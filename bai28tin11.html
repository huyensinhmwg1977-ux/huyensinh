<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hành Trình GIMP - Tin Học 11</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f1f5f9;
        }

        #game-area {
            position: relative;
            width: 1024px;
            height: 576px;
            background-color: #87CEEB;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border-radius: 12px;
        }

        /* --- Hiệu ứng Mây trôi --- */
        .cloud { position: absolute; background-color: rgba(255, 255, 255, 0.9); border-radius: 50px; animation: floatCloud linear infinite; }
        .cloud::after, .cloud::before { content: ''; position: absolute; background-color: rgba(255, 255, 255, 0.9); border-radius: 50%; }
        
        .cloud1 { width: 120px; height: 40px; top: 50px; left: -150px; animation-duration: 45s; }
        .cloud1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud1::after { width: 80px; height: 80px; top: -40px; right: 15px; }
        
        .cloud2 { width: 100px; height: 35px; top: 120px; left: -100px; animation-duration: 35s; animation-delay: 5s; opacity: 0.8; }
        .cloud2::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud2::after { width: 60px; height: 60px; top: -30px; right: 10px; }

        .cloud3 { width: 150px; height: 50px; top: 80px; left: -200px; animation-duration: 50s; animation-delay: 15s; opacity: 0.9; }
        .cloud3::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .cloud3::after { width: 90px; height: 90px; top: -45px; right: 20px; }

        @keyframes floatCloud {
            0% { transform: translateX(-250px); }
            100% { transform: translateX(1200px); }
        }

        /* --- Đàn chim lượn sóng --- */
        .bird {
            position: absolute;
            font-size: 30px;
            z-index: 5;
            animation: flyX linear infinite, flyY 1.5s ease-in-out infinite alternate;
        }

        @keyframes flyX {
            0% { left: -100px; }
            100% { left: 1200px; }
        }

        @keyframes flyY {
            0% { transform: scaleX(-1) translateY(0) rotate(-5deg); }
            100% { transform: scaleX(-1) translateY(-20px) rotate(5deg); }
        }

        .bird1 { top: 90px; animation-duration: 22s, 1.2s; }
        .bird2 { top: 130px; animation-duration: 26s, 1.5s; animation-delay: 2s, 0s; font-size: 24px;}
        .bird3 { top: 70px; animation-duration: 18s, 1s; animation-delay: 6s, 0s; font-size: 35px;}
        .bird4 { top: 150px; animation-duration: 30s, 1.8s; animation-delay: 10s, 0s; font-size: 20px;}
        .bird5 { top: 100px; animation-duration: 24s, 1.4s; animation-delay: 14s, 0s; }

        /* Header */
        #header-bar {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 10;
        }

        /* Đường chạy và Khối */
        #track {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }

        .track-block {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            border: 3px solid;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .block-normal { background-color: #f1c40f; border-color: #f39c12; }
        .block-active { background-color: #bdc3c7; border-color: #95a5a6; }
        .block-correct { background-color: #2ecc71; border-color: #27ae60; box-shadow: 0 0 20px 10px rgba(46, 204, 113, 0.6); }
        .block-wrong { background-color: #34495e; border-color: #2c3e50; }

        .block-number { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .block-wrong .block-number { color: #fff; } 

        /* Icons trên khối */
        .track-block:nth-child(1)::before { content:'📚'; font-size: 50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }
        .track-block:nth-child(2)::before { content:'📓'; font-size: 50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }
        .track-block:nth-child(3)::before { content:'🖥️'; font-size: 50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }
        .track-block:nth-child(4)::before { content:'💻'; font-size: 50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }
        .track-block:nth-child(5)::before { content:'✏️'; font-size: 50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }
        .track-block:nth-child(6)::before { content:'🌳'; font-size: 50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }
        .track-block:nth-child(7)::before { content:'🎨'; font-size:50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }
        .track-block:nth-child(8)::before { content:'🔬'; font-size: 50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }
        .track-block:nth-child(9)::before { content:'🎵'; font-size: 50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }
        .track-block:nth-child(10)::before { content:'🏀'; font-size: 50px; position:absolute; top:-70px; left:150%; transform:translateX(-150%); }

        /* Hộp câu hỏi */
        #quiz-box {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 450px;
            background-color: rgba(255, 255, 255, 0.98);
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #question-text {
            font-size: 20px;
            line-height: 1.5;
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 25px;
            width: 100%;
        }

        #answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 20px; }

        .answer-btn {
            background-color: #f8f9fa; color: #34495e; border: 2px solid #bdc3c7; border-radius: 8px;
            padding: 12px 15px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: left; transition: all 0.2s ease;
        }
        .answer-btn:hover:not(:disabled) { border-color: #3498db; background-color: #ebf5fb; }
        .answer-btn.selected-correct { background-color: #e8f8f5; border-color: #27ae60; color: #27ae60; }
        .answer-btn.selected-wrong { background-color: #fdedec; border-color: #e74c3c; color: #e74c3c; }

        #feedback-text { font-size: 18px; font-weight: bold; margin-bottom: 15px; width: 100%; display: none; text-align: center; }

        #next-btn {
            display: none; background-color: #3498db; color: white; border: none; border-radius: 25px;
            padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: transform 0.1s;
        }
        #next-btn:hover { background-color: #2980b9; transform: scale(1.05); }

        /* --- NHÂN VẬT QUAY MẶT VỀ TRƯỚC VÀ NHẢY --- */
        #player {
            position: absolute;
            font-size: 45px;
            z-index: 15;
            transition: left 0.6s linear; 
            /* scaleX(-1) giúp nhân vật luôn quay mặt về bên phải */
            transform: scaleX(-1); 
        }

        /* Class tạo độ nảy vòng cung Parabol trên trục Y (nhớ giữ nguyên hướng mặt) */
        .jumping-arc {
            animation: jumpArc 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes jumpArc {
            0%   { transform: translateY(0) scaleX(-1); }
            50%  { transform: translateY(-110px) scaleX(-1); }
            100% { transform: translateY(0) scaleX(-1); }
        }

        /* Hoạt ảnh hiện ra màn hình tổng kết */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Modal Bắt Đầu Game */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; border-radius: 12px;
        }
        #start-overlay h1 { color: #f1c40f; font-size: 36px; text-shadow: 2px 2px 5px #000; margin-bottom: 10px;}
        #start-overlay input {
            padding: 12px; font-size: 18px; border-radius: 6px; border: none; outline: none; margin-bottom: 20px; width: 250px; text-align: center;
        }
        #start-overlay button {
            padding: 15px 40px; font-size: 24px; font-weight: bold;
            background: #f1c40f; border: none; border-radius: 10px; cursor: pointer; color: #333; transition: transform 0.2s;
        }
        #start-overlay button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div id="game-area">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    
    <div class="bird bird1">🦅</div>
    <div class="bird bird2">🦅</div>
    <div class="bird bird3">🦅</div>
    <div class="bird bird4">🦅</div>
    <div class="bird bird5">🦅</div>

    <div id="header-bar">
        Học sinh: <span id="display-name" style="color:#2980b9">Khách</span> | Điểm: <span id="current-score" style="color:#e74c3c">0</span> / 100 | Câu: <span id="current-question-num">1</span> / 10
    </div>

    <div id="track"></div>

    <div id="player">🏃‍♂️</div>

    <div id="quiz-box">
        <div id="question-text">Đang tải câu hỏi...</div>
        <div id="answers-grid"></div>
        <div id="feedback-text"></div>
        <button id="next-btn">Câu Tiếp Theo ➔</button>
    </div>

    <div id="start-overlay">
        <h1>BÀI 28. TẠO ẢNH ĐÔNG </h1>
        <input type="text" id="studentName" placeholder="Nhập tên của bạn...">
        <button onclick="startGame()">▶ BẮT ĐẦU CHƠI</button>
    </div>
</div>

<script>
    let currentQuestionIndex = 0;
    let score = 0;
    let isAnswered = false;
    let playerName = "";
    
    const scoreSpan = document.getElementById('current-score');
    const questionNumSpan = document.getElementById('current-question-num');
    const trackDiv = document.getElementById('track');
    const playerDiv = document.getElementById('player');
    const questionTextDiv = document.getElementById('question-text');
    const answersGrid = document.getElementById('answers-grid');
    const feedbackTextDiv = document.getElementById('feedback-text');
    const nextBtn = document.getElementById('next-btn');

    // --- ÂM THANH ---
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTone(freq, type, duration, startTime) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, startTime);
        gainNode.gain.setValueAtTime(0.1, startTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
    }
    function playHappySound() {
        if(!audioCtx) return;
        const now = audioCtx.currentTime;
        playTone(523.25, 'sine', 0.15, now);      
        playTone(659.25, 'sine', 0.15, now + 0.1); 
        playTone(1046.50, 'sine', 0.4, now + 0.2); 
    }
    function playSadSound() {
        if(!audioCtx) return;
        const now = audioCtx.currentTime;
        playTone(300, 'sawtooth', 0.3, now);
        playTone(200, 'sawtooth', 0.6, now + 0.3);
    }

    // --- HIỆU ỨNG HÌNH ẢNH ---
    function createParticles(isHappy) {
        const area = document.getElementById('game-area');
        const playerRect = playerDiv.getBoundingClientRect();
        const areaRect = area.getBoundingClientRect();
        
        const startX = playerRect.left - areaRect.left + 20;
        const startY = playerRect.top - areaRect.top;
        const emojis = isHappy ? ['🎆', '✨', '🌟', '🎉'] : ['😢', '🌧️', '💔', '🌚'];
        
        for(let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            p.style.position = 'absolute';
            p.style.left = startX + 'px'; p.style.top = startY + 'px';
            p.style.fontSize = isHappy ? '30px' : '35px';
            p.style.pointerEvents = 'none'; p.style.zIndex = '100';
            p.style.transition = 'all 1s cubic-bezier(0.1, 0.8, 0.3, 1)'; 
            area.appendChild(p);

            setTimeout(() => {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 120 + 50;
                p.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(${isHappy? 1.5 : 1.2})`;
                p.style.opacity = '0';
            }, 10);
            setTimeout(() => p.remove(), 1000);
        }
    }

    // --- DATA CÂU HỎI ---
    const quizData = [
        { q: "Câu 1: Định dạng tệp tin nào sau đây hỗ trợ lưu trữ ảnh động?", a: [".PNG", ".JPG", ".GIF", ".BMP"], correct: 2 },
        { q: "Câu 2: Trong GIMP, mỗi khung hình của ảnh động được lưu dưới dạng gì?", a: ["Tệp tin riêng", "Một Lớp (Layer)", "Kênh màu", "Đường dẫn (Path)"], correct: 1 },
        { q: "Câu 3: Để xem thử ảnh động trước khi xuất file, dùng lệnh nào?", a: ["Filters -> Animation -> Playback", "View -> Animation", "Tools -> Preview", "Image -> Play Animation"], correct: 0 },
        { q: "Câu 4: Làm sao để điều chỉnh thời gian hiển thị cho 1 khung hình?", a: ["Edit -> Delay time", "Đổi tên Layer (VD: Ten (100ms))", "Dùng Time Tool", "Không thể chỉnh"], correct: 1 },
        { q: "Câu 5: Khi xuất ảnh động (Export As), phải chọn tùy chọn nào?", a: ["As image", "As animation", "Save layers", "Motion JPEG"], correct: 1 },
        { q: "Câu 6: Tùy chọn 'Loop forever' có ý nghĩa gì?", a: ["Ảnh lặp lại vô tận", "Ảnh chạy 1 lần", "Tăng tốc độ tối đa", "Lặp màu sắc"], correct: 0 },
        { q: "Câu 7: Lệnh Filters -> Animation -> Optimize (for GIF) dùng làm gì?", a: ["Làm nét ảnh", "Thêm hiệu ứng", "Giảm dung lượng tệp GIF", "Căn chỉnh màu"], correct: 2 },
        { q: "Câu 8: Chế độ 'Replace' (thay thế) khung hình có nghĩa là gì?", a: ["Khung mới đè lên khung cũ", "Khung cũ bị xóa trước khi hiện khung mới", "Pha trộn màu sắc", "Nhân đôi khung"], correct: 1 },
        { q: "Câu 9: Để tạo hiệu ứng quả bóng rơi, cần làm gì với các Layer?", a: ["1 Layer + Move tool", "Nhiều Layer, dịch xuống", "Blur -> Motion blur", "Image -> Transform"], correct: 1 },
        { q: "Câu 10: Tham số 'ms' (ví dụ 100ms) trong tên layer là viết tắt của?", a: ["Microseconds", "Minutes", "Milliseconds (Mili giây)", "Metres per second"], correct: 2 }
    ];

    function startGame() {
        const nameInput = document.getElementById('studentName').value.trim();
        playerName = nameInput !== "" ? nameInput : "Học sinh";
        document.getElementById('display-name').textContent = playerName;

        document.getElementById('start-overlay').style.display = 'none';
        initAudio(); 
        
        trackDiv.innerHTML = '';
        for (let i = 1; i <= 10; i++) {
            const block = document.createElement('div');
            block.className = 'track-block block-normal';
            block.innerHTML = `<div class="block-number">${i}</div>`;
            trackDiv.appendChild(block);
        }
        
        setTimeout(() => {
            updatePlayerPosition(0, false);
            loadQuestionData(0);
        }, 50);
    }

    function updatePlayerPosition(index, animateJump = true) {
        const blocks = trackDiv.children;
        const currentBlock = blocks[index];
        
        const blockRect = currentBlock.getBoundingClientRect();
        const areaRect = document.getElementById('game-area').getBoundingClientRect();
        
        const targetLeft = (blockRect.left - areaRect.left + blockRect.width / 2 - 25);
        const targetTop = (blockRect.top - areaRect.top - 55);
        
        playerDiv.style.left = targetLeft + 'px';
        playerDiv.style.top = targetTop + 'px'; 

        if (animateJump) {
            playerDiv.classList.remove('jumping-arc');
            void playerDiv.offsetWidth; 
            playerDiv.classList.add('jumping-arc');
        }
        
        for (let i = 0; i < blocks.length; i++) {
            if(!blocks[i].classList.contains('block-correct') && !blocks[i].classList.contains('block-wrong')) {
                blocks[i].className = 'track-block block-normal'; 
            }
        }
        currentBlock.className = 'track-block block-active';
    }

    function loadQuestionData(index) {
        // --- GIAO DIỆN HOÀN THÀNH BÀI TẬP ĐẸP MẮT ---
        if (index >= 10) {
            questionTextDiv.innerHTML = `
                <div style="text-align: center; animation: popIn 0.5s ease-out;">
                    <div style="font-size: 60px; margin-bottom: 10px;">🏆</div>
                    <h1 style="color:#2ecc71; margin:0 0 10px 0; font-size: 28px;">Xuất sắc, ${playerName}!</h1>
                    <p style="font-size:18px; color: #7f8c8d; margin-bottom: 20px;">Bạn đã hoàn thành Hành Trình GIMP Số</p>
                </div>
            `;
            answersGrid.innerHTML = `
                <div style="grid-column: 1 / span 2; text-align: center; background: #f8f9fa; padding: 20px; border-radius: 12px; border: 2px dashed #bdc3c7;">
                    <p style="font-size:20px; margin: 0; color: #34495e;">Điểm số cuối cùng</p>
                    <p style="font-size:48px; margin: 10px 0; color: #e74c3c; font-weight: bold;">${score} <span style="font-size: 24px; color: #95a5a6;">/ 100</span></p>
                </div>
                <div style="grid-column: 1 / span 2; display: flex; justify-content: center; margin-top: 20px;">
                    <button onclick="location.reload()" style="background-color: #f39c12; color: white; border: none; border-radius: 25px; padding: 15px 40px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: transform 0.2s;">
                        🔄 LÀM LẠI TỪ ĐẦU
                    </button>
                </div>
            `;
            feedbackTextDiv.style.display = 'none';
            nextBtn.style.display = 'none';

            // Tung pháo hoa chúc mừng liên tục
            createParticles(true);
            setTimeout(() => createParticles(true), 800);
            setTimeout(() => createParticles(true), 1600);
            playHappySound();
            return;
        }

        isAnswered = false;
        feedbackTextDiv.style.display = 'none';
        nextBtn.style.display = 'none';
        scoreSpan.textContent = score;
        questionNumSpan.textContent = index + 1;

        const qData = quizData[index];
        questionTextDiv.textContent = qData.q;
        
        answersGrid.innerHTML = '';
        const labels = ['A.', 'B.', 'C.', 'D.'];

        qData.a.forEach((ans, i) => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.innerHTML = `<span style="color:#2980b9; margin-right:5px;">${labels[i]}</span> ${ans}`;
            btn.onclick = () => checkAnswer(i, qData.correct);
            answersGrid.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, correctIndex) {
        if (isAnswered) return;
        isAnswered = true;
        
        const buttons = answersGrid.children;
        const currentBlock = trackDiv.children[currentQuestionIndex];

        if (selectedIndex === correctIndex) {
            score += 10;
            scoreSpan.textContent = score;
            buttons[selectedIndex].classList.add('selected-correct');
            
            feedbackTextDiv.style.color = '#27ae60';
            feedbackTextDiv.textContent = "Chính xác! Chuẩn bị nhảy tới nào!";
            currentBlock.className = 'track-block block-correct';
            
            playHappySound(); 
            createParticles(true); 

        } else {
            scoreSpan.textContent = score;

            buttons[selectedIndex].classList.add('selected-wrong');
            buttons[correctIndex].classList.add('selected-correct'); 
            
            feedbackTextDiv.style.color = '#e74c3c';
            feedbackTextDiv.textContent = "Chưa đúng rồi! Khối đã chuyển thành màu đen.";
            currentBlock.className = 'track-block block-wrong';
            
            playSadSound(); 
            createParticles(false); 
        }

        for(let btn of buttons) btn.disabled = true;

        feedbackTextDiv.style.display = 'block';
        nextBtn.style.display = 'block';
    }

    nextBtn.onclick = () => {
        currentQuestionIndex++;
        if (currentQuestionIndex < 10) {
            updatePlayerPosition(currentQuestionIndex, true); 
        }
        loadQuestionData(currentQuestionIndex);
    };

    document.getElementById("studentName").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            startGame();
        }
    });

</script>
</body>
</html>
