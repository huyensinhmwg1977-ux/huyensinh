            { id: 'tf2_b', text: "Hàng có STT 1 là hàng chứa thông tin của học sinh NGUYEN AN.", correct: "Đúng" },
            { id: 'tf2_c', text: "Trong bảng dữ liệu trên, trường MA HS được chọn làm khoá chính.", correct: "Đúng" },
            { id: 'tf2_d', text: "Công thức tính điểm trung bình (DIEMTOAN*2 + DIEMVAN*2 + DIEMTIN)/5.", correct: "Đúng" }
        ]},
        { id: 'c3', type: 'tf_cluster', huong: 'CS', question: "Ứng dụng của học máy trong chẩn đoán bệnh tim mạch...", subQuestions: [
            { id: 'tf3_a', text: "Mô hình học máy có khả năng dự đoán nguy cơ đột quỵ.", correct: "Đúng" },
            { id: 'tf3_b', text: "Chẩn đoán bệnh tim mạch dựa trên học máy luôn chính xác 100%.", correct: "Sai" },
            { id: 'tf3_c', text: "Giúp rút ngắn thời gian nhưng không thể giảm chi phí điều trị.", correct: "Sai" },
            { id: 'tf3_d', text: "Phân tích các tín hiệu điện tâm đồ (ECG).", correct: "Đúng" }
        ]},
        { id: 'c4', type: 'tf_cluster', huong: 'CS', question: "Viết chương trình duyệt và tính tổng ma trận hai chiều...", subQuestions: [
            { id: 'tf4_a', text: "Chương trình sẽ in ra kết quả là 45.", correct: "Đúng" },
            { id: 'tf4_b', text: "Nếu trong ma trận có số âm, chương trình vẫn tính đúng.", correct: "Đúng" },
            { id: 'tf4_c', text: "Thêm một hàng mới vào ma trận, chương trình vẫn chạy đúng.", correct: "Đúng" },
            { id: 'tf4_d', text: "Ma trận có các hàng không đều về số cột sẽ bị lỗi.", correct: "Sai" }
        ]},
        { id: 'c5', type: 'tf_cluster', huong: 'ICT', question: "Nhóm tình nguyện viên xây dựng trang web hoạt động từ thiện...", subQuestions: [
            { id: 'tf5_a', text: "Biểu mẫu giúp thu thập thông tin người hỗ trợ.", correct: "Đúng" },
            { id: 'tf5_b', text: "Nhúng bản đồ hướng dẫn địa điểm là không cần thiết.", correct: "Sai" },
            { id: 'tf5_c', text: "Video hoạt động có thể tạo cảm hứng cho người xem.", correct: "Đúng" },
            { id: 'tf5_d', text: "Các video và bản đồ không cần cập nhật thường xuyên.", correct: "Sai" }
        ]},
        { id: 'c6', type: 'tf_cluster', huong: 'ICT', question: "Thiết kế truy vấn cho yêu cầu Đưa ra danh sách các sách...", subQuestions: [
            { id: 'tf6_a', text: "Thiết lập liên kết giữa SACH và MUON_SACH là 1-1.", correct: "Sai" },
            { id: 'tf6_b', text: "Liên kết bằng biểu thức SACH.MaSach = MUON_SACH.MaSach.", correct: "Đúng" },
            { id: 'tf6_c', text: "Chỉ cần liệt kê bảng SACH và xếp theo tên sách.", correct: "Sai" },
            { id: 'tf6_d', text: "Điều kiện lọc (NgayMuon >= '2024-09-01') AND (NgayMuon <= '2024-09-30').", correct: "Đúng" }
        ]}
    ];

    let currentQuestions = [];
    let userAnswers = {};
    let currentIdx = 0;
    let studentInfo = {};
    let timerInterval;

    // Bắt đầu thi
    document.getElementById('login-form').onsubmit = (e) => {
        e.preventDefault();
        studentInfo = {
            hoTen: document.getElementById('hoTen').value,
            lop: document.getElementById('lop').value,
            huong: document.querySelector('input[name="chonHuong"]:checked').value
        };
        
        // Lọc câu hỏi: Lấy toàn bộ Phần 1 + Phần 2 (Chung + Hướng đã chọn)
        let p1 = rawQuestions.filter(q => q.type === 'single');
        let p2 = rawQuestions.filter(q => q.type === 'tf_cluster' && (q.huong === 'chung' || q.huong === studentInfo.huong));
        currentQuestions = [...p1, ...p2];

        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        document.getElementById('student-info').innerText = studentInfo.hoTen + " - " + studentInfo.lop;
        
        renderQuestion();
        startTimer(45 * 60);
    };

    function renderQuestion() {
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        let html = "";

        if (q.type === 'single') {
            html = `<p class="text-blue-600 font-black mb-2">PHẦN I: TRẮC NGHIỆM 1 LỰA CHỌN ĐÚNG</p>
                    <h2 class="text-xl font-bold text-red-600 mb-6">Câu ${currentIdx + 1}: ${q.question}</h2>
                    <div class="space-y-4">
                        ${q.options.map((opt, i) => `
                            <label class="block">
                                <input type="radio" name="q${q.id}" class="hidden" onchange="userAnswers['${q.id}']=${i}" ${userAnswers[q.id]===i?'checked':''}>
                                <div class="option-label p-4 border-2 border-gray-100 rounded-2xl cursor-pointer font-bold flex items-center gap-4 transition-all">
                                    <span class="w-8 h-8 rounded-full border-2 flex items-center justify-center">${String.fromCharCode(65+i)}</span> ${opt}
                                </div>
                            </label>
                        `).join('')}
                    </div>`;
        } else {
            html = `<p class="text-orange-600 font-black mb-2">PHẦN II: TRẮC NGHIỆM ĐÚNG SAI</p>
                    <h2 class="text-xl font-bold text-red-600 mb-4">Câu ${currentIdx + 1}: ${q.question}</h2>
                    <div class="space-y-4">
                        ${q.subQuestions.map(sub => `
                            <div class="bg-gray-50 p-4 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4 border border-gray-100">
                                <span class="font-bold text-gray-700">${sub.text}</span>
                                <div class="flex gap-2">
                                    <input type="radio" id="T${sub.id}" name="${sub.id}" class="hidden" onchange="userAnswers['${sub.id}']='Đúng'" ${userAnswers[sub.id]==='Đúng'?'checked':''}>
                                    <label for="T${sub.id}" class="option-label px-6 py-2 border-2 rounded-xl font-black cursor-pointer bg-white text-gray-400">ĐÚNG</label>
                                    <input type="radio" id="S${sub.id}" name="${sub.id}" class="hidden" onchange="userAnswers['${sub.id}']='Sai'" ${userAnswers[sub.id]==='Sai'?'checked':''}>
                                    <label for="S${sub.id}" class="option-label px-6 py-2 border-2 rounded-xl font-black cursor-pointer bg-white text-gray-400">SAI</label>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
        }
        container.innerHTML = html;
        document.getElementById('next-btn').style.display = currentIdx === currentQuestions.length - 1 ? 'none' : 'block';
        document.getElementById('submit-btn').style.display = currentIdx === currentQuestions.length - 1 ? 'block' : 'none';
    }

    document.getElementById('next-btn').onclick = () => { currentIdx++; renderQuestion(); };

    async function submitQuiz() {
        clearInterval(timerInterval);
        let correctCount = 0;
        let totalItems = 0;
        
        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                totalItems++; if (userAnswers[q.id] === q.correct) correctCount++;
            } else {
                q.subQuestions.forEach(s => {
                    totalItems++; if (userAnswers[s.id] === s.correct) correctCount++;
                });
            }
        });

        const score = (correctCount * 10 / totalItems).toFixed(2);
        
        // Gửi lên Firebase
        await scoresRef.push({
            ...studentInfo,
            diem: parseFloat(score),
            dung: correctCount,
            tong: totalItems,
            thoiGian: firebase.database.ServerValue.TIMESTAMP
        });

        document.getElementById('final-score').innerText = score;
        document.getElementById('final-detail').innerText = `Đúng ${correctCount}/${totalItems} ý`;
        document.getElementById('result-modal').classList.remove('hidden');
    }

    document.getElementById('submit-btn').onclick = submitQuiz;

    // Xem lại bài chi tiết
    function reviewQuiz() {
        document.getElementById('result-modal').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('submit-btn').classList.add('hidden');
        
        const container = document.getElementById('question-container');
        container.innerHTML = `<h2 class="text-2xl font-black text-blue-800 mb-8 border-b-4 border-blue-200 pb-2">KẾT QUẢ CHI TIẾT</h2>` + 
        currentQuestions.map((q, idx) => {
            if (q.type === 'single') {
                return `<div class="mb-8 p-5 rounded-3xl border-2">
                    <p class="font-bold mb-4">Câu ${idx+1}: ${q.question}</p>
                    ${q.options.map((opt, i) => {
                        let isUser = userAnswers[q.id] === i;
                        let isCorrect = q.correct === i;
                        let cls = isCorrect ? 'review-correct' : (isUser ? 'review-incorrect' : '');
                        return `<div class="p-3 mb-2 rounded-xl border ${cls}">${String.fromCharCode(65+i)}. ${opt} ${isCorrect?'✅':(isUser?'❌':'')}</div>`
                    }).join('')}
                </div>`;
            } else {
                return `<div class="mb-8 p-5 rounded-3xl border-2">
                    <p class="font-bold mb-4">Câu ${idx+1}: ${q.question}</p>
                    ${q.subQuestions.map(s => {
                        let isTrue = userAnswers[s.id] === s.correct;
                        return `<div class="p-3 mb-2 rounded-xl border ${isTrue?'review-correct':'review-incorrect'}">
                            ${s.text} <br> <span class="text-sm">Em chọn: <b>${userAnswers[s.id]||'Bỏ trống'}</b> - Đáp án: <b>${s.correct}</b></span>
                        </div>`
                    }).join('')}
                </div>`;
            }
        }).join('') + `<button onclick="location.reload()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl mt-4">XONG, QUAY VỀ TRANG CHỦ</button>`;
        container.scrollIntoView({ behavior: 'smooth' });
    }

    function startTimer(seconds) {
        let remain = seconds;
        timerInterval = setInterval(() => {
            remain--;
            let m = Math.floor(remain/60), s = remain%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(remain <= 0) submitQuiz();
        }, 1000);
    }
</script>
</body>
</html>
