<!doctype html>
<html lang="vi" class="w-full h-full m-0 p-0">
 <head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Kiểm Tra Trắc Nghiệm - Tin Học 12 (Đề 3)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none !important; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body { 
      font-family: 'Be Vietnam Pro', sans-serif; 
      -webkit-user-select: none !important; -moz-user-select: none !important;
      -ms-user-select: none !important; user-select: none !important; 
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    
    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    input, textarea, select {
      -webkit-user-select: auto !important; -moz-user-select: auto !important;
      -ms-user-select: auto !important; user-select: auto !important;
      pointer-events: auto !important;
    }
    #app { width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden; padding-bottom: 50px; }
    
    .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .option-label { transition: all 0.2s ease-in-out; cursor: pointer; border-color: #e2e8f0; }
    .option-label:hover { transform: translateX(6px); background-color: #f0fdfa; border-color: #38bdf8; box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.1); }
    
    input[type="radio"].de-radio:checked + .de-label {
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        border-color: #0ea5e9;
        box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.3);
    }
    input[type="radio"].de-radio:checked + .de-label .de-icon { background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; }

    /* Nút chọn Phần I */
    input[type="radio"].single-radio:checked + .option-label {
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      color: white; border-color: transparent;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }
    input[type="radio"].single-radio:checked + .option-label span:first-child { background-color: rgba(255,255,255,0.25); border-color: transparent; color: white; }
    input[type="radio"].single-radio:checked + .option-label span:last-child { color: white; }
    
    /* Nút chọn Phần II */
    .tf-radio-T:checked + .tf-label-T, .tf-radio-S:checked + .tf-label-S {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important; 
        border-color: transparent !important; color: white !important;
        box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);
    }

    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .my-score-row {
      background: linear-gradient(to right, #fdf4ff, #ffffff) !important;
      border-left: 4px solid #db2777 !important; font-weight: 700 !important;
      color: #9d174d !important; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; z-index: 10;
    }
    .my-score-row td { padding-top: 16px; padding-bottom: 16px; }
    button:active { transform: scale(0.96); }

    /* LÀM ĐẸP ĐOẠN CODE (NỀN SÁNG, CHỮ XANH ĐẬM) */
    .code-block { 
        background: #f8fafc; 
        color: #1e3a8a; 
        padding: 15px 20px; 
        border-radius: 10px; 
        font-family: 'Consolas', 'Courier New', monospace; 
        white-space: pre-wrap; 
        margin: 15px 0; 
        font-size: 16px; 
        font-weight: 700;
        border: 1px solid #e2e8f0;
        border-left: 5px solid #3b82f6; 
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    /* CSS bảng dữ liệu */
    .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 15px; font-size: 0.95rem; background: white; }
    .data-table th, .data-table td { border: 1px solid #cbd5e1; padding: 8px 12px; text-align: left; }
    .data-table th { background-color: #f1f5f9; font-weight: bold; color: #334155; }
    .data-table tr:nth-child(even) { background-color: #f8fafc; }

    /* CSS chế độ xem lại (Review Mode) */
    body.is-reviewing #app { padding-bottom: 100px; } 
    .review-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
    .review-incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; text-decoration: line-through; opacity: 0.8; }
    .review-neutral { background-color: #ffffff !important; border-color: #e2e8f0 !important; opacity: 0.5; }
  </style>
 </head>
 <body oncopy="return false" oncut="return false" onpaste="return false">
  <div id="app" class="p-0 sm:p-4 md:p-8 flex flex-col sm:block transition-all">
   
   <div id="login-section" class="w-full min-h-screen sm:min-h-0 sm:h-auto max-w-md mx-auto fade-in flex-grow flex flex-col sm:justify-center">
    <div class="glass-card rounded-none sm:rounded-3xl p-6 sm:p-8 flex flex-col justify-start flex-grow sm:flex-grow-0">
     <div class="text-center mb-6 pt-4 sm:pt-0">
      <div class="w-24 h-24 bg-gradient-to-br from-pink-500 to-orange-400 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-lg transform rotate-3 hover:rotate-0 transition-transform">
       <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-purple-600 mb-1">Kiểm Tra Tin Học</h1>
      <p class="text-gray-600 font-bold">Thời gian làm bài: 45 Phút</p>
     </div>
     
     <form id="login-form" class="space-y-4">
      <div class="flex flex-col sm:flex-row gap-4">
          <div class="w-full sm:flex-1">
               <label class="block text-sm font-bold text-gray-700 mb-1">Họ và tên</label> 
               <input type="text" id="hoTen" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-pink-500 focus:ring-4 focus:ring-pink-100 outline-none transition-all" placeholder="Nhập họ tên...">
          </div>
          <div class="w-full sm:w-1/3">
               <label class="block text-sm font-bold text-gray-700 mb-1">Lớp</label> 
               <input type="text" id="lop" required class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-pink-500 focus:ring-4 focus:ring-pink-100 outline-none transition-all" placeholder="12A1">
          </div>
      </div>
      
      <div class="pt-2">
          <label class="block text-sm font-bold text-blue-600 mb-2">🎯 Chọn định hướng Phần riêng:</label>
          <div class="grid grid-cols-1 gap-3">
              <label class="cursor-pointer">
                  <input type="radio" name="chonHuong" value="CS" class="hidden de-radio" checked>
                  <div class="de-label flex items-center p-3 border-2 border-gray-200 rounded-2xl transition-all h-full">
                      <div class="de-icon w-10 h-10 rounded-xl bg-gray-100 text-gray-500 flex items-center justify-center font-bold text-sm mr-3">CS</div>
                      <div class="de-text text-gray-800 font-extrabold text-sm leading-tight">Khoa học máy tính<br><span class="text-xs font-normal text-gray-500">Định hướng KHTN</span></div>
                  </div>
              </label>
              <label class="cursor-pointer">
                  <input type="radio" name="chonHuong" value="ICT" class="hidden de-radio">
                  <div class="de-label flex items-center p-3 border-2 border-gray-200 rounded-2xl transition-all h-full">
                      <div class="de-icon w-10 h-10 rounded-xl bg-gray-100 text-gray-500 flex items-center justify-center font-bold text-sm mr-3">ICT</div>
                      <div class="de-text text-gray-800 font-extrabold text-sm leading-tight">Tin học ứng dụng<br><span class="text-xs font-normal text-gray-500">Định hướng ICT</span></div>
                  </div>
              </label>
          </div>
      </div>

      <button type="submit" id="start-btn" class="w-full py-4 mt-6 bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 text-white font-extrabold rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all text-xl"> 🚀 BẮT ĐẦU THI </button>
     </form>
     <div class="mt-4 text-center pb-8 sm:pb-0">
         <button id="view-scores-btn" type="button" class="text-blue-600 font-extrabold hover:text-blue-800 hover:underline transition-colors text-lg">🏆 Xem bảng điểm</button>
     </div>
    </div>
   </div>

   <div id="quiz-section" class="w-full min-h-screen sm:min-h-0 sm:h-auto max-w-4xl mx-auto hidden flex-grow flex flex-col">
    <div class="glass-card rounded-none sm:rounded-3xl p-4 sm:p-8 flex flex-col flex-grow relative">
     <div class="flex items-center justify-between mb-4 sm:mb-6 pb-4 border-b-2 border-gray-100">
      <div>
       <h2 id="quiz-title" class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">Đề Số 3</h2>
       <p id="student-info" class="text-sm font-bold text-gray-500 mt-1 uppercase tracking-wide"></p>
      </div>
      <div class="text-right bg-blue-50 px-4 py-2 rounded-xl border border-blue-100" id="progress-container">
       <div class="text-xs text-blue-500 font-bold uppercase tracking-wider mb-1">Tiến độ</div>
       <div id="progress-text" class="text-xl font-black text-blue-700">0/0</div>
      </div>
     </div>
     
     <div id="timer-banner" class="mb-6 p-4 bg-gradient-to-r from-orange-50 to-red-50 border-2 border-red-100 rounded-2xl flex items-center justify-between shadow-sm">
        <span class="text-red-800 font-extrabold flex items-center gap-2"><span class="text-2xl animate-pulse">⏰</span> THỜI GIAN CÒN LẠI:</span> 
        <span id="timer" class="text-3xl font-black text-red-600 font-mono tracking-wider drop-shadow-sm">45:00</span>
     </div>

     <div id="question-container" class="mb-8 flex-grow"></div>
     
     <div id="nav-buttons" class="flex gap-4 pt-4 sm:pt-6 border-t-2 border-gray-100 mt-auto pb-4 sm:pb-0">
        <button id="next-btn" class="flex-1 py-4 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-extrabold text-xl rounded-2xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">Tiếp theo ➔</button> 
        <button id="submit-btn" class="flex-1 py-4 bg-gradient-to-r from-green-500 to-emerald-600 text-white font-extrabold text-xl rounded-2xl shadow-lg hover:shadow-xl hidden transition-all transform hover:-translate-y-1">✅ NỘP BÀI NGAY</button>
     </div>
    </div>
   </div>

   <div id="scores-section" class="w-full min-h-screen sm:min-h-0 sm:h-auto max-w-4xl mx-auto hidden flex-grow flex flex-col">
    <div class="glass-card rounded-none sm:rounded-3xl p-4 sm:p-8 flex flex-col flex-grow">
     <div class="mb-6 flex items-center justify-between">
      <h2 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600">🏆 BẢNG XẾP HẠNG (THỜI GIAN THỰC)</h2>
      <button onclick="goHome()" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-sm border border-gray-200">🏠 Về trang chủ</button>
     </div>
     <div class="overflow-x-auto rounded-2xl border-2 border-gray-100 flex-grow shadow-lg bg-white/50">
      <table class="w-full text-sm sm:text-base">
       <thead class="bg-gradient-to-r from-orange-500 to-red-500 text-white">
        <tr>
         <th class="px-3 sm:px-5 py-4 text-left font-extrabold">#</th>
         <th class="px-3 sm:px-5 py-4 text-left font-extrabold">Họ tên</th>
         <th class="px-3 sm:px-5 py-4 text-left font-extrabold">Hướng</th>
         <th class="px-3 sm:px-5 py-4 text-center font-extrabold">Ý Đúng</th>
         <th class="px-3 sm:px-5 py-4 text-center font-extrabold">Điểm (10)</th>
         <th class="px-3 sm:px-5 py-4 text-right font-extrabold">Ngày nộp</th>
        </tr>
       </thead>
       <tbody id="scores-tbody" class="bg-white/80 divide-y divide-gray-100"></tbody>
      </table>
      <div id="no-scores" class="text-center py-12 hidden text-gray-500 font-bold text-lg">Chưa có dữ liệu nộp bài 🥲</div>
     </div>
    </div>
   </div>

   <div id="result-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white rounded-[2rem] shadow-2xl p-8 max-w-md w-full fade-in text-center flex flex-col border-t-8 border-green-500" id="result-content"></div>
   </div>
  </div>

  <script>
    // ==================== BẢO VỆ TÀI LIỆU ====================
    document.addEventListener('contextmenu', event => event.preventDefault()); 
    document.addEventListener('selectstart', event => {
        if (event.target.tagName !== 'INPUT' && event.target.tagName !== 'SELECT') { event.preventDefault(); }
    });
    document.addEventListener('dragstart', event => event.preventDefault()); 
    document.addEventListener('copy', event => {
        event.clipboardData.setData('text/plain', 'Tài liệu đã được bảo vệ!');
        event.preventDefault();
    });

    // ==================== NGÂN HÀNG CÂU HỎI ĐỀ 3 ====================
    const rawQuestions = [
        // PHẦN 1
        { id: 1, type: "single", question: "Phương án nào sau đây là một trong những khả năng của AI?", options: ["AI chỉ có thể đọc văn bản, không có khả năng học và ra quyết định.", "AI có khả năng nhận biết môi trường xung quanh và học tập từ dữ liệu.", "AI không thể hiểu tiếng nói hoặc nhận biết môi trường xung quanh.", "AI hoạt động mà không cần lập trình hoặc sự can thiệp từ con người."], correct: 1 },
        { id: 2, type: "single", question: "Ví dụ nào sau đây minh hoạ cho một hệ thống AI có khả năng học từ dữ liệu?", options: ["Một hệ thống AI phân tích hàng nghìn hình ảnh y khoa để cải thiện độ chính xác trong việc phát hiện bệnh.", "Một chương trình máy tính luôn thực hiện các lệnh đã được lập trình sẵn mà không thể thay đổi.", "Một robot thực hiện các thao tác lặp lại mà không cần phân tích dữ liệu đầu vào.", "Một máy tính được lập trình để thực hiện các phép tính toán học cơ bản mà không cần thu thập thêm thông tin."], correct: 0 },
        { id: 3, type: "single", question: "Phát biểu nào sau đây về khả năng của switch là sai?", options: ["Mở rộng băng thông cho mạng bằng cách phân phối dữ liệu giữa các thiết bị.", "Kết nối các thiết bị trong mạng nội bộ theo mô hình hình sao.", "Định tuyến các gói tin giữa các mạng khác nhau.", "Quản lí lưu lượng dữ liệu giữa các thiết bị để tránh xung đột trong mạng."], correct: 2 },
        { id: 4, type: "single", question: "Lựa chọn nào sau đây cho phép người dùng kích hoạt tính năng chia sẻ tệp tin và thư mục?", options: ["Allow access to files.", "Share this folder.", "Turn on network discovery.", "Enable Sharing."], correct: 1 },
        { id: 5, type: "single", question: "Phương án nào sau đây là chức năng của modem trong hệ thống mạng?", options: ["Chuyển đổi dữ liệu số thành tín hiệu tương tự và ngược lại.", "Điều chỉnh tốc độ truyền dữ liệu.", "Định tuyến các gói dữ liệu trong mạng.", "Kết nối LAN với Internet."], correct: 0 },
        { id: 6, type: "single", question: "Khi đang cấu hình một thiết bị mạng để gửi dữ liệu, điều quan trọng là phải thực hiện một giao thức mạng ngay trước khi bắt đầu truyền gói dữ liệu. Giao thức nào sau đây cần được thực hiện tại thiết bị gửi trước khi gửi gói dữ liệu đi?", options: ["Giao thức FTP (File Transfer Protocol).", "Giao thức HTTP (HyperText Transfer Protocol).", "Giao thức TCP (Transmission Control Protocol).", "Giao thức ICMP (Internet Control Message Protocol)."], correct: 2 },
        { id: 7, type: "single", question: "Nhược điểm nào sau đây có thể ảnh hưởng đến sự hiệu quả của giao tiếp ảo?", options: ["Dễ dàng truyền tải cảm xúc và tâm trạng thông qua tin nhắn.", "Không có rào cản về ngôn ngữ trong giao tiếp.", "Thiếu sự giao tiếp phi ngôn ngữ như ánh mắt, cử chỉ.", "Luôn đảm bảo mọi thông tin được truyền đạt đầy đủ và rõ ràng."], correct: 2 },
        { id: 8, type: "single", question: "Nghề sửa chữa và bảo trì máy tính không yêu cầu bắt buộc phải:", options: ["Thực hiện bảo trì định kì và nâng cấp linh kiện phần cứng.", "Lập trình ứng dụng và phát triển phần mềm mới.", "Kiểm tra và tối ưu hoá hiệu suất của hệ thống máy tính.", "Phân tích và giải quyết các sự cố phần cứng và phần mềm."], correct: 1 },
        { id: 9, type: "single", question: "Phương án nào sau đây là nhiệm vụ chính của kĩ thuật viên CNTT?", options: ["Quản lí hệ thống mạng", "Phân tích dữ liệu tài chính.", "Thiết kế phần mềm.", "Cài đặt, bảo trì và sửa chữa phần cứng."], correct: 3 },
        { id: 10, type: "single", question: "Khi một công ti phần mềm tuyển dụng lập trình viên, yếu tố nào được xem là quan trọng nhất trong quá trình lựa chọn ứng viên?", options: ["Có bằng cấp của các trường đại học nổi tiếng mà không cần kinh nghiệm thực tế trong lĩnh vực lập trình.", "Khả năng hiểu biết sâu sắc về ngôn ngữ lập trình cụ thể cũng như khả năng áp dụng kĩ năng giải quyết vấn đề trong thực tế.", "Kinh nghiệm làm việc trong các lĩnh vực không liên quan đến lập trình, như quản lí dự án.", "Sự hiểu biết về xu hướng công nghệ mới và khả năng làm việc nhóm hiệu quả với các bộ phận khác."], correct: 1 },
        { id: 11, type: "single", question: "Phương án nào sau đây chỉ ra đúng cụm từ viết tắt của từ HTML?", options: ["Hot Typing Markup Language.", "Home Testing Mixed Language.", "Home Typing Modern Language.", "HyperText Markup Language."], correct: 3 },

        { id: 13, type: "single", question: "Đoạn mã HTML sau đây định dạng một đoạn văn bản. Phương án nào sau đây cho biết chính xác màu chữ của văn bản khi mã được thực thi?<br><br><div class='code-block'>&lt;p style=\"color: #3498db; font-size: 18px;\"&gt;Đây là một đoạn văn bản.&lt;/p&gt;</div>", options: ["Màu đỏ.", "Màu xanh da trời.", "Màu vàng.", "Màu đen."], correct: 1 },

    const scoresRef = database.ref('bxh_tin12_de3');

    const RealtimeSdk = {
        init(handler) {
            // Lắng nghe dữ liệu thay đổi trên thời gian thực
            scoresRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const scoresList = [];
                if (data) {
                    // Chuyển đổi dữ liệu từ dạng Object sang Mảng
                    for (let key in data) {
                        scoresList.push({ id: key, ...data[key] });
                    }
                }
                // Gửi dữ liệu cập nhật ra giao diện ngay lập tức
                handler.onDataChanged(scoresList);
            }, (error) => {
                console.error("Lỗi lấy dữ liệu từ Firebase:", error);
                // Fallback tạm thời nếu cấu hình Firebase sai
                if(error.code === 'PERMISSION_DENIED') {
                   console.warn("Cô nhớ vào Firebase -> Realtime Database -> Rules -> Đổi '.read' và '.write' thành true nhé!");
                }
            });
            return Promise.resolve({ isOk: true });
        },
        create(record) {
            // Đẩy dữ liệu của học sinh mới nộp bài lên mạng
            return scoresRef.push(record)
                .then(() => {
                    return { isOk: true };
                })
                .catch(error => {
                    console.error("Lỗi lưu điểm lên Firebase:", error);
                    return { isOk: false };
                });
        }
    };

    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    function initApp() {
        try {
            if (!localStorage.getItem('deviceId')) {
                localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
            }
            deviceId = localStorage.getItem('deviceId');
        } catch (e) {
            deviceId = 'dev_' + Math.random().toString(36).substr(2) + Date.now();
        }
        
        // Gắn hệ thống lưu trữ thời gian thực thay vì lưu ảo

        window.dataSdk.init(dataHandler);
        
        setupEvents();
    }

                let rawData = JSON.parse(JSON.stringify(rawQuestions));
                let part1 = rawData.filter(q => q.type === 'single');
                
                // Trộn Phần 1
                part1 = shuffleArray(part1);
                part1.forEach((q, idx) => {
                    q.question = q.question.replace(/^Câu\s*\d+[:\.\s]*/i, '');
                    q.question = `Câu ${idx + 1}: ${q.question}`;
                    let correctText = q.options[q.correct];
                    q.options = shuffleArray(q.options);
                    q.correct = q.options.indexOf(correctText);
                });

                // Tách riêng và Trộn Phần 2 (Chung trước, Riêng sau)
                let part2_chung = rawData.filter(q => q.type === 'tf_cluster' && q.huong === 'chung');
                let part2_rieng = rawData.filter(q => q.type === 'tf_cluster' && q.huong === huong);

                part2_chung = shuffleArray(part2_chung);
                part2_rieng = shuffleArray(part2_rieng);

                // Gộp phần chung và riêng lại theo đúng thứ tự
                let part2 = [...part2_chung, ...part2_rieng];

                part2.forEach((q, idx) => {
                    q.question = q.question.replace(/^Câu\s*\d+[:\.\s]*/i, '');
                    q.question = `Câu ${idx + 1}: ${q.question}`;
                    q.subQuestions = shuffleArray(q.subQuestions);
                    const labels = ['a)', 'b)', 'c)', 'd)'];
                    q.subQuestions.forEach((sub, sIdx) => {
                        sub.text = sub.text.replace(/^[a-d]\)\s*/i, '');
                        sub.text = `${labels[sIdx]} ${sub.text}`;
                    });
                });

                // Gộp (24 + 4 = 28 màn hình câu hỏi)
                currentQuestions = [...part1, ...part2];

                startQuiz();
            } else {
                alert("Vui lòng nhập đủ Họ tên và Lớp!");
            }
        };

        document.getElementById('view-scores-btn').onclick = () => showSection('scores');
        document.getElementById('next-btn').onclick = nextQuestion;
        document.getElementById('submit-btn').onclick = submitQuiz;
    }

    function goHome() {
        document.body.classList.remove('is-reviewing');
        let floatingBar = document.getElementById('review-floating-bar');
        if(floatingBar) floatingBar.style.display = 'none';
        
        document.getElementById('result-modal').classList.add('hidden');
        document.getElementById('hoTen').value = ''; 
        document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    }

    let currentIdx = 0;
    function startQuiz() {
        document.body.classList.remove('is-reviewing');
        let floatingBar = document.getElementById('review-floating-bar');
        if(floatingBar) floatingBar.style.display = 'none';
        
        document.getElementById('timer-banner').style.display = 'flex';
        document.getElementById('nav-buttons').style.display = 'flex';
        document.getElementById('progress-container').style.display = 'block';

        showSection('quiz');
        document.getElementById('student-info').innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop} (${currentStudent.huong})`;
        currentIdx = 0;
        userAnswers = {};
        renderQuestion();
        startTimer(45 * 60); // 45 phút
    }

    function retryQuiz() {
        document.getElementById('login-form').dispatchEvent(new Event('submit'));
    }

    function getTotalItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.subQuestions.length;
            else count++;
        });
        return count; 
    }

    function getAnsweredCount() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') {
                q.subQuestions.forEach(sub => {
                    if (userAnswers[sub.id]) count++;
                });
            } else {
                if (userAnswers[q.id] !== undefined) count++;
            }
        });
        return count;
    }

    window.selectAnswer = function(qId, val, type) {
        userAnswers[qId] = val;
        updateProgress();
    };

    function renderQuestion() {
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        
        if (q.type === 'tf_cluster') {
            container.innerHTML = `
                <div class="fade-in">
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-orange-100 pb-3">
                        <span class="bg-gradient-to-br from-orange-400 to-red-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span>
                        <h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-600 tracking-wide uppercase">TRẮC NGHIỆM ĐÚNG/SAI (${q.huong === 'chung' ? 'Phần Chung' : 'Phần ' + q.huong})</h3>
                    </div>

                    <div class="bg-red-50 border-2 border-red-200 p-4 md:p-6 rounded-2xl mb-6 text-red-700 text-base md:text-lg font-extrabold leading-relaxed shadow-inner">
                        ${q.question}
                    </div>
                    <div class="space-y-3 md:pl-6">
                        ${q.subQuestions.map(sub => `
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-white p-4 border-2 border-gray-100 hover:border-red-300 rounded-2xl gap-4 shadow-sm hover:shadow-md transition-all">
                                <span class="flex-1 text-gray-800 font-bold text-base leading-snug">${sub.text}</span>
                                <div class="flex gap-2 flex-shrink-0 self-end sm:self-auto mt-2 sm:mt-0">
                                    <input type="radio" id="q_${sub.id}_T" name="q_${sub.id}" value="Đúng" class="hidden tf-radio-T" 
                                        onchange="selectAnswer('${sub.id}', 'Đúng', 'tf')" ${isChecked(sub.id, 'Đúng') ? 'checked' : ''}>
                                    <label for="q_${sub.id}_T" class="tf-label-T px-6 py-3 border-2 border-gray-200 rounded-xl cursor-pointer font-extrabold text-gray-500 text-sm text-center w-24 sm:w-28 transition-all hover:bg-gray-50 uppercase tracking-wide">Đúng</label>

                                    <input type="radio" id="q_${sub.id}_S" name="q_${sub.id}" value="Sai" class="hidden tf-radio-S" 
                                        onchange="selectAnswer('${sub.id}', 'Sai', 'tf')" ${isChecked(sub.id, 'Sai') ? 'checked' : ''}>
                                    <label for="q_${sub.id}_S" class="tf-label-S px-6 py-3 border-2 border-gray-200 rounded-xl cursor-pointer font-extrabold text-gray-500 text-sm text-center w-24 sm:w-28 transition-all hover:bg-gray-50 uppercase tracking-wide">Sai</label>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="fade-in">
                    ${currentIdx === 0 ? `
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3">
                        <span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span>
                        <h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">PHẦN TRẮC NGHIỆM NHIỀU LỰA CHỌN</h3>
                    </div>` : ''}

                    <div class="flex gap-4 mb-5">
                        <span class="bg-gradient-to-r from-red-500 to-pink-500 text-white w-12 h-12 flex items-center justify-center rounded-2xl font-black text-xl flex-shrink-0 shadow-lg transform -rotate-3">${currentIdx + 1}</span>
                        <div class="w-full">
                            <p class="text-xl font-extrabold text-red-600 mt-1 leading-snug tracking-tight">${q.question}</p>
                        </div>
                    </div>
                    <div class="space-y-4 md:pl-14 mt-6">
                        ${q.options.map((opt, i) => `
                            <div class="flex items-center">
                                <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio"
                                    ${isChecked(q.id, i) ? 'checked' : ''}
                                    onchange="selectAnswer('${q.id}', ${i}, 'single')">
                                <label for="opt_${i}" class="option-label w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg">
                                    <span class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50 transition-colors">
                                        ${String.fromCharCode(65 + i)}
                                    </span>
                                    <span class="text-gray-700 leading-relaxed">${opt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                                </label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        updateNav();
        updateProgress();
    }

    function isChecked(qId, val) {
        return userAnswers[qId] === val;
    }

    function nextQuestion() {
        if (currentIdx < currentQuestions.length - 1) {
            currentIdx++;
            renderQuestion();
        }
    }

    function updateNav() {
        const isLast = currentIdx === currentQuestions.length - 1;
        document.getElementById('next-btn').style.display = isLast ? 'none' : 'block';
        document.getElementById('submit-btn').style.display = isLast ? 'block' : 'none';
    }

    function updateProgress() {
        document.getElementById('progress-text').innerText = `${getAnsweredCount()}/${getTotalItems()} ý`;
    }

    async function submitQuiz() {
        clearInterval(timerInterval);
        
        let correct = 0;
        let totalItems = getTotalItems(); 

        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') {
                q.subQuestions.forEach(sub => {
                    if (userAnswers[sub.id] === sub.correct) correct++;
                });
            } else {
                if (userAnswers[q.id] === q.correct) correct++;
            }
        });
        
        const score = (correct * 10 / totalItems).toFixed(2);
        
        const record = {
            hoTen: currentStudent.hoTen,
            lop: currentStudent.lop,
            huong: currentStudent.huong,
            diem: parseFloat(score),
            soCauDung: correct,
            tongCau: totalItems,
            thoiGian: new Date().toISOString(),
            deviceId: deviceId 
        };

        const result = await window.dataSdk.create(record);

        if (result.isOk) {
            showModalResult(score, correct, totalItems);
        } else {
            alert("Lỗi lưu bài! Vui lòng kiểm tra lại cấu hình Firebase.");
        }
    }

    function showModalResult(score, correct, total) {
        const modal = document.getElementById('result-modal');
        const content = document.getElementById('result-content');
        modal.classList.remove('hidden');
        
        content.innerHTML = `
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-green-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2">
                <span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - ${currentStudent.lop}</span>
                <br><span class="text-sm font-bold text-gray-400 mt-1 block">Định hướng ${currentStudent.huong}</span>
            </p>
            <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative">
                <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
                <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
                <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm">Trả lời đúng ${correct}/${total} ý</div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="reviewQuiz()" class="w-full py-3 bg-gray-100 text-blue-700 border-2 border-blue-200 rounded-xl font-extrabold shadow-sm hover:bg-blue-50 transition-colors text-lg">🔎 Xem lại bài</button>
                <button onclick="document.getElementById('result-modal').classList.add('hidden'); document.getElementById('quiz-section').classList.add('hidden'); document.getElementById('scores-section').classList.remove('hidden');" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
            </div>
            <button onclick="goHome()" class="w-full py-3 bg-gray-100 text-gray-800 rounded-xl font-extrabold shadow-sm hover:bg-gray-200 transition-colors text-lg">🏠 Về trang chủ</button>
        `;
    }

    // ==========================================
    // CHẾ ĐỘ XEM LẠI BÀI (XỔ DỌC TOÀN BỘ CÂU HỎI)
    // ==========================================
    function reviewQuiz() {
        document.getElementById('result-modal').classList.add('hidden');
        document.getElementById('scores-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        
        document.body.classList.add('is-reviewing');
        
        // Ẩn thanh thời gian và nút next/submit
        document.getElementById('timer-banner').style.display = 'none';
        document.getElementById('nav-buttons').style.display = 'none';
        document.getElementById('progress-container').style.display = 'none';

        // Tạo thanh công cụ nổi dưới cùng
        let floatingBar = document.getElementById('review-floating-bar');
        if(!floatingBar) {
            floatingBar = document.createElement('div');
            floatingBar.id = 'review-floating-bar';
            floatingBar.className = "fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200 p-4 flex gap-4 justify-center shadow-[0_-10px_30px_rgba(0,0,0,0.1)] z-50";
            floatingBar.innerHTML = `
                <button onclick="goHome()" class="px-6 py-3 bg-gray-100 text-gray-800 rounded-xl font-extrabold shadow-sm hover:bg-gray-200 transition-colors text-lg">🏠 Về trang chủ</button>
                <button onclick="retryQuiz()" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-extrabold shadow-md hover:bg-blue-700 transition-colors text-lg">🔄 Làm lại bài</button>
            `;
            document.body.appendChild(floatingBar);
        }
        floatingBar.style.display = 'flex';

        // Xổ dọc toàn bộ câu hỏi
        const container = document.getElementById('question-container');
        container.innerHTML = currentQuestions.map((q, idx) => {
            
            // XỬ LÝ CHÈN TIÊU ĐỀ PHẦN I VÀ PHẦN II
            let headerHtml = '';
            if (idx === 0) {
                headerHtml = `
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-blue-200 pb-3 mt-4">
                        <span class="bg-gradient-to-br from-blue-500 to-cyan-600 text-white w-12 h-12 flex items-center justify-center rounded-xl font-black text-2xl shadow-md">I</span>
                        <h3 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-cyan-700 uppercase tracking-widest">Phần Trắc Nghiệm Nhiều Lựa Chọn</h3>
                    </div>
                `;
            } else if (q.type === 'tf_cluster' && currentQuestions[idx - 1] && currentQuestions[idx - 1].type === 'single') {
                headerHtml = `
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-orange-200 pb-3 mt-10">
                        <span class="bg-gradient-to-br from-orange-500 to-red-600 text-white w-12 h-12 flex items-center justify-center rounded-xl font-black text-2xl shadow-md">II</span>
                        <h3 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-700 to-red-700 uppercase tracking-widest">Phần Trắc Nghiệm Đúng/Sai</h3>
                    </div>
                `;
            }

            if (q.type === 'single') {
                let optionsHtml = q.options.map((opt, i) => {
                    let isSelected = isChecked(q.id, i);
                    let isCorrect = (q.correct === i);
                    let stateClass = "review-neutral";
                    let icon = "";
                    
                    if (isCorrect) {
                        stateClass = "review-correct shadow-md";
                        icon = "✅";
                    } else if (isSelected && !isCorrect) {
                        stateClass = "review-incorrect";
                        icon = "❌";
                    }
                    
                    return `
                        <div class="p-4 border-2 rounded-2xl flex items-center gap-4 ${stateClass} mb-3 font-bold text-lg pointer-events-none">
                            <span class="w-10 h-10 rounded-xl border-2 flex items-center justify-center text-base font-black flex-shrink-0 bg-white/50 border-gray-300/50">${String.fromCharCode(65 + i)}</span>
                            <span class="leading-relaxed flex-1">${opt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                            <span>${icon}</span>
                        </div>
                    `;
                }).join('');

                return `
                    ${headerHtml}
                    <div class="mb-8">
                        <div class="flex gap-4 mb-4">
                            <span class="bg-gray-200 text-gray-600 w-10 h-10 flex items-center justify-center rounded-xl font-black text-lg flex-shrink-0">${idx + 1}</span>
                            <p class="text-xl font-extrabold text-red-600 leading-snug">${q.question}</p>
                        </div>
                        <div class="md:pl-14">${optionsHtml}</div>
                    </div>
                `;
            } else {
                let subHtml = q.subQuestions.map(sub => {
                    let userAns = userAnswers[sub.id];
                    let isCorrect = userAns === sub.correct;
                    let ansText = userAns ? (isCorrect ? `✅ Chính xác (Bạn chọn: ${userAns})` : `❌ Trả lời sai (Bạn chọn: ${userAns} | Đáp án: ${sub.correct})`) : `➖ Bỏ qua (Đáp án: ${sub.correct})`;
                    let colorClass = userAns ? (isCorrect ? 'text-green-700 bg-green-50' : 'text-red-700 bg-red-50') : 'text-orange-600 bg-orange-50';

                    return `
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-white p-4 border-2 border-gray-100 rounded-2xl gap-4 shadow-sm mb-3">
                            <span class="flex-1 text-gray-800 font-bold text-base leading-snug">${sub.text}</span>
                            <div class="font-extrabold ${colorClass} text-sm whitespace-nowrap px-4 py-2 rounded-xl border border-gray-100">
                                ${ansText}
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    ${headerHtml}
                    <div class="mb-8 p-4 bg-gray-50 rounded-2xl border-2 border-gray-200">
                        <div class="text-xl font-extrabold text-red-600 mb-4">${q.question}</div>
                        <div>${subHtml}</div>
                    </div>
                `;
            }
        }).join('<div class="my-6 border-b-2 border-dashed border-gray-200"></div>');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderScores() {
        const tbody = document.getElementById('scores-tbody');
        if (allScores.length === 0) {
            tbody.innerHTML = '';
            document.getElementById('no-scores').classList.remove('hidden');
            return;
        }
        document.getElementById('no-scores').classList.add('hidden');

        const sorted = [...allScores].sort((a, b) => b.diem - a.diem);

        tbody.innerHTML = sorted.map((s, idx) => {
            const rowClass = s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-gray-50';
            const meBadge = s.deviceId === deviceId ? '<span class="ml-3 bg-gradient-to-r from-pink-500 to-rose-500 text-white text-xs px-3 py-1 rounded-full font-black shadow-sm uppercase tracking-wider">Bạn</span>' : '';
            const date = new Date(s.thoiGian).toLocaleString('vi-VN');

            return `
                <tr class="${rowClass} transition-colors">
                    <td class="px-3 sm:px-5 py-4 text-center font-black text-gray-400 text-lg">#${idx + 1}</td>
                    <td class="px-3 sm:px-5 py-4 font-extrabold text-gray-800 whitespace-nowrap text-lg">${s.hoTen} ${meBadge}</td>
                    <td class="px-3 sm:px-5 py-4 text-sm font-bold text-blue-500 whitespace-nowrap bg-blue-50/50 rounded-lg inline-block mt-3">${s.huong}</td>
                    <td class="px-3 sm:px-5 py-4 text-center text-gray-600 font-bold text-lg">${s.soCauDung}/${s.tongCau}</td>
                    <td class="px-3 sm:px-5 py-4 text-center"><span class="font-black text-2xl ${s.diem >= 5 ? 'text-green-600' : 'text-red-500 drop-shadow-sm'}">${s.diem}</span></td>
                    <td class="px-3 sm:px-5 py-4 text-right text-xs text-gray-400 whitespace-nowrap font-bold">${date}</td>
                </tr>
            `;
        }).join('');
        
        setTimeout(() => {
            const myRow = document.querySelector('.my-score-row');
            if (myRow) myRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
    }

    function showSection(id) {
        ['login', 'quiz', 'scores'].forEach(s => document.getElementById(s+'-section').classList.add('hidden'));
        document.getElementById(id+'-section').classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) submitQuiz();
        }, 1000);
    }

    initApp();
  </script>
 </body>
</html>
