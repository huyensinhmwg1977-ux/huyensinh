<!doctype html>
<html lang="vi" class="w-full h-full m-0 p-0">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Kiểm Tra Trắc Nghiệm - Tin Học 12 (Đề 3)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
    body { 
      font-family: 'Be Vietnam Pro', sans-serif; 
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    
    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    #app { width: 100%; height: 100%; overflow-y: auto; padding-bottom: 80px; }
    .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border-radius: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); }

    /* MÀU SẮC KHI CHỌN - ĐẬM VÀ RÕ RÀNG */
    input[type="radio"].single-radio:checked + .option-label {
      background-color: #1e40af !important; /* Xanh đậm */
      color: white !important;
      border-color: #1e3a8a;
      transform: scale(1.02);
    }
    input[type="radio"].single-radio:checked + .option-label span { color: white !important; border-color: white !important; }

    /* MÀU ĐÚNG/SAI ĐẬM CHO PHẦN II */
    .tf-radio-T:checked + .tf-label-T { background-color: #047857 !important; color: white !important; border-color: #064e3b; }
    .tf-radio-S:checked + .tf-label-S { background-color: #b91c1c !important; color: white !important; border-color: #7f1d1d; }

    /* CHẾ ĐỘ XEM LẠI BÀI */
    .review-correct { background-color: #dcfce7 !important; border: 2px solid #15803d !important; }
    .review-incorrect { background-color: #fee2e2 !important; border: 2px solid #b91c1c !important; }
    .review-answer-key { color: #15803d; font-weight: 800; margin-top: 4px; display: block; }
    
    .btn-grad { background: linear-gradient(to right, #FF512F 0%, #DD2476  51%, #FF512F  100%); transition: 0.5s; background-size: 200% auto; color: white; box-shadow: 0 0 20px #eee; border-radius: 15px; }
    .btn-grad:hover { background-position: right center; text-decoration: none; }
  </style>
 </head>
 <body>
  <div id="app" class="p-4 md:p-8">
   
   <div id="login-section" class="max-w-md mx-auto fade-in mt-10">
    <div class="glass-card p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-blue-700">HÀNH TRÌNH SỐ</h1>
        <p class="text-gray-500 font-bold uppercase mt-2">Đề Kiểm Tra Số 3 - Tin 12</p>
      </div>
      <form id="login-form" class="space-y-4">
        <input type="text" id="hoTen" required class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none" placeholder="Nhập họ tên của em...">
        <input type="text" id="lop" required class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none" placeholder="Lớp (Ví dụ: 12A1)">
        <div class="bg-blue-50 p-4 rounded-xl">
          <p class="font-bold text-blue-800 mb-2">🎯 Chọn định hướng:</p>
          <label class="flex items-center mb-2 cursor-pointer"><input type="radio" name="chonHuong" value="CS" checked class="mr-2"> Khoa học máy tính (CS)</label>
          <label class="flex items-center cursor-pointer"><input type="radio" name="chonHuong" value="ICT" class="mr-2"> Tin học ứng dụng (ICT)</label>
        </div>
        <button type="submit" class="w-full py-4 btn-grad font-black text-xl rounded-xl">BẮT ĐẦU THI NGAY</button>
      </form>
    </div>
   </div>

   <div id="quiz-section" class="max-w-4xl mx-auto hidden">
    <div class="glass-card p-6 shadow-2xl">
      <div class="flex justify-between items-center border-b pb-4 mb-4">
        <div id="student-display" class="font-black text-blue-700 text-lg uppercase"></div>
        <div class="text-red-600 font-black text-2xl" id="timer">45:00</div>
      </div>
      <div id="question-container"></div>
      <div class="flex gap-4 mt-8">
        <button id="next-btn" class="flex-1 py-4 bg-blue-600 text-white font-black rounded-xl text-lg">CÂU TIẾP THEO ➔</button>
        <button id="submit-btn" class="flex-1 py-4 bg-green-600 text-white font-black rounded-xl text-lg hidden">NỘP BÀI LÊN HỆ THỐNG</button>
      </div>
    </div>
   </div>

   <div id="scores-section" class="max-w-4xl mx-auto hidden">
    <div class="glass-card p-6">
      <h2 class="text-2xl font-black text-center text-blue-800 mb-6">🏆 BẢNG XẾP HẠNG THỜI GIAN THỰC</h2>
      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead><tr class="bg-blue-600 text-white"><th class="p-3">Hạng</th><th class="p-3">Họ Tên</th><th class="p-3">Lớp</th><th class="p-3">Đúng</th><th class="p-3">Điểm</th></tr></thead>
          <tbody id="scores-tbody" class="text-center font-bold"></tbody>
        </table>
      </div>
      <button onclick="location.reload()" class="w-full mt-6 py-3 bg-gray-200 rounded-xl font-bold">Quay lại trang chủ</button>
    </div>
   </div>

   <div id="result-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center">
      <div class="text-5xl mb-4">🎊</div>
      <h2 class="text-2xl font-black text-green-600">Nộp bài thành công!</h2>
      <div class="my-6 p-6 bg-blue-50 rounded-2xl">
        <p class="text-gray-500 font-bold uppercase text-xs">Điểm số của em</p>
        <div id="final-score" class="text-6xl font-black text-blue-700">0.0</div>
        <p id="final-correct" class="font-bold text-gray-700 mt-2"></p>
      </div>
      <div class="flex flex-col gap-3">
        <button onclick="reviewQuiz()" class="py-3 bg-blue-100 text-blue-700 rounded-xl font-black">🔎 XEM LẠI BÀI LÀM</button>
        <button onclick="showSection('scores')" class="py-3 bg-orange-500 text-white rounded-xl font-black">🏆 XEM BẢNG ĐIỂM</button>
      </div>
    </div>
   </div>
  </div>

  <script>
    // --- NGÂN HÀNG CÂU HỎI (Tóm lược để ví dụ) ---
    const rawQuestions = [
      { id: 1, type: "single", question: "Phương án nào sau đây là một trong những khả năng của AI?", options: ["AI chỉ có thể đọc văn bản.", "AI có khả năng nhận biết môi trường xung quanh và học tập từ dữ liệu.", "AI không thể hiểu tiếng nói.", "AI hoạt động không cần dữ liệu."], correct: 1 },
      { id: 2, type: "single", question: "Trong HTML, thẻ nào dùng để tạo tiêu đề lớn nhất?", options: ["<h6>", "<head>", "<h1>", "<title>"], correct: 2 },
      // ... Thêm đủ 24 câu đơn vào đây
      { id: 'c1', type: 'tf_cluster', huong: 'chung', question: "Nhận định về hệ thống mạng trường học:", subQuestions: [
          { id: 'tf1a', text: "Nên sử dụng thêm switch để mở rộng kết nối.", correct: "Đúng" },
          { id: 'tf1b', text: "Lắp AP sẽ tăng tốc độ Internet cho mọi máy.", correct: "Sai" },
          { id: 'tf1c', text: "Thay router băng thông cao giúp mạng ổn định hơn.", correct: "Đúng" },
          { id: 'tf1d', text: "Nâng cấp modem giúp tăng vùng phủ sóng Wi-Fi.", correct: "Sai" }
      ]}
      // ... Thêm các câu chùm còn lại
    ];

    // --- FIREBASE CỦA CÔ SINH ---
    const firebaseConfig = {
      apiKey: "AIzaSyC4ou3Fu8IxAPYV347pHKT1jtPxQe5TBM4",
      authDomain: "hanhtrinhso-e3368.firebaseapp.com",
      databaseURL: "https://hanhtrinhso-e3368-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "hanhtrinhso-e3368",
      storageBucket: "hanhtrinhso-e3368.firebasestorage.app",
      appId: "1:1046142513655:web:5c7bb3a47ee90ac279fef2"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const scoresRef = database.ref('bxh_tin12_de3');

    let currentQuestions = [];
    let userAnswers = {};
    let currentIdx = 0;
    let student = {};

    document.getElementById('login-form').onsubmit = (e) => {
      e.preventDefault();
      student = { hoTen: document.getElementById('hoTen').value, lop: document.getElementById('lop').value, huong: document.querySelector('input[name="chonHuong"]:checked').value };
      
      // Lọc câu hỏi theo định hướng
      let p1 = rawQuestions.filter(q => q.type === 'single');
      let p2 = rawQuestions.filter(q => q.type === 'tf_cluster' && (q.huong === 'chung' || q.huong === student.huong));
      currentQuestions = [...p1, ...p2];
      
      startQuiz();
    };

    function startQuiz() {
      showSection('quiz');
      document.getElementById('student-display').innerText = student.hoTen;
      renderQuestion();
      startTimer(45 * 60);
    }

    function renderQuestion() {
      const q = currentQuestions[currentIdx];
      const container = document.getElementById('question-container');
      
      let html = "";
      if (q.type === 'single') {
        html = `<div class="mt-4"><p class="text-blue-600 font-black mb-2 uppercase">PHẦN I: TRẮC NGHIỆM 1 LỰA CHỌN ĐÚNG</p>
                <h2 class="text-xl font-bold text-red-600 mb-6">Câu ${currentIdx + 1}: ${q.question}</h2>
                <div class="space-y-4">${q.options.map((opt, i) => `
                  <label class="flex items-center">
                    <input type="radio" name="q${q.id}" class="hidden single-radio" onchange="userAnswers['${q.id}']=${i}" ${userAnswers[q.id]===i?'checked':''}>
                    <div class="option-label w-full p-4 border-2 border-gray-100 rounded-2xl cursor-pointer font-bold flex items-center gap-4 transition-all">
                      <span class="w-8 h-8 rounded-full border-2 flex items-center justify-center">${String.fromCharCode(65+i)}</span> ${opt}
                    </div>
                  </label>`).join('')}</div></div>`;
      } else {
        html = `<div class="mt-4"><p class="text-orange-600 font-black mb-2 uppercase">PHẦN II: TRẮC NGHIỆM ĐÚNG SAI</p>
                <h2 class="text-xl font-bold text-red-600 mb-4">Câu ${currentIdx + 1}: ${q.question}</h2>
                <div class="space-y-3">${q.subQuestions.map(sub => `
                  <div class="bg-gray-50 p-4 rounded-xl flex flex-col md:flex-row justify-between gap-4">
                    <span class="font-bold flex-1">${sub.text}</span>
                    <div class="flex gap-2">
                      <input type="radio" id="T${sub.id}" name="${sub.id}" class="hidden tf-radio-T" onchange="userAnswers['${sub.id}']='Đúng'" ${userAnswers[sub.id]==='Đúng'?'checked':''}>
                      <label for="T${sub.id}" class="tf-label-T px-6 py-2 border-2 rounded-xl font-black cursor-pointer bg-white text-gray-400">ĐÚNG</label>
                      <input type="radio" id="S${sub.id}" name="${sub.id}" class="hidden tf-radio-S" onchange="userAnswers['${sub.id}']='Sai'" ${userAnswers[sub.id]==='Sai'?'checked':''}>
                      <label for="S${sub.id}" class="tf-label-S px-6 py-2 border-2 rounded-xl font-black cursor-pointer bg-white text-gray-400">SAI</label>
                    </div>
                  </div>`).join('')}</div></div>`;
      }
      container.innerHTML = html;
      updateNav();
    }

    function updateNav() {
      document.getElementById('next-btn').style.display = currentIdx === currentQuestions.length - 1 ? 'none' : 'block';
      document.getElementById('submit-btn').style.display = currentIdx === currentQuestions.length - 1 ? 'block' : 'none';
      document.getElementById('progress-text').innerText = `${currentIdx + 1}/${currentQuestions.length}`;
    }

    document.getElementById('next-btn').onclick = () => { currentIdx++; renderQuestion(); };

    async function submitQuiz() {
      let correctCount = 0;
      let total = 0;
      currentQuestions.forEach(q => {
        if(q.type === 'single') { total++; if(userAnswers[q.id] === q.correct) correctCount++; }
        else { q.subQuestions.forEach(s => { total++; if(userAnswers[s.id] === s.correct) correctCount++; }); }
      });
      const score = (correctCount * 10 / total).toFixed(2);
      await scoresRef.push({ ...student, diem: parseFloat(score), dung: correctCount, tong: total, thoiGian: firebase.database.ServerValue.TIMESTAMP });
      
      document.getElementById('final-score').innerText = score;
      document.getElementById('final-correct').innerText = `Trả lời đúng ${correctCount}/${total} ý`;
      document.getElementById('result-modal').classList.remove('hidden');
    }

    document.getElementById('submit-btn').onclick = submitQuiz;

    // --- HÀM XEM LẠI BÀI (REVIEW) ---
    function reviewQuiz() {
      document.getElementById('result-modal').classList.add('hidden');
      const container = document.getElementById('question-container');
      document.getElementById('next-btn').classList.add('hidden');
      document.getElementById('submit-btn').classList.add('hidden');
      
      container.innerHTML = `<h2 class="text-2xl font-black text-blue-800 mb-8 border-b-4 border-blue-200 pb-2">KẾT QUẢ CHI TIẾT</h2>` + 
      currentQuestions.map((q, idx) => {
        if(q.type === 'single') {
          return `<div class="mb-8 p-4 rounded-2xl border-2">
            <p class="font-bold mb-3">Câu ${idx+1}: ${q.question}</p>
            ${q.options.map((opt, i) => {
              let isUserChoice = userAnswers[q.id] === i;
              let isCorrect = q.correct === i;
              let style = isCorrect ? 'review-correct' : (isUserChoice ? 'review-incorrect' : '');
              return `<div class="p-3 mb-2 rounded-xl border ${style}">${String.fromCharCode(65+i)}. ${opt} ${isCorrect ? '✅' : (isUserChoice ? '❌' : '')}</div>`
            }).join('')}
          </div>`;
        } else {
          return `<div class="mb-8 p-4 rounded-2xl border-2">
            <p class="font-bold mb-3">Câu ${idx+1}: ${q.question}</p>
            ${q.subQuestions.map(s => {
              let isCorrect = userAnswers[s.id] === s.correct;
              return `<div class="p-3 mb-2 rounded-xl border ${isCorrect?'review-correct':'review-incorrect'}">
                ${s.text} <br> 
                <span class="text-sm">Em chọn: <b>${userAnswers[s.id] || 'Bỏ qua'}</b> - Đáp án: <b>${s.correct}</b></span>
              </div>`
            }).join('')}
          </div>`;
        }
      }).join('');
      container.innerHTML += `<button onclick="location.reload()" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl">XONG, QUAY VỀ TRANG CHỦ</button>`;
    }

    function showSection(id) {
      ['login', 'quiz', 'scores'].forEach(s => document.getElementById(s+'-section').classList.toggle('hidden', s!==id));
      if(id === 'scores') loadLeaderboard();
    }

    function loadLeaderboard() {
      scoresRef.orderByChild('diem').limitToLast(20).on('value', snap => {
        const data = []; snap.forEach(child => { data.push(child.val()); });
        document.getElementById('scores-tbody').innerHTML = data.reverse().map((s, i) => `
          <tr class="border-b hover:bg-blue-50">
            <td class="p-3 text-blue-600">#${i+1}</td>
            <td class="p-3">${s.hoTen}</td>
            <td class="p-3">${s.lop}</td>
            <td class="p-3">${s.dung}/${s.tong}</td>
            <td class="p-3 text-red-600">${s.diem}</td>
          </tr>`).join('');
      });
    }

    function startTimer(sec) {
      let remaining = sec;
      timerInterval = setInterval(() => {
        remaining--;
        let m = Math.floor(remaining/60), s = remaining%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        if(remaining<=0) { clearInterval(timerInterval); submitQuiz(); }
      }, 1000);
    }
  </script>
 </body>
</html>
