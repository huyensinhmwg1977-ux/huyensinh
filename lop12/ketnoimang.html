  <style>
    * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none !important; }

      font-family: 'Be Vietnam Pro', sans-serif;

      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    
    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    input, textarea, select {
      -webkit-user-select: auto !important; -moz-user-select: auto !important;
      -ms-user-select: auto !important; user-select: auto !important;
      pointer-events: auto !important;
    }
    #app { width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden; padding-bottom: 50px; }
    
    .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .option-label { transition: all 0.2s ease-in-out; cursor: pointer; border-color: #e2e8f0; }
    .option-label:hover { transform: translateX(6px); background-color: #f0fdfa; border-color: #38bdf8; box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.1); }
    
    input[type="radio"].de-radio:checked + .de-label {
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        border-color: #0ea5e9;
        box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.3);
    }
    input[type="radio"].de-radio:checked + .de-label .de-icon { background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; }

    /* Nút chọn Phần I */
    input[type="radio"].single-radio:checked + .option-label {
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      color: white; border-color: transparent;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }
    input[type="radio"].single-radio:checked + .option-label span:first-child { background-color: rgba(255,255,255,0.25); border-color: transparent; color: white; }
    input[type="radio"].single-radio:checked + .option-label span:last-child { color: white; }
    
    /* Nút chọn Phần II */
    .tf-radio-T:checked + .tf-label-T, .tf-radio-S:checked + .tf-label-S {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important; 
        border-color: transparent !important; color: white !important;
        box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);
    }

    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .my-score-row {
      background: linear-gradient(to right, #fdf4ff, #ffffff) !important;
      border-left: 4px solid #db2777 !important; font-weight: 700 !important;
      color: #9d174d !important; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; z-index: 10;
    }
    .my-score-row td { padding-top: 16px; padding-bottom: 16px; }
    button:active { transform: scale(0.96); }

    .code-block { background: #f8fafc; color: #1e3a8a; padding: 15px 20px; border-radius: 10px; font-family: 'Consolas', 'Courier New', monospace; white-space: pre-wrap; margin: 15px 0; font-size: 16px; font-weight: 700; border: 1px solid #e2e8f0; border-left: 5px solid #3b82f6; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);}

    .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 15px; font-size: 0.95rem; text-align: left;}
    .data-table th, .data-table td { border: 1px solid #cbd5e1; padding: 8px 12px; }
    .data-table th { background-color: #f1f5f9; font-weight: bold; color: #334155; }
    .data-table tr:nth-child(even) { background-color: #f8fafc; }

    /* CSS chế độ xem lại - Tăng padding-bottom để không bị nút nổi che khuất câu cuối */
    body.is-reviewing #app { padding-bottom: 160px; } 
    .review-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
    .review-incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; text-decoration: line-through; opacity: 0.8; }
    .review-neutral { background-color: #ffffff !important; border-color: #e2e8f0 !important; opacity: 0.5; }
  </style>

  <script>
    // ==================== BẢO VỆ TÀI LIỆU ====================
    document.addEventListener('contextmenu', event => event.preventDefault()); 
    document.addEventListener('selectstart', event => {
        if (event.target.tagName !== 'INPUT' && event.target.tagName !== 'SELECT') { event.preventDefault(); }
    });
    document.addEventListener('dragstart', event => event.preventDefault()); 
    document.addEventListener('copy', event => {
        event.clipboardData.setData('text/plain', 'Tài liệu đã được bảo vệ!');
        event.preventDefault();
    });

    let isQuizStarted = false; 

    // ==================== CẤU HÌNH FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyC4ou3Fu8IxAPYV347pHKT1jtPxQe5TBM4",
        authDomain: "hanhtrinhso-e3368.firebaseapp.com",
        databaseURL: "https://hanhtrinhso-e3368-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "hanhtrinhso-e3368",
        storageBucket: "hanhtrinhso-e3368.firebasestorage.app",
        messagingSenderId: "1046142513655",
        appId: "1:1046142513655:web:5c7bb3a47ee90ac279fef2"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();
    const scoresRef = database.ref('bxh_tin12_ontap_mang');

    // ==================== NGÂN HÀNG CÂU HỎI MỚI (MẠNG MÁY TÍNH) ====================
    const rawQuestions = [
        // PHẦN 1: TRẮC NGHIỆM MỘT LỰA CHỌN (16 CÂU)
        { id: 1, type: "single", question: "Phát biểu nào sau đây mô tả sai về việc kết nối máy tính với các thiết bị khác qua mạng Wi-Fi?", options: ["Để kết nối vào mạng Wi-Fi, cần phải biết cả tên mạng và mật khẩu truy cập nếu mạng có bảo mật.", "Hiện nay, hầu hết các laptop và điện thoại thông minh đều được trang bị sẵn Card mạng không dây (NIC) để kết nối vào Wi-Fi.", "Để kết nối laptop hoặc điện thoại thông minh vào Wi-Fi, chỉ cần liên kết với bất kì điểm truy cập nào trong phạm vi phủ sóng.", "Để kết nối máy tính cá nhân hoặc điện thoại thông minh vào mạng Wi-Fi, cần kết nối với Access Point của mạng đó."], correct: 2 },
        { id: 2, type: "single", question: "Phương án nào sau đây mô tả đúng về một giao thức mạng có nhiệm vụ truyền tải các gói dữ liệu tin cậy, theo thứ tự và có khả năng kiểm tra lỗi, điều chỉnh tốc độ truyền?", options: ["HTTP.", "SMTP.", "TCP.", "IP."], correct: 2 },
        { id: 3, type: "single", question: "Phát biểu nào sau đây sai khi nói về các giao thức mạng?", options: ["TCP đảm bảo các gói tin được truyền tải tin cậy và theo đúng thứ tự giữa các thiết bị.", "HTTP là giao thức truyền tải siêu văn bản giữa trình duyệt và máy chủ web.", "FTP là giao thức truyền tải tệp tin, thường được sử dụng để chia sẻ tệp qua Internet.", "SMTP được sử dụng để truyền tải tập tin lớn giữa các máy tính trong mạng."], correct: 3 },
        { id: 4, type: "single", question: "Phát biểu nào sau đây mô tả sai về giao thức IP?", options: ["Giao thức IP là một phần quan trọng của bộ giao thức Internet, được sử dụng để định danh và truyền tải các gói tin qua mạng.", "IP là viết tắt của Internet Protocol, chịu trách nhiệm định địa chỉ cho các gói tin dữ liệu.", "Hiện nay chỉ có địa chỉ IP phiên bản 6 (IPv6) được sử dụng, các phiên bản cũ như IPv4 đã hoàn toàn bị thay thế và không còn dùng nữa.", "Giao thức IP hỗ trợ việc định tuyến trên mạng, giúp các bộ định tuyến (router) xác định tuyến đường phù hợp để gửi gói tin đến đích."], correct: 2 },
        { id: 5, type: "single", question: "Phát biểu nào sau đây mô tả sai về khả năng của thiết bị switch?", options: ["Kết nối các thiết bị trong mạng nội bộ theo mô hình hình sao.", "Mở rộng băng thông cho mạng bằng cách phân phối dữ liệu giữa các thiết bị.", "Định tuyến các gói tin giữa các mạng khác nhau.", "Quản lí lưu lượng dữ liệu giữa các thiết bị trong mạng để tránh xung đột."], correct: 2 },
        { id: 6, type: "single", question: "Ngoài việc cung cấp kết nối không dây, Access Point còn có chức năng nào sau đây?", options: ["Tăng cường khả năng truyền tải dữ liệu cho các thiết bị trong mạng.", "Chuyển đổi tín hiệu số thành tín hiệu tương tự để truyền tải qua mạng.", "Biến đổi tín hiệu tương tự thành tín hiệu số khi nhận dữ liệu.", "Hỗ trợ điều phối và quản lí lưu lượng dữ liệu giữa các thiết bị kết nối."], correct: 3 },
        { id: 7, type: "single", question: "Đặc điểm nào sau đây thể hiện một trong những lợi ích của giao thức TCP/IP?", options: ["Đảm bảo tính bảo mật cao khi truyền tải dữ liệu qua Internet.", "Cung cấp khả năng kết nối và truyền tải dữ liệu giữa nhiều loại thiết bị khác nhau.", "Hỗ trợ khả năng xử lí và truyền tải các ứng dụng đa phương tiện.", "Đảm bảo các gói dữ liệu được gửi đi theo đúng thứ tự và kiểm tra lỗi trong quá trình truyền tải."], correct: 1 },
        { id: 8, type: "single", question: "Phương án nào sau đây mô tả đúng về một giao thức mạng có nhiệm vụ định danh gói tin bằng cách gắn địa chỉ IP của trạm gửi và trạm nhận, sau đó xác định tuyến đường tốt nhất cho gói tin?", options: ["HTTP.", "SMTP.", "TCP.", "IP."], correct: 3 },
        { id: 9, type: "single", question: "Khi đang cấu hình một thiết bị mạng để gửi dữ liệu, điều quan trọng là phải thực hiện một giao thức mạng nhất định ngay trước khi bắt đầu truyền gói dữ liệu. Giao thức nào sau đây cần được thực hiện tại thiết bị gửi trước khi gửi gói dữ liệu đi?", options: ["Giao thức TCP (Transmission Control Protocol).", "Giao thức HTTP (Hypertext Transfer Protocol).", "Giao thức FTP (File Transfer Protocol).", "Giao thức ICMP (Internet Control Message Protocol)."], correct: 0 },
        { id: 10, type: "single", question: "Lựa chọn nào sau đây cho phép người dùng kích hoạt tính năng chia sẻ tệp tin và thư mục?", options: ["Enable Sharing.", "Share this folder.", "Turn on network discovery.", "Allow access to files."], correct: 1 },
        { id: 11, type: "single", question: "Thẻ nào trong cửa sổ Properties cho phép người dùng thiết lập chức năng chia sẻ?", options: ["General.", "Sharing.", "Security.", "Details."], correct: 1 },
        { id: 12, type: "single", question: "Trong một văn phòng, sau khi đã bật tính năng chia sẻ máy in, một nhân viên cần chia sẻ máy in với các đồng nghiệp của mình để họ có thể in tài liệu dễ dàng. Lựa chọn nào sau đây cho phép người dùng thiết lập việc chia sẻ máy in để mọi người cùng sử dụng?", options: ["Share this printer.", "Configure printer settings.", "Stop sharing this printer.", "Add a new printer."], correct: 0 },

        { id: 'c15', type: 'tf_cluster', question: "Tại một công ti kiến trúc, phòng thiết kế có 30 máy tính để bàn (không hỗ trợ kết nối không dây) và được thiết lập thành một hệ thống mạng nội bộ. Máy tính đều có thể chia sẻ dữ liệu và truy cập Internet. Có bộ phát Wi-Fi cho thiết bị di động. Tất cả kết nối qua switch. Một dây cáp mạng Internet kết nối từ bộ định tuyến vào phòng thiết kế. Sau đây là các nhận xét:", subQuestions: [
            { id: 'tf15_a', text: "Tất cả các máy tính trong phòng sử dụng cáp mạng để kết nối.", correct: "Đúng" },

            { id: 'tf15_c', text: "Sử dụng hub sẽ hiệu quả hơn switch trong cấu hình này.", correct: "Sai" },
            { id: 'tf15_d', text: "Dây cáp mạng Internet được kết nối trực tiếp với bộ phát Wi-Fi.", correct: "Sai" }
        ]},

        { id: 'c16', type: 'tf_cluster', question: "Một quán cà phê cung cấp Wi-Fi miễn phí cho khách hàng của mình. Mạng có các đặc điểm: Một modem kết nối với ISP. Modem kết nối với một bộ phát Wi-Fi. Chủ quán muốn đảm bảo chỉ khách hàng được phép mới có thể truy cập Wi-Fi và đề xuất bật mã hoá WPA2. Hãy đánh giá những nhận xét sau:", subQuestions: [
            { id: 'tf16_a', text: "Bộ phát Wi-Fi là một phần của mạng cục bộ (LAN).", correct: "Đúng" },
            { id: 'tf16_b', text: "Mã hoá WPA2 đảm bảo rằng người dùng trái phép không thể dễ dàng kết nối với mạng.", correct: "Đúng" },
            { id: 'tf16_c', text: "Modem gán địa chỉ IP cho các thiết bị kết nối với Wi-Fi.", correct: "Sai" },
            { id: 'tf16_d', text: "Tất cả các thiết bị của khách hàng kết nối qua Wi-Fi đều là một phần của LAN nội bộ của quán cà phê.", correct: "Đúng" }
        ]},

        { id: 'c17', type: 'tf_cluster', question: "Một văn phòng nhỏ thiết lập một mạng, trong đó 20 máy tính được kết nối với một switch duy nhất và switch này được kết nối với Internet thông qua một modem. Họ muốn đảm bảo nhân viên có thể chia sẻ tệp nội bộ mà không cần sử dụng Internet. Hãy đánh giá những nhận xét sau:", subQuestions: [
            { id: 'tf17_a', text: "Thiết bị NAS sẽ cho phép nhân viên chia sẻ tệp qua mạng cục bộ.", correct: "Đúng" },
            { id: 'tf17_b', text: "Máy chủ DHCP là cần thiết để gán địa chỉ IP cho cả việc sử dụng mạng cục bộ và truy cập Internet.", correct: "Đúng" },
            { id: 'tf17_c', text: "Kết nối Internet là không cần thiết để chia sẻ tệp nội bộ giữa các máy tính trên cùng một switch.", correct: "Đúng" },
            { id: 'tf17_d', text: "Switch gán địa chỉ IP cho tất cả các thiết bị trên mạng.", correct: "Sai" }
        ]}
    ];

    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    const RealtimeSdk = {
        init(handler) {
            scoresRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const scoresList = [];
                if (data) {
                    for (let key in data) {
                        scoresList.push({ id: key, ...data[key] });
                    }
                }
                handler.onDataChanged(scoresList);
            });
            return Promise.resolve({ isOk: true });
        },
        create(record) {
            return scoresRef.push(record)
                .then(() => { return { isOk: true }; })
                .catch(error => { console.error(error); return { isOk: false }; });
        }
    };

    const dataHandler = {
        onDataChanged(data) {
            allScores = data || [];
            renderScores();
        }
    };

    function initApp() {
        try {
            if (!localStorage.getItem('deviceId')) {
                localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
            }
            deviceId = localStorage.getItem('deviceId');
        } catch (e) {
            deviceId = 'dev_' + Math.random().toString(36).substr(2) + Date.now();
        }
        
        window.dataSdk = RealtimeSdk;
        window.dataSdk.init(dataHandler);
        setupEvents();
        
        showSection('login');
    }

    function setupEvents() {
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('hoTen').value.trim();
            const lop = document.getElementById('lop').value.trim();
            
            if (name && lop) {
                currentStudent = { hoTen: name, lop: lop, huong: 'Chung' };
                loadQuizData();
            } else {
                alert("Vui lòng nhập đủ Họ tên và Lớp!");
            }
        };

        document.getElementById('view-scores-btn').onclick = () => {
            showSection('scores');
        };
        document.getElementById('next-btn').onclick = nextQuestion;
        document.getElementById('prev-btn').onclick = prevQuestion; 
        document.getElementById('submit-btn').onclick = submitQuiz;
    }

    function loadQuizData() {
        let rawData = JSON.parse(JSON.stringify(rawQuestions));
        
        // GIỮ NGUYÊN THỨ TỰ (KHÔNG DÙNG HÀM SHUFFLE)
        let part1 = rawData.filter(q => q.type === 'single');
        part1.forEach((q, idx) => {
            q.displayQuestion = `Câu ${idx + 1}: ${q.question}`;
        });

        // BẮT ĐẦU ĐÁNH SỐ TỪ CÂU 1 CHO PHẦN 2
        let part2 = rawData.filter(q => q.type === 'tf_cluster');
        part2.forEach((q, idx) => {
            q.displayQuestion = `Câu ${idx + 1}: ${q.question}`;
            const labels = ['a)', 'b)', 'c)', 'd)'];
            q.subQuestions.forEach((sub, sIdx) => {
                sub.text = sub.text.replace(/^[a-d]\)\s*/i, '');
                sub.text = `${labels[sIdx]} ${sub.text}`;
            });
        });

        currentQuestions = [...part1, ...part2];
        startQuiz();
    }

    function goHome() {
        document.body.classList.remove('is-reviewing');
        let floatingBar = document.getElementById('review-floating-bar');
        if(floatingBar) floatingBar.style.display = 'none';
        
        document.getElementById('result-modal').classList.add('hidden');
        document.getElementById('hoTen').value = ''; 
        document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    }

    let currentIdx = 0;
    function startQuiz() {
        quizStartTime = new Date();
        isQuizStarted = true;

        document.body.classList.remove('is-reviewing');
        let floatingBar = document.getElementById('review-floating-bar');
        if(floatingBar) floatingBar.style.display = 'none';
        
        document.getElementById('timer-banner').style.display = 'flex';
        document.getElementById('nav-buttons').style.display = 'flex';
        document.getElementById('progress-container').style.display = 'block';

        showSection('quiz');
        document.getElementById('student-info').innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
        currentIdx = 0;
        userAnswers = {};
        renderQuestion();
        
        clearInterval(timerInterval);
        startTimer(45 * 60); 
    }

    function retryQuiz() {
        loadQuizData();
    }

    function getTotalItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.subQuestions.length;
            else count++;
        });
        return count; 
    }

    function getAnsweredCount() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') {
                q.subQuestions.forEach(sub => {
                    if (userAnswers[sub.id]) count++;
                });
            } else {
                if (userAnswers[q.id] !== undefined) count++;
            }
        });
        return count;
    }

    window.selectAnswer = function(qId, val, type) {
        userAnswers[qId] = val;
        updateProgress();
    };

    function renderQuestion() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        
        if (q.type === 'tf_cluster') {
            container.innerHTML = `
                <div class="fade-in">
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-orange-100 pb-3">
                        <span class="bg-gradient-to-br from-orange-400 to-red-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span>
                        <h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-600 tracking-wide uppercase">TRẮC NGHIỆM ĐÚNG/SAI</h3>
                    </div>

                    <div class="bg-red-50 border-2 border-red-200 p-4 md:p-6 rounded-2xl mb-6 text-red-700 text-base md:text-lg font-extrabold leading-relaxed shadow-inner">
                        ${q.displayQuestion}
                    </div>
                    <div class="space-y-3 md:pl-6">
                        ${q.subQuestions.map(sub => `
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-white p-4 border-2 border-gray-100 hover:border-red-300 rounded-2xl gap-4 shadow-sm hover:shadow-md transition-all">
                                <span class="flex-1 text-gray-800 font-bold text-base leading-snug">${sub.text}</span>
                                <div class="flex gap-2 flex-shrink-0 self-end sm:self-auto mt-2 sm:mt-0">
                                    <input type="radio" id="q_${sub.id}_T" name="q_${sub.id}" value="Đúng" class="hidden tf-radio-T" 
                                        onchange="selectAnswer('${sub.id}', 'Đúng', 'tf')" ${isChecked(sub.id, 'Đúng') ? 'checked' : ''}>
                                    <label for="q_${sub.id}_T" class="tf-label-T px-6 py-3 border-2 border-gray-200 rounded-xl cursor-pointer font-extrabold text-gray-500 text-sm text-center w-24 sm:w-28 transition-all hover:bg-gray-50 uppercase tracking-wide">Đúng</label>

                                    <input type="radio" id="q_${sub.id}_S" name="q_${sub.id}" value="Sai" class="hidden tf-radio-S" 
                                        onchange="selectAnswer('${sub.id}', 'Sai', 'tf')" ${isChecked(sub.id, 'Sai') ? 'checked' : ''}>
                                    <label for="q_${sub.id}_S" class="tf-label-S px-6 py-3 border-2 border-gray-200 rounded-xl cursor-pointer font-extrabold text-gray-500 text-sm text-center w-24 sm:w-28 transition-all hover:bg-gray-50 uppercase tracking-wide">Sai</label>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="fade-in">
                    ${currentIdx === 0 ? `
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3">
                        <span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span>
                        <h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">PHẦN TRẮC NGHIỆM MỘT LỰA CHỌN</h3>
                    </div>` : ''}

                    <div class="flex gap-4 mb-5">
                        <div class="w-full">
                            <div class="text-xl font-extrabold text-red-600 mt-1 leading-snug tracking-tight">${q.displayQuestion}</div>
                        </div>
                    </div>
                    <div class="space-y-4 md:pl-14 mt-6">
                        ${q.options.map((opt, i) => `
                            <div class="flex items-center">
                                <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio"
                                    ${isChecked(q.id, i) ? 'checked' : ''}
                                    onchange="selectAnswer('${q.id}', ${i}, 'single')">
                                <label for="opt_${i}" class="option-label w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg">
                                    <span class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50 transition-colors">
                                        ${String.fromCharCode(65 + i)}
                                    </span>
                                    <span class="text-gray-700 leading-relaxed">${opt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                                </label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        updateNav();
        updateProgress();
    }

    function isChecked(qId, val) {
        return userAnswers[qId] === val;
    }

    function nextQuestion() {
        if (currentIdx < currentQuestions.length - 1) {
            currentIdx++;
            renderQuestion();
        }
    }
    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            renderQuestion();
        }
    }

   function updateNav() {
        const isLast = currentIdx === currentQuestions.length - 1;
        const isFirst = currentIdx === 0; 
        
        document.getElementById('prev-btn').style.display = isFirst ? 'none' : 'block';
        document.getElementById('next-btn').style.display = isLast ? 'none' : 'block';
        document.getElementById('submit-btn').style.display = isLast ? 'block' : 'none';
    }
    
    function updateProgress() {
        document.getElementById('progress-text').innerText = `${getAnsweredCount()}/${getTotalItems()} ý`;
    }

    function formatDuration(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m}p ${s}s`;
    }

    async function submitQuiz() {
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let correct = 0;
        let totalItems = getTotalItems(); 

        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') {
                q.subQuestions.forEach(sub => {
                    if (userAnswers[sub.id] === sub.correct) correct++;
                });
            } else {
                if (userAnswers[q.id] === q.correct) correct++;
            }
        });
        
        const score = (correct * 10 / totalItems).toFixed(2);
        const durationSeconds = Math.floor((quizEndTime - quizStartTime) / 1000);
        
        const record = {
            hoTen: currentStudent.hoTen,
            lop: currentStudent.lop,
            huong: currentStudent.huong,
            diem: parseFloat(score),
            soCauDung: correct,
            tongCau: totalItems,
            startTime: quizStartTime.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit', second:'2-digit'}),
            endTime: quizEndTime.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit', second:'2-digit'}),
            duration: formatDuration(durationSeconds),
            thoiGian: new Date().toISOString(),
            deviceId: deviceId 
        };

        if (window.dataSdk) {
            const result = await window.dataSdk.create(record);

            if (result.isOk) {
                showModalResult(score, correct, totalItems, record.duration);
            } else {
                alert("Lỗi mạng! Không thể lưu điểm. Vui lòng thử lại.");
            }
        }
    }

    function showModalResult(score, correct, total, dur) {
        const modal = document.getElementById('result-modal');
        const content = document.getElementById('result-content');
        modal.classList.remove('hidden');
        
        content.innerHTML = `
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-green-600 mb-2">Hoàn thành bài ôn tập!</h3>
            <p class="text-gray-600 mb-6 mt-2">
                <span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - ${currentStudent.lop}</span>
            </p>
            <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative">
                <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
                <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
                <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm">Đúng ${correct}/${total} ý | Tổng TG: ${dur}</div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="reviewQuiz()" class="w-full py-3 bg-gray-100 text-blue-700 border-2 border-blue-200 rounded-xl font-extrabold shadow-sm hover:bg-blue-50 transition-colors text-lg">🔎 Xem lại bài</button>
                <button onclick="document.getElementById('result-modal').classList.add('hidden'); document.getElementById('quiz-section').classList.add('hidden'); document.getElementById('scores-section').classList.remove('hidden');" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
            </div>
            <button onclick="goHome()" class="w-full py-3 bg-gray-100 text-gray-800 rounded-xl font-extrabold shadow-sm hover:bg-gray-200 transition-colors text-lg">🏠 Về màn hình chính</button>
        `;
    }

    function reviewQuiz() {
        document.getElementById('result-modal').classList.add('hidden');
        document.getElementById('scores-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        
        document.body.classList.add('is-reviewing');
        
        document.getElementById('timer-banner').style.display = 'none';
        document.getElementById('nav-buttons').style.display = 'none';
        document.getElementById('progress-container').style.display = 'none';

        let floatingBar = document.getElementById('review-floating-bar');
        if(!floatingBar) {
            floatingBar = document.createElement('div');
            floatingBar.id = 'review-floating-bar';
            floatingBar.className = "fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200 p-4 flex gap-4 justify-center shadow-[0_-10px_30px_rgba(0,0,0,0.1)] z-50";
            floatingBar.innerHTML = `
                <button onclick="document.getElementById('quiz-section').classList.add('hidden'); document.getElementById('scores-section').classList.remove('hidden');" class="px-6 py-3 bg-gray-100 text-gray-800 rounded-xl font-extrabold shadow-sm hover:bg-gray-200 transition-colors text-lg">🏆 Xem Bảng Điểm</button>
                <button onclick="goHome()" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-extrabold shadow-md hover:bg-blue-700 transition-colors text-lg">🏠 Về màn hình chính</button>
            `;
            document.body.appendChild(floatingBar);
        }
        floatingBar.style.display = 'flex';

        const container = document.getElementById('question-container');
        container.innerHTML = currentQuestions.map((q, idx) => {
            
            let headerHtml = '';
            if (idx === 0) {
                headerHtml = `
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-blue-200 pb-3 mt-4">
                        <span class="bg-gradient-to-br from-blue-500 to-cyan-600 text-white w-12 h-12 flex items-center justify-center rounded-xl font-black text-2xl shadow-md">I</span>
                        <h3 class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-cyan-700 uppercase tracking-widest">Phần Trắc Nghiệm Nhiều Lựa Chọn</h3>
                    </div>
                `;
            } else if (q.type === 'tf_cluster' && currentQuestions[idx - 1] && currentQuestions[idx - 1].type === 'single') {
                headerHtml = `
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-orange-200 pb-3 mt-10">
                        <span class="bg-gradient-to-br from-orange-500 to-red-600 text-white w-12 h-12 flex items-center justify-center rounded-xl font-black text-2xl shadow-md">II</span>
                        <h3 class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-700 to-red-700 uppercase tracking-widest">Phần Trắc Nghiệm Đúng/Sai</h3>
                    </div>
                `;
            }

            if (q.type === 'single') {
                let optionsHtml = q.options.map((opt, i) => {
                    let isSelected = isChecked(q.id, i);
                    let isCorrect = (q.correct === i);
                    let stateClass = "review-neutral";
                    let icon = "";
                    
                    if (isCorrect) {
                        stateClass = "review-correct shadow-md";
                        icon = "✅";
                    } else if (isSelected && !isCorrect) {
                        stateClass = "review-incorrect";
                        icon = "❌";
                    }
                    
                    return `
                        <div class="p-4 border-2 rounded-2xl flex items-center gap-4 ${stateClass} mb-3 font-bold text-lg pointer-events-none">
                            <span class="w-10 h-10 rounded-xl border-2 flex items-center justify-center text-base font-black flex-shrink-0 bg-white/50 border-gray-300/50">${String.fromCharCode(65 + i)}</span>
                            <span class="leading-relaxed flex-1">${opt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                            <span>${icon}</span>
                        </div>
                    `;
                }).join('');

                return `
                    ${headerHtml}
                    <div class="mb-8">
                        <div class="mb-4">
                            <div class="text-xl font-extrabold text-red-600 leading-snug">${q.displayQuestion}</div>
                        </div>
                        <div class="md:pl-14">${optionsHtml}</div>
                    </div>
                `;
            } else {
                let subHtml = q.subQuestions.map(sub => {
                    let userAns = userAnswers[sub.id];
                    let isCorrect = userAns === sub.correct;
                    
                    let ansText = "";
                    let colorClass = "";

                    if (userAns) {
                        ansText = isCorrect ? `✅ Chính xác (Bạn chọn: ${userAns})` : `❌ Trả lời sai (Bạn chọn: ${userAns} | Đáp án: ${sub.correct})`;
                        colorClass = isCorrect ? 'text-green-700 bg-green-50 border-green-200' : 'text-red-700 bg-red-50 border-red-200';
                    } else {
                        ansText = `➖ Bỏ qua (Đáp án chuẩn: ${sub.correct})`;
                        colorClass = 'text-orange-600 bg-orange-50 border-orange-200';
                    }

                    return `
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-white p-4 border-2 border-gray-100 rounded-2xl gap-4 shadow-sm mb-3">
                            <span class="flex-1 text-gray-800 font-bold text-base leading-snug">${sub.text}</span>
                            <div class="font-extrabold ${colorClass} text-sm whitespace-nowrap px-4 py-2 rounded-xl border border-gray-100">
                                ${ansText}
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    ${headerHtml}
                    <div class="mb-8 p-4 bg-gray-50 rounded-2xl border-2 border-gray-200">
                        <div class="text-xl font-extrabold text-red-600 mb-4">${q.displayQuestion}</div>
                        <div>${subHtml}</div>
                    </div>
                `;
            }
        }).join('<div class="my-6 border-b-2 border-dashed border-gray-200"></div>');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderScores() {
        const tbody = document.getElementById('scores-tbody');
        if (allScores.length === 0) {
            tbody.innerHTML = '';
            document.getElementById('no-scores').classList.remove('hidden');
            return;
        }
        document.getElementById('no-scores').classList.add('hidden');

        const sorted = [...allScores].sort((a, b) => b.diem - a.diem);

        tbody.innerHTML = sorted.map((s, idx) => {
            const rowClass = s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-gray-50';
            const meBadge = s.deviceId === deviceId ? '<span class="ml-3 bg-gradient-to-r from-pink-500 to-rose-500 text-white text-xs px-3 py-1 rounded-full font-black shadow-sm uppercase tracking-wider">Bạn</span>' : '';

            const cauDung = s.soCauDung !== undefined ? s.soCauDung : '-';
            const tongCau = s.tongCau !== undefined ? s.tongCau : '-';
            const tenLop = s.lop || '';

            return `
                <tr class="${rowClass} transition-colors">
                    <td class="px-3 sm:px-5 py-4 text-center font-black text-gray-400 text-lg">#${idx + 1}</td>
                    <td class="px-3 sm:px-5 py-4 font-bold text-gray-700 text-base">${tenLop}</td>
                    <td class="px-3 sm:px-5 py-4 font-extrabold text-gray-800 whitespace-nowrap text-lg">${s.hoTen || ''} ${meBadge}</td>
                    <td class="px-3 sm:px-5 py-4 text-center text-gray-600 font-bold text-lg">${cauDung}/${tongCau}</td>
                    <td class="px-3 sm:px-5 py-4 text-center"><span class="font-black text-2xl ${s.diem >= 5 ? 'text-green-600' : 'text-red-500 drop-shadow-sm'}">${s.diem}</span></td>
                    <td class="px-3 sm:px-5 py-4 text-center text-xs text-gray-400 font-bold">${s.startTime || '--:--'}</td>
                    <td class="px-3 sm:px-5 py-4 text-center text-xs text-gray-400 font-bold">${s.endTime || '--:--'}</td>
                    <td class="px-3 sm:px-5 py-4 text-right text-xs text-orange-600 font-bold">${s.duration || '--'}</td>
                </tr>
            `;
        }).join('');
        
        setTimeout(() => {
            const myRow = document.querySelector('.my-score-row');
            if (myRow) myRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
    }

    function showSection(id) {
        ['login', 'quiz', 'scores'].forEach(s => {
            const sec = document.getElementById(s+'-section');
            if(sec) sec.classList.add('hidden');
        });
        const target = document.getElementById(id+'-section');
        if(target) target.classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) submitQuiz();
        }, 1000);
    }

    initApp();
  </script>
 </body>
</html>
