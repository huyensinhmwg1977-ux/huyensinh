    html, body { width: 100%; min-height: 100vh; margin: 0; padding: 0; overflow-x: hidden; overflow-y: auto; }
    
    /* GIAO DIỆN NỀN CHUYỂN MÀU GỐC */
    body { 
      font-family: 'Be Vietnam Pro', sans-serif; 
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    
    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    #app { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
    
    .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .option-label { transition: all 0.2s ease-in-out; cursor: pointer; border-color: #e2e8f0; }
    .option-label:hover { transform: translateX(6px); background-color: #f0fdfa; border-color: #38bdf8; box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.1); }
    
    input[type="radio"].de-radio:checked + .de-label {
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        border-color: #0ea5e9;
        box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.3);
    }
    input[type="radio"].de-radio:checked + .de-label .de-icon { background: linear-gradient(135deg, #0ea5e9, #3b82f6); color: white; }

    input[type="radio"].single-radio:checked + .option-label {
      background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      color: white; border-color: transparent;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }
    input[type="radio"].single-radio:checked + .option-label span:first-child { background-color: rgba(255,255,255,0.25); border-color: transparent; color: white; }
    input[type="radio"].single-radio:checked + .option-label span:last-child { color: white; }
    
    .tf-radio-T:checked + .tf-label-T, .tf-radio-S:checked + .tf-label-S {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important; 
        border-color: transparent !important; color: white !important;
        box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);
    }

    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .my-score-row {
      background: linear-gradient(to right, #fdf4ff, #ffffff) !important;
      border-left: 4px solid #db2777 !important; font-weight: 700 !important;
      color: #9d174d !important; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; z-index: 10;
    }
    .my-score-row td { padding-top: 16px; padding-bottom: 16px; }
    button:active { transform: scale(0.96); }

    /* CSS NỀN XANH NHẠT VÀ CHỮ XANH ĐẬM CHO BLOCK CODE */
    .code-snippet {

        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        line-height: 1.6;
        white-space: pre-wrap;

    const testBanks = { de1: de1_data, de2: de2_data };
    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    window.startQuizAction = function() {
        const errDiv = document.getElementById('login-error');
        errDiv.classList.add('hidden');
        const name = document.getElementById('hoTen').value.trim();
        const lop = document.getElementById('lop').value.trim();
        const checkedRadio = document.querySelector('input[name="chonDe"]:checked');
        if (!name || !lop) {
            errDiv.innerText = "⚠️ Thầy/Cô vui lòng nhắc học sinh nhập đầy đủ Họ tên và Lớp nhé!";
            errDiv.classList.remove('hidden');
            return;
        }
        if (name && lop && checkedRadio) {
            const maDe = checkedRadio.value;
            const tenDe = checkedRadio.nextElementSibling.querySelector('.de-text').innerText.split('\n')[0].trim();
            currentStudent = { hoTen: name, lop: lop, maDe: maDe, tenDe: tenDe };
            let rawQuestions = JSON.parse(JSON.stringify(testBanks[maDe]));
            
            // ĐÁNH SỐ TỪ 1 CHO CÂU TRẮC NGHIỆM ĐƠN
            let part1 = rawQuestions.filter(q => q.type === 'single');
            part1.forEach((q, idx) => {
                q.displayQuestion = `Câu ${idx + 1}: ${q.question.replace(/^Câu\s*\d+[\.\:]\s*/i, '')}`;
            });
            
            // ĐÁNH SỐ TỪ 1 CHO CÂU ĐÚNG SAI
            let part2 = rawQuestions.filter(q => q.type === 'tf_cluster');
            part2.forEach((q, idx) => {
                q.displayQuestion = `Câu ${idx + 1}: ${q.question.replace(/^Câu\s*\d+[\.\:]\s*/i, '')}`;
                const labels = ['a)', 'b)', 'c)', 'd)'];
                q.subQuestions.forEach((sub, sIdx) => {
                    sub.text = sub.text.replace(/^[a-d]\)\s*/i, '');
                    sub.text = `${labels[sIdx]} ${sub.text}`;
                });
            });

            currentQuestions = [...part1, ...part2];
            quizStartTime = new Date();
            
            setTimeout(() => { isQuizStarted = true; }, 1000);
            showSection('quiz');
            document.getElementById('quiz-title').innerText = currentStudent.tenDe;
            document.getElementById('student-info').innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
            currentIdx = 0;
            userAnswers = {};
            window.renderQuestion();
            startTimer(45 * 60);
        }
    };

    window.prevQuestion = function() {
        if (currentIdx > 0) { currentIdx--; window.renderQuestion(); }
    };

    window.nextQuestion = function() {
        if (currentIdx < currentQuestions.length - 1) { currentIdx++; window.renderQuestion(); }
    };

    window.viewScoresAction = function() {
        const btn = document.getElementById('view-scores-btn') || document.createElement('button'); // Fallback
        btn.innerText = "⏳ Đang tải dữ liệu...";
        if (database) {
            scoresRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                allScores = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                window.renderScores();
                btn.innerText = "🏆 Xem bảng xếp hạng";
                showSection('scores');
            });
        }
    };

    window.goHome = function() {
        document.getElementById('hoTen').value = ''; 
        document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    };

    // ĐÃ CHỈNH SỬA: Hiển thị tổng số "câu" thay vì "ý" trên thanh Tiến độ
    function getTotalItems() {
        return currentQuestions.length; 
    }

    function getAnsweredCount() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') {
                let allAnswered = q.subQuestions.every(sub => userAnswers[sub.id] !== undefined);
                if (allAnswered) count++;
            } else {
                if (userAnswers[q.id] !== undefined && userAnswers[q.id].toString().trim() !== '') count++;
            }
        });
        return count;
    }

    window.selectAnswer = function(qId, val, type) {
        userAnswers[qId] = val;
        window.updateProgress();
    };

    window.renderQuestion = function() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        
        if (q.type === 'tf_cluster') {
            container.innerHTML = `<div class="fade-in"><div class="flex items-center gap-3 mb-6 border-b-2 border-orange-100 pb-3"><span class="bg-gradient-to-br from-orange-400 to-red-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-600 tracking-wide uppercase">PHẦN TRẮC NGHIỆM ĐÚNG/SAI</h3></div><div class="bg-red-50 border-2 border-red-200 p-4 md:p-6 rounded-2xl mb-6 text-red-600 text-lg sm:text-xl font-bold leading-relaxed shadow-inner">${q.displayQuestion.replace(/\n/g, '<br/>')}</div><div class="space-y-3 md:pl-6">${q.subQuestions.map(sub => `<div class="flex flex-col sm:flex-row sm:items-center justify-between bg-white p-4 border-2 border-gray-100 hover:border-red-300 rounded-2xl gap-4 shadow-sm hover:shadow-md transition-all"><span class="flex-1 text-gray-800 font-bold text-base leading-snug">${sub.text}</span><div class="flex gap-2 flex-shrink-0 self-end sm:self-auto mt-2 sm:mt-0"><input type="radio" id="q_${sub.id}_T" name="q_${sub.id}" value="Đúng" class="hidden tf-radio-T" onchange="window.selectAnswer('${sub.id}', 'Đúng', 'tf')" ${userAnswers[sub.id] === 'Đúng' ? 'checked' : ''}><label for="q_${sub.id}_T" class="tf-label-T px-6 py-3 border-2 border-gray-200 rounded-xl cursor-pointer font-extrabold text-gray-500 text-sm text-center w-24 sm:w-28 transition-all hover:bg-gray-50 uppercase tracking-wide shadow-sm">Đúng</label><input type="radio" id="q_${sub.id}_S" name="q_${sub.id}" value="Sai" class="hidden tf-radio-S" onchange="window.selectAnswer('${sub.id}', 'Sai', 'tf')" ${userAnswers[sub.id] === 'Sai' ? 'checked' : ''}><label for="q_${sub.id}_S" class="tf-label-S px-6 py-3 border-2 border-gray-200 rounded-xl cursor-pointer font-extrabold text-gray-500 text-sm text-center w-24 sm:w-28 transition-all hover:bg-gray-50 uppercase tracking-wide shadow-sm">Sai</label></div></div>`).join('')}</div></div>`;
        } else if (q.type === 'single') {
            let isFirstSingle = (currentIdx === 0) || (currentQuestions[currentIdx - 1].type !== 'single');
            container.innerHTML = `<div class="fade-in">${isFirstSingle ? `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">PHẦN TRẮC NGHIỆM MỘT LỰA CHỌN</h3></div>` : ''}<div class="flex gap-4 mb-5"><div class="w-full"><p class="text-lg sm:text-xl font-bold text-red-600 mt-1 leading-snug tracking-tight">${q.displayQuestion}</p></div></div><div class="space-y-4 md:pl-14 mt-6">${q.options.map((opt, i) => `<div class="flex items-center"><input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio" ${userAnswers[q.id] === i ? 'checked' : ''} onchange="window.selectAnswer('${q.id}', ${i}, 'single')"><label for="opt_${i}" class="option-label w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg"><span class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50 transition-colors shadow-sm">${String.fromCharCode(65 + i)}</span><span class="text-gray-700 leading-relaxed">${opt}</span></label></div>`).join('')}</div></div>`;
        }
        
        window.updateNav();
        window.updateProgress();
    };

    window.updateNav = function() {
        document.getElementById('prev-btn').style.display = (currentIdx === 0) ? 'none' : 'block';
        document.getElementById('next-btn').style.display = (currentIdx === currentQuestions.length - 1) ? 'none' : 'block';
        document.getElementById('submit-btn').style.display = (currentIdx === currentQuestions.length - 1) ? 'block' : 'none';
    };

    window.updateProgress = function() {
        document.getElementById('progress-text').innerText = `${getAnsweredCount()}/${getTotalItems()} câu`;
    };

    function formatDuration(sec) {
        const m = Math.floor(sec / 60); const s = sec % 60;
        return `${m}p ${s}s`;
    }

    // ĐÃ CHỈNH SỬA: Chấm điểm tính theo TỪNG "Ý" chi tiết như đã yêu cầu.
    // 28 ý phần trắc nghiệm + 12 ý (3 câu x 4) phần Đúng/Sai = 40 ý/đề.
    window.submitQuiz = function() {
        if (!isQuizStarted) return; 
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let correctP1P2 = 0;
        let totalP1P2 = 0;

        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') {
                q.subQuestions.forEach(sub => {
                    totalP1P2++;
                    if (userAnswers[sub.id] === sub.correct) correctP1P2++;
                });
            } else if (q.type === 'single') {
                totalP1P2++;
                if (userAnswers[q.id] === q.correct) correctP1P2++;
            }
        });

        // Tính điểm trên thang 10 (mỗi ý chiếm trọng số như nhau)
        let scoreP1P2 = (totalP1P2 > 0) ? (correctP1P2 / totalP1P2) * 10 : 0; 

        const score = scoreP1P2.toFixed(2);
        let correctTotal = correctP1P2;
        let itemsTotal = totalP1P2;

        const record = {
            hoTen: currentStudent.hoTen, lop: currentStudent.lop, tenDe: currentStudent.tenDe,
            diem: parseFloat(score), soCauDung: correctTotal, tongCau: itemsTotal,
            startTime: quizStartTime.toLocaleTimeString(), endTime: quizEndTime.toLocaleTimeString(),
            duration: formatDuration(Math.floor((quizEndTime - quizStartTime) / 1000)),
            thoiGian: new Date().toISOString(), deviceId: deviceId
        };
        
        if(database) {
            scoresRef.push(record, () => { window.showModalResult(score, correctTotal, itemsTotal, record.duration); });
        }
    };

    window.showModalResult = function(score, correct, total, dur) {
        ['login', 'quiz', 'scores', 'review'].forEach(s => document.getElementById(s+'-section').classList.add('hidden'));
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('result-content').innerHTML = `
        <div class="flex justify-start mb-2">
            <button onclick="window.goHome()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-sm border border-gray-200 text-sm">🏠 Trang chủ</button>
        </div>
        <div class="text-center">
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-emerald-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2"><span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - Lớp ${currentStudent.lop}</span><br><span class="text-sm font-bold text-gray-400 mt-1 block">${currentStudent.tenDe}</span></p>
        </div>
        <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative text-center">
            <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
            <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
            <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm border border-blue-100">Trả lời đúng ${correct}/${total} ý | TG: ${dur}</div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button onclick="window.reviewQuiz()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">👀 Xem lại bài</button>
            <button onclick="window.viewScoresAction()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
        </div>`;
    };

    window.reviewQuiz = function() {
        showSection('review');
        const container = document.getElementById('review-content');
        let html = '';

        currentQuestions.forEach((q, idx) => {
            if (q.type === 'tf_cluster') {
                html += `<div class="p-4 sm:p-6 border border-slate-200 rounded-2xl bg-white shadow-sm mb-6">`;
                html += `<div class="font-bold text-lg sm:text-xl text-red-600 mb-4 leading-relaxed">${q.displayQuestion}</div>`;
                html += `<div class="space-y-3">`;
                q.subQuestions.forEach(sub => {
                    let uAns = userAnswers[sub.id];
                    let isCorrect = uAns === sub.correct;
                    let borderColor = isCorrect ? 'border-emerald-300 bg-emerald-50' : 'border-red-300 bg-red-50';
                    let statusIcon = isCorrect ? '✅' : '❌';
                    
                    html += `<div class="p-4 border-2 rounded-xl flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 ${borderColor}">`;
                    html += `<span class="font-bold text-slate-700 flex-1">${sub.text}</span>`;
                    html += `<div class="flex gap-2 font-bold text-sm flex-shrink-0 items-center">`;
                    html += `  <span class="text-2xl mr-2 drop-shadow-sm">${statusIcon}</span>`;
                    html += `  <span class="px-3 py-1.5 rounded-lg ${isCorrect ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-red-100 text-red-700 border border-red-200'} shadow-sm">Bạn chọn: ${uAns || 'Chưa chọn'}</span>`;
                    html += `  <span class="px-3 py-1.5 rounded-lg bg-emerald-100 text-emerald-700 border border-emerald-200 shadow-sm">Đáp án: ${sub.correct}</span>`;
                    html += `</div>`;
                    html += `</div>`;
                });
                html += `</div></div>`;
            } else if (q.type === 'single') {
                let uAns = userAnswers[q.id];
                let isCorrect = uAns === q.correct;
                let borderColor = isCorrect ? 'border-emerald-300 bg-emerald-50' : 'border-red-300 bg-red-50';
                html += `<div class="p-4 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor}">`;
                html += `<div class="font-bold text-lg sm:text-xl text-red-600 mb-4 leading-relaxed">${q.displayQuestion}</div>`;
                html += `<div class="space-y-2">`;
                q.options.forEach((opt, i) => {
                    let optBg = '';
                    let iconHtml = '';
                    
                    if (q.correct === i) {
                        optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2'; 
                        iconHtml = '<span class="text-2xl drop-shadow-sm ml-auto">✅</span>';
                    } else if (uAns === i && !isCorrect) {
                        optBg = 'bg-red-100 text-red-900 line-through border-red-400 border-2'; 
                        iconHtml = '<span class="text-2xl drop-shadow-sm ml-auto">❌</span>';
                    } else {
                        optBg = 'bg-white text-slate-700 border border-slate-200'; 
                    }

                    html += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3">
                                <span class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/50 text-sm font-black shadow-sm">${String.fromCharCode(65 + i)}</span>
                                <span class="${(q.correct === i || uAns === i) ? 'font-semibold' : 'font-medium'} flex-1">${opt}</span>
                                ${iconHtml}
                             </div>`;
                });
                html += `</div></div>`;
            }
        });
        container.innerHTML = html;
    };

    window.backToResult = function() {
        showSection('result');
    };

    window.renderScores = function() {
        const tbody = document.getElementById('scores-tbody');
        if (allScores.length === 0) { tbody.innerHTML = ''; document.getElementById('no-scores').classList.remove('hidden'); return; }
        document.getElementById('no-scores').classList.add('hidden');
        const sorted = [...allScores].sort((a, b) => (a.lop.localeCompare(b.lop)) || (a.hoTen.localeCompare(b.hoTen)) || (b.diem - a.diem));
        tbody.innerHTML = sorted.map((s, idx) => `<tr class="${s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-slate-50'} transition-colors border-b border-slate-100"><td class="px-4 py-4 text-center font-black text-slate-400 text-sm">#${idx + 1}</td><td class="px-4 py-4 font-black text-blue-600 text-sm">${s.lop}</td><td class="px-4 py-4 font-extrabold text-slate-800 text-sm">${s.hoTen} ${s.deviceId === deviceId ? '<span class="ml-2 bg-pink-500 text-white text-[10px] px-2 rounded-md">Bạn</span>' : ''}</td><td class="px-4 py-4 text-xs font-bold text-blue-500"><span class="bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">${s.tenDe}</span></td><td class="px-4 py-4 text-center text-slate-600 font-bold text-sm">${s.soCauDung}/${s.tongCau}</td><td class="px-4 py-4 text-center"><span class="font-black text-lg ${s.diem >= 5 ? 'text-emerald-600' : 'text-red-500'}">${s.diem}</span></td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.startTime}</td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.endTime}</td><td class="px-4 py-4 text-right font-black text-orange-600 text-xs">${s.duration}</td>
<td class="px-4 py-4 text-right text-xs text-slate-500 font-bold">${s.thoiGian ? new Date(s.thoiGian).toLocaleDateString('vi-VN') : '--/--/----'}</td></tr>`).join('');
    };

    function showSection(id) {
        ['login', 'quiz', 'scores', 'result', 'review'].forEach(s => document.getElementById(s+'-section').classList.add('hidden'));
        document.getElementById(id+'-section').classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) window.submitQuiz();
        }, 1000);
    }

    try {
        if (!localStorage.getItem('deviceId')) {
            localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
        }
        deviceId = localStorage.getItem('deviceId');
    } catch (e) { deviceId = 'dev_temp_' + Math.random().toString(36).substr(2); }
  </script>
 </body>
</html>
