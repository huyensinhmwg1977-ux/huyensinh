        border: 1px solid rgba(255, 255, 255, 0.5);

    .option-label { transition: all 0.2s ease-in-out; cursor: pointer; border-color: #e2e8f0; }
    .option-label:hover { transform: translateX(6px); background-color: #f0fdfa; border-color: #38bdf8; box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.1); }
    
    input[type="radio"].de-radio:checked + .de-label {
        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);

        box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.3);

    input[type="radio"].single-radio:checked + .option-label {

      color: white; border-color: transparent;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }
    input[type="radio"].single-radio:checked + .option-label span:first-child { background-color: rgba(255,255,255,0.25); border-color: transparent; color: white; }
    input[type="radio"].single-radio:checked + .option-label span:last-child { color: white; }
    
    .tf-radio-T:checked + .tf-label-T, .tf-radio-S:checked + .tf-label-S {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important; 
        border-color: transparent !important; color: white !important;
        box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);
    }

    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    .my-score-row {
      background: linear-gradient(to right, #fdf4ff, #ffffff) !important;
      border-left: 4px solid #db2777 !important; font-weight: 700 !important;
      color: #9d174d !important; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; z-index: 10;
    }
    .my-score-row td { padding-top: 16px; padding-bottom: 16px; }
    button:active { transform: scale(0.96); }

    /* ĐỊNH DẠNG CODE BLOCK CỰC ĐẸP */
    .code-block { 
        background: #f8fafc; 
        color: #1e3a8a; 
        padding: 15px 20px;

        font-family: 'Consolas', 'Courier New', monospace;

        border: 1px solid #e2e8f0; 
        border-left: 5px solid #3b82f6; 
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);

    /* CSS bảng dữ liệu */
    .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 15px; font-size: 0.95rem; text-align: left;}
    .data-table th, .data-table td { border: 1px solid #cbd5e1; padding: 8px 12px; }
    .data-table th { background-color: #f1f5f9; font-weight: bold; color: #334155; }
    .data-table tr:nth-child(even) { background-color: #f8fafc; }

    /* CSS chế độ xem lại */
    body.is-reviewing #app { padding-bottom: 100px; } 
    .review-correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
    .review-incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; text-decoration: line-through; opacity: 0.8; }
    .review-neutral { background-color: #ffffff !important; border-color: #e2e8f0 !important; opacity: 0.5; }
  </style>

  <script>
    // ==================== BẢO VỆ TÀI LIỆU & CHỐNG GIAN LẬN ====================
    document.addEventListener('contextmenu', event => event.preventDefault()); 
    document.addEventListener('selectstart', event => {
        if (event.target.tagName !== 'INPUT' && event.target.tagName !== 'SELECT') { event.preventDefault(); }
    });
    document.addEventListener('dragstart', event => event.preventDefault()); 
    document.addEventListener('copy', event => {
        event.clipboardData.setData('text/plain', 'Tài liệu đã được bảo vệ!');
        event.preventDefault();
    });

    let cheatCount = 0;
    let isQuizStarted = false; 
    let isPenalizing = false; 

    function handleCheatAction() {
        if (!isQuizStarted || isPenalizing) return; 
        
        const isQuizActive = !document.getElementById('quiz-section').classList.contains('hidden') && !document.body.classList.contains('is-reviewing');
        
        if (isQuizActive) {
            isPenalizing = true;
            cheatCount++;
            
            document.getElementById('cheat-count-display').innerText = cheatCount;
            const modal = document.getElementById('cheat-modal');
            const msg = document.getElementById('cheat-message');
            const btn = document.getElementById('cheat-continue-btn');
            
            modal.classList.remove('hidden');
            
            const currentQ = currentQuestions[currentIdx];
            if (currentQ.type === 'tf_cluster') {
                currentQ.subQuestions.forEach(sub => {
                    if (!userAnswers[sub.id]) userAnswers[sub.id] = "Gian lận"; 
                });
            } else {
                if (userAnswers[currentQ.id] === undefined) userAnswers[currentQ.id] = -1; 
            }
            updateProgress();

            if (cheatCount >= 3) {
                msg.innerHTML = "Bạn đã vi phạm quá 3 lần.<br>Hệ thống đang <b>TỰ ĐỘNG THU BÀI</b>!";
                btn.innerText = "NỘP BÀI NGAY";
                btn.onclick = () => {
                    modal.classList.add('hidden');
                    submitQuiz();
                    isPenalizing = false;
                };
            } else {
                msg.innerHTML = "Bạn vừa thoát màn hình, chuyển tab hoặc dùng phím cấm.<br><br><span class='text-red-600 font-black'>Câu hỏi này bị tước quyền trả lời (0 điểm).</span><br><br><i class='text-sm text-gray-500'>Vui lòng nhấn nút bên dưới để tiếp tục.</i>";
                btn.innerText = "TÔI ĐÃ HIỂU & TIẾP TỤC";
                
                btn.onclick = () => {
                    modal.classList.add('hidden');
                    if (currentIdx < currentQuestions.length - 1) {
                        currentIdx++;
                        renderQuestion();
                    } else {
                        submitQuiz(); 
                    }
                    isPenalizing = false;
                };
            }
        }
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'hidden') handleCheatAction();
    });

    window.addEventListener('keydown', (e) => {
        const forbiddenKeys = ['PrintScreen', 'F12'];
        if (forbiddenKeys.includes(e.key) || (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'p' || e.key === 's'))) {
            e.preventDefault();
            handleCheatAction();
        }
    });
    window.addEventListener('keyup', (e) => {
        if (e.key === 'PrintScreen') handleCheatAction();
    });

    // ==================== CẤU HÌNH FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyC4ou3Fu8IxAPYV347pHKT1jtPxQe5TBM4",
        authDomain: "hanhtrinhso-e3368.firebaseapp.com",
        databaseURL: "https://hanhtrinhso-e3368-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "hanhtrinhso-e3368",
        storageBucket: "hanhtrinhso-e3368.firebasestorage.app",
        messagingSenderId: "1046142513655",
        appId: "1:1046142513655:web:5c7bb3a47ee90ac279fef2"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();
    const scoresRef = database.ref('bxh_tin12_de0501');

    // ==================== NGÂN HÀNG CÂU HỎI ĐỀ 0501 ====================
    const rawQuestions = [
        // PHẦN I
        { id: 1, type: "single", question: "Khả năng hiểu ngôn ngữ của Trí tuệ nhân tạo không thể hiện trong hệ thống nào sau đây?", options: ["Trợ lý ảo trên xe ô tô.", "Trợ giúp soạn thảo văn bản.", "Tổng đài tự động hỏi đáp.", "Nhận diện khuôn mặt."], correct: 3 },
        { id: 2, type: "single", question: "Người quản trị mạng thực hiện công việc chính nào sau đây?", options: ["Xây dựng các ứng dụng trên mạng.", "Thiết lập và cấu hình hệ thống mạng.", "Tư vấn nâng cấp các thiết bị phần cứng.", "Nghiên cứu và phát triển các phần mềm."], correct: 1 },
        { id: 3, type: "single", question: "Phương án nào sau đây chỉ ra lý do chủ yếu dẫn tới nhu cầu gia tăng về số lượng chuyên gia bảo mật hệ thống thông tin?", options: ["Tính phức tạp ngày càng tăng của các cuộc tấn công mạng.", "Tốc độ xử lý của CPU ngày càng tăng nhanh.", "Sự phổ biến của các ứng dụng soạn thảo văn bản.", "Dung lượng của các thiết bị lưu trữ ngày càng tăng nhanh."], correct: 0 },
        { id: 4, type: "single", question: "Trong lĩnh vực y tế, Trí tuệ nhân tạo được ứng dụng phổ biến trong hệ thống nào sau đây?", options: ["Tự động hóa hoàn toàn việc kê đơn thuốc cho bệnh nhân.", "In phiếu thứ tự khám bệnh cho bệnh nhân tại các phòng khám.", "Tự động hóa hoàn toàn việc thẩm định các loại thuốc mới.", "Hỗ trợ bác sĩ chẩn đoán bệnh dựa trên hình ảnh X-quang."], correct: 3 },
        { id: 5, type: "single", question: "Thiết bị nào sau đây có chức năng chính là thiết lập kênh kết nối giữa các thiết bị trong mạng LAN (có dây) để truyền dữ liệu?", options: ["Router.", "Access Point.", "Modem.", "Switch."], correct: 3 },
        { id: 6, type: "single", question: "Một công ty có hai chi nhánh ở cách nhau khoảng 10 km. Các máy tính ở mỗi chi nhánh đã được kết nối thành một mạng LAN riêng. Thiết bị nào sau đây là phù hợp nhất để kết nối hai mạng riêng này thành một mạng chung?", options: ["Access Point.", "Modem.", "Router.", "Switch."], correct: 2 },
        { id: 7, type: "single", question: "Đoạn mã CSS nào sau đây thiết lập đường viền có độ dày 3 pixel, kiểu nét đứt bao quanh các đối tượng nội dung khi hiển thị trên trình duyệt?", options: ["p {border-width: 3px; border-style: double;}", "p {border-width: 3px; border-style: dashed;}", "p {border-width: 3px; border-style: groove;}", "p {border-width: 3px; border-style: solid;}"], correct: 1 },
        { id: 8, type: "single", question: "Cho đoạn chương trình viết bằng ngôn ngữ Python hoặc C++ như sau:<div class='grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3 mb-3'><div><div class='font-bold text-gray-700 bg-gray-200 px-3 py-1 rounded-t-lg'>Python</div><div class='code-block mt-0 rounded-t-none text-sm' style='margin:0; padding:10px;'>n = 9\ni = 5\nS = 0\nwhile i &lt; n:\n    S = S + i\n    i = i + 2\nprint(S)</div></div><div><div class='font-bold text-gray-700 bg-gray-200 px-3 py-1 rounded-t-lg'>C++</div><div class='code-block mt-0 rounded-t-none text-sm' style='margin:0; padding:10px;'>int n = 9, i = 5, S = 0;\nwhile (i &lt; n) {\n    S = S + i;\n    i = i + 2;\n}\ncout &lt;&lt; S;</div></div></div>Phương án nào sau đây chỉ ra đúng số lần lặp của câu lệnh while?", options: ["3", "2", "1", "0"], correct: 1 },
        { id: 9, type: "single", question: "Cho đoạn chương trình viết bằng ngôn ngữ Python hoặc C++ như sau:<div class='grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3 mb-3'><div><div class='font-bold text-gray-700 bg-gray-200 px-3 py-1 rounded-t-lg'>Python</div><div class='code-block mt-0 rounded-t-none text-sm' style='margin:0; padding:10px;'>s = \"TRI TUE NHAN TAO\"\nx = 9\nfor i in range(8, 10):\n    if i % 2 == 0:\n        x = x * 2\n    else:\n        x = x // 3\nprint(s[x])</div></div><div><div class='font-bold text-gray-700 bg-gray-200 px-3 py-1 rounded-t-lg'>C++</div><div class='code-block mt-0 rounded-t-none text-sm' style='margin:0; padding:10px;'>char s[] = \"TRI TUE NHAN TAO\";\nint x = 9;\nfor (int i = 8; i &lt; 10; i++) {\n    if (i % 2 == 0)\n        x = x * 2;\n    else\n        x = x / 3;\n}\ncout &lt;&lt; s[x];</div></div></div>Sau khi thực hiện đoạn chương trình trên, kí tự nào sau đây được hiển thị trên màn hình?", options: ["E", "U", "T", "R"], correct: 0 },
        { id: 10, type: "single", question: "Trong bộ giao thức TCP/IP, giao thức IP đảm nhận vai trò nào sau đây?", options: ["Truyền tải an toàn dữ liệu giữa các thiết bị.", "Định tuyến các gói dữ liệu đến đúng địa chỉ mạng.", "Cấp phát địa chỉ IP cho các thiết bị trong mạng.", "Thiết lập bộ quy tắc gửi và nhận thư điện tử qua mạng."], correct: 1 },
        { id: 11, type: "single", question: "Đoạn mã HTML nào sau đây định dạng dòng chữ “TN THPT 2025” thành in đậm, riêng số 2025 còn được in nghiêng?", options: ["&lt;p&gt;&lt;em&gt;TN THPT &lt;/em&gt;&lt;strong&gt;2025&lt;/strong&gt;&lt;/p&gt;", "&lt;p&gt;&lt;em&gt;TN THPT &lt;strong&gt;2025&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;", "&lt;p&gt;&lt;em&gt;&lt;strong&gt;TN THPT 2025&lt;/strong&gt;&lt;/em&gt;&lt;/p&gt;", "&lt;p&gt;&lt;strong&gt;TN THPT &lt;em&gt;2025&lt;/em&gt;&lt;/strong&gt;&lt;/p&gt;"], correct: 3 },
        { id: 12, type: "single", question: "Hành vi nào sau đây không phù hợp với đạo đức trong môi trường số?", options: ["Phát tán tin đồn chưa được kiểm chứng về người khác.", "Trao đổi ý kiến thẳng thắn nhưng mang tính xây dựng.", "Chia sẻ kiến thức có ích kèm theo nguồn trích dẫn.", "Cổ vũ cho những việc làm tốt để lan tỏa đến mọi người."], correct: 0 },

        { id: 14, type: "single", question: "Thuộc tính CSS nào sau đây thiết lập cỡ chữ cho văn bản?", options: ["font-size", "text-align", "font-family", "text-indent"], correct: 0 },
        { id: 15, type: "single", question: "Khi thực hiện đoạn mã HTML có style sau:<div class='code-block'>&lt;html&gt;\n&lt;head&gt;\n&lt;style&gt;\n  .mau { color: green; font-weight: bold; }\n  #mau { color: yellow; font-style: italic; }\n&lt;/style&gt;\n&lt;/head&gt;\n&lt;body&gt;\n  &lt;p id=\"mau\"&gt;Chúc các em thi tốt!&lt;/p&gt;\n&lt;/body&gt;\n&lt;/html&gt;</div>Dòng chữ hiển thị trên trình duyệt sẽ có định dạng nào dưới đây?", options: ["Màu xanh lá cây, in đậm.", "Màu vàng, in nghiêng.", "Màu xanh lá cây, in nghiêng.", "Màu vàng, in đậm."], correct: 1 },
        { id: 16, type: "single", question: "Tiêu đề của trang web được khai báo trong phần tử HTML nào sau đây?", options: ["html", "p", "title", "body"], correct: 2 },
        { id: 17, type: "single", question: "Đoạn mã CSS nào sau đây thiết lập hình ảnh và văn bản được hiển thị theo khối?", options: ["img, p {display: block;}", "img, p {display: none;}", "img, p {display: inline;}", "img, p {display: flex;}"], correct: 0 },
        { id: 18, type: "single", question: "Người làm nghề sửa chữa và bảo trì máy tính phải có kiến thức về lĩnh vực nào sau đây?", options: ["Phần cứng máy tính.", "Lập trình nhúng.", "Cơ sở dữ liệu.", "An toàn thông tin."], correct: 0 },
        { id: 19, type: "single", question: "Khi đọc được thông tin về khu vực thiên tai trên trang báo uy tín, hành động nào không thể hiện tính nhân văn?", options: ["Đăng tải lại hình ảnh thiên tai trên trang cá nhân để tăng lượt tương tác.", "Gửi lời chia buồn và động viên những người bị ảnh hưởng.", "Kêu gọi giúp đỡ từ cộng đồng nếu xác minh thông tin chính xác.", "Tham gia các nhóm từ thiện trực tuyến để hỗ trợ thiết thực."], correct: 0 },
        { id: 20, type: "single", question: "Nhận được tin nhắn việc nhẹ lương cao yêu cầu nộp tiền đặt cọc. Ứng xử nào không an toàn?", options: ["Xác minh thông tin một cách cẩn trọng.", "Bỏ qua tin nhắn và cảnh báo cho bạn bè.", "Trình báo công an về dấu hiệu lừa đảo.", "Nộp tiền đặt cọc ngay theo yêu cầu."], correct: 3 },
        { id: 21, type: "single", question: "Cho đoạn mã HTML sau:<div class='code-block'>&lt;table border=\"1\" width=\"50%\" height=\"10%\"&gt;\n  &lt;tr&gt; &lt;th&gt; &lt;/th&gt; &lt;th&gt; &lt;/th&gt; &lt;/tr&gt;\n  &lt;tr&gt; &lt;td&gt; &lt;/td&gt; &lt;td&gt; &lt;/td&gt; &lt;/tr&gt;\n  &lt;tr&gt; &lt;th&gt; &lt;/th&gt; &lt;td&gt; &lt;/td&gt; &lt;/tr&gt;\n&lt;/table&gt;</div>Phương án nào sau đây nêu đúng số lượng hàng và cột của bảng được tạo bởi đoạn mã trên?", options: ["3 hàng, 2 cột.", "3 hàng, 3 cột.", "2 hàng, 2 cột.", "2 hàng, 3 cột."], correct: 0 },
        { id: 22, type: "single", question: "Lĩnh vực tin học nào tập trung nghiên cứu phát triển máy tính ngày càng thông minh như con người?", options: ["Mạng máy tính.", "An toàn thông tin.", "Trí tuệ nhân tạo.", "Internet vạn vật."], correct: 2 },
        { id: 23, type: "single", question: "Cách ứng xử nào phù hợp đối với kết quả được tạo ra bởi Trí tuệ nhân tạo?", options: ["Tin tưởng hoàn toàn vào tính chính xác và khách quan.", "Xem xét một cách thận trọng và có trách nhiệm.", "Giữ nguyên để làm sản phẩm học tập và nghiên cứu.", "Chia sẻ ra cộng đồng mà không cần kiểm chứng."], correct: 1 },
        { id: 24, type: "single", question: "Router có chức năng chính nào sau đây?", options: ["Kết nối các thiết bị bằng sóng vô tuyến trong mạng cục bộ.", "Tìm đường đi tối ưu để truyền các gói dữ liệu giữa các mạng.", "Chuyển đổi giữa tín hiệu tương tự và tín hiệu số qua mạng.", "Phát tín hiệu đến tất cả các cổng kết nối trong mạng LAN."], correct: 1 },

        // PHẦN II - CHUNG
        { id: 'c1', type: 'tf_cluster', huong: 'chung', question: "Tòa nhà của một công ty có một số phòng làm việc. Mỗi phòng có không quá 10 máy tính, được kết nối với nhau thông qua Switch tạo thành một mạng LAN. Công ty cần kết nối các mạng LAN này với nhau để tạo thành một mạng cục bộ duy nhất. Sau khi thảo luận, một số nhân viên của công ty đưa ra các nhận định sau:", subQuestions: [
            { id: 'tf1_a', text: "Mạng cục bộ của công ty là mạng WAN.", correct: "Sai" },
            { id: 'tf1_b', text: "Có thể sử dụng Switch loại 16 cổng để kết nối các máy tính trong mỗi phòng làm việc.", correct: "Đúng" },
            { id: 'tf1_c', text: "Để máy tính trong các phòng làm việc truy cập được Internet thì chỉ cần lắp đặt thêm một Modem mà không cần phải đăng ký với nhà cung cấp dịch vụ Internet.", correct: "Sai" },
            { id: 'tf1_d', text: "Để các nhân viên có thể sử dụng điện thoại thông minh kết nối được vào mạng cục bộ của công ty qua Wi-Fi, có thể lắp đặt cho mỗi phòng một Access Point và kết nối thiết bị này với Switch ở phòng đó.", correct: "Đúng" }
        ]},
        { id: 'c2', type: 'tf_cluster', huong: 'chung', question: "Dữ liệu về dân số nước ta từ năm 2019 đến năm 2023 có trong niên giám số liệu thống kê của Tổng cục thống kê. Việc quản lí dữ liệu này có ý nghĩa quan trọng trong hoạch định một số chính sách quốc gia. Để lưu trữ và khai thác dữ liệu về dân số hàng năm theo từng khu vực, có thể tạo cơ sở dữ liệu với các bảng sau:<br/><ul style='list-style-type: disc; margin-left: 20px; margin-top: 10px; margin-bottom: 10px;'><li><b>KHUVUC</b> (<i>maKV</i>, <i>tenKV</i>): lưu thông tin mã khu vực và tên khu vực; mỗi khu vực có một mã khu vực duy nhất.</li><li><b>TINH</b> (<i>maTinh</i>, <i>maKV</i>, <i>tenTinh</i>): lưu thông tin mã tỉnh, mã khu vực và tên tỉnh; mỗi tỉnh chỉ thuộc về một khu vực và mỗi khu vực có thể có nhiều tỉnh.</li><li><b>DANSO</b> (<i>maTinh</i>, <i>nam</i>, <i>danSoTB</i>) lưu thông tin: mã tỉnh, năm và dân số trung bình của năm.</li></ul>Sau khi tìm hiểu cơ sở dữ liệu trên, một số học sinh đưa ra các ý kiến sau:", subQuestions: [
            { id: 'tf2_a', text: "Trường <i>maKV</i> là khóa ngoài của bảng KHUVUC.", correct: "Sai" },
            { id: 'tf2_b', text: "Nhóm hai trường <i>maTinh</i> và <i>nam</i> là khóa chính của bảng DANSO.", correct: "Đúng" },
            { id: 'tf2_c', text: "Chỉ cần liên kết hai bảng TINH và DANSO theo khóa <i>maTinh</i> là có thể kết xuất được thông tin đầy đủ gồm: tên tỉnh, tên khu vực, năm và dân số trung bình của năm.", correct: "Sai" },
            { id: 'tf2_d', text: "Để đưa ra được thông tin gồm tên tỉnh, năm và dân số trung bình của năm 2020, có thể thực hiện câu truy vấn với các thành phần sau:<ul style='list-style-type: circle; margin-left: 25px; margin-top: 5px; font-weight: normal;'><li>Các bảng và trường được chọn: TINH.tenTinh, DANSO.nam, DANSO.danSoTB.</li><li>Các bảng được liên kết qua khóa: TINH liên kết DANSO qua khóa <i>maTinh</i>.</li><li>Điều kiện kết xuất dữ liệu: DANSO.nam = 2020.</li></ul>", correct: "Đúng" }
        ]},

        // PHẦN II - CS
        { id: 'c3', type: 'tf_cluster', huong: 'CS', question: "Hội chứng FOMO (Fear of Missing Out, sau đây gọi tắt là Hội chứng) là cảm giác lo âu, tiếc nuối khi nghĩ mình đang bỏ qua một điều gì đó thú vị, hấp dẫn, chẳng hạn như bỏ lỡ cơ hội mua một món đồ giảm giá nào đó. Nắm bắt được thực tế số lượng người mắc Hội chứng ngày càng nhiều, một công ty đã lên kế hoạch xây dựng hệ thống trí tuệ nhân tạo để dự đoán khả năng mắc Hội chứng. Công ty đã tạo bảng câu hỏi và thu thập dữ liệu khảo sát từ hơn 10000 người để làm dữ liệu huấn luyện mô hình. Kết quả cho thấy tỉ lệ người mắc Hội chứng là 35% và người chưa mắc là 65%. Trong khi thảo luận, một số nhân viên của công ty đưa ra các nhận định sau:", subQuestions: [
            { id: 'tf3_a', text: "Thông tin mắc và chưa mắc Hội chứng của mỗi người có thể được sử dụng làm nhãn của dữ liệu huấn luyện mô hình.", correct: "Đúng" },
            { id: 'tf3_b', text: "Không cần sử dụng các phương pháp tiền xử lý để làm sạch tập dữ liệu đã thu thập nói trên trước khi đưa vào huấn luyện mô hình.", correct: "Sai" },
            { id: 'tf3_c', text: "Mô hình học máy phù hợp nhất được sử dụng để xây dựng hệ thống dự đoán trong tình huống này là mô hình Học có giám sát.", correct: "Đúng" },
            { id: 'tf3_d', text: "Khi xuất hiện biểu hiện lo âu, tiếc nuối, người ta chỉ cần sử dụng hệ thống dự đoán của công ty nói trên để biết được chính xác mình có mắc Hội chứng hay không.", correct: "Sai" }
        ]},
        { id: 'c4', type: 'tf_cluster', huong: 'CS', question: "Cho hàm sau đây được viết bằng ngôn ngữ lập trình Python và C++:<div class='grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3 mb-3'><div><div class='font-bold text-gray-700 bg-gray-200 px-3 py-1 rounded-t-lg'>Hàm viết bằng ngôn ngữ Python</div><div class='code-block mt-0 rounded-t-none text-sm' style='margin:0; padding:10px;'>def E(A, n):\n    for i in range(1, n):\n        x = A[i]\n        j = i - 1\n        while j &gt;= 0 and A[j] &gt; x:\n            A[j+1] = A[j]\n            j = j - 1\n        A[j+1] = x\n    return (A[n//2] + A[n-1]) / 2</div></div><div><div class='font-bold text-gray-700 bg-gray-200 px-3 py-1 rounded-t-lg'>Hàm viết bằng ngôn ngữ C++</div><div class='code-block mt-0 rounded-t-none text-sm' style='margin:0; padding:10px;'>float E(int A[], int n) {\n    for (int i = 1; i &lt; n; i++) {\n        int x = A[i];\n        int j = i - 1;\n        while (j &gt;= 0 && A[j] &gt; x) {\n            A[j+1] = A[j];\n            j = j - 1;\n        }\n        A[j+1] = x;\n    }\n    return (A[n / 2] + A[n - 1]) / 2.0;\n}</div></div></div>Sau khi chọn một trong hai ngôn ngữ Python hoặc C++ để tìm hiểu hàm trên, một số bạn học sinh đã nêu các ý kiến sau:", subQuestions: [
            { id: 'tf4_a', text: "Mảng A biểu diễn cấu trúc dữ liệu ngăn xếp (Stack).", correct: "Sai" },
            { id: 'tf4_b', text: "Nếu dữ liệu đầu vào là mảng A gồm n phần tử đã được sắp xếp theo chiều không giảm thì các câu lệnh tại Dòng 6 và Dòng 7 được thực hiện n lần.", correct: "Sai" },
            { id: 'tf4_c', text: "Nếu dữ liệu đầu vào là n=6 và mảng A là (6, 4, 2, 1, 3, 5) thì sau khi câu lệnh for tại Dòng 2 thực hiện lần lặp thứ 2, giá trị của mảng A là (2, 4, 6, 1, 3, 5).", correct: "Đúng" },
            { id: 'tf4_d', text: "Nếu dữ liệu đầu vào là n=7 và mảng A là (8, 6, 4, 2, 3, 5, 7) thì hàm trả về giá trị 6.5.", correct: "Đúng" }
        ]},

        // PHẦN II - ICT
        { id: 'c5', type: 'tf_cluster', huong: 'ICT', question: "Một trường phổ thông muốn sử dụng một phần mềm để xây dựng một website đưa thông tin về hoạt động của các câu lạc bộ (CLB) trong nhà trường. Website có cấu trúc như sau: Phần đầu trang chứa hình ảnh logo của trường; thanh banner chứa hình ảnh về hoạt động của các CLB; thanh điều hướng gồm ba mục chính Giới thiệu, Hoạt động và Các sự kiện. Ứng với mỗi mục chính sẽ có các mục con có nhãn là tên các CLB và chứa liên kết đến trang web của CLB tương ứng. Trong khi thảo luận về việc sử dụng phần mềm để xây dựng website này, một số bạn học sinh đưa ra ý kiến như sau:", subQuestions: [
            { id: 'tf5_a', text: "Phần mềm tạo trang web có sẵn mẫu bố cục trang web để thiết kế các phần cho website của trường.", correct: "Đúng" },

        ]},
        { id: 'c6', type: 'tf_cluster', huong: 'ICT', question: "Trong niên giám số liệu thống kê có dữ liệu từ năm 2019 đến năm 2023 về tổng vốn đăng kí đầu tư trực tiếp nước ngoài, được cấp phép phân theo địa phương (có hiệu lực đến 31/12/2023). Cần tạo cơ sở dữ liệu với các bảng sau để lưu trữ và khai thác nguồn dữ liệu này.<br/><ul style='list-style-type: disc; margin-left: 20px; margin-top: 10px; margin-bottom: 10px;'><li><b>KHUVUC</b> (<i>maKV</i>, <i>tenKV</i>): lưu thông tin mã khu vực và tên khu vực; mỗi khu vực có một mã khu vực duy nhất.</li><li><b>DIAPHUONG</b> (<i>maDP</i>, <i>tenDP</i>, <i>maKV</i>): lưu thông tin mã địa phương, tên địa phương và mã khu vực; mỗi địa phương chỉ thuộc một khu vực và mỗi khu vực có thể có một số địa phương.</li><li><b>DAUTU</b> (<i>maDP</i>, <i>nam</i>, <i>tongVon</i>): lưu thông tin mã địa phương, năm và tổng vốn đăng kí đầu tư theo địa phương trong năm.</li></ul>Sau khi tìm hiểu các phần mềm để quản trị cơ sở dữ liệu trên, một số bạn học sinh đưa ra các ý kiến sau:", subQuestions: [

            { id: 'tf6_b', text: "Khi tạo bảng DAUTU trong phần mềm quản trị cơ sở dữ liệu, chọn trường <i>maDP</i> rồi thiết lập trường này làm khóa chính của bảng.", correct: "Sai" },

    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;

    const RealtimeSdk = {
        init(handler) {
            scoresRef.on('value', (snapshot) => {
                const data = snapshot.val();
                const scoresList = [];
                if (data) {
                    for (let key in data) {
                        scoresList.push({ id: key, ...data[key] });
                    }
                }
                handler.onDataChanged(scoresList);
            });
            return Promise.resolve({ isOk: true });
        },
        create(record) {
            return scoresRef.push(record)
                .then(() => { return { isOk: true }; })
                .catch(error => { console.error(error); return { isOk: false }; });
        }
    };

    const dataHandler = {
        onDataChanged(data) {
            allScores = data || [];
            renderScores();
        }
    };

    function initApp() {
        try {
            if (!localStorage.getItem('deviceId')) {
                localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
            }
            deviceId = localStorage.getItem('deviceId');
        } catch (e) {
            deviceId = 'dev_' + Math.random().toString(36).substr(2) + Date.now();
        }
        
        window.dataSdk = RealtimeSdk;
        window.dataSdk.init(dataHandler);
        setupEvents();
    }

    function setupEvents() {
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('hoTen').value.trim();
            const lop = document.getElementById('lop').value.trim();
            const huong = document.querySelector('input[name="chonHuong"]:checked').value;
            
            if (name && lop) {
                currentStudent = { hoTen: name, lop: lop, huong: huong };
                
                let rawData = JSON.parse(JSON.stringify(rawQuestions));
                
                // === LƯU Ý: ĐÃ BỎ HÀM TRỘN CÂU HỎI VÀ ĐÁP ÁN ===
                let part1 = rawData.filter(q => q.type === 'single');
                part1.forEach((q, idx) => {
                    q.question = `<span class="text-red-600 text-xl font-extrabold">Câu ${idx + 1}: </span>${q.question}`;
                });

                let part2_chung = rawData.filter(q => q.type === 'tf_cluster' && q.huong === 'chung');
                let part2_rieng = rawData.filter(q => q.type === 'tf_cluster' && q.huong === huong);
                
                // === KHÔNG TRỘN CÂU HỎI VÀ ĐÁP ÁN ĐÚNG SAI ===
                let part2 = [...part2_chung, ...part2_rieng];

                part2.forEach((q, idx) => {
                    // ĐÁNH SỐ TỪ 1 ĐẾN 4 CHO PHẦN 2
                    q.question = `<span class="text-red-600 text-xl font-extrabold">Câu ${idx + 1}: </span>${q.question}`;
                    const labels = ['a)', 'b)', 'c)', 'd)'];
                    q.subQuestions.forEach((sub, sIdx) => {
                        sub.text = `<span class="font-bold mr-1">${labels[sIdx]}</span> ${sub.text}`;
                    });
                });

                currentQuestions = [...part1, ...part2];
                startQuiz();
            } else {
                alert("Vui lòng nhập đủ Họ tên và Lớp!");
            }
        };

        document.getElementById('view-scores-btn').onclick = () => showSection('scores');
        document.getElementById('next-btn').onclick = nextQuestion;
        document.getElementById('prev-btn').onclick = prevQuestion; 
        document.getElementById('submit-btn').onclick = submitQuiz;
    }

    function goHome() {
        document.body.classList.remove('is-reviewing');
        let floatingBar = document.getElementById('review-floating-bar');
        if(floatingBar) floatingBar.style.display = 'none';
        
        document.getElementById('result-modal').classList.add('hidden');
        document.getElementById('hoTen').value = ''; 
        document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    }

    let currentIdx = 0;
    function startQuiz() {
        quizStartTime = new Date();
        cheatCount = 0;
        setTimeout(() => { isQuizStarted = true; }, 1000);

        document.body.classList.remove('is-reviewing');
        let floatingBar = document.getElementById('review-floating-bar');
        if(floatingBar) floatingBar.style.display = 'none';
        
        document.getElementById('timer-banner').style.display = 'flex';
        document.getElementById('nav-buttons').style.display = 'flex';
        document.getElementById('progress-container').style.display = 'block';

        showSection('quiz');
        document.getElementById('student-info').innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop} (${currentStudent.huong})`;
        currentIdx = 0;
        userAnswers = {};
        renderQuestion();
        startTimer(50 * 60); 
    }

    function retryQuiz() {
        document.getElementById('login-form').dispatchEvent(new Event('submit'));
    }

    function getTotalItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.subQuestions.length;
            else count++;
        });
        return count; 
    }

    function getAnsweredCount() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') {
                q.subQuestions.forEach(sub => {
                    if (userAnswers[sub.id]) count++;
                });
            } else {
                if (userAnswers[q.id] !== undefined) count++;
            }
        });
        return count;
    }

    window.selectAnswer = function(qId, val, type) {
        userAnswers[qId] = val;
        updateProgress();
    };

    function renderQuestion() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        
        if (q.type === 'tf_cluster') {
            container.innerHTML = `
                <div class="fade-in">
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-orange-100 pb-3">
                        <span class="bg-gradient-to-br from-orange-400 to-red-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span>
                        <h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-600 tracking-wide uppercase">PHẦN TRẮC NGHIỆM ĐÚNG/SAI</h3>
                    </div>

                    <div class="bg-red-50 border-2 border-red-200 p-4 md:p-6 rounded-2xl mb-6 text-gray-800 text-base md:text-lg font-bold leading-relaxed shadow-inner">
                        ${q.question}
                    </div>
                    <div class="space-y-3 md:pl-6">
                        ${q.subQuestions.map(sub => `
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-white p-4 border-2 border-gray-100 hover:border-red-300 rounded-2xl gap-4 shadow-sm hover:shadow-md transition-all">
                                <span class="flex-1 text-gray-700 font-bold text-lg leading-relaxed">${sub.text}</span>
                                <div class="flex gap-2 flex-shrink-0 self-end sm:self-auto mt-2 sm:mt-0">
                                    <input type="radio" id="q_${sub.id}_T" name="q_${sub.id}" value="Đúng" class="hidden tf-radio-T" 
                                        onchange="selectAnswer('${sub.id}', 'Đúng', 'tf')" ${isChecked(sub.id, 'Đúng') ? 'checked' : ''}>
                                    <label for="q_${sub.id}_T" class="tf-label-T px-6 py-3 border-2 border-gray-200 rounded-xl cursor-pointer font-extrabold text-gray-500 text-sm text-center w-24 sm:w-28 transition-all hover:bg-gray-50 uppercase tracking-wide">Đúng</label>

                                    <input type="radio" id="q_${sub.id}_S" name="q_${sub.id}" value="Sai" class="hidden tf-radio-S" 
                                        onchange="selectAnswer('${sub.id}', 'Sai', 'tf')" ${isChecked(sub.id, 'Sai') ? 'checked' : ''}>
                                    <label for="q_${sub.id}_S" class="tf-label-S px-6 py-3 border-2 border-gray-200 rounded-xl cursor-pointer font-extrabold text-gray-500 text-sm text-center w-24 sm:w-28 transition-all hover:bg-gray-50 uppercase tracking-wide">Sai</label>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="fade-in">
                    ${currentIdx === 0 ? `
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3">
                        <span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span>
                        <h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">PHẦN TRẮC NGHIỆM MỘT LỰA CHỌN</h3>
                    </div>` : ''}

                    <div class="w-full">
                        <div class="text-lg font-bold text-gray-800 mt-1 leading-snug tracking-tight">${q.question}</div>
                    </div>
                    
                    <div class="space-y-4 md:pl-14 mt-6">
                        ${q.options.map((opt, i) => `
                            <div class="flex items-center">
                                <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio"
                                    ${isChecked(q.id, i) ? 'checked' : ''}
                                    onchange="selectAnswer('${q.id}', ${i}, 'single')">
                                <label for="opt_${i}" class="option-label w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg">
                                    <span class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50 transition-colors">
                                        ${String.fromCharCode(65 + i)}
                                    </span>
                                    <span class="text-gray-700 leading-relaxed">${opt.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</span>
                                </label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        updateNav();
        updateProgress();
    }

    function isChecked(qId, val) {
        return userAnswers[qId] === val;
    }

    function nextQuestion() {
        if (currentIdx < currentQuestions.length - 1) {
            currentIdx++;
            renderQuestion();
        }
    }
    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            renderQuestion();
        }
    }

    function updateNav() {
        const isLast = currentIdx === currentQuestions.length - 1;
        const isFirst = currentIdx === 0;
        
        document.getElementById('prev-btn').style.display = isFirst ? 'none' : 'block';
        document.getElementById('next-btn').style.display = isLast ? 'none' : 'block';
        document.getElementById('submit-btn').style.display = isLast ? 'block' : 'none';
    }

    function updateProgress() {
        document.getElementById('progress-text').innerText = `${getAnsweredCount()}/${getTotalItems()} ý`;
    }

    function formatDuration(sec) {
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m}p ${s}s`;
    }

    // ================== CƠ CHẾ TÍNH ĐIỂM ==================
    async function submitQuiz() {
        if (!isQuizStarted && !isPenalizing) return;
        
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let diemPhan1 = 0;
        let diemPhan2 = 0;
        let soCauDungThucTe = 0; 

        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                if (userAnswers[q.id] === q.correct) {
                    diemPhan1 += 0.25;
                    soCauDungThucTe++;
                }
            } else if (q.type === 'tf_cluster') {
                let dung = 0;
                q.subQuestions.forEach(sub => {
                    if (userAnswers[sub.id] === sub.correct) {
                        dung++;
                        soCauDungThucTe++;
                    }
                });
                if (dung === 1) diemPhan2 += 0.1;
                else if (dung === 2) diemPhan2 += 0.25;
                else if (dung === 3) diemPhan2 += 0.5;
                else if (dung === 4) diemPhan2 += 1.0;
            }
        });
        
        const score = (diemPhan1 + diemPhan2).toFixed(2);
        const durationSeconds = Math.floor((quizEndTime - quizStartTime) / 1000);
        
        const record = {
            hoTen: currentStudent.hoTen,
            lop: currentStudent.lop,
            huong: currentStudent.huong,
            diem: parseFloat(score),
            soCauDung: soCauDungThucTe,
            tongCau: getTotalItems(),
            startTime: quizStartTime.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit', second:'2-digit'}),
            endTime: quizEndTime.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit', second:'2-digit'}),
            duration: formatDuration(durationSeconds),
            thoiGian: new Date().toISOString(),
            deviceId: deviceId 
        };

        if (window.dataSdk) {
            const result = await window.dataSdk.create(record);

            if (result.isOk) {
                showModalResult(score, soCauDungThucTe, getTotalItems(), record.duration);
            } else {
                alert("Lỗi mạng! Không thể lưu điểm. Vui lòng thử lại.");
            }
        }
    }

    function showModalResult(score, correct, total, dur) {
        const modal = document.getElementById('result-modal');
        const content = document.getElementById('result-content');
        modal.classList.remove('hidden');
        
        content.innerHTML = `
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-green-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2">
                <span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - ${currentStudent.lop}</span>
                <br><span class="text-sm font-bold text-gray-400 mt-1 block">Định hướng ${currentStudent.huong}</span>
            </p>
            <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative">
                <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
                <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
                <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm">Đúng ${correct}/${total} ý | Tổng TG: ${dur}</div>

            <div class="grid grid-cols-2 gap-3 mb-4">

                <button onclick="document.getElementById('result-modal').classList.add('hidden'); document.getElementById('quiz-section').classList.add('hidden'); document.getElementById('scores-section').classList.remove('hidden'); document.getElementById('view-scores-btn').click();" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
            </div>
            <button onclick="goHome()" class="w-full py-3 bg-gray-100 text-gray-800 rounded-xl font-extrabold shadow-sm hover:bg-gray-200 transition-colors text-lg">🏠 Về trang chủ</button>
        `;
    }

    function reviewQuiz() {
        document.getElementById('result-modal').classList.add('hidden');
        document.getElementById('scores-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        
        document.body.classList.add('is-reviewing');
        
        document.getElementById('timer-banner').style.display = 'none';
        document.getElementById('nav-buttons').style.display = 'none';
        document.getElementById('progress-container').style.display = 'none';

        let floatingBar = document.getElementById('review-floating-bar');
        if(!floatingBar) {
            floatingBar = document.createElement('div');
            floatingBar.id = 'review-floating-bar';
            floatingBar.className = "fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200 p-4 flex gap-4 justify-center shadow-[0_-10px_30px_rgba(0,0,0,0.1)] z-50";
            floatingBar.innerHTML = `
                <button onclick="goHome()" class="px-6 py-3 bg-gray-100 text-gray-800 rounded-xl font-extrabold shadow-sm hover:bg-gray-200 transition-colors text-lg">🏠 Về trang chủ</button>
                <button onclick="retryQuiz()" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-extrabold shadow-md hover:bg-blue-700 transition-colors text-lg">🔄 Làm lại bài</button>
            `;
            document.body.appendChild(floatingBar);
        }
        floatingBar.style.display = 'flex';

        const container = document.getElementById('question-container');
        container.innerHTML = currentQuestions.map((q, idx) => {
            
            let headerHtml = '';
            if (idx === 0) {
                headerHtml = `
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-blue-200 pb-3 mt-4">
                        <span class="bg-gradient-to-br from-blue-500 to-cyan-600 text-white w-12 h-12 flex items-center justify-center rounded-xl font-black text-2xl shadow-md">I</span>
                        <h3 class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-cyan-700 uppercase tracking-widest">PHẦN TRẮC NGHIỆM MỘT LỰA CHỌN</h3>
                    </div>
                `;
            } else if (q.type === 'tf_cluster' && currentQuestions[idx - 1] && currentQuestions[idx - 1].type === 'single') {
                headerHtml = `
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-orange-200 pb-3 mt-10">
                        <span class="bg-gradient-to-br from-orange-500 to-red-600 text-white w-12 h-12 flex items-center justify-center rounded-xl font-black text-2xl shadow-md">II</span>
                        <h3 class="text-xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-700 to-red-700 uppercase tracking-widest">PHẦN TRẮC NGHIỆM ĐÚNG/SAI</h3>
                    </div>
                `;
            }

            if (q.type === 'single') {
                let penaltyHtml = userAnswers[q.id] === -1 ? `<div class="mb-4 inline-block font-extrabold text-red-700 bg-red-50 px-4 py-2 rounded-xl border border-red-200 shadow-sm">⚠️ Bị tước quyền (Gian lận) | Đáp án đúng: ${String.fromCharCode(65 + q.correct)}</div>` : "";

                let optionsHtml = q.options.map((opt, i) => {
                    let isSelected = isChecked(q.id, i);
                    let isCorrect = (q.correct === i);
                    let stateClass = "review-neutral";
                    let icon = "";
                    
                    if (isCorrect) {
                        stateClass = "review-correct shadow-md";
                        icon = "✅";
                    } else if (isSelected && !isCorrect) {
                        stateClass = "review-incorrect";
                        icon = "❌";
                    }
                    
                    return `
                        <div class="p-4 border-2 rounded-2xl flex items-center gap-4 ${stateClass} mb-3 font-bold text-lg pointer-events-none">
                            <span class="w-10 h-10 rounded-xl border-2 flex items-center justify-center text-base font-black flex-shrink-0 bg-white/50 border-gray-300/50">${String.fromCharCode(65 + i)}</span>
                            <span class="leading-relaxed flex-1">${opt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                            <span>${icon}</span>
                        </div>
                    `;
                }).join('');

                return `
                    ${headerHtml}
                    <div class="mb-8">
                        <div class="mb-4">
                            <div class="text-xl font-bold text-gray-800 leading-snug">${q.question}</div>
                        </div>
                        ${penaltyHtml}
                        <div class="md:pl-14">${optionsHtml}</div>
                    </div>
                `;
            } else {
                let subHtml = q.subQuestions.map(sub => {
                    let userAns = userAnswers[sub.id];
                    let isCorrect = userAns === sub.correct;
                    
                    let ansText = "";
                    let colorClass = "";
                    if (userAns === "Gian lận") {
                        ansText = `⚠️ Bị tước quyền (Gian lận) | Đáp án chuẩn: ${sub.correct}`;
                        colorClass = "text-red-800 bg-red-100 border-red-300";
                    } else if (userAns) {
                        ansText = isCorrect ? `✅ Chính xác (Bạn chọn: ${userAns})` : `❌ Trả lời sai (Bạn chọn: ${userAns} | Đáp án: ${sub.correct})`;
                        colorClass = isCorrect ? 'text-green-700 bg-green-50 border-green-200' : 'text-red-700 bg-red-50 border-red-200';
                    } else {
                        ansText = `➖ Bỏ qua (Đáp án chuẩn: ${sub.correct})`;
                        colorClass = 'text-orange-600 bg-orange-50 border-orange-200';
                    }

                    return `
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-white p-4 border-2 border-gray-100 rounded-2xl gap-4 shadow-sm mb-3">
                            <span class="flex-1 text-gray-700 font-bold text-lg leading-relaxed">${sub.text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</span>
                            <div class="font-extrabold ${colorClass} text-sm whitespace-nowrap px-4 py-2 rounded-xl border border-gray-100">
                                ${ansText}
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    ${headerHtml}
                    <div class="mb-8 p-4 bg-gray-50 rounded-2xl border-2 border-gray-200">
                        <div class="text-xl font-bold text-gray-800 mb-4">${q.question}</div>
                        <div>${subHtml}</div>
                    </div>
                `;
            }
        }).join('<div class="my-6 border-b-2 border-dashed border-gray-200"></div>');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderScores() {
        const tbody = document.getElementById('scores-tbody');
        if (allScores.length === 0) {
            tbody.innerHTML = '';
            document.getElementById('no-scores').classList.remove('hidden');
            document.getElementById('view-scores-btn').innerText = "🏆 Xem bảng điểm";
            return;
        }
        document.getElementById('no-scores').classList.add('hidden');

        const sorted = [...allScores].sort((a, b) => {
            let lopA = (a.lop || "").toLowerCase();
            let lopB = (b.lop || "").toLowerCase();
            if (lopA < lopB) return -1;
            if (lopA > lopB) return 1;

            let tenA = (a.hoTen || "").toLowerCase();
            let tenB = (b.hoTen || "").toLowerCase();
            if (tenA < tenB) return -1;
            if (tenA > tenB) return 1;

            return b.diem - a.diem;
        });

        tbody.innerHTML = sorted.map((s, idx) => {
            const rowClass = s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-gray-50';
            const meBadge = s.deviceId === deviceId ? '<span class="ml-3 bg-gradient-to-r from-pink-500 to-rose-500 text-white text-xs px-3 py-1 rounded-full font-black shadow-sm uppercase tracking-wider">Bạn</span>' : '';

            const cauDung = s.soCauDung !== undefined ? s.soCauDung : '-';
            const tongCau = s.tongCau !== undefined ? s.tongCau : '-';
            const tenLop = s.lop || '';

            return `
                <tr class="${rowClass} transition-colors">
                    <td class="px-3 sm:px-5 py-4 text-center font-black text-gray-400 text-lg">#${idx + 1}</td>
                    <td class="px-3 sm:px-5 py-4 font-bold text-gray-700 text-base">${tenLop}</td>
                    <td class="px-3 sm:px-5 py-4 font-extrabold text-gray-800 whitespace-nowrap text-lg">${s.hoTen || ''} ${meBadge}</td>
                    <td class="px-3 sm:px-5 py-4 text-sm font-bold text-blue-500 whitespace-nowrap bg-blue-50/50 rounded-lg inline-block mt-3">${s.huong || ''}</td>
                    <td class="px-3 sm:px-5 py-4 text-center text-gray-600 font-bold text-lg">${cauDung}/${tongCau}</td>
                    <td class="px-3 sm:px-5 py-4 text-center"><span class="font-black text-2xl ${s.diem >= 5 ? 'text-green-600' : 'text-red-500 drop-shadow-sm'}">${s.diem}</span></td>
                    <td class="px-3 sm:px-5 py-4 text-center text-xs text-gray-400 font-bold">${s.startTime || '--:--'}</td>
                    <td class="px-3 sm:px-5 py-4 text-center text-xs text-gray-400 font-bold">${s.endTime || '--:--'}</td>
                    <td class="px-3 sm:px-5 py-4 text-right text-xs text-orange-600 font-bold">${s.duration || '--'}</td>
                </tr>
            `;
        }).join('');
        
        document.getElementById('view-scores-btn').innerText = "🏆 Xem bảng điểm";
        
        setTimeout(() => {
            const myRow = document.querySelector('.my-score-row');
            if (myRow) myRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
    }

    function showSection(id) {
        ['login', 'quiz', 'scores'].forEach(s => document.getElementById(s+'-section').classList.add('hidden'));
        document.getElementById(id+'-section').classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) submitQuiz();
        }, 1000);
    }

    initApp();
  </script>
 </body>
</html>
