        { id: "3_4", type: "single", question: "Câu 4. Ở vùng núi đá vôi, quá trình xâm thực tạo nên địa hình nào sau đây?", options: ["Địa hình các-xtơ.", "Cao nguyên badan.", "Đồi thấp, địa hình thoải.", "Bãi bồi ven biển."], correct: 0, explanation: "Dưới tác động của nước mưa (có chứa CO2), quá trình phong hóa hóa học diễn ra mạnh mẽ ở các vùng núi đá vôi, tạo nên các hang động, suối ngầm,... được gọi chung là địa hình các-xtơ." },
        { id: "3_5", type: "single", question: "Câu 5. Chế độ nước của hệ thống sông ngòi ở nước ta phụ thuộc vào nhân tố nào sau đây?", options: ["Độ dài của các con sông.", "Đặc điểm địa hình.", "Hướng dòng chảy.", "Chế độ mưa theo mùa."], correct: 3, explanation: "Sông ngòi nước ta có nguồn cung cấp nước chủ yếu là từ nước mưa. Do đó, chế độ nước sông (mùa lũ, mùa cạn) phụ thuộc trực tiếp và chặt chẽ vào chế độ mưa theo mùa." },
        { id: "3_6", type: "single", question: "Câu 6. Sự phân chia thành mùa mưa và mùa khô rõ rệt nhất từ vĩ tuyến nào sau đây?", options: ["21°B trở vào.", "18°B trở vào.", "16°B trở vào.", "14°B trở vào."], correct: 2, explanation: "Từ vĩ tuyến 16°B trở vào Nam (bắt đầu từ dãy Bạch Mã), khí hậu mang tính chất cận xích đạo, không có mùa đông lạnh mà phân hóa thành 2 mùa mưa và mùa khô sâu sắc." },
        { id: "3_7", type: "single", question: "Câu 7. Cơ cấu dân số theo tuổi ở nước ta có đặc điểm nào sau đây?", options: ["Dân số đang có xu hướng già hoá.", "Tỉ lệ người trong nhóm 0 - 14 tuổi tăng.", "Tỉ lệ người trong nhóm 15 - 64 tuổi tăng.", "Tỉ lệ người trong nhóm từ 65 tuổi trở lên giảm."], correct: 0, explanation: "Việt Nam đang trong quá trình chuyển đổi nhân khẩu học, tuổi thọ trung bình tăng và tỉ suất sinh giảm dẫn đến cơ cấu dân số đang có xu hướng già hoá nhanh." },
        { id: "3_8", type: "single", question: "Câu 8. Phát biểu nào sau đây không đúng với chất lượng nguồn lao động ở nước ta?", options: ["Người lao động giàu kinh nghiệm sản xuất.", "Chất lượng nguồn lao động ngày càng nâng cao.", "Năng suất lao động xã hội ngày càng tăng.", "Khả năng hội nhập với lao động thế giới còn hạn chế."], correct: 3, explanation: "Thực tế thì khả năng hội nhập của lao động nước ta vẫn CÒN HẠN CHẾ về mặt ngoại ngữ, kĩ năng mềm và tác phong công nghiệp. Tuy nhiên, trong bối cảnh các đáp án, nếu xét chuẩn kiến thức, trình độ ngoại ngữ và kĩ năng vẫn là rào cản. *Lưu ý: Tuỳ thuộc vào diễn ngôn cụ thể của sgk mới, lao động Việt Nam được đánh giá là tiếp thu nhanh KHCN.*" },
        { id: "3_9", type: "single", question: "Câu 9. Theo quy hoạch của Quốc hội, số lượng các vùng kinh tế – xã hội của nước ta tính đến năm 2023 là", options: ["4 vùng.", "5 vùng.", "6 vùng.", "7 vùng."], correct: 2, explanation: "Theo các quy hoạch gần đây nhất của nước ta, lãnh thổ được chia thành 6 vùng kinh tế - xã hội (TDMN Bắc Bộ, ĐB Sông Hồng, Bắc Trung Bộ và Duyên hải miền Trung, Tây Nguyên, Đông Nam Bộ, ĐB Sông Cửu Long)." },
        { id: "3_10", type: "single", question: "Câu 10. Hồ thuỷ lợi Dầu Tiếng là công trình thuỷ lợi lớn của nước ta nằm ở các tỉnh nào sau đây?", options: ["Tây Ninh, Bình Dương, Bình Phước.", "Tây Ninh, Bình Dương, Đồng Nai.", "Đồng Nai, Tây Ninh, Lâm Đồng.", "Gia Lai, Kon Tum, Đắk Lắk."], correct: 0, explanation: "Hồ Dầu Tiếng là hồ nước nhân tạo lớn nhất Việt Nam, nằm trải rộng trên địa bàn 3 tỉnh: Tây Ninh, Bình Dương và Bình Phước (lưu vực sông Sài Gòn)." },
        { id: "3_11", type: "single", question: `Câu 11. Dựa vào bảng số liệu sau:
        <div class="overflow-x-auto my-3"><table class="data-table w-full text-sm">
            <thead><tr><th>Năm</th><th>2010</th><th>2015</th><th>2021</th></tr></thead>
            <tbody>
                <tr><td class="font-bold text-left bg-blue-50">Trồng trọt</td><td>73.4</td><td>66.9</td><td>60.8</td></tr>
                <tr><td class="font-bold text-left bg-blue-50">Chăn nuôi</td><td>25.1</td><td>30.7</td><td>34.7</td></tr>
                <tr><td class="font-bold text-left bg-blue-50">Dịch vụ nông nghiệp</td><td>1.5</td><td>2.4</td><td>4.5</td></tr>
            </tbody>
        </table></div>
        Nhận xét nào sau đây không đúng với cơ cấu giá trị sản xuất ngành nông nghiệp của nước ta, giai đoạn 2010 - 2021?`, options: ["Tỉ trọng ngành trồng trọt giảm.", "Tỉ trọng ngành chăn nuôi tăng.", "Tỉ trọng ngành dịch vụ nông nghiệp tăng.", "Tỉ trọng ngành dịch vụ nông nghiệp tăng nhiều nhất."], correct: 3, explanation: "Nhìn vào bảng số liệu: Dịch vụ nông nghiệp tăng từ 1.5% lên 4.5% (tăng 3.0%), trong khi Chăn nuôi tăng từ 25.1% lên 34.7% (tăng 9.6%). Do đó nhận định 'dịch vụ nông nghiệp tăng nhiều nhất' là SAI." },
        { id: "3_12", type: "single", question: "Câu 12. Những vùng kinh tế – xã hội nào sau đây có số lượng các khu công nghiệp nhiều nhất nước ta?", options: ["Trung du và miền núi Bắc Bộ, Tây Nguyên.", "Đồng bằng sông Hồng và Đông Nam Bộ.", "Bắc Trung Bộ và duyên hải miền Trung, Tây Nguyên.", "Đồng bằng sông Cửu Long và Đông Nam Bộ."], correct: 1, explanation: "Đồng bằng sông Hồng và Đông Nam Bộ là 2 vùng kinh tế trọng điểm, thu hút lượng lớn FDI và có cơ sở hạ tầng phát triển nhất, do đó tập trung số lượng khu công nghiệp nhiều nhất cả nước." },
        { id: "3_13", type: "single", question: "Câu 13. Mỏ a-pa-tít lớn nhất ở vùng Trung du và miền núi Bắc Bộ thuộc tỉnh nào sau đây?", options: ["Lào Cai.", "Sơn La.", "Yên Bái.", "Thái Nguyên."], correct: 0, explanation: "Cam Đường (Lào Cai) là mỏ a-pa-tít lớn nhất và có chất lượng tốt nhất ở nước ta, phục vụ chủ yếu cho công nghiệp sản xuất phân lân." },
        { id: "3_14", type: "single", question: "Câu 14. Đàn bò của vùng Trung du và miền núi Bắc Bộ được nuôi nhiều nhất ở tỉnh nào sau đây?", options: ["Bắc Giang.", "Hà Giang.", "Sơn La.", "Lào Cai."], correct: 2, explanation: "Sơn La có cao nguyên Mộc Châu với các đồng cỏ tự nhiên rộng lớn, điều kiện khí hậu cận nhiệt đới thích hợp, nên đây là tỉnh chăn nuôi bò (đặc biệt là bò sữa) lớn nhất vùng." },
        { id: "3_15", type: "single", question: "Câu 15. Đồng bằng sông Hồng có kiểu khí hậu", options: ["nhiệt đới ẩm gió mùa, có mùa đông lạnh.", "cận xích đạo, có hai mùa mưa và khô rõ rệt.", "cận nhiệt đới, có mùa đông lạnh.", "xích đạo, nóng quanh năm."], correct: 0, explanation: "Nằm ở miền Bắc, Đồng bằng sông Hồng mang đặc trưng khí hậu nhiệt đới ẩm gió mùa nhưng chịu ảnh hưởng sâu sắc của gió mùa Đông Bắc, nên có một mùa đông lạnh (2-3 tháng nhiệt độ < 18°C)." },
        { id: "3_16", type: "single", question: "Câu 16. Sự phân bố dân cư ở Bắc Trung Bộ không có đặc điểm nào sau đây?", options: ["Người Kinh sống chủ yếu ở đồng bằng, ven biển.", "Người dân tộc thiểu số sống chủ yếu ở phía tây.", "Hiện nay, các dân tộc phân bố đan xen khá phổ biến.", "Tỉ lệ dân thành thị cao hơn tỉ lệ chung cả nước."], correct: 3, explanation: "Bắc Trung Bộ là vùng có nền kinh tế đang phát triển, tốc độ đô thị hóa chưa cao, do đó tỉ lệ dân thành thị của vùng hiện nay VẪN THẤP HƠN mức trung bình của cả nước." },
        { id: "3_17", type: "single", question: "Câu 17. Tài nguyên sinh vật biển ở Duyên hải Nam Trung Bộ không có đặc điểm nào sau đây?", options: ["Nguồn hải sản phong phú, đa dạng.", "Đầm phá Tam Giang có sinh vật phong phú.", "Nhiều bãi tôm, bãi cá và ngư trường lớn.", "Các đảo ven bờ có hệ sinh thái độc đáo."], correct: 1, explanation: "Hệ thống đầm phá Tam Giang - Cầu Hai nằm ở tỉnh Thừa Thiên Huế, thuộc vùng kinh tế Bắc Trung Bộ, KHÔNG thuộc Duyên hải Nam Trung Bộ." },
        { id: "3_18", type: "single", question: "Câu 18. Vùng kinh tế trọng điểm miền Trung có các ngành kinh tế nổi bật nào sau đây?", options: ["Khai thác và chế biến dầu khí, sản xuất sản phẩm điện tử, máy vi tính và dịch vụ.", "Sản xuất ô tô, sản xuất sản phẩm điện tử, máy vi tính và dịch vụ ngân hàng.", "Kinh tế biển, du lịch, khai thác hải sản và sản xuất lương thực, thực phẩm.", "Kinh tế biển, sản xuất sản phẩm dầu mỏ tinh chế và năng lượng tái tạo."], correct: 2, explanation: "Lợi thế lớn nhất của Vùng KTTĐ miền Trung là đường bờ biển dài, nhiều vũng vịnh sâu. Do đó, kinh tế biển (cảng biển), du lịch (Đà Nẵng, Hội An, Huế) và khai thác hải sản là những trụ cột nổi bật nhất." },

        // --- ĐỀ 3 - PHẦN II ---
        { id: "3_II_1", type: "tf_cluster", context: "Câu 1. Vị trí địa lí và đặc điểm lãnh thổ nước ta có tác động đến sự phát triển của nhiều ngành kinh tế.", items: [
            { id: "a", text: "a) Vị trí địa lí nước ta tạo điều kiện thuận lợi cho các hoạt động trao đổi, giao lưu kinh tế – xã hội.", correct: true, expl: "Nằm ở ngã tư đường hàng hải, hàng không quốc tế, Việt Nam dễ dàng giao lưu với các nước. Mệnh đề ĐÚNG." },
            { id: "b", text: "b) Nằm trong khu vực với các quốc gia có nhiều nét tương đồng về văn hoá, lịch sử tạo điều kiện cho việc xây dựng mối quan hệ hoà bình và phát triển.", correct: true, expl: "Sự tương đồng trong khối ASEAN giúp Việt Nam dễ dàng hội nhập và hợp tác khu vực. Mệnh đề ĐÚNG." },
            { id: "c", text: "c) Vị trí địa lí tạo điều kiện thuận lợi cho nước ta phát triển các hoạt động ngoại thương, kinh tế mở cửa và thu hút đầu tư nước ngoài.", correct: true, expl: "Đường bờ biển dài, nhiều cảng nước sâu là cửa ngõ giao thương xuất nhập khẩu cực kì thuận lợi. Mệnh đề ĐÚNG." },
            { id: "d", text: "d) Nước ta nằm trong vùng có nhiều thiên tai như bão, áp thấp nhiệt đới, lũ, ngập lụt, hạn hán và biến đổi khí hậu.", correct: true, expl: "Ngoài thuận lợi, vị trí kề sát Biển Đông cũng khiến nước ta phải đón nhận nhiều loại hình thiên tai khắc nghiệt hàng năm. Mệnh đề ĐÚNG." }
        ]},
        { id: "3_II_2", type: "tf_cluster", context: "Câu 2. Đô thị hoá ở nước ta gắn liền với quá trình công nghiệp hoá và hiện đại hoá đất nước, quá trình đô thị hoá tác động mạnh mẽ đến chức năng và lối sống đô thị.", items: [
            { id: "a", text: "a) Các đô thị có quy mô lớn thường đảm nhận chức năng trung tâm kinh tế, giáo dục, văn hoá của cả nước như Hà Nội, Thành phố Hồ Chí Minh.", correct: true, expl: "Hà Nội và TP.HCM là 2 đô thị loại đặc biệt, là đầu tàu kinh tế và văn hóa đa chức năng của cả nước. Mệnh đề ĐÚNG." },
            { id: "b", text: "b) Một số đô thị có chức năng nổi bật về kinh tế công nghiệp, dịch vụ như Hải Phòng, Đà Nẵng, Nha Trang, Thủ Dầu Một.", correct: true, expl: "Hải Phòng (cảng biển, CN), Nha Trang (du lịch), Thủ Dầu Một (CN) đều có chức năng kinh tế đặc thù rất rõ. Mệnh đề ĐÚNG." },
            { id: "c", text: "c) Lối sống đô thị ngày càng được phổ biến ở các đô thị, sự lan toả lối sống này về các khu vực nông thôn còn chậm và có nhiều hạn chế.", correct: true, expl: "Mặc dù truyền thông phát triển, nhưng sự khác biệt về lối sống giữa đô thị và vùng sâu vùng xa vẫn còn khoảng cách lớn. Mệnh đề ĐÚNG." },
            { id: "d", text: "d) Cơ sở hạ tầng đô thị ngày càng hoàn thiện, thu nhập của người dân đô thị tăng, người dân đô thị ngày càng được hưởng thụ môi trường sống tốt hơn.", correct: true, expl: "Nhờ CNH-HĐH, chất lượng sống, cảnh quan và dịch vụ tiện ích tại các đô thị đang ngày càng được nâng cao rõ rệt. Mệnh đề ĐÚNG." }
        ]},
        { id: "3_II_3", type: "tf_cluster", context: "Câu 3. Hoạt động ngoại thương có vai trò quan trọng đối với nền kinh tế, kết nối thị trường trong nước và quốc tế, tăng nguồn thu ngoại tệ cho đất nước và có nhiều chuyển biến tích cực trong những năm gần đây.", items: [
            { id: "a", text: "a) Thị trường buôn bán ngày càng được mở rộng theo hướng đa dạng hoá, đa phương hoá và hiện có quan hệ buôn bán với hầu hết các nước trên thế giới.", correct: true, expl: "Việt Nam hiện có quan hệ thương mại với hơn 200 quốc gia và vùng lãnh thổ trên thế giới. Mệnh đề ĐÚNG." },
            { id: "b", text: "b) Trị giá xuất khẩu, nhập khẩu tăng và cơ cấu trị giá xuất khẩu, nhập khẩu thay đổi theo hướng tăng tỉ trọng trị giá xuất khẩu.", correct: true, expl: "Nước ta đã chuyển từ tình trạng nhập siêu sang xuất siêu liên tục trong nhiều năm trở lại đây. Mệnh đề ĐÚNG." },
            { id: "c", text: "c) Các mặt hàng xuất khẩu của nước ta ngày càng đa dạng, phong phú và đáp ứng được các tiêu chuẩn khắt khe của nhiều thị trường khu vực, quốc gia trên thế giới.", correct: true, expl: "Nông sản, thủy sản, dệt may Việt Nam đã vào được các thị trường khó tính như EU, Mỹ, Nhật. Mệnh đề ĐÚNG." },
            { id: "d", text: "d) Các mặt hàng chế biến và chế biến sâu có hàm lượng khoa học – công nghệ, giá trị gia tăng cao chiếm tỉ trọng còn thấp và tăng trưởng không đáng kể.", correct: false, expl: "Thực tế, nhóm hàng công nghiệp chế biến chế tạo (điện tử, máy móc) đang chiếm tỉ trọng rất CAO (hơn 80% kim ngạch) và tăng trưởng RẤT NHANH. Mệnh đề SAI." }
        ]},
        { id: "3_II_4", type: "tf_cluster", context: "Câu 4. Ngành dịch vụ của Đông Nam Bộ phát triển ngày càng nhanh và chiếm tỉ trọng cao nhất trong cơ cấu GRDP của vùng. Các lĩnh vực dịch vụ trong vùng đa dạng, phát triển hàng đầu trên cả nước.", items: [
            { id: "a", text: "a) Thương mại của vùng phát triển mạnh, đặc biệt là thương mại điện tử, trong vùng hình thành nhiều trung tâm thương mại lớn, siêu thị.", correct: true, expl: "TP.HCM và các tỉnh lân cận là thị trường tiêu dùng lớn nhất, thương mại điện tử hoạt động cực kì sôi động. Mệnh đề ĐÚNG." },
            { id: "b", text: "b) Tài chính – ngân hàng phát triển mạnh với đa dạng các loại hình kinh doanh như hệ thống ngân hàng, sàn giao dịch chứng khoán, bảo hiểm.", correct: true, expl: "TP.HCM là trung tâm tài chính lớn nhất quốc gia, nơi đặt trụ sở của hầu hết các ngân hàng lớn và sàn HOSE. Mệnh đề ĐÚNG." },
            { id: "c", text: "c) Tổng mức bán lẻ hàng hoá và doanh thu dịch vụ tiêu dùng của vùng trong những năm gần đây có mức tăng trưởng giảm và chiếm tỉ trọng thấp so với cả nước.", correct: false, expl: "Đông Nam Bộ luôn là vùng có tổng mức bán lẻ và doanh thu dịch vụ tiêu dùng CHIẾM TỈ TRỌNG CAO NHẤT cả nước. Mệnh đề SAI." },
            { id: "d", text: "d) Mạng lưới giao thông của vùng có đủ loại hình và ngày càng hoàn thiện.", correct: true, expl: "Vùng hội tụ đủ các loại hình: đường bộ (cao tốc), đường sắt, đường thủy, cảng biển nước sâu, hàng không quốc tế. Mệnh đề ĐÚNG." }
        ]},

        // --- ĐỀ 3 - PHẦN III ---
        { id: "3_III_1", type: "short_answer", question: `Câu 1. Dựa bảng số liệu Nhiệt độ không khí trung bình tại trạm quan trắc Lai Châu:
        <div class="overflow-x-auto my-3"><table class="data-table w-full text-sm">
            <thead><tr><th>Năm</th><th>07</th><th>08</th><th>09</th><th>10</th><th>11</th><th>12</th><th>13</th><th>14</th><th>15</th><th>16</th><th>17</th><th>18</th><th>19</th><th>20</th><th>21</th><th>22</th></tr></thead>
            <tbody><tr><td class="font-bold bg-blue-50">T(°C)</td><td>23.2</td><td>23.0</td><td>23.8</td><td>24.0</td><td>23.6</td><td>20.2</td><td>19.9</td><td>20.1</td><td>20.6</td><td>20.2</td><td>19.7</td><td>20.0</td><td>24.7</td><td>24.0</td><td>20.3</td><td>20.1</td></tr></tbody>
        </table></div>
        Nhiệt độ trung bình các năm trong giai đoạn 2007 – 2022 tại trạm Lai Châu là bao nhiêu độ C (làm tròn kết quả đến hàng đơn vị)?`, correct: "22", explanation: "- <b>Bước 1:</b> Tính tổng nhiệt độ của tất cả 16 năm trong bảng số liệu.<br>Tổng = 23.2 + 23.0 + 23.8 + 24.0 + 23.6 + 20.2 + 19.9 + 20.1 + 20.6 + 20.2 + 19.7 + 20.0 + 24.7 + 24.0 + 20.3 + 20.1 = <b>347.4 °C</b>.<br>- <b>Bước 2:</b> Tính trung bình = 347.4 / 16 năm = <b>21.7125 °C</b>.<br>- <b>Bước 3:</b> Đề bài yêu cầu làm tròn đến hàng đơn vị. Vì phần thập phân đầu tiên là 7 (>=5) nên ta làm tròn lên thành <b>22</b>." },

        So năm 2021 với năm 2018, tỉ lệ hộ dân sử dụng nguồn nước sạch của vùng cao nhất tăng bao nhiêu phần trăm (%)?`, correct: "0.2", explanation: "- <b>Bước 1:</b> Quan sát biểu đồ, ta thấy vùng có tỉ lệ sử dụng nước sạch cao nhất trong cả 2 năm là <b>Đồng bằng sông Hồng</b> và <b>Đông Nam Bộ</b> (đều đạt 99.9% vào năm 2021). Tuy nhiên ĐB Sông Hồng năm 2018 là 99.7%, còn ĐNB là 99.6%. Ta lấy đại diện là ĐB Sông Hồng (hoặc vùng dẫn đầu).<br>- <b>Bước 2:</b> Tính mức tăng = Giá trị năm 2021 - Giá trị năm 2018.<br>Thay số = 99.9% - 99.7% = <b>0.2%</b>.<br>Kết quả nhập vào là <b>0.2</b>." },
        { id: "3_III_4", type: "short_answer", question: `Câu 4. Dựa vào bảng Sản lượng thuỷ sản khai thác và nuôi trồng ở nước ta (triệu tấn):
        <div class="overflow-x-auto my-3"><table class="data-table w-full text-sm">
            <thead><tr><th>Năm</th><th>2010</th><th>2021</th></tr></thead>
            <tbody>
                <tr><td class="font-bold bg-blue-50 text-left">Khai thác</td><td>2.47</td><td>3.93</td></tr>
                <tr><td class="font-bold bg-blue-50 text-left">Nuôi trồng</td><td>2.73</td><td>4.88</td></tr>
            </tbody>
        </table></div>
        Từ năm 2010 đến năm 2021, sản lượng thuỷ sản nuôi trồng tăng (hoặc giảm) bao nhiêu phần trăm (%) trong tổng sản lượng thuỷ sản (làm tròn đến hàng đơn vị của %)?`, correct: "3", explanation: "- <b>Bước 1:</b> Tính tổng sản lượng từng năm.<br>Năm 2010 = 2.47 + 2.73 = 5.2 triệu tấn.<br>Năm 2021 = 3.93 + 4.88 = 8.81 triệu tấn.<br>- <b>Bước 2:</b> Tính tỉ trọng nuôi trồng của từng năm.<br>Tỉ trọng 2010 = (2.73 / 5.2) * 100 = <b>52.5%</b>.<br>Tỉ trọng 2021 = (4.88 / 8.81) * 100 = <b>55.39...%</b>.<br>- <b>Bước 3:</b> Mức độ thay đổi (tăng) = 55.39 - 52.5 = <b>2.89%</b>.<br>- <b>Bước 4:</b> Làm tròn đến hàng đơn vị, do 8>5 nên làm tròn lên thành <b>3</b>." },
        { id: "3_III_5", type: "short_answer", question: `Câu 5. Dựa vào bảng Sản lượng hải sản khai thác và nuôi trồng ở Duyên hải Nam Trung Bộ (nghìn tấn):
        <div class="overflow-x-auto my-3"><table class="data-table w-full text-sm">
            <thead><tr><th>Năm</th><th>2010</th><th>2021</th></tr></thead>
            <tbody>
                <tr><td class="font-bold bg-blue-50 text-left">Khai thác</td><td>707.1</td><td>1 167.9</td></tr>
                <tr><td class="font-bold bg-blue-50 text-left">Nuôi trồng</td><td>80.8</td><td>101.3</td></tr>
            </tbody>
        </table></div>
        Tính tốc độ tăng trưởng của TỔNG sản lượng hải sản ở Duyên hải Nam Trung Bộ năm 2021 (lấy năm 2010 bằng 100%) (làm tròn kết quả đến hàng đơn vị của %).`, correct: "161", explanation: "- <b>Bước 1:</b> Tính tổng sản lượng từng năm.<br>Tổng 2010 = 707.1 + 80.8 = <b>787.9</b> nghìn tấn.<br>Tổng 2021 = 1167.9 + 101.3 = <b>1269.2</b> nghìn tấn.<br>- <b>Bước 2:</b> Tính tốc độ tăng trưởng = (Tổng 2021 / Tổng 2010) * 100.<br>Thay số = (1269.2 / 787.9) * 100 = <b>161.086... %</b>.<br>- <b>Bước 3:</b> Làm tròn đến hàng đơn vị, kết quả thu được là <b>161</b>." },
        { id: "3_III_6", type: "short_answer", question: `Câu 6. Dựa vào bảng Sản lượng lúa của cả nước và vùng Đồng bằng sông Cửu Long (triệu tấn):
        <div class="overflow-x-auto my-3"><table class="data-table w-full text-sm">
            <thead><tr><th>Năm</th><th>2010</th><th>2021</th></tr></thead>
            <tbody>
                <tr><td class="font-bold bg-blue-50 text-left">Cả nước</td><td>40.0</td><td>43.9</td></tr>
                <tr><td class="font-bold bg-blue-50 text-left">Đồng bằng sông Cửu Long</td><td>21.6</td><td>24.3</td></tr>
            </tbody>
        </table></div>
        So với năm 2010, tỉ trọng sản lượng lúa của vùng Đồng bằng sông Cửu Long trong tổng sản lượng lúa của cả nước năm 2021 tăng bao nhiêu phần trăm (làm tròn kết quả đến hàng đơn vị của %)?`, correct: "1", explanation: "- <b>Bước 1:</b> Công thức tính tỉ trọng = (Giá trị vùng / Giá trị cả nước) * 100.<br>- <b>Bước 2:</b> Tính tỉ trọng năm 2010 = (21.6 / 40.0) * 100 = <b>54.0%</b>.<br>- <b>Bước 3:</b> Tính tỉ trọng năm 2021 = (24.3 / 43.9) * 100 = <b>55.353...%</b>.<br>- <b>Bước 4:</b> Tính mức tăng = 55.353% - 54.0% = <b>1.353%</b>.<br>- <b>Bước 5:</b> Làm tròn đến hàng đơn vị. Vì phần thập phân đầu tiên là 3 (<5) nên giữ nguyên phần nguyên là <b>1</b>." }
    ];

    const de2_data = [
        // --- ĐỀ 5 - PHẦN I ---
        { id: "5_1", type: "single", question: "Câu 1. Rừng tự nhiên nước ta hiện nay", options: ["có xu hướng tăng diện tích.", "hoàn toàn là vườn quốc gia.", "phần lớn dùng khai thác gỗ.", "tập trung hầu hết ở ven biển."], correct: 0, explanation: "Nhờ chính sách đóng cửa rừng tự nhiên và đẩy mạnh khoanh nuôi bảo vệ, diện tích rừng tự nhiên ở nước ta đang có xu hướng tăng dần trở lại." },
        { id: "5_2", type: "single", question: "Câu 2. Quá trình hoang mạc hoá đất xảy ra chủ yếu ở nơi nào của nước ta sau đây?", options: ["Trà Vinh, Bến Tre.", "Hà Tĩnh, Quảng Bình.", "Nam Định, Thái Bình.", "Ninh Thuận, Bình Thuận."], correct: 3, explanation: "Ninh Thuận và Bình Thuận là 2 tỉnh cực Nam Trung Bộ có khí hậu khô hạn nhất cả nước (lượng mưa rất thấp), do đó tình trạng hoang mạc hóa đất (đất cát di động) diễn ra nghiêm trọng nhất." },
        { id: "5_3", type: "single", question: "Câu 3. Thiên nhiên phần lãnh thổ phía Nam của nước ta có đặc điểm là", options: ["nhiệt độ trung bình năm trên 20°C biên độ nhiệt độ năm lớn.", "nhiệt độ trung bình năm trên 25°C, biên độ nhiệt độ năm nhỏ.", "phổ biến rừng cận xích đạo gió mùa và có gió mùa Đông Bắc.", "có mùa đông lạnh, khí hậu chia rõ thành mùa mưa và mùa khô."], correct: 1, explanation: "Phần lãnh thổ phía Nam (từ dãy Bạch Mã trở vào) mang đặc trưng khí hậu cận xích đạo: nhiệt độ trung bình năm cao (trên 25°C), nóng quanh năm, nên biên độ nhiệt trung bình năm rất nhỏ." },
        { id: "5_4", type: "single", question: "Câu 4. Phân bố dân cư nước ta", options: ["khác nhau giữa đồng bằng với trung du và miền núi.", "giống nhau giữa các vùng kinh tế, giữa các thành phố.", "với mật độ cao ở Đồng bằng sông Hồng, Tây Nguyên.", "với mật độ thấp ở Bắc Trung Bộ, vùng Đông Nam Bộ."], correct: 0, explanation: "Dân cư nước ta phân bố rất không đồng đều. Tập trung rất đông đúc ở các vùng đồng bằng, ven biển (ĐBSH, ĐBSCL) và thưa thớt ở vùng trung du, miền núi (Tây Bắc, Tây Nguyên)." },
        { id: "5_5", type: "single", question: "Câu 5. Phát biểu nào sau đây không đúng về vấn đề việc làm ở nước ta hiện nay?", options: ["Mỗi năm nước ta tạo thêm nhiều việc làm mới.", "Tỉ lệ thất nghiệp ở thành thị cao hơn nông thôn.", "Tỉ lệ thiếu việc làm ở nông thôn khác với đô thị.", "Tỉ lệ thất nghiệp giống nhau ở các vùng kinh tế."], correct: 3, explanation: "Tỉ lệ thất nghiệp và thiếu việc làm có sự chênh lệch lớn giữa các vùng kinh tế, tùy thuộc vào trình độ phát triển và tốc độ CNH-HĐH của từng vùng. Do đó nhận định 'giống nhau ở các vùng' là hoàn toàn SAI." },
        { id: "5_6", type: "single", question: "Câu 6. Ngành nông nghiệp nước ta chuyển dịch chủ yếu theo hướng", options: ["chú trọng phát triển sản xuất hàng hoá lớn.", "tập trung ngành có hàm lượng tri thức cao.", "hiện đại hoá trên nền tảng tiến bộ khoa học.", "ưu tiên đầu tư một số ngành công nghệ cao."], correct: 0, explanation: "Nền nông nghiệp nước ta đang chuyển đổi mạnh mẽ từ sản xuất tự cung tự cấp, quy mô nhỏ lẻ sang nền nông nghiệp sản xuất hàng hóa quy mô lớn, hướng tới xuất khẩu." },
        { id: "5_7", type: "single", question: "Câu 7. Biển Đông không có", options: ["độ muối giống nhau giữa các khu vực và các mùa.", "các dòng biển thay đổi hướng, tính chất theo mùa.", "nguồn nhiệt ẩm rất dồi dào và phân hoá theo mùa.", "nhiều loại tài nguyên khoáng sản, sinh vật, du lịch."], correct: 0, explanation: "Độ muối của Biển Đông thay đổi theo mùa và theo từng khu vực (cửa sông thì nhạt hơn, ngoài khơi mặn hơn, mùa mưa nhạt hơn mùa khô). Nên nhận định 'giống nhau' là SAI." },
        { id: "5_8", type: "single", question: "Câu 8. Các đảo nào sau đây thuộc vùng Duyên hải Nam Trung Bộ?", options: ["Cù Lao Chàm, Lý Sơn, Phú Quý.", "Cù Lao Chàm, Cồn Cỏ, Phú Quý.", "Cù Lao Chàm, Cát Bà, Phú Quốc.", "Cù Lao Chàm, Cái Bầu, Côn Đảo."], correct: 0, explanation: "Cù Lao Chàm (Quảng Nam), Lý Sơn (Quảng Ngãi) và Phú Quý (Bình Thuận) đều là các đảo/quần đảo nổi tiếng trực thuộc vùng Duyên hải Nam Trung Bộ." },
        { id: "5_9", type: "single", question: "Câu 9. Các nhân tố chủ yếu tạo ra nhiều việc làm mỗi năm ở nước ta là", options: ["sự phát triển các ngành sản xuất, đa dạng hoá kinh tế.", "nhiều thành phần kinh tế, sự phát triển ngành dịch vụ.", "đầu tư nước ngoài, hội nhập kinh tế toàn cầu sâu rộng.", "chuyển dịch cơ cấu ngành kinh tế, phát triển đô thị hoá."], correct: 0, explanation: "Để giải quyết căn bản vấn đề việc làm cho hàng triệu lao động tăng thêm mỗi năm, giải pháp cốt lõi là phát triển mở rộng quy mô các ngành sản xuất và đa dạng hóa cơ cấu nền kinh tế." },
        { id: "5_10", type: "single", question: "Câu 10. Tỉ lệ lao động phi nông nghiệp ở nông thôn nước ta tăng chủ yếu do tác động của", options: ["kinh tế thị trường, khoa học kĩ thuật và công nghệ, tăng đào tạo lao động.", "quá trình công nghiệp hoá, xây dựng nông thôn mới, đa dạng hoá kinh tế.", "đô thị hoả, thu hút nguồn vốn đầu tư, tăng cường nhiều hoạt động dịch vụ.", "hội nhập toàn cầu sâu rộng, hiện đại hoá sản xuất, phát triển các làng nghề."], correct: 1, explanation: "Quá trình công nghiệp hóa nông thôn và xây dựng nông thôn mới đã thúc đẩy việc phát triển tiểu thủ công nghiệp, dịch vụ và ngành nghề phụ tại địa phương, rút bớt lao động khỏi nông nghiệp thuần túy." },
        { id: "5_11", type: "single", question: "Câu 11. Nguyên nhân chủ yếu gây suy thoái tài nguyên đất ở nước ta không phải là", options: ["khai thác tài nguyên thiếu hợp lí của con người.", "thiên tai như: hạn hán, lũ lụt, xâm nhập mặn...", "sử dụng nhiều hợp chất hoá học trong canh tác.", "kết hợp hoạt động nông lâm ở khu vực đồi núi."], correct: 3, explanation: "Mô hình 'nông - lâm kết hợp' (RVAC) là một biện pháp sinh thái học ĐỂ BẢO VỆ và cải tạo đất đồi núi dốc, không phải là nguyên nhân gây suy thoái đất." },
        { id: "5_12", type: "single", question: "Câu 12. Do khai thác quá mức nguồn nước nên", options: ["ô nhiễm nước mặt ở đoạn sông chảy qua làng nghề.", "xâm nhập mặn tại các vùng cửa sông và ven biển...", "ô nhiễm kim loại nặng nước dưới đất ở một số vùng.", "gây ra tình trạng hạ thấp mực nước ngầm một số nơi."], correct: 3, explanation: "Việc khai thác nước ngầm quá mức (đặc biệt là để tưới tiêu cà phê ở Tây Nguyên hoặc sử dụng ở các đại đô thị) dẫn đến hệ quả trực tiếp là sụt giảm mực nước ngầm." },
        { id: "5_13", type: "single", question: "Câu 13. Ý nghĩa của chuyển dịch cơ cấu kinh tế ở nước ta không phải là", options: ["thúc đẩy kinh tế trên cơ sở về lao động và tài nguyên.", "đẩy nhanh quá trình hội nhập vào nền kinh tế thế giới.", "khai thác tổng hợp các nguồn lực trong và ngoài nước.", "khai thác và sử dụng hiệu quả những nguồn lực sẵn có."], correct: 0, explanation: "Chuyển dịch cơ cấu kinh tế theo hướng CNH-HĐH nhằm mục đích giảm sự phụ thuộc vào khai thác tài nguyên thô và lao động giá rẻ, hướng tới nền kinh tế tri thức và công nghệ. Vì vậy, ý A là phản ánh mô hình cũ, không phải ý nghĩa của xu thế mới." },
        { id: "5_14", type: "single", question: "Câu 14. Nguồn gây ô nhiễm không khí ở nước ta chủ yếu đến từ", options: ["hoạt động nông nghiệp và hoạt động du lịch.", "hoạt động xây dựng và khai thác khoáng sản.", "hoạt động công nghiệp và giao thông vận tải.", "các khu công nghiệp và khu dân cư đông đúc."], correct: 2, explanation: "Khí thải từ các nhà máy công nghiệp và đặc biệt là từ khói bụi của hàng chục triệu phương tiện giao thông (xe máy, ô tô) là thủ phạm chính gây ô nhiễm không khí tại Việt Nam." },
        { id: "5_15", type: "single", question: "Câu 15. Khí hậu phần lãnh thổ phía Bắc nước ta khác với khí hậu phần lãnh thổ phía Nam chủ yếu do tác động của", options: ["vị trí địa lí, đồi núi, Tín phong bán cầu Bắc.", "các loại gió vào mùa đông, độ cao núi, biển.", "vị trí địa lí, các loại gió trong năm, địa hình.", "phạm vi lãnh thổ, gió mùa, diện tích đồi núi."], correct: 2, explanation: "Sự phân hóa khí hậu Bắc - Nam là kết quả tổng hợp của: Vị trí địa lí (vĩ độ), các loại gió (gió mùa Đông Bắc chỉ tác động mạnh ở miền Bắc) và sự chắn gió của địa hình (dãy Hoành Sơn, Bạch Mã)." },
        { id: "5_16", type: "single", question: "Câu 16. Tác động chủ yếu của khoa học, công nghệ đến nông nghiệp nước ta là", options: ["tạo ra giá trị và chất lượng sản phẩm tốt hơn.", "hỗ trợ phát triển và đầu tư trong nông nghiệp.", "tạo thuận lợi cho xuất khẩu các loại nông sản.", "thúc đẩy phát triển nền nông nghiệp hàng hoá."], correct: 0, explanation: "Việc ứng dụng KHCN (giống mới, công nghệ sinh học, chế biến sâu) giúp tăng năng suất, nâng cao chất lượng nông sản, từ đó gia tăng giá trị kinh tế trên cùng một đơn vị diện tích." },
        { id: "5_17", type: "single", question: "Câu 17. Hoạt động chăn nuôi gia súc lớn ở Trung du và miền núi Bắc Bộ cần chú ý đến", options: ["ứng dụng khoa học và công nghệ, sản xuất tập trung.", "những thay đổi của môi trường và vấn đề tái định cư.", "môi trường nước, không khí, suy giảm diện tích rừng.", "đẩy mạnh chăn nuôi nông hộ, tăng chăn thả tự nhiên."], correct: 2, explanation: "Chăn nuôi gia súc lớn (trâu, bò) tại các vùng đồi núi nếu chăn thả quá mức tự do sẽ dẫn đến dẫm đạp phá hoại thảm thực vật rừng non, gây xói mòn đất và ô nhiễm nguồn nước ngầm." },
        { id: "5_18", type: "single", question: "Câu 18. Ngành dịch vụ ở Đồng bằng sông Hồng ngày càng đa dạng chủ yếu do", options: ["mật độ dân số cao, có thế mạnh về du lịch.", "dân số đông, các ngành sản xuất phát triển.", "vị trí thuận lợi, nhiều lao động trình độ cao.", "có nhiều đô thị, khoa học kĩ thuật phát triển."], correct: 1, explanation: "Dịch vụ ra đời để phục vụ nhu cầu của sản xuất và tiêu dùng. Đồng bằng sông Hồng có nền kinh tế phát triển năng động và thị trường tiêu thụ (dân số) đông đảo nhất cả nước, tạo sức kéo lớn cho dịch vụ đa dạng." },

        // --- ĐỀ 5 - PHẦN II ---
        { id: "5_II_1", type: "tf_cluster", context: "Câu 1. Sinh vật nước ta có tính đa dạng cao, thể hiện ở số lượng thành phần loài, các kiểu hệ sinh thái và nguồn gen quý hiếm. Tuy nhiên tính đa dạng của sinh vật đang bị suy giảm.", items: [
            { id: "a", text: "a) Các hệ sinh thái tự nhiên ở nước ta đang giảm dần về quy mô lẫn chất lượng, đặc biệt là các hệ sinh thái: rừng, đất ngập nước, bãi bồi, núi đá vôi...", correct: true, expl: "Quá trình đô thị hóa, khai thác tài nguyên và biến đổi khí hậu đã làm thu hẹp đáng kể các hệ sinh thái tự nhiên. Mệnh đề ĐÚNG." },
            { id: "b", text: "b) Tổng diện tích rừng và tỉ lệ che phủ rừng ở nước ta tăng qua các năm chủ yếu do tăng vườn quốc gia và khu dự trữ tự nhiên.", correct: false, expl: "Diện tích rừng tăng lên trong thời gian qua chủ yếu là nhờ các dự án TRỒNG RỪNG mới (rừng sản xuất, phòng hộ) chứ không chỉ do lập thêm vườn quốc gia. Mệnh đề SAI." },
            { id: "c", text: "c) Số lượng loài sinh vật ở nước ta bị giảm đi nhanh chóng, ngày càng có nhiều loài có tên trong sách đỏ bị đe doạ tuyệt chủng.", correct: true, expl: "Nạn săn bắt động vật hoang dã trái phép và mất môi trường sống khiến danh sách Sách đỏ ngày càng dài thêm. Mệnh đề ĐÚNG." },
            { id: "d", text: "d) Nguồn tài nguyên sinh vật dưới nước, đặc biệt nguồn hải sản ở vùng ven biển bị giảm sút rõ rệt, do khai thác quá mức và ô nhiễm.", correct: true, expl: "Sử dụng thuốc nổ, xung điện và xả thải chưa qua xử lý ra biển đã phá hủy nghiêm trọng nguồn lợi thủy sản ven bờ. Mệnh đề ĐÚNG." }
        ]},
        { id: "5_II_2", type: "tf_cluster", context: "Câu 2. Chất lượng lao động Việt Nam đang ngày càng tăng. Với sự tăng cường đào tạo, lao động Việt Nam đã khẳng định được sự uy tín trên thị trường lao động quốc tế.", items: [
            { id: "a", text: "a) Các chính sách hỗ trợ và khuyến khích sự phát triển nghề nghiệp đóng vai trò quan trọng trong việc nâng cao chất lượng lao động nước ta.", correct: true, expl: "Chính sách nhà nước tạo hành lang pháp lý để phát triển hệ thống trường nghề và trung tâm đào tạo. Mệnh đề ĐÚNG." },
            { id: "b", text: "b) Sự đầu tư vào giáo dục và đào tạo đã tạo cho nước ta có được một lực lượng lao động đa dạng và chất lượng.", correct: true, expl: "Đây là nguyên nhân cốt lõi để nâng cao tay nghề và kĩ năng chuyên môn cho người lao động. Mệnh đề ĐÚNG." },
            { id: "c", text: "c) Lao động nước ta có nhiều kinh nghiệm sản xuất trong tiểu thủ công nghiệp và dịch vụ, được tích luỹ qua nhiều thế hệ.", correct: true, expl: "Các làng nghề truyền thống và thói quen canh tác tiểu nông đã rèn luyện cho lao động Việt sự khéo léo, tỉ mỉ. Mệnh đề ĐÚNG." },
            { id: "d", text: "d) Chất lượng lao động nước ta và tỉ lệ lao động đã qua đào tạo tăng cao, đã đáp ứng đầy đủ yêu cầu hiện đại hoá đất nước và hội nhập.", correct: false, expl: "Dù đã được nâng cao, nhưng nguồn nhân lực nước ta hiện TÌNH TRẠNG CHUNG vẫn còn thiếu hụt lao động tay nghề cao, CHƯA ĐÁP ỨNG ĐẦY ĐỦ yêu cầu khắt khe của hội nhập. Mệnh đề SAI." }
        ]},
        { id: "5_II_3", type: "tf_cluster", context: "Câu 3. Trồng trọt là ngành sản xuất chính trong nông nghiệp nước ta với giá trị sản xuất chiếm 60,8% (năm 2021) và không ngừng tăng.", items: [
            { id: "a", text: "a) Ngành trồng trọt nước ta đã áp dụng nhiều thành tựu khoa học, công nghệ như cơ giới hoá sản xuất, ứng dụng giống mới, tưới phun tự động...", correct: true, expl: "Đây là biểu hiện rõ nét của một nền nông nghiệp đang hướng tới thông minh và chính xác. Mệnh đề ĐÚNG." },
            { id: "b", text: "b) Cơ cấu ngành trồng trọt nước ta khá đa dạng, bao gồm: cây hàng năm, cây lâu năm và một số cây trồng khác.", correct: true, expl: "Nhờ khí hậu và thổ nhưỡng đa dạng, Việt Nam trồng được hầu hết các nhóm cây trồng nhiệt đới, cận nhiệt. Mệnh đề ĐÚNG." },
            { id: "c", text: "c) Lúa là cây trồng chính trong ngành trồng trọt ở nước ta, có diện tích lớn nhất, sản lượng lớn và đóng góp nhiều cho xuất khẩu gạo.", correct: true, expl: "Cây lúa nước là cây lương thực cốt lõi, giúp Việt Nam vững vàng vị trí top 3 nước xuất khẩu gạo thế giới. Mệnh đề ĐÚNG." },
            { id: "d", text: "d) Một số cây công nghiệp chủ lực ở nước ta là: cà phê, cao su, chè... Các cây công nghiệp nước ta đều có nguồn gốc nhiệt đới và trồng chủ yếu ở khu vực đồi núi.", correct: false, expl: "Không phải 'đều có nguồn gốc nhiệt đới'. Ví dụ tiêu biểu là cây CHÈ có nguồn gốc CẬN NHIỆT đới. Mệnh đề SAI." }
        ]},
        { id: "5_II_4", type: "tf_cluster", context: "Câu 4. Vùng biển Việt Nam trên Biển Đông giáp với vùng biển của nhiều nước. Việc giải quyết các tranh chấp cần thiết phải theo luật pháp quốc tế.", items: [
            { id: "a", text: "a) Hướng chung trong giải quyết tranh chấp vùng biển, đảo ở Biển Đông là tuân thủ Công ước của Liên hợp quốc về Luật Biển năm 1982 (UNCLOS).", correct: true, expl: "UNCLOS 1982 là cơ sở pháp lý cao nhất và toàn diện nhất để phân định chủ quyền biển đảo toàn cầu. Mệnh đề ĐÚNG." },
            { id: "b", text: "b) Thực hiện Tuyên bố về ứng xử các bên ở Biển Đông (DOC), hoàn thiện Bộ Quy tắc ứng xử (COC) là giải pháp duy trì sự ổn định, hoà bình.", correct: true, expl: "Đây là nỗ lực chung của khối ASEAN và Trung Quốc để ngăn ngừa xung đột. Mệnh đề ĐÚNG." },
            { id: "c", text: "c) Tuyên bố về ứng xử các bên ở Biển Đông (DOC) là một văn kiện mang tính ràng buộc pháp lí.", correct: false, expl: "DOC chỉ là một 'tuyên bố chung' mang tính chính trị, thiện chí, KHÔNG CÓ tính ràng buộc pháp lý chặt chẽ như một hiệp ước hay bộ luật. Mệnh đề SAI." },
            { id: "d", text: "d) Bộ Quy tắc ứng xử của các bên ở Biển Đông (COC) có thể được coi là một bộ Luật Biển khu vực để điều chỉnh mọi mối quan hệ đang diễn ra trong Biển Đông.", correct: true, expl: "COC khi được kí kết sẽ trở thành công cụ pháp lý mạnh mẽ có tính ràng buộc cao nhất trong khu vực. Mệnh đề ĐÚNG." }
        ]},

        // --- ĐỀ 5 - PHẦN III ---
        { id: "5_III_1", type: "short_answer", question: `Câu 1. Tổng lượng nước của sông ngòi nước ta trên 830 tỉ m³/năm; trong đó lượng nước mùa lũ chiếm khoảng 80% tổng lượng nước cả năm.
        <br><br>Cho biết lượng nước mùa lũ của sông ngòi nước ta khoảng bao nhiêu tỉ m³ (làm tròn số liệu đến một chữ số thập phân)?`, correct: "664.0", explanation: "- <b>Bước 1:</b> Tính lượng nước mùa lũ bằng cách lấy Tổng lượng nước nhân với tỉ lệ phần trăm của mùa lũ.<br>- <b>Bước 2:</b> Phép tính = 830 * 80% = 830 * 0.8 = <b>664</b> (tỉ m³).<br>- <b>Bước 3:</b> Đề yêu cầu làm tròn đến một chữ số thập phân, ta ghi thêm \".0\" để biểu diễn độ chính xác. Kết quả là <b>664.0</b>." },
        { id: "5_III_2", type: "short_answer", question: `Câu 2. Năm 2010, diện tích rừng trồng của nước ta là 3,1 triệu ha; đến năm 2021 là 4,6 triệu ha.
        <br><br>Cho biết giai đoạn 2010 – 2021, diện tích rừng trồng của nước ta tăng lên bao nhiêu % (làm tròn số liệu đến một chữ số thập phân)?`, correct: "48.4", explanation: "- <b>Bước 1:</b> Viết công thức tính tỉ lệ phần trăm tăng thêm = ((Giá trị năm sau - Giá trị năm trước) / Giá trị năm trước) * 100.<br>- <b>Bước 2:</b> Thay số = ((4.6 - 3.1) / 3.1) * 100 = (1.5 / 3.1) * 100 = <b>48.387... %</b>.<br>- <b>Bước 3:</b> Làm tròn đến 1 chữ số thập phân. Do số ở hàng phần trăm là 8 (lớn hơn 5) nên ta làm tròn lên thành <b>48.4</b>." },
        { id: "5_III_3", type: "short_answer", question: `Câu 3. Cho bảng số liệu: LỰC LƯỢNG LAO ĐỘNG SO VỚI TỔNG SỐ DÂN CỦA NƯỚC TA
        <div class="overflow-x-auto my-3"><table class="data-table w-full text-sm">
            <thead><tr><th>Năm</th><th>2010</th><th>2015</th><th>2021</th></tr></thead>
            <tbody><tr><td class="font-bold bg-blue-50 text-left">Lực lượng lao động (triệu người)</td><td>50.4</td><td>54.3</td><td>50.6</td></tr></tbody>
        </table></div>
        Căn cứ vào bảng số liệu, cho biết tốc độ tăng lao động trong khoảng thời gian từ 2010 – 2015 là bao nhiêu % (làm tròn đến một chữ số thập phân)?`, correct: "7.7", explanation: "- <b>Bước 1:</b> Tương tự câu 2, công thức = ((Giá trị 2015 - Giá trị 2010) / Giá trị 2010) * 100.<br>- <b>Bước 2:</b> Thay số = ((54.3 - 50.4) / 50.4) * 100 = (3.9 / 50.4) * 100 = <b>7.738... %</b>.<br>- <b>Bước 3:</b> Làm tròn đến 1 chữ số thập phân, phần trăm là 3 (<5) nên giữ nguyên là <b>7.7</b>." },
        { id: "5_III_4", type: "short_answer", question: `Câu 4. Cho bảng số liệu: DIỆN TÍCH VÀ SẢN LƯỢNG CÂY CAO SU Ở BẮC TRUNG BỘ
        <div class="overflow-x-auto my-3"><table class="data-table w-full text-sm">
            <thead><tr><th>Năm</th><th>2015</th><th>2021</th></tr></thead>
            <tbody>
                <tr><td class="font-bold bg-blue-50 text-left">Diện tích (nghìn ha)</td><td>86.8</td><td>61.4</td></tr>
                <tr><td class="font-bold bg-blue-50 text-left">Sản lượng (nghìn tấn)</td><td>35.0</td><td>47.2</td></tr>
            </tbody>
        </table></div>
        Căn cứ vào bảng số liệu, cho biết năng suất của cây cao su ở Bắc Trung Bộ năm 2021 so với năm 2015 tăng thêm bao nhiêu kg/ha (làm tròn đến một chữ số thập phân)?`, correct: "365.5", explanation: "- <b>Bước 1:</b> Công thức Năng suất = Sản lượng / Diện tích. Để tính đơn vị kg/ha từ (nghìn tấn) và (nghìn ha), ta có: (nghìn tấn / nghìn ha) = tấn/ha. Để đổi ra kg/ha, ta nhân thêm 1000.<br>- <b>Bước 2:</b> Năng suất 2015 = (35.0 / 86.8) * 1000 = <b>403.22...</b> kg/ha.<br>- <b>Bước 3:</b> Năng suất 2021 = (47.2 / 61.4) * 1000 = <b>768.72...</b> kg/ha.<br>- <b>Bước 4:</b> Mức độ tăng thêm = 768.72 - 403.22 = <b>365.5</b> kg/ha." },
        { id: "5_III_5", type: "short_answer", question: `Câu 5. Cho bảng số liệu: SỐ LƯỢT KHÁCH NỘI ĐỊA DO CÁC CƠ SỞ LỮ HÀNH PHỤC VỤ (nghìn lượt người) Ở DHNTB NĂM 2022
        <div class="overflow-x-auto my-3"><table class="data-table w-full text-sm">
            <thead><tr><th>Đà Nẵng</th><th>Q.Nam</th><th>Q.Ngãi</th><th>Bình Định</th><th>Phú Yên</th><th>Khánh Hoà</th><th>N.Thuận</th><th>B.Thuận</th></tr></thead>
            <tbody><tr><td>457.0</td><td>86.4</td><td>8.6</td><td>177.3</td><td>3.8</td><td>758.5</td><td>2.9</td><td>17.8</td></tr></tbody>
        </table></div>
        Theo bảng số liệu, cho biết tỉnh (thành phố) đứng đầu về số lượt khách nội địa chiếm tỉ trọng bao nhiêu % trong tổng số lượt khách của vùng (làm tròn đến một chữ số thập phân)?`, correct: "50.2", explanation: "- <b>Bước 1:</b> Xác định tỉnh đứng đầu là <b>Khánh Hòa (758.5)</b> nghìn lượt.<br>- <b>Bước 2:</b> Tính tổng khách của toàn vùng = 457.0 + 86.4 + 8.6 + 177.3 + 3.8 + 758.5 + 2.9 + 17.8 = <b>1512.3</b> (nghìn lượt).<br>- <b>Bước 3:</b> Tính tỉ trọng = (758.5 / 1512.3) * 100 = <b>50.155... %</b>.<br>- <b>Bước 4:</b> Làm tròn 1 chữ số thập phân (do phần trăm là 5, làm tròn lên) thành <b>50.2</b>." },
        { id: "5_III_6", type: "short_answer", question: `Câu 6. Cho bảng số liệu: DIỆN TÍCH CÂY CÔNG NGHIỆP LÂU NĂM VÙNG ĐÔNG NAM BỘ NĂM 2021 (nghìn ha)
        <div class="overflow-x-auto my-3"><table class="data-table w-full text-sm">
            <thead><tr><th>Cây trồng</th><th>Cao su</th><th>Điều</th><th>Hồ tiêu</th><th>Cây khác</th></tr></thead>
            <tbody><tr><td class="font-bold bg-blue-50">Diện tích</td><td>547.6</td><td>192.6</td><td>38.3</td><td>25.8</td></tr></tbody>
        </table></div>
        Căn cứ vào bảng số liệu, cho biết diện tích cây cao su chiếm bao nhiêu % trong cơ cấu diện tích cây công nghiệp lâu năm vùng Đông Nam Bộ năm 2021 (làm tròn đến một chữ số thập phân)?`, correct: "68.1", explanation: "- <b>Bước 1:</b> Tính tổng diện tích = 547.6 + 192.6 + 38.3 + 25.8 = <b>804.3</b> (nghìn ha).<br>- <b>Bước 2:</b> Áp dụng công thức tỉ trọng = (Diện tích Cao su / Tổng) * 100.<br>- <b>Bước 3:</b> Phép tính = (547.6 / 804.3) * 100 = <b>68.084... %</b>.<br>- <b>Bước 4:</b> Làm tròn 1 chữ số thập phân, thu được <b>68.1</b>." }
    ];

    const testBanks = { de1: de1_data, de2: de2_data };
    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    // BẮT ĐẦU BÀI THI
    window.startQuizAction = function() {
        try {
            const errDiv = document.getElementById('login-error');
            if(errDiv) errDiv.classList.add('hidden');
            
            const nameEl = document.getElementById('hoTen');
            const lopEl = document.getElementById('lop');
            
            const name = nameEl.value.trim();
            const lop = lopEl.value.trim();
            const checkedRadio = document.querySelector('input[name="chonDe"]:checked');
            
            if (!name || !lop) {
                if(errDiv) {
                    errDiv.innerText = "⚠️ Các em học sinh nhớ nhập đầy đủ Họ tên và Lớp nhé!";
                    errDiv.classList.remove('hidden');
                }
                return;
            }
            
            if (name && lop && checkedRadio) {
                const maDe = checkedRadio.value;
                const tenDe = checkedRadio.nextElementSibling.querySelector('.de-text').innerText.split('\n')[0].trim();
                currentStudent = { hoTen: name, lop: lop, maDe: maDe, tenDe: tenDe };
                currentQuestions = JSON.parse(JSON.stringify(testBanks[maDe]));
                quizStartTime = new Date();
                
                setTimeout(() => { isQuizStarted = true; }, 1000);
                showSection('quiz');
                
                const titleEl = document.getElementById('quiz-title');
                const infoEl = document.getElementById('student-info');
                if (titleEl) titleEl.innerText = currentStudent.tenDe;
                if (infoEl) infoEl.innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
                
                currentIdx = 0;
                userAnswers = {};
                window.renderQuestion();
                startTimer(50 * 60); 
            }
        } catch (error) {
            console.error(error);
        }
    };

    window.prevQuestion = function() {
        if (currentIdx > 0) { currentIdx--; window.renderQuestion(); }
    };

    window.nextQuestion = function() {
        if (currentIdx < currentQuestions.length - 1) { currentIdx++; window.renderQuestion(); }
    };

    window.viewScoresAction = function() {
        const btn = document.getElementById('view-scores-btn') || document.createElement('button'); 
        btn.innerText = "⏳ Đang tải...";
        if (database) {
            scoresRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                allScores = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                window.renderScores();
                btn.innerText = "🏆 Xem bảng xếp hạng";
                showSection('scores');
            });
        }
    };

    window.goHome = function() {
        if(document.getElementById('hoTen')) document.getElementById('hoTen').value = ''; 
        if(document.getElementById('lop')) document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    };

    function getTotalScoreItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.items.length;
            else count += 1;
        });
        return count; 
    }

    function getAnsweredCount() {
        return Object.keys(userAnswers).length;
    }

    window.selectAnswer = function(qId, val, type) {
        if (type === 'tf') {
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            
            const parts = qId.split('_'); 
            // Đã sửa lại thành slice(0, 3) và parts[3] để lấy đúng mã ID
            const mainQId = parts.slice(0, 3).join('_'); 
            const itemId = parts[3]; 
            
            const q = currentQuestions.find(i => i.id === mainQId);
            const item = q.items.find(i => i.id === itemId);
            window.showFeedbackModal(item, val, 'tf');
        } else if (type === 'single') {
            if (userAnswers[qId] !== undefined) return;
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            const q = currentQuestions[currentIdx];
            window.showFeedbackModal(q, val, 'single');
        } else if (type === 'short_answer') {
            userAnswers[qId] = val.trim();
            window.updateProgress();
        }
    };

    window.showFeedbackModal = function(qOrItem, uAns, type = 'single') {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        const header = document.getElementById('feedback-header');
        const body = document.getElementById('feedback-body');
        
        if(!modal || !content) return; 

        window.autoAdvance = (type === 'single'); 

        let isCorrect = false;
        let explanation = qOrItem.explanation || qOrItem.expl || "Chưa có lời giải chi tiết.";
        let optionsHtml = '';
        
        let questionText = "";
        if (type === 'single') {
            questionText = qOrItem.question || "";
        } else if (type === 'tf') {
            questionText = qOrItem.text || "";
        } else if (type === 'short_answer') {
            questionText = qOrItem.question || "";
        }

        let questionHtml = `<div class="bg-slate-50 border-l-4 border-blue-500 p-4 rounded-r-xl shadow-sm mb-4 text-left">
            <div class="text-xs font-black text-blue-500 uppercase tracking-wider mb-2">Nội dung câu hỏi:</div>
            <div class="text-slate-800 font-bold text-lg math-scroll">${questionText}</div>
        </div>`;

        if (type === 'single') {
            isCorrect = (uAns === qOrItem.correct);
            optionsHtml += `<div class="space-y-3 mb-4 mt-2">`;
            qOrItem.options.forEach((opt, i) => {
                let optBg = ''; let iconHtml = ''; let textStyle = 'font-semibold';
                if (qOrItem.correct === i) {
                    optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                    iconHtml = '<div class="text-xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                    textStyle = 'font-bold text-base';
                } else if (uAns === i && !isCorrect) {
                    optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                    iconHtml = '<div class="text-xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                    textStyle = 'font-bold text-base line-through decoration-red-500 decoration-2';
                } else { 
                    optBg = 'bg-white text-slate-700 border border-slate-200'; 
                }

                let letterBg = (qOrItem.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                               ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                optionsHtml += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                    <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                    <div class="${textStyle} flex-1 math-scroll text-left text-sm sm:text-base">${opt}</div>
                                    ${iconHtml}
                                </div>`;
            });
            optionsHtml += `</div>`;
        } else if (type === 'tf') {
            isCorrect = (uAns === qOrItem.correct);
            let ansText = qOrItem.correct ? 'ĐÚNG' : 'SAI';
            let uAnsText = uAns ? 'ĐÚNG' : 'SAI';
            
            optionsHtml += `
                <div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm mb-4 mt-2 text-left">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                        <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="font-black text-lg uppercase ${isCorrect ? 'text-emerald-600' : 'text-red-500 line-through decoration-red-500 decoration-2'}">${uAnsText}</span></span>
                        <span class="font-black text-lg text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg border-2 border-emerald-200">ĐÁP ÁN: ${ansText}</span>
                    </div>
                </div>
            `;
        } else if (type === 'short_answer') {
            isCorrect = String(uAns).trim().toLowerCase() === String(qOrItem.correct).trim().toLowerCase();
            let uAnsText = String(uAns).trim() === "" ? "Chưa nhập" : String(uAns).trim();
            optionsHtml += `
                <div class="p-4 bg-white border-2 border-gray-200 rounded-xl shadow-sm mb-4 mt-2 text-left">
                    <div class="flex flex-col sm:flex-row gap-4 justify-between items-center">
                        <div class="flex-1 text-center bg-gray-50 p-4 rounded-xl border border-gray-200 w-full">
                            <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Đáp án của bạn</div>
                            <div class="text-3xl font-black ${isCorrect ? 'text-emerald-600' : 'text-red-600 line-through decoration-2 decoration-red-500'}">${uAnsText}</div>
                        </div>
                        <div class="flex-1 text-center bg-emerald-50 p-4 rounded-xl border border-emerald-300 w-full">
                            <div class="text-xs font-bold text-emerald-600 uppercase tracking-widest mb-2">Đáp án chuẩn</div>
                            <div class="text-3xl font-black text-emerald-700">${qOrItem.correct}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        let emoji = isCorrect ? '🎉' : '💡';
        let statusTitle = isCorrect ? 'Chính xác!' : 'Bạn làm sai rồi!';
        let headerColor = isCorrect ? 'text-emerald-600' : 'text-red-600';
        
        header.innerHTML = `<div class="text-4xl mb-2 animate-bounce drop-shadow-md">${emoji}</div><h3 class="text-2xl font-black ${headerColor} uppercase tracking-widest drop-shadow-sm">${statusTitle}</h3>`;
        
        body.innerHTML = questionHtml + optionsHtml;
        body.innerHTML += `<div class="mt-2"><div class="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-t-xl font-bold uppercase text-sm border-b-2 border-blue-500 text-left tracking-wide">📖 Giải chi tiết:</div><div class="p-4 bg-white border-2 border-blue-200 rounded-b-xl rounded-tr-xl shadow-sm text-black font-semibold text-sm md:text-base leading-loose math-scroll text-left">${explanation}</div></div>`;

        modal.classList.remove('hidden');
        void modal.offsetWidth;
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');
    };

    window.closeFeedbackModal = function() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        if(!modal) return;
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => { 
            modal.classList.add('hidden'); 
            if (window.autoAdvance) {
                if (currentIdx < currentQuestions.length - 1) {
                    window.nextQuestion();
                }
            }
        }, 300);
    };

    window.renderQuestion = function() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        if(!container) return;

        let html = `<div class="fade-in w-full">`;
        
        // --- MULTIPLE CHOICE ---
        if (q.type === 'single') {
            const hasAnswered = userAnswers[q.id] !== undefined;
            const uAns = userAnswers[q.id];
            
            html += `<div class="flex items-center gap-3 mb-4 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-black text-lg shadow-sm">I</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-400 tracking-wide uppercase">Trắc nghiệm một lựa chọn đúng</h3></div>`;
            html += `<div class="flex gap-3 mb-4"><div class="w-full math-scroll"><div class="text-base md:text-lg font-bold text-red-400 mt-1 leading-relaxed tracking-tight">${q.question}</div></div></div>`;
            html += `<div class="space-y-3 md:pl-4 mt-4">`;
            q.options.forEach((opt, i) => {
                const isChecked = (uAns === i) ? 'checked' : '';
         const disabledClass = hasAnswered ? 'disabled-option' : '';
                html += `<div class="flex items-center">
                    <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio" ${isChecked} ${hasAnswered ? 'disabled' : ''} onchange="window.selectAnswer('${q.id}', ${i}, 'single')">
                    <label for="opt_${i}" class="option-label ${disabledClass} w-full p-4 border-2 border-gray-200 rounded-xl flex items-center gap-4 bg-white shadow-sm font-semibold text-sm md:text-base cursor-pointer">
                        <div class="w-10 h-10 rounded-lg border-2 border-gray-300 flex items-center justify-center text-sm font-black text-gray-400 flex-shrink-0 bg-gray-50">${String.fromCharCode(65 + i)}</div>
                        <div class="text-gray-700 leading-relaxed math-scroll flex-1">${opt}</div>
                    </label>
                </div>`;
            });
            html += `</div>`;
        } 
        // --- TRUE / FALSE ---
        else if (q.type === 'tf_cluster') {
            let displayContext = q.context;
            html += `<div class="flex items-center gap-3 mb-4 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-indigo-400 to-purple-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-black text-lg shadow-sm">II</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 tracking-wide uppercase">Trắc nghiệm ĐÚNG/SAI</h3></div>`;
            html += `<div class="bg-indigo-50 text-indigo-900 p-4 rounded-xl font-bold mb-4 border-2 border-indigo-200 text-base leading-relaxed math-scroll">${displayContext}</div>`;
            html += `<div class="space-y-3 mt-4">`;
            q.items.forEach((item) => {
                const combinedId = q.id + '_' + item.id;
                let ans = userAnswers[combinedId];
                let btnT = ans === true ? 'selected' : ''; 
                let btnF = ans === false ? 'selected' : ''; 

                html += `<div class="p-4 border-2 border-gray-100 rounded-xl bg-white shadow-sm flex flex-col xl:flex-row xl:items-center justify-between gap-4 transition-all hover:border-indigo-300">
                    <div class="font-bold text-gray-800 flex-1 text-sm md:text-base math-scroll leading-relaxed">${item.text}</div>
                    <div class="flex gap-3 shrink-0">
                        <button onclick="window.selectAnswer('${combinedId}', true, 'tf')" class="btn-tf w-24 py-2.5 rounded-lg font-black text-sm border-2 ${btnT}">ĐÚNG</button>
                        <button onclick="window.selectAnswer('${combinedId}', false, 'tf')" class="btn-tf w-24 py-2.5 rounded-lg font-black text-sm border-2 ${btnF}">SAI</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        } 
        // --- SHORT ANSWER ---
        else if (q.type === 'short_answer') {
            let uAns = userAnswers[q.id] || "";
            html += `<div class="flex items-center gap-3 mb-4 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-orange-400 to-red-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-black text-lg shadow-sm">III</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-600 tracking-wide uppercase">Câu trả lời ngắn</h3></div>`;
            html += `<div class="bg-orange-50 text-orange-900 p-4 rounded-xl font-bold mb-4 border-2 border-orange-200 text-base leading-relaxed math-scroll">${q.question}</div>`;
          html += `<div class="answer-submission-box">
        <label class="answer-label" for="short_ans_${q.id}">NHẬP KẾT QUẢ CUỐI CÙNG CỦA BẠN:</label>
        <textarea id="short_ans_${q.id}" class="answer-input" placeholder="Nhập đáp án tại đây..." onblur="window.selectAnswer('${q.id}', this.value, 'short_answer')">${uAns}</textarea>
        
        <button type="button" class="btn-submit-explain" onclick="
            document.getElementById('explain_${q.id}').style.display='block'; 
            this.style.backgroundColor='#475569'; 
            this.innerText='Đã nộp bài & Đang xem giải thích';
        ">Nộp câu trả lời & Xem giải thích</button>
        
        <div id="explain_${q.id}" style="display: none; margin-top: 20px; padding: 20px; background-color: #f0fdf4; border: 2px solid #bbf7d0; border-radius: 12px;">
            <p style="font-size: 20px; font-weight: bold; color: #dc2626; margin-bottom: 12px; text-transform: uppercase;">
                🎯 Đáp án đúng: ${q.correct}
            </p>
            <div style="font-size: 18px; color: #166534; line-height: 1.6;">
                ${q.explanation}
            </div>
        </div>
    </div>`;
        }

        html += `</div>`;
        container.innerHTML = html;
        window.updateNav();
        window.updateProgress();
    };

    window.updateNav = function() {
        const pBtn = document.getElementById('prev-btn');
        const nBtn = document.getElementById('next-btn');
        const sBtn = document.getElementById('submit-btn');
        if(pBtn) pBtn.style.display = (currentIdx === 0) ? 'none' : 'block';
        if(nBtn) nBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'none' : 'block';
        if(sBtn) sBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'block' : 'none';
    };

    window.updateProgress = function() {
        const pgText = document.getElementById('progress-text');
        if(pgText) pgText.innerText = `${getAnsweredCount()}/${getTotalScoreItems()}`;
    };

    function formatDuration(sec) {
        const m = Math.floor(sec / 60); const s = sec % 60;
        return `${m}p ${s}s`;
    }

    // CHẤM ĐIỂM
    window.submitQuiz = function() {
        if (!isQuizStarted) return; 
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        // Buộc lưu input cuối nếu user chưa click ra ngoài
        const currentQ = currentQuestions[currentIdx];
        if (currentQ.type === 'short_answer') {
            const inputEl = document.getElementById(`short_ans_${currentQ.id}`);
            if (inputEl) userAnswers[currentQ.id] = inputEl.value.trim();
        }

        let score = 0;

        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                if (userAnswers[q.id] === q.correct) score += 0.25; 
            } else if (q.type === 'tf_cluster') {
                let c = 0;
                q.items.forEach(item => { if (userAnswers[q.id + '_' + item.id] === item.correct) c++; });
                
                if (c === 1) score += 0.1;
                else if (c === 2) score += 0.25;
                else if (c === 3) score += 0.75;
                else if (c === 4) score += 1.0;
            } else if (q.type === 'short_answer') {
                let uAnsStr = String(userAnswers[q.id] || "").trim().toLowerCase();
                let cAnsStr = String(q.correct).trim().toLowerCase();
                if (uAnsStr === cAnsStr) score += 0.25;
            }
        });

        score = score.toFixed(2); 

        const record = {
            hoTen: currentStudent.hoTen, lop: currentStudent.lop, tenDe: currentStudent.tenDe,
            diem: parseFloat(score),
            startTime: quizStartTime.toLocaleTimeString(), endTime: quizEndTime.toLocaleTimeString(),
            duration: formatDuration(Math.floor((quizEndTime - quizStartTime) / 1000)),
            thoiGian: new Date().toISOString(), deviceId: deviceId
        };
        
        if(database) {
            scoresRef.push(record, () => { window.showModalResult(score, record.duration); });
        } else {
            // Backup nếu không có net
            window.showModalResult(score, record.duration);
        }
    };

    window.showModalResult = function(score, dur) {
        ['login', 'quiz', 'scores', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const resEl = document.getElementById('result-section');
        if(resEl) resEl.classList.remove('hidden');
        const contentEl = document.getElementById('result-content');
        if(contentEl) contentEl.innerHTML = `
        <div class="absolute top-3 left-3 z-50">
            <button onclick="window.goHome()" class="px-3 py-2 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-sm border-2 border-gray-200 text-sm flex items-center gap-2">🏠 Trang chủ</button>
        </div>
        <div class="text-center mt-10 sm:mt-6">
            <div class="text-5xl sm:text-6xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-emerald-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2"><span class="font-black text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - Lớp ${currentStudent.lop}</span><br><span class="text-sm font-bold text-gray-400 mt-1 block">${currentStudent.tenDe}</span></p>
        </div>
        <div class="bg-blue-50 border-2 border-blue-200 rounded-2xl p-6 mb-6 shadow-inner relative text-center">
            <div class="text-sm text-blue-500 font-black mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
            <div class="text-5xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
            <div class="text-sm sm:text-base font-bold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm border-2 border-blue-200">Thời gian làm bài: ${dur}</div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-2">
            <button onclick="window.reviewQuiz()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-bold shadow-sm hover:shadow-md transition-all text-base border-2 border-indigo-400">👀 Xem lại & Giải chi tiết</button>
            <button onclick="window.viewScoresAction()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-600 text-white rounded-xl font-bold shadow-sm hover:shadow-md transition-all text-base border-2 border-orange-400">🏆 Bảng Xếp Hạng</button>
        </div>`;
    };

    window.reviewQuiz = function() {
        showSection('review');
        const container = document.getElementById('review-content');
        if(!container) return;
        let html = '';

        currentQuestions.forEach((q) => {
            if (q.type === 'single') {
                let uAns = userAnswers[q.id];
                let isCorrect = uAns === q.correct;
                let borderColor = isCorrect ? 'border-emerald-400 bg-emerald-50' : 'border-red-400 bg-red-50';
                let explanation = q.explanation;
                
                let statusText = uAns === undefined ? '⚠️ Chưa làm' : (isCorrect ? '✅ Bạn làm đúng!' : '❌ Bạn làm sai!');
                let statusClass = uAns === undefined ? 'text-orange-500 bg-orange-50 border-orange-300' : (isCorrect ? 'text-emerald-700 bg-emerald-50 border-emerald-300' : 'text-red-700 bg-red-50 border-red-300');
                if (uAns === undefined) borderColor = 'border-orange-400 bg-orange-50';

                html += `<div class="p-5 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor} relative mt-5 text-left">`;
                html += `<div class="absolute -top-4 right-4 px-4 py-1 rounded-xl border-2 ${statusClass} font-bold text-sm shadow-sm tracking-wide bg-white">${statusText}</div>`;
                html += `<div class="font-bold text-lg sm:text-xl text-slate-800 mb-4 leading-relaxed math-scroll mt-2">${q.question}</div>`;
                html += `<div class="space-y-3">`;
                
                q.options.forEach((opt, i) => {
                    let optBg = ''; let iconHtml = ''; let textStyle = 'font-semibold';
                    if (q.correct === i) {
                        optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                        iconHtml = '<div class="text-xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                        textStyle = 'font-bold text-base';
                    } else if (uAns === i && !isCorrect) {
                        optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                        iconHtml = '<div class="text-xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                        textStyle = 'font-bold text-base line-through decoration-red-500 decoration-2';
                    } else { 
                        optBg = 'bg-white text-slate-700 border border-slate-200'; 
                    }

                    let letterBg = (q.correct === i) ? 'bg-emerald-200 text-emerald-800' : ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');
                    html += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                <div class="${textStyle} flex-1 math-scroll text-left text-sm sm:text-base">${opt}</div>
                                ${iconHtml}
                            </div>`;
                });
                html += `</div>`;
                if (q.explanation) html += `<div class="mt-4 pt-4 border-t-2 border-gray-200"><p class="text-sm font-bold uppercase tracking-widest text-blue-600 mb-2">💡 Giải chi tiết:</p><p class="text-black font-semibold text-sm leading-loose math-scroll text-left">${explanation}</p></div>`;
                html += `</div>`;
            } 
            else if (q.type === 'tf_cluster') {
                let displayContext = q.context;
                html += `<div class="p-5 sm:p-6 border-2 border-indigo-300 bg-indigo-50 rounded-2xl shadow-sm mb-6 text-left mt-5">`;
                html += `<div class="font-bold text-lg sm:text-xl text-indigo-900 mb-4 math-scroll leading-relaxed">${displayContext}</div>`;
                html += `<div class="space-y-4">`;
                q.items.forEach(item => {
                    let uAns = userAnswers[q.id + '_' + item.id];
                    let isCorrect = uAns === item.correct;
                    let ansText = item.correct ? 'ĐÚNG' : 'SAI';
                    
                    let statusText = uAns === undefined ? '⚠️ Chưa làm' : (isCorrect ? '✅ Đúng!' : '❌ Sai!');
                    let statusColor = uAns === undefined ? 'text-orange-600 border-orange-300 bg-orange-50' : (isCorrect ? 'text-emerald-700 border-emerald-300 bg-emerald-50' : 'text-red-700 border-red-300 bg-red-50');

                    html += `<div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm">
                        <div class="font-bold text-base text-gray-800 math-scroll mb-3 leading-relaxed">${item.text}</div>
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b-2 border-gray-100 pb-3 gap-3">
                            <span class="text-sm font-semibold text-gray-500">Bạn chọn: <span class="${uAns === undefined ? 'text-gray-400' : 'text-blue-700'} font-black text-base uppercase ${!isCorrect && uAns !== undefined ? 'line-through decoration-red-500 decoration-2 text-red-500' : ''}">${uAns === undefined ? '...' : (uAns?'Đúng':'Sai')}</span></span>
                            <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border-2 border-emerald-200">ĐÁP ÁN: ${ansText}</span>
                            <span class="font-bold text-sm ${statusColor} px-3 py-1 rounded-lg border-2 text-center">${statusText}</span>
                        </div>
                        <div class="mt-3 pt-1 text-sm text-gray-700 font-semibold leading-relaxed math-scroll"><span class="text-indigo-600 font-bold uppercase">Giải chi tiết:</span><br> ${item.expl}</div>
                    </div>`;
                });
                html += `</div></div>`;
            }
            else if (q.type === 'short_answer') {
                let uAnsStr = String(userAnswers[q.id] || "").trim();
                let cAnsStr = String(q.correct).trim();
                let isCorrect = uAnsStr.toLowerCase() === cAnsStr.toLowerCase();
                
                let borderColor = isCorrect ? 'border-emerald-400 bg-emerald-50' : 'border-red-400 bg-red-50';
                let statusText = uAnsStr === "" ? '⚠️ Chưa làm' : (isCorrect ? '✅ Chính xác!' : '❌ Sai rồi!');
                let statusClass = uAnsStr === "" ? 'text-orange-500 bg-orange-50 border-orange-300' : (isCorrect ? 'text-emerald-700 bg-emerald-50 border-emerald-300' : 'text-red-700 bg-red-50 border-red-300');
                if (uAnsStr === "") borderColor = 'border-orange-400 bg-orange-50';

                html += `<div class="p-5 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor} relative mt-5 text-left">`;
                html += `<div class="absolute -top-4 right-4 px-4 py-1 rounded-xl border-2 ${statusClass} font-bold text-sm shadow-sm tracking-wide bg-white">${statusText}</div>`;
                html += `<div class="font-bold text-lg sm:text-xl text-slate-800 mb-4 leading-relaxed math-scroll mt-2">${q.question}</div>`;
                html += `<div class="flex flex-col md:flex-row gap-4 mt-3">
                            <div class="flex-1 p-4 bg-white border-2 border-gray-200 rounded-xl text-center">
                                <div class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Đáp án của bạn</div>
                                <div class="text-2xl font-black ${isCorrect ? 'text-emerald-600' : 'text-red-600 line-through decoration-2 decoration-red-500'}">${uAnsStr || '---'}</div>
                            </div>
                            <div class="flex-1 p-4 bg-emerald-50 border-2 border-emerald-300 rounded-xl text-center">
                                <div class="text-xs font-bold text-emerald-600 uppercase tracking-widest mb-1">Đáp án chuẩn</div>
                                <div class="text-2xl font-black text-emerald-700">${cAnsStr}</div>
                            </div>
                         </div>`;
                html += `<div class="mt-4 pt-4 border-t-2 border-gray-200"><p class="text-sm font-bold uppercase tracking-widest text-blue-600 mb-2">💡 Giải chi tiết:</p><p class="text-black font-semibold text-sm leading-loose math-scroll text-left">${q.explanation}</p></div>`;
                html += `</div>`;
            }
        });
        container.innerHTML = html;
    };

    window.backToResult = function() { showSection('result'); };

    window.renderScores = function() {
        const tbody = document.getElementById('scores-tbody');
        if(!tbody) return;
        if (allScores.length === 0) { tbody.innerHTML = ''; document.getElementById('no-scores').classList.remove('hidden'); return; }
        const noScore = document.getElementById('no-scores');
        if(noScore) noScore.classList.add('hidden');
        const sorted = [...allScores].sort((a, b) => (a.lop.localeCompare(b.lop)) || (b.diem - a.diem));
        tbody.innerHTML = sorted.map((s, idx) => `<tr class="${s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-slate-50'} transition-colors border-b border-slate-100"><td class="px-3 py-3 text-center font-bold text-slate-400 text-sm">#${idx + 1}</td><td class="px-3 py-3 font-bold text-blue-600 text-sm">${s.lop}</td><td class="px-3 py-3 font-bold text-slate-800 text-sm">${s.hoTen} ${s.deviceId === deviceId ? '<span class="ml-2 bg-pink-500 text-white text-[10px] px-2 py-0.5 rounded-md uppercase tracking-wider">Bạn</span>' : ''}</td><td class="px-3 py-3 text-xs font-bold text-blue-500"><span class="bg-blue-50 border border-blue-200 px-2 py-1 rounded-lg">${s.tenDe}</span></td><td class="px-3 py-3 text-center"><span class="font-black text-xl ${s.diem >= 5 ? 'text-emerald-600' : 'text-red-500'}">${s.diem}</span></td><td class="px-3 py-3 text-center text-slate-500 text-xs font-semibold">${s.startTime}</td><td class="px-3 py-3 text-center text-slate-500 text-xs font-semibold">${s.endTime}</td><td class="px-3 py-3 text-right font-bold text-orange-600 text-xs">${s.duration}</td>
            <td class="px-3 py-3 text-right text-xs text-slate-500 font-semibold">${s.thoiGian ? new Date(s.thoiGian).toLocaleDateString('vi-VN') : '--/--/----'}</td></tr>`).join('');
    };

    function showSection(id) {
        ['login', 'quiz', 'scores', 'result', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const tgt = document.getElementById(id+'-section');
        if(tgt) tgt.classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        if(!display) return;
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) window.submitQuiz();
        }, 1000);
    }

    try {
        if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
        deviceId = localStorage.getItem('deviceId');
    } catch (e) { deviceId = 'dev_temp_' + Math.random().toString(36).substr(2); }
  </script>
 </body>
</html>
