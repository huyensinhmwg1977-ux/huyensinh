    const de9_data = [
        // --- PHẦN I ---
        { id: "9_1", type: "single", question: "Câu 1. Sau khi thành lập, người đầu tiên được cử đứng đầu Liên bang Cộng hoà xã hội chủ nghĩa Xô viết là", options: ["Lê-nin.", "Xta-lin.", "Pu-tin.", "Goóc-ba-chốp."], correct: 0, explanation: "Sau khi Liên Xô được thành lập, V.I. Lê-nin là người đứng đầu chính phủ Liên Xô đầu tiên." },
        { id: "9_2", type: "single", question: "Câu 2. Sau cuộc chiến đấu chống \"thù trong, giặc ngoài” (đầu năm 1918 – cuối năm 1920), nhiệm vụ đặt ra cho chính quyền Xô viết là", options: ["đập tan bộ máy nhà nước cũ, xây dựng nhà nước mới của những người lao động.", "khôi phục kinh tế, xây dựng chủ nghĩa xã hội và bảo vệ đất nước.", "thực hiện các quyền tự do, dân chủ.", "cải cách dân chủ trên các lĩnh vực kinh tế, chính trị, xã hội."], correct: 1, explanation: "Sau chiến tranh bảo vệ Tổ quốc, nước Nga Xô viết chuyển sang thời kì hòa bình với nhiệm vụ khôi phục nền kinh tế và xây dựng chủ nghĩa xã hội." },

        { id: "9_5", type: "single", question: "Câu 5. Nội dung nào sau đây không phải là quyết định của Hội nghị I-an-ta (02 – 1945)?", options: ["Thống nhất mục tiêu chung là tiêu diệt tận gốc chủ nghĩa phát xít Đức và chủ nghĩa quân phiệt Nhật.", "Giải giáp quân đội Nhật ở Đông Dương được giao cho quân đội Anh và quân đội Trung Hoa Dân quốc.", "Thoả thuận về việc đóng quân tại các nước nhằm giải giáp quân đội phát xít, phân chia phạm vi ảnh hưởng ở châu Âu và châu Á.", "Thành lập tổ chức Liên hợp quốc nhằm duy trì hoà bình và an ninh thế giới."], correct: 1, explanation: "Việc giao cho Anh và Trung Hoa Dân quốc giải giáp quân Nhật ở Đông Dương là quyết định của Hội nghị Pốt-xđam (7/1945), không phải I-an-ta." },
        { id: "9_6", type: "single", question: "Câu 6. Từ ngày 25 - 4 - 1945 đến ngày 26 - 6 - 1945, 50 nước họp tại Xan Phran-xi-xcô (Mỹ) đã thông qua văn bản nào sau đây?", options: ["Chương trình 14 điểm.", "Tuyên cáo kêu gọi Nhật Bản đầu hàng.", "Hiến chương Liên hợp quốc.", "Hiệp ước cấm phổ biến vũ khí hạt nhân."], correct: 2, explanation: "Hội nghị San Francisco (Xan Phran-xi-xcô) đã thông qua Hiến chương Liên hợp quốc." },
        { id: "9_7", type: "single", question: "Câu 7. Nội dung nào sau đây là đặc điểm nổi bật của trật tự thế giới mới được hình thành sau Chiến tranh thế giới thứ hai?", options: ["Một trật tự thế giới được thiết lập trên cơ sở nước thắng trận thống trị nước bại trận.", "Xác lập trật tự thế giới mới của các nước tư bản chủ nghĩa do Mỹ đứng đầu, chi phối.", "Hình thành trật tự thế giới hai cực đối lập: cực Liên Xô và cực Mỹ đứng đầu mỗi bên.", "Trật tự thế giới được thiết lập trên cơ sở các nước thắng trận đoàn kết, đồng thuận."], correct: 2, explanation: "Sau Chiến tranh thế giới thứ hai, trật tự thế giới hai cực I-an-ta được hình thành, đứng đầu là Mỹ và Liên Xô." },
        { id: "9_8", type: "single", question: "Câu 8. Văn kiện đầu tiên đề xuất ý tưởng xây dựng Cộng đồng ASEAN là", options: ["Hiến chương ASEAN.", "Tầm nhìn ASEAN 2020.", "Tuyên bố ASEAN.", "Tuyên bố Cu-a-la Lăm-po."], correct: 1, explanation: "Văn kiện Tầm nhìn ASEAN 2020 được thông qua năm 1997 là văn kiện đầu tiên đề xuất ý tưởng xây dựng Cộng đồng ASEAN." },
        { id: "9_9", type: "single", question: "Câu 9. Một trong những nội dung chính của Cộng đồng Văn hoá – Xã hội ASEAN (ASCC) là", options: ["phát triển con người.", "tạo dựng một khu vực gắn kết.", "xây dựng khu vực kinh tế có sức cạnh tranh.", "thúc đẩy hoà bình và ổn định khu vực."], correct: 0, explanation: "Phát triển con người là một trong những trọng tâm cốt lõi của Cộng đồng Văn hóa - Xã hội ASEAN (ASCC)." },
      

{ id: "9_10", type: "single", question: "Câu 10. Nguyên tắc cơ bản chi phối hoạt động của Cộng đồng Chính trị – An ninh ASEAN (APSC) là", options: ["sự đồng thuận giữa các nước thành viên.", "bình đẳng chủ quyền của tất cả các quốc gia thành viên.", "giải quyết các tranh chấp bằng biện pháp hoà bình.", "không can thiệp vào công việc nội bộ của nhau."], correct: 0, explanation: "Nguyên tắc cơ bản chi phối hoạt động của Cộng đồng Chính trị – An ninh ASEAN (APSC) là dựa trên sự đồng thuận của các nước thành viên (Phương thức ASEAN)." },




        { id: "9_11", type: "single", question: "Câu 11. Nội dung nào sau đây là một trong những chủ trương của Hội nghị toàn quốc của Đảng Cộng sản Đông Dương từ ngày 14 đến ngày 15-8-1945?", options: ["Thành lập Uỷ ban Khởi nghĩa toàn quốc.", "Phát động cao trào kháng Nhật, cứu nước.", "Thông qua kế hoạch lãnh đạo toàn dân Tổng khởi nghĩa.", "Cử ra Uỷ ban Dân tộc giải phóng Việt Nam do Hồ Chí Minh làm Chủ tịch."], correct: 2, explanation: "Hội nghị toàn quốc của Đảng tại Tân Trào đã quyết định phát động Tổng khởi nghĩa giành chính quyền trước khi quân Đồng minh vào Đông Dương." },
        { id: "9_12", type: "single", question: "Câu 12. Ngày 06 – 3 – 1946, Chủ tịch Hồ Chí Minh kí với đại diện Chính phủ Pháp văn bản ngoại giao nào sau đây?", options: ["Hiệp định Pa-ri.", "Tạm ước.", "Hiệp định Giơ-ne-vơ.", "Hiệp định Sơ bộ."], correct: 3, explanation: "Ngày 6-3-1946, Chủ tịch Hồ Chí Minh thay mặt Chính phủ Việt Nam kí với đại diện Chính phủ Pháp bản Hiệp định Sơ bộ." },
        { id: "9_13", type: "single", question: "Câu 13. Sự kiện nào sau đây đánh dấu cuộc kháng chiến chống thực dân Pháp (1945 – 1954) hoàn toàn thắng lợi?", options: ["Hiệp định Pa-ri được kí kết.", "Hiệp định Giơ-ne-vơ được kí kết.", "Chiến dịch Điện Biên Phủ thắng lợi.", "Hà Nội được giải phóng."], correct: 1, explanation: "Hiệp định Giơ-ne-vơ (1954) về chấm dứt chiến tranh, lập lại hòa bình ở Đông Dương là văn bản pháp lí quốc tế đánh dấu thắng lợi hoàn toàn của cuộc kháng chiến chống Pháp." },
        { id: "9_14", type: "single", question: "Câu 14. Nội dung nào sau đây phản ánh không đúng một trong những nguyên nhân thắng lợi của cuộc kháng chiến chống thực dân Pháp (1945 – 1954)?", options: ["Sự lãnh đạo sáng suốt của Đảng Cộng sản Đông Dương (từ năm 1951 là Đảng Lao động Việt Nam), đứng đầu là Chủ tịch Hồ Chí Minh.", "Hậu phương kháng chiến được xây dựng vững chắc.", "Sự viện trợ, giúp đỡ của các nước Tây Âu.", "Tinh thần đoàn kết chiến đấu của nhân dân ba nước Đông Dương."], correct: 2, explanation: "Trong KCCP, Việt Nam nhận được sự giúp đỡ của Liên Xô, Trung Quốc và các nước XHCN, không phải từ các nước tư bản Tây Âu." },
        { id: "9_15", type: "single", question: "Câu 15. Cuộc Tổng tiến công và nổi dậy Xuân Mậu Thân 1968 đã mở ra bước ngoặt cơ bản cho cuộc đấu tranh của nhân dân ta trên mặt trận ngoại giao vì", options: ["Mỹ phải chấm dứt không điều kiện chiến tranh phá hoại miền Bắc.", "làm lung lay ý chí xâm lược của quân Mỹ, buộc chúng phải tuyên bố “phi Mỹ hoá\" chiến tranh.", "đánh sụp lòng tin của quân đội Sài Gòn vào trang bị vũ khí hiện đại của Mỹ.", "giáng đòn nặng nề vào chiến lược “Việt Nam hoá chiến tranh\" của Mỹ."], correct: 1, explanation: "Thắng lợi của Mậu Thân 1968 buộc Mỹ phải tuyên bố \"phi Mỹ hóa\" chiến tranh, ngừng ném bom miền Bắc và chấp nhận đàm phán tại Paris, mở ra bước ngoặt về ngoại giao." },
        
{ id: "9_16", type: "single", question: "Câu 16. Nội dung nào sau đây thuộc về đổi mới trên lĩnh vực chính trị giai đoạn 1996 – 2006?", options: ["Xây dựng Nhà nước của nhân dân, do nhân dân và vì nhân dân, nâng cao hiệu lực quản lí của Nhà nước.", "Bảo đảm Nhà nước Việt Nam thực sự là của nhân dân, do nhân dân và vì nhân dân, do Đảng Cộng sản Việt Nam lãnh đạo.", "Tiếp tục cải cách bộ máy nhà nước, xây dựng nhà nước xã hội chủ nghĩa của dân, do dân và vì dân.", "Gắn liền tăng trưởng kinh tế với tiến bộ và công bằng xã hội, khuyến khích làm giàu hợp pháp."], correct: 2, explanation: "Trong giai đoạn này, đổi mới chính trị tập trung vào việc tiếp tục cải cách bộ máy nhà nước, xây dựng nhà nước xã hội chủ nghĩa của dân, do dân và vì dân." },



        { id: "9_17", type: "single", question: "Câu 17. Nội dung nào sau đây phản ánh đúng quốc sách hàng đầu trong đường lối Đổi mới ở Việt Nam?", options: ["Phát triển giáo dục – đào tạo và khoa học – công nghệ.", "Triển khai chính sách hỗ trợ người lao động gặp khó khăn.", "Đa dạng hoá các loại hình, sản phẩm văn hoá tinh thần.", "Thực hiện đa phương hoá, đa dạng hoá quan hệ đối ngoại."], correct: 0, explanation: "Đảng và Nhà nước ta luôn khẳng định giáo dục - đào tạo cùng với khoa học - công nghệ là quốc sách hàng đầu để phát triển đất nước." },
        { id: "9_18", type: "single", question: "Câu 18. Nội dung nào sau đây phản ánh điểm xuyên suốt về mục tiêu trong đường lối Đổi mới ở Việt Nam từ năm 1986 đến nay?", options: ["Thực hiện hoà bình, thống nhất hai miền về lãnh thổ, về nhà nước.", "Hoàn thành cuộc cách mạng dân tộc dân chủ nhân dân trong cả nước.", "Làm cho mục tiêu xã hội chủ nghĩa được thực hiện có hiệu quả hơn.", "Xoá bỏ tàn dư của chế độ phong kiến, thực hiện người cày có ruộng."], correct: 2, explanation: "Bản chất của Đổi mới không phải là thay đổi mục tiêu Chủ nghĩa xã hội mà là làm cho các mục tiêu đó được thực hiện hiệu quả hơn." },
        { id: "9_19", type: "single", question: "Câu 19. Hoạt động đối ngoại của Phan Bội Châu vào đầu thế kỉ XX diễn ra chủ yếu ở quốc gia nào?", options: ["Trung Quốc, Pháp.", "Trung Quốc, Thái Lan.", "Nhật Bản, Pháp.", "Nhật Bản, Trung Quốc."], correct: 3, explanation: "Phan Bội Châu chủ yếu hoạt động tại Nhật Bản (phong trào Đông Du) và sau đó là Trung Quốc (thành lập Việt Nam Quang phục hội)." },
        { id: "9_20", type: "single", question: "Câu 20. Hoạt động đối ngoại của Chính phủ Việt Nam Dân chủ Cộng hoà thời kì 1954 - 1975 có nhiệm vụ trọng tâm là", options: ["phục vụ cho cuộc kháng chiến chống Mỹ, cứu nước.", "phục vụ công cuộc xây dựng chủ nghĩa xã hội ở miền Bắc.", "tích cực mở rộng quan hệ với các nước tư bản chủ nghĩa phát triển.", "tích cực đóng góp vào công cuộc đổi mới, công nghiệp hoá."], correct: 0, explanation: "Nhiệm vụ bao trùm của toàn Đảng, toàn dân và ngoại giao trong giai đoạn này là chống Mỹ cứu nước, giải phóng miền Nam." },
        { id: "9_21", type: "single", question: "Câu 21. Hiệp định Pa-ri về chấm dứt chiến tranh, lập lại hoà bình ở Việt Nam (27-01-1973) đã đem lại thuận lợi gì cho cách mạng Việt Nam?", options: ["Cuộc kháng chiến của nhân dân ta nhận được sự ủng hộ to lớn của các nước xã hội chủ nghĩa.", "Quân Mỹ và quân Đồng minh phải rút về nước, làm thay đổi so sánh lực lượng có lợi cho cách mạng.", "Tạo điều kiện cho nhân dân ta hoàn thành công cuộc khôi phục kinh tế, hàn gắn vết thương chiến tranh.", "Tạo điều kiện để nhân dân hai miền Nam – Bắc thực hiện thống nhất đất nước."], correct: 1, explanation: "Việc Mỹ rút quân đã tạo ra sự thay đổi tương quan lực lượng hoàn toàn có lợi cho cách mạng miền Nam." },
        { id: "9_22", type: "single", question: "Câu 22. Năm 1920, Nguyễn Ái Quốc đã lựa chọn con đường cách mạng nào sau đây?", options: ["Cách mạng tư sản.", "Cách mạng dân chủ.", "Cách mạng vô sản.", "Kết hợp giữa cách mạng tư sản với vô sản."], correct: 2, explanation: "Năm 1920, sau khi đọc Sơ thảo luận cương của Lê-nin, Nguyễn Ái Quốc đã tìm thấy con đường cứu nước đúng đắn: con đường cách mạng vô sản." },
        { id: "9_23", type: "single", question: "Câu 23. Nhân dân thế giới đánh giá cao và tôn vinh Chủ tịch Hồ Chí Minh vì lí do nào sau đây?", options: ["Hồ Chí Minh có những đóng góp riêng trong lĩnh vực văn hoá.", "Hồ Chí Minh có những đóng góp riêng trong lĩnh vực quân sự.", "Hồ Chí Minh tiêu biểu cho ý chí và khát vọng độc lập của nhân loại.", "Hồ Chí Minh tham gia vào sự nghiệp giáo dục của nhiều quốc gia."], correct: 2, explanation: "Hồ Chí Minh không chỉ giải phóng dân tộc Việt Nam mà còn là biểu tượng cho khát vọng độc lập, tự do của các dân tộc bị áp bức trên thế giới." },
        { id: "9_24", type: "single", question: "Câu 24. Toàn dân Việt Nam kính yêu, quý trọng Chủ tịch Hồ Chí Minh được thể hiện thiết thực nhất qua phong trào", options: ["“Cả nước chung tay vì người nghèo\".", "\"Học tập và làm theo tư tưởng, đạo đức, phong cách Hồ Chí Minh\".", "“Cả nước chung sức xây dựng nông thôn mới\".", "\"Cán bộ, công chức, viên chức thi đua thực hiện văn hoá công sở\"."], correct: 1, explanation: "Đây là phong trào thi đua xuyên suốt được phát động để toàn Đảng, toàn dân noi gương Chủ tịch Hồ Chí Minh." },

        // --- PHẦN II (ĐÚNG/SAI) ---
        { id: "9_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>\"Không giống như Liên minh châu Âu (EU), ASEAN không theo đuổi mô hình siêu quốc gia, không có quốc hội và toà án chung. Hợp tác ASEAN thường dựa vào các thoả thuận lỏng và không chính thức, quan hệ cá nhân giữa các nhà lãnh đạo và quan chức, sự đồng thuận và lợi ích chung, hơn là các cam kết có tính ràng buộc. Cựu Bộ trưởng Ngoại giao In-đô-nê-xi-a Mốc-ta Ku-su-ma-át-ma-gia đã có nhận xét: “Bản chất sự hợp tác khu vực giữa các nước thành viên là lỏng lẻo, một sự hợp tác thật sự tự nguyện giữa các nước có chủ quyền, không có các cơ quan siêu quốc gia hoặc các thể chế. Về hình thức, nó thật sự là một Hiệp hội chứ không phải là một tổ chức\".<br><span class='italic text-sm'>(Tầm nhìn và triển vọng của ASEAN sau năm 2025)</span>", items: [
            { id: "a", text: "a) ASEAN hoạt động theo cơ chế đảm bảo sự đồng thuận dựa trên sự đoàn kết giữa tất cả các quốc gia thành viên.", correct: false, expl: "Sai. Cơ chế của ASEAN linh hoạt, tự nguyện và chấp nhận sự đa dạng. Sự đoàn kết tuyệt đối giữa tất cả các thành viên trong mọi vấn đề không phải là đặc điểm hoạt động xuyên suốt." },
            { id: "b", text: "b) ASEAN là một Hiệp hội khá lỏng lẻo về mặt pháp lí, song lại chặt chẽ về nguyên tắc, tiến triển dần dần và biến chuyển linh hoạt theo phương thức bình đẳng và đồng thuận trong mọi quyết định.", correct: true, expl: "Đúng. Đây là mô tả chính xác về 'Phương cách ASEAN' (ASEAN Way)." },
            { id: "c", text: "c) Hợp tác là nguyên tắc bảo đảm không một quốc gia thành viên nào bị \"gạt ra ngoài lề\" trong những vấn đề quan trọng của tiến trình phát triển ASEAN.", correct: false, expl: "Sai. Không có nguyên tắc nào khẳng định điều này trong đoạn tư liệu cũng như thực tiễn lịch sử." },
            { id: "d", text: "d) Nguyên tắc “đồng thuận\" là một trong những giá trị cốt lõi của ASEAN, đã trở thành một phần quan trọng trong bản sắc của ASEAN.", correct: true, expl: "Đúng. Đồng thuận là yếu tố then chốt giúp duy trì sự tồn tại và phát triển của ASEAN." }
        ]},
        { id: "9_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>\"Đấu tranh quân sự và đấu tranh chính trị ở miền Nam là nhân tố chủ yếu quyết định thắng lợi trên chiến trường, làm cơ sở cho thắng lợi trên mặt trận ngoại giao. Chúng ta chỉ có thể giành được trên bàn hội nghị những cái mà chúng ta đã giành trên chiến trường. Tuy nhiên, đấu tranh ngoại giao không chỉ đơn thuần phản ánh cuộc đấu tranh trên chiến trường, mà trong tình hình quốc tế hiện nay với tính chất cuộc chiến tranh giữa ta và địch, đấu tranh ngoại giao giữ một vai trò quan trọng, tích cực và chủ động\".<br><span class='italic text-sm'>(Văn kiện Đảng toàn tập, tập 28)</span>", items: [
            { id: "a", text: "a) Trong cuộc kháng chiến chống Mỹ, cứu nước (1954 – 1975), chủ trương của Đảng là kết hợp đấu tranh quân sự, chính trị và ngoại giao.", correct: true, expl: "Đúng. Sự kết hợp chặt chẽ 3 mặt trận là đường lối chủ đạo của Đảng." },
            { id: "b", text: "b) Đấu tranh quân sự, chính trị giữ vai trò quyết định thắng lợi trên chiến trường, chi phối thắng lợi trên bàn đàm phán ngoại giao theo nguyên tắc tích cực và chủ động.", correct: true, expl: "Đúng. 'Chỉ có thể giành được trên bàn hội nghị những cái mà chúng ta đã giành trên chiến trường'." },
            { id: "c", text: "c) Việc kết hợp đấu tranh quân sự, chính trị vào ngoại giao được tiến hành ngay từ khi bắt đầu cuộc kháng chiến chống Mỹ, cứu nước.", correct: false, expl: "Sai. Mặt trận ngoại giao chỉ thực sự mở ra và quyết liệt từ sau thắng lợi Mậu Thân 1968." },

        { id: "9_II_3", type: "tf_cluster", context: "Câu 3. Cho những thông tin trong bảng sau đây:<br>04-3-1975: Quân Giải phóng đánh nghi binh ở Pleiku và Kon Tum.<br>10-3-1975: Quân Giải phóng tiến công quân đội Sài Gòn ở Buôn Ma Thuột và giành thắng lợi.<br>12-3-1975: Quân đội Sài Gòn tập trung lực lượng hòng tái chiếm Buôn Ma Thuột nhưng không thành.<br>14-3-1975: Tổng thống chính quyền Sài Gòn là Nguyễn Văn Thiệu ra lệnh rút quân khỏi Tây Nguyên.<br>24-3-1975: Toàn bộ Tây Nguyên với hơn 60 vạn dân được giải phóng.", items: [

            { id: "d", text: "d) Chính quyền, quân đội Sài Gòn đã mắc phải sai lầm về chiến thuật và chiến lược.", correct: false, expl: "Sai. Quyết định rút khỏi Tây Nguyên là sai lầm chiến lược, không đơn thuần là sai lầm chiến thuật." }

        { id: "9_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>Nghị quyết số 24C/18.6.5 ngày 20 – 11 – 1987 của UNESCO đã khẳng định Chủ tịch Hồ Chí Minh là \"anh hùng giải phóng dân tộc và nhà văn hoá kiệt xuất của Việt Nam\". Người đã có “những đóng góp quan trọng và nhiều mặt trên các lĩnh vực văn hoá, giáo dục và nghệ thuật.... Người là “sự kết tinh của truyền thống văn hoá hàng ngàn năm của nhân dân Việt Nam, và những tư tưởng của Người là hiện thân của những khát vọng của các dân tộc mong muốn được khẳng định bản sắc văn hoá của mình và mong muốn tăng cường sự hiểu biết lẫn nhau giữa các dân tộc...\".", items: [
            { id: "a", text: "a) UNESCO tôn vinh Chủ tịch Hồ Chí Minh là anh hùng giải phóng dân tộc và nhà văn hoá kiệt xuất của Việt Nam.", correct: true, expl: "Đúng. Đây là sự ghi nhận xứng đáng của tổ chức quốc tế." },
            { id: "b", text: "b) Tên của Chủ tịch Hồ Chí Minh được đặt cho nhiều quảng trường, đường phố ở tất cả các quốc gia trên thế giới.", correct: false, expl: "Sai. Không phải 'tất cả các quốc gia' trên thế giới đều đặt tên Người." },
            { id: "c", text: "c) Chủ tịch Hồ Chí Minh có những đóng góp quan trọng trong lĩnh vực quân sự cho thế giới.", correct: false, expl: "Sai. Đoạn trích của UNESCO đánh giá cao cống hiến về văn hóa, nghệ thuật chứ không đề cập đến quân sự thế giới." },
            { id: "d", text: "d) Chủ tịch Hồ Chí Minh được UNESCO vinh danh là \"anh hùng giải phóng dân tộc và nhà văn hoá kiệt xuất của Việt Nam\" do đã góp phần vào sự nghiệp đấu tranh vì hoà bình, dân chủ, tự do và tiến bộ xã hội trên thế giới.", correct: true, expl: "Đúng. Sự cống hiến của Người vượt ra ngoài phạm vi quốc gia, có sức lan tỏa toàn cầu." }

        { id: "10_14", type: "single", question: "Câu 14. Trong chiến lược “Chiến tranh đặc biệt\" (1961 – 1965) ở miền Nam Việt Nam, Mỹ đã sử dụng chiến thuật quân sự nào sau đây?", options: ["Dồn dân lập \"ấp chiến lược\".", "“Trực thăng vận\", \"thiết xa vận\".", "Mở các cuộc hành quân \"tìm diệt\".", "\"Bình định miền Nam trong 18 tháng\"."], correct: 1, explanation: "Dựa vào ưu thế cơ động đường không và hỏa lực, Mỹ đã áp dụng triệt để chiến thuật \"trực thăng vận\", \"thiết xa vận\" hòng tiêu diệt nhanh lực lượng vũ trang cách mạng." },
       { id: "10_15", type: "single", question: "Câu 15. Yếu tố nào sau đây đã tác động đến công cuộc đấu tranh bảo vệ Tổ quốc từ năm 1945?", options: ["Mỹ trở thành siêu cường, có sức mạnh vượt trội.", "Mỹ ra sức chống phá các nước xã hội chủ nghĩa.", "Xu thế hoà hoãn Đông – Tây tiếp tục diễn ra.", "Cuộc chạy đua vũ trang giữa các cường quốc lớn."], correct: 2, explanation: "Xu thế hòa hoãn Đông - Tây xuất hiện và tiếp tục diễn ra đã có những tác động quan trọng đến quá trình đấu tranh và ngoại giao bảo vệ Tổ quốc của nhân dân ta." },





        { id: "10_16", type: "single", question: "Câu 16. Hình thức tiến công của Chiến dịch Hồ Chí Minh (1975) có điểm khác biệt so với chiến dịch Điện Biên Phủ (1954) là", options: ["cuộc tiến công của lực lượng vũ trang, có sự hỗ trợ của lực lượng chính trị.", "cuộc tiến công quân sự đồng loạt của lực lượng vũ trang trên các mặt trận.", "sự phối hợp của các quân, binh chủng có sự hỗ trợ của lực lượng biệt động.", "cuộc tiến công của lực lượng vũ trang với phong trào nổi dậy của quần群众."], correct: 3, explanation: "Nếu Điện Biên Phủ thuần túy là trận đọ sức quân sự quy mô lớn, thì Chiến dịch Hồ Chí Minh là đỉnh cao của nghệ thuật kết hợp: Tiến công quân sự của chủ lực đồng thời với sự Nổi dậy nổi dậy của quần chúng nhân dân để giải phóng các đô thị." },
        { id: "10_17", type: "single", question: "Câu 17. Khi thực hiện đường lối Đồi mới đất nước từ tháng 12-1986, Đảng Cộng sản Việt Nam chủ trương thực hiện chính sách đối ngoại nào?", options: ["Hoà bình, hữu nghị, hợp tác.", "Hoà bình, hữu nghị, trung lập.", "Hữu nghị, coi trọng hợp tác kinh tế.", "Hoà bình, mở rộng hợp tác về văn hoá."], correct: 0, explanation: "Nghị quyết Đại hội VI (1986) khẳng định chính sách đối ngoại của ta là: \"Hòa bình, độc lập, hữu nghị và hợp tác\", muốn làm bạn với tất cả các nước." },
        { id: "10_18", type: "single", question: "Câu 18. Đảng Cộng sản Đông Dương chủ trương thực hiện hoạt động đối ngoại nào trong giai đoạn 1941 – 1945?", options: ["Kí với Pháp Hiệp ước Sơ bộ, chủ trương \"hoà để tiến\".", "Ủng hộ Liên Xô và lực lượng Đồng minh chống phát xít.", "Kí Hiệp định Giơ-ne-vơ về chấm dứt chiến tranh, lập lại hoà bình ở Đông Dương.", "Kí Hiệp định Pa-ri về chấm dứt chiến tranh, lập lại hoà bình ở Việt Nam."], correct: 1, explanation: "Trong giai đoạn khốc liệt của Thế chiến II, Đảng ta xác định lập trường rõ ràng: đứng hẳn về phe dân chủ, ủng hộ Liên Xô và phe Đồng minh tiêu diệt chủ nghĩa phát xít." },
        { id: "10_19", type: "single", question: "Câu 19. Trước khi ASEAN ra đời, các tổ chức được thành lập ở khu vực Đông Nam Á chỉ tồn tại trong thời gian ngắn là do", options: ["không thống nhất được mục tiêu thành lập của tổ chức.", "chịu ảnh hưởng và sự can thiệp của các nước lớn.", "các quốc gia tham gia tổ chức khu vực chưa được độc lập hoàn toàn.", "bất đồng trong quan hệ song phương giữa các nước thành viên."], correct: 3, explanation: "Sự đổ vỡ nhanh chóng của ASA (1961) và MAPHILINDO (1963) là do các cuộc xung đột lãnh thổ, sắc tộc gay gắt giữa chính các nước thành viên trong nội khối." },
        { id: "10_20", type: "single", question: "Câu 20. Trong giai đoạn 1975-1985 hoạt động đối ngoại của Việt Nam với các nước Đông Nam Á không tập trung vào vấn đề nào?", options: ["Chủ động thiết lập quan hệ ngoại giao với các nước Đông Nam Á.", "Phát triển quan hệ hữu nghị, tình đoàn kết chiến đấu và hợp tác với Lào.", "Phát triển quan hệ hữu nghị, tình đoàn kết chiến đấu và hợp tác với Cam-pu-chia.", "Sẵn sàng thiết lập quan hệ hợp tác và phát triển với các nước khác ở Đông Nam Á."], correct: 0, explanation: "Giai đoạn này, do vấn đề Campuchia, quan hệ giữa Việt Nam và các nước ASEAN lâm vào tình trạng đối đầu căng thẳng, nên ta không có hoạt động \"chủ động thiết lập quan hệ ngoại giao\" thuận lợi." },
        { id: "10_21", type: "single", question: "Câu 21. Trong đường lối Đổi mới do Đảng Cộng sản Việt Nam đề ra ở giai đoạn 1986 - 1995 không tập trung vào vấn đề nào sau đây?", options: ["Đổi mới cơ chế quản lí kinh tế.", "Xây dựng nền kinh tế hàng hoá nhiều thành phần.", "Phát triển kinh tế tư nhân đóng vai trò chủ lực.", "Điều chỉnh cơ cấu đầu tư."], correct: 2, explanation: "Trong đường lối Đổi mới, Đảng ta luôn xác định phát triển kinh tế nhiều thành phần, nhưng \"Kinh tế nhà nước\" mới là thành phần giữ vai trò chủ đạo, dẫn dắt nền kinh tế, không phải kinh tế tư nhân." },
        { id: "10_22", type: "single", question: "Câu 22. Nội dung nào sau đây không phản ánh đúng vai trò của Nguyễn Ái Quốc với cách mạng Việt Nam trong giai đoạn 1939 – 1945?", options: ["Người triệu tập và chủ trì Hội nghị Ban Chấp hành Trung ương Đảng lần thứ 8.", "Tìm ra con đường cứu nước đúng đắn để giải phóng cho dân tộc.", "Thành lập Đội Việt Nam Tuyên truyền Giải phóng quân.", "Lãnh đạo Tổng khởi nghĩa giành chính quyền trong cả nước."], correct: 1, explanation: "Hành trình vĩ đại \"Tìm ra con đường cứu nước\" được Bác Hồ hoàn thành vào năm 1920 (khi đọc Sơ thảo luận cương), không nằm trong khung thời gian từ 1939 - 1945." },
        { id: "10_23", type: "single", question: "Câu 23. Tầm nhìn Cộng đồng ASEAN sau năm 2025 bổ sung nội dung nào sau đây cho Cộng đồng ASEAN?", options: ["Hướng tới một khu vực năng động và rộng mở với bên ngoài.", "Xây dựng bản sắc ASEAN.", "Xây dựng khu vực kinh tế có sức cạnh tranh cao.", "Tập trung hợp tác chuyển đổi số, phát triển nền kinh tế số, kinh tế xanh."], correct: 3, explanation: "Để thích ứng với thời đại mới, Tầm nhìn ASEAN sau 2025 chú trọng sâu sắc vào các lĩnh vực của thế kỷ 21 như đổi mới sáng tạo, kinh tế số và phát triển xanh bền vững." },
        { id: "10_24", type: "single", question: "Câu 24. Lí luận giải phóng dân tộc của Nguyễn Ái Quốc được truyền bá vào Việt Nam trong những năm 1921 – 1929 có điểm gì mới?", options: ["Gắn độc lập dân tộc với chủ nghĩa xã hội.", "Giải phóng dân tộc khỏi sự áp bức của thực dân.", "Gắn vấn đề dân tộc với dân chủ, dân quyền.", "Giành độc lập gắn với khôi phục chế độ quân chủ."], correct: 0, explanation: "Điểm cách mạng vĩ đại trong lí luận của Người là khẳng định muốn cứu nước và giải phóng dân tộc triệt để, không có con đường nào khác ngoài việc tiến lên xây dựng chủ nghĩa xã hội." },

        // --- PHẦN II (ĐÚNG/SAI) ---
        { id: "10_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>“Chủ tịch Hồ Chí Minh không chỉ là vị lãnh tụ kính yêu của nhân dân Việt Nam mà còn là nhà lãnh đạo, người anh hùng giải phóng dân tộc được nhân dân thế giới ngưỡng mộ với tình cảm chân thành. Rất nhiều quốc gia đã dựng tượng đài, lấy tên Người đặt cho nhiều công trình để bày tỏ sự kính ngưỡng sâu sắc dành cho người đã khai sinh ra nước Việt Nam hiện đại. Theo thống kê, đến nay tượng và tượng đài tưởng niệm Hồ Chủ tịch đã có mặt tại khoảng 20 nước trên thế giới... Ngoài việc dựng tượng Chủ tịch Hồ Chí Minh, tên của Người cũng đã được đặt cho nhiều quảng trường, trường học và đại lộ tại Nga, Pháp, Buốc-ki-na Pha-sô, Mô-dăm-bích, Ấn Độ,... Tại những quốc gia nơi Bác Hồ từng đặt chân tới trên chặng đường hoạt động cách mạng đều có những công trình di tích tưởng niệm Người....<br><span class='italic text-sm'>(Báo Điện tử Chính phủ, ngày 18-5-2017)</span>", items: [
            { id: "a", text: "a) Đến nay tượng và tượng đài tưởng niệm Chủ tịch Hồ Chí Minh đã có mặt tại khoảng hơn 100 nước trên thế giới.", correct: false, expl: "Sai. Đoạn trích từ báo điện tử Chính phủ ghi nhận số liệu là 'khoảng 20 nước trên thế giới', không phải hơn 100." },
            { id: "b", text: "b) Chủ tịch Hồ Chí Minh là người tìm ra con đường giải phóng dân tộc và lãnh đạo nhân dân Việt Nam giành độc lập dân tộc, góp phần vào sự nghiệp đấu tranh vì hoà bình, dân chủ, tự do và tiến bộ xã hội trên thế giới.", correct: true, expl: "Đúng. Đây là nhận định chính xác về tầm vóc và di sản mà Người để lại cho lịch sử thế giới." },
            { id: "c", text: "c) Để bày tỏ sự kính ngưỡng sâu sắc dành cho Chủ tịch Hồ Chí Minh đã khai sinh ra nước Việt Nam hiện đại, tất cả các quốc gia dựng tượng đài, lấy tên Người đặt cho nhiều công trình.", correct: false, expl: "Sai. Cụm từ 'tất cả các quốc gia' là một sự cường điệu không chính xác so với thực tế và với thông tin trong tư liệu." },
            { id: "d", text: "d) Chủ tịch Hồ Chí Minh để lại dấu ấn trong lòng nhân dân thế giới là do những cống hiến và giá trị tư tưởng, văn hoá của Người được đánh giá cao.", correct: true, expl: "Đúng. Di sản văn hóa, tư tưởng nhân văn sâu sắc của Bác là giá trị trường tồn được thế giới ngưỡng mộ." }
        ]},

{ id: "10_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>\"Duy trì hoà bình và an ninh quốc tế và để đạt được mục đích đó, thi hành những biện pháp tập thể có hiệu quả để phòng ngừa và loại trừ các mối đe doạ hoà bình, cấm mọi hành vi xâm lược và phá hoại hoà bình khác, điều chỉnh hoặc giải quyết các vụ tranh chấp hoặc những tình thế có tính chất quốc tế có thể đưa đến sự phá hoại hoà bình, bằng phương pháp hoà bình theo đúng nguyên tắc của công lí và pháp luật quốc tế\".<br><span class='italic text-sm'>(Trích trong Điều 1, Hiến chương Liên hợp quốc)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu thể hiện mục tiêu của Liên hợp quốc là duy trì hoà bình và an ninh quốc tế cho tất cả các quốc gia.", correct: true, expl: "Đúng. Mặc dù văn bản không dùng từ 'đảm bảo', nhưng việc duy trì hòa bình và an ninh quốc tế vốn dĩ là mục tiêu hướng tới phục vụ lợi ích và sự ổn định cho cộng đồng quốc tế, cho tất cả các quốc gia." },
            { id: "b", text: "b) Một trong những mục tiêu của Liên hợp quốc là giải quyết các vụ tranh chấp quốc tế bằng pháp luật của các quốc gia.", correct: false, expl: "Sai. Giải quyết tranh chấp phải tuân theo 'nguyên tắc của công lí và pháp luật quốc tế', chứ không phải pháp luật của từng quốc gia riêng lẻ." },
            { id: "c", text: "c) Trong các mục tiêu của Liên hợp quốc, duy trì hoà bình và an ninh quốc tế là mục tiêu được đặt lên hàng đầu.", correct: true, expl: "Đúng. Đây là sứ mệnh lớn lao nhất, là lí do tồn tại của tổ chức Liên hợp quốc." },
            { id: "d", text: "d) Hiện nay, Liên hợp quốc vẫn tiếp tục thực hiện mục tiêu giải quyết các vụ tranh chấp, xung đột quốc tế bằng phương pháp hoà bình.", correct: true, expl: "Đúng. Mặc dù gặp nhiều khó khăn, nhưng đây vẫn là tôn chỉ hoạt động bất di bất dịch của Liên hợp quốc trong thế giới đương đại." }
        ]},




        
        { id: "10_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>“Chống lại các thủ đoạn và luận điệu ngoại giao nham hiểm của Mỹ, ngoại giao của Việt Nam Dân chủ Cộng hoà phối hợp với ngoại giao của Mặt trận Dân tộc giải phóng tiến hành nhiều hoạt động ngoại giao và vận động quốc tế nhằm hai hướng chính: đề cao chính nghĩa dân tộc, nêu cao quyết tâm của nhân dân Việt Nam quyết đánh và quyết thắng cuộc chiến tranh xâm lược của Mỹ; tập trung mũi nhọn lên án cuộc chiến tranh xâm lược của Mỹ, lên án các hành động leo thang chiến tranh và các tội ác của Mỹ trên cả hai miền, mạnh mẽ bác bỏ các luận điệu dối trá của Mỹ “đàm phán không điều kiện\" và \"hai bên cùng rút quân\".<br><span class='italic text-sm'>(Nguyễn Khắc Huỳnh, Nghệ thuật ngoại giao Việt Nam với cuộc đàm phán Paris)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu phản ánh giai đoạn đầu cuộc đấu tranh ngoại giao thể hiện tính chất chính nghĩa của ta và lên án thủ đoạn của Mỹ làm kéo dài cuộc đàm phán.", correct: true, expl: "Đúng. Hoạt động ngoại giao của ta ở giai đoạn đầu (1968) đã phơi bày bộ mặt thật của Mỹ, tranh thủ sự đồng tình của dư luận quốc tế." },
            { id: "b", text: "b) Ngoại giao của Việt Nam Dân chủ Cộng hoà và ngoại giao của Mặt trận Dân tộc giải phóng miền Nam Việt Nam là hai nền ngoại giao biệt lập, không có sự ràng buộc.", correct: false, expl: "Sai. Tư liệu nêu rõ sự 'phối hợp' chặt chẽ giữa hai đoàn ngoại giao, tạo nên sức mạnh tổng hợp ('tuy hai mà một')." },
            { id: "c", text: "c) \"Đàm phán không điều kiện\", “hai bên cùng rút quân\" là một trong hai hướng chính của đấu tranh ngoại giao Việt Nam trong cuộc kháng chiến chống Mỹ, cứu nước.", correct: false, expl: "Sai. Đây là những luận điệu dối trá của Mỹ mà mặt trận ngoại giao Việt Nam đang 'mạnh mẽ bác bỏ', không phải là hướng đi của ta." },
            { id: "d", text: "d) Hoạt động ngoại giao của ta trong cuộc kháng chiến chống Mỹ, cứu nước là đề cao tính chính nghĩa dân tộc, góp phần chống lại các thủ đoạn và luận điệu dối trá của Mỹ.", correct: true, expl: "Đúng. Dùng chính nghĩa để bác bỏ sự phi nghĩa và những lí lẽ xảo trá của kẻ thù là đòn tấn công sắc bén của ngoại giao Việt Nam." }
        ]},
        { id: "10_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>...Một xã hội dân giàu, nước mạnh, dân chủ, công bằng, văn minh; do nhân dân làm chủ; có nền kinh tế phát triển cao, dựa trên lực lượng sản xuất hiện đại và quan hệ sản xuất tiến bộ phù hợp; có nền văn hoá tiên tiến, đậm đà bản sắc dân tộc; con người có cuộc sống ấm no, tự do, hạnh phúc, có điều kiện phát triển toàn diện; các dân tộc trong cộng đồng Việt Nam bình đẳng, đoàn kết, tôn trọng và giúp đỡ nhau cùng phát triển; có Nhà nước pháp quyền xã hội chủ nghĩa của nhân dân, do nhân dân, vì nhân dân do Đảng Cộng sản lãnh đạo; có quan hệ hữu nghị và hợp tác với các nước trên thế giới\".<br><span class='italic text-sm'>(Nguyễn Phú Trọng, Một số vấn đề lí luận và thực tiễn về chủ nghĩa xã hội và con đường đi lên chủ nghĩa xã hội ở Việt Nam)</span>", items: [
            { id: "a", text: "a) Đất nước Việt Nam phát triển toàn diện phải đảm bảo quyền lợi về kinh tế, văn hoá, xã hội và sự ổn định nền chính trị của Nhà nước pháp quyền xã hội chủ nghĩa cho nhân dân.", correct: true, expl: "Đúng. Đoạn tư liệu phác họa bức tranh toàn cảnh về một xã hội XHCN, nơi quyền lợi của con người trên mọi lĩnh vực được đảm bảo dưới sự quản lý của nhà nước pháp quyền." },
            { id: "b", text: "b) Con người giữ vị trí trung tâm trong chiến lược phát triển đất nước; phát triển văn hoá, xây dựng con người vừa là mục tiêu, vừa là động lực của công cuộc Đổi mới.", correct: true, expl: "Đúng. Tất cả các yếu tố văn hóa, kinh tế đều hướng tới mục tiêu tối thượng là mang lại 'cuộc sống ấm no, tự do, hạnh phúc' cho con người." },
            { id: "c", text: "c) Nền kinh tế thị trường định hướng xã hội chủ nghĩa phải hội nhập quốc tế, vận hành đầy đủ, đồng bộ theo các quy luật, lấy kinh tế đầu tư nước ngoài làm trọng tâm.", correct: false, expl: "Sai. Nền kinh tế nước ta định hướng dựa trên 'lực lượng sản xuất hiện đại', lấy kinh tế nhà nước làm chủ đạo, KHÔNG bao giờ 'lấy kinh tế đầu tư nước ngoài làm trọng tâm'." },
            { id: "d", text: "d) Trong đất nước Việt Nam phát triển phải xây dựng một hệ thống chính trị mà quyền lực thực sự thuộc về người lãnh đạo do nhân dân bầu ra và phục vụ lợi ích của nhân dân.", correct: false, expl: "Sai. Tư liệu khẳng định rõ nguyên tắc bất di bất dịch của nhà nước ta là 'do nhân dân làm chủ' và 'Nhà nước... của nhân dân, do nhân dân, vì nhân dân', chứ không phải quyền lực tập trung vào 'người lãnh đạo'." }
        ]}
    ];

    const testBanks = { de9: de9_data, de10: de10_data };
    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    // BẮT ĐẦU BÀI THI
    window.startQuizAction = function() {
        try {
            const errDiv = document.getElementById('login-error');
            if(errDiv) errDiv.classList.add('hidden');
            
            const nameEl = document.getElementById('hoTen');
            const lopEl = document.getElementById('lop');
            
            const name = nameEl.value.trim();
            const lop = lopEl.value.trim();
            const checkedRadio = document.querySelector('input[name="chonDe"]:checked');
            
            if (!name || !lop) {
                if(errDiv) {
                    errDiv.innerText = "⚠️ Bạn nhớ nhập đầy đủ Họ tên và Lớp nhé!";
                    errDiv.classList.remove('hidden');
                }
                return;
            }
            
            if (name && lop && checkedRadio) {
                const maDe = checkedRadio.value;
                const tenDe = checkedRadio.nextElementSibling.querySelector('.de-text').innerText.split('\n')[0].trim();
                currentStudent = { hoTen: name, lop: lop, maDe: maDe, tenDe: tenDe };
                currentQuestions = JSON.parse(JSON.stringify(testBanks[maDe]));
                quizStartTime = new Date();
                
                setTimeout(() => { isQuizStarted = true; }, 1000);
                showSection('quiz');
                
                const titleEl = document.getElementById('quiz-title');
                const infoEl = document.getElementById('student-info');
                if (titleEl) titleEl.innerText = currentStudent.tenDe;
                if (infoEl) infoEl.innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
                
                currentIdx = 0;
                userAnswers = {};
                window.renderQuestion();
                startTimer(50 * 60); 
            }
        } catch (error) {
            console.error(error);
        }
    };

    window.prevQuestion = function() {
        if (currentIdx > 0) { currentIdx--; window.renderQuestion(); }
    };

    window.nextQuestion = function() {
        if (currentIdx < currentQuestions.length - 1) { currentIdx++; window.renderQuestion(); }
    };

    window.viewScoresAction = function() {
        const btn = document.getElementById('view-scores-btn') || document.createElement('button'); 
        btn.innerText = "⏳ Đang tải dữ liệu...";
        if (database) {
            scoresRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                allScores = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                window.renderScores();
                btn.innerText = "🏆 Xem bảng xếp hạng";
                showSection('scores');
            });
        }
    };

    window.goHome = function() {
        if(document.getElementById('hoTen')) document.getElementById('hoTen').value = ''; 
        if(document.getElementById('lop')) document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    };

    function getTotalScoreItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.items.length;
            else count += 1;
        });
        return count; 
    }

    function getAnsweredCount() {
        return Object.keys(userAnswers).length;
    }

    // LƯU ĐÁP ÁN PHẦN I VÀ PHẦN II
    window.selectAnswer = function(qId, val, type) {
        if (type === 'tf') {
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            
            // Xử lý tách ID 
            const parts = qId.split('_'); 
            const itemId = parts[parts.length - 1]; 
            const mainQId = parts.slice(0, parts.length - 1).join('_');
            
            const q = currentQuestions.find(i => i.id === mainQId);
            if (q) {
                const item = q.items.find(i => i.id === itemId);
                if (item) {
                    window.showFeedbackModal(item, val, 'tf');
                }
            }

        } else if (type === 'single') {
            if (userAnswers[qId] !== undefined) return;
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            const q = currentQuestions[currentIdx];
            window.showFeedbackModal(q, val, 'single');
        }
    };

    window.showFeedbackModal = function(qOrItem, uAns, type = 'single') {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        const header = document.getElementById('feedback-header');
        const body = document.getElementById('feedback-body');
        
        if(!modal || !content) return; 

        window.autoAdvance = (type === 'single' || type === 'short'); 

        let isCorrect = false;
        let explanation = qOrItem.explanation || qOrItem.expl || "Chưa có lời giải chi tiết.";
        let optionsHtml = '';
        
        let questionText = "";
        if (type === 'single' || type === 'short') {
            questionText = qOrItem.question || "";
        } else if (type === 'tf') {
            questionText = qOrItem.text || "";
        }

        let questionHtml = `<div class="bg-slate-50 border-l-4 border-blue-500 p-4 rounded-r-xl shadow-sm mb-6 text-left">
            <div class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">Nội dung câu hỏi:</div>
            <div class="text-slate-800 font-bold text-lg math-scroll">${questionText}</div>
        </div>`;

        if (type === 'single') {
            isCorrect = (uAns === qOrItem.correct);
            
            optionsHtml += `<div class="space-y-3 mb-6 mt-4">`;
            qOrItem.options.forEach((opt, i) => {
                let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                if (qOrItem.correct === i) {
                    optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                    textStyle = 'font-bold';
                } else if (uAns === i && !isCorrect) {
                    optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                    textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                } else { 
                    optBg = 'bg-white text-slate-700 border border-slate-200'; 
                }

                let letterBg = (qOrItem.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                               ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                optionsHtml += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                    <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                    <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                    ${iconHtml}
                                </div>`;
            });
            optionsHtml += `</div>`;

        } else if (type === 'tf') {
            isCorrect = (uAns === qOrItem.correct);
            let ansText = qOrItem.correct ? 'ĐÚNG' : 'SAI';
            let uAnsText = uAns ? 'ĐÚNG' : 'SAI';
            
            optionsHtml += `
                <div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm mb-6 mt-4 text-left">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="font-black uppercase ${isCorrect ? 'text-emerald-600' : 'text-red-500 line-through decoration-red-500 decoration-2'}">${uAnsText}</span></span>
                        <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                    </div>
                </div>
            `;
        }
        
        let emoji = isCorrect ? '🎉' : '💡';
        let statusTitle = isCorrect ? 'Chính xác!' : 'Bạn làm sai rồi!';
        let headerColor = isCorrect ? 'text-emerald-600' : 'text-red-600';
        
        header.innerHTML = `<div class="text-6xl mb-4 animate-bounce">${emoji}</div><h3 class="text-3xl font-black ${headerColor} uppercase tracking-widest drop-shadow-sm">${statusTitle}</h3>`;
        
        body.innerHTML = questionHtml + optionsHtml;
        body.innerHTML += `<div class="mt-2"><div class="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-t-xl font-black uppercase text-sm border-b-4 border-blue-500 text-left">📖 Giải chi tiết từng bước:</div><div class="p-5 bg-white border-2 border-blue-200 rounded-b-2xl rounded-tr-2xl shadow-sm text-black font-medium text-base md:text-lg leading-loose math-scroll text-left">${explanation}</div></div>`;

        modal.classList.remove('hidden');
        void modal.offsetWidth;
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');

    };

    window.closeFeedbackModal = function() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        if(!modal) return;
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => { 
            modal.classList.add('hidden'); 
            if (window.autoAdvance) {
                if (currentIdx < currentQuestions.length - 1) {
                    window.nextQuestion();
                }
            }
        }, 300);
    };

    window.renderQuestion = function() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        if(!container) return;

        let html = `<div class="fade-in w-full">`;
        
        if (q.type === 'single') {
            const hasAnswered = userAnswers[q.id] !== undefined;
            const uAns = userAnswers[q.id];
            
            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">CÂU HỎI TRẮC NGHIỆM</h3></div>`;
            html += `<div class="flex gap-4 mb-5"><div class="w-full math-scroll"><p class="text-lg sm:text-xl font-bold text-red-600 mt-1 leading-snug tracking-tight">${q.question}</p></div></div>`;
            html += `<div class="space-y-4 md:pl-6 mt-6">`;
            q.options.forEach((opt, i) => {
                const isChecked = (uAns === i) ? 'checked' : '';
                const disabledClass = hasAnswered ? 'disabled-option' : '';
                html += `<div class="flex items-center">
                    <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio" ${isChecked} ${hasAnswered ? 'disabled' : ''} onchange="window.selectAnswer('${q.id}', ${i}, 'single')">
                    <label for="opt_${i}" class="option-label ${disabledClass} w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg cursor-pointer">
                        <div class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50">${String.fromCharCode(65 + i)}</div>
                        <div class="text-gray-700 leading-relaxed math-scroll flex-1">${opt}</div>
                    </label>
                </div>`;
            });
            html += `</div>`;
            
        } 
        else if (q.type === 'tf_cluster') {
            
            let displayContext = q.context;

            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">TRẮC NGHIỆM ĐÚNG/SAI</h3></div>`;
            html += `<div class="bg-red-50 text-red-700 p-4 rounded-xl font-bold mb-4 border-2 border-red-100 text-lg sm:text-xl leading-relaxed math-scroll">${displayContext}</div>`;
            html += `<div class="space-y-3 mt-6">`;
            q.items.forEach((item) => {
                const combinedId = q.id + '_' + item.id;
                let ans = userAnswers[combinedId];
                let btnT = ans === true ? 'selected' : ''; 
                let btnF = ans === false ? 'selected' : ''; 

                html += `<div class="p-4 sm:p-5 border-2 border-gray-100 rounded-2xl bg-white shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all hover:border-blue-200">
                    <div class="font-bold text-gray-800 flex-1 text-base sm:text-lg math-scroll">${item.text}</div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="window.selectAnswer('${combinedId}', true, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnT}">ĐÚNG</button>
                        <button onclick="window.selectAnswer('${combinedId}', false, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnF}">SAI</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        } 

        html += `</div>`;
        container.innerHTML = html;
        window.updateNav();
        window.updateProgress();
    };

    window.updateNav = function() {
        const pBtn = document.getElementById('prev-btn');
        const nBtn = document.getElementById('next-btn');
        const sBtn = document.getElementById('submit-btn');
        if(pBtn) pBtn.style.display = (currentIdx === 0) ? 'none' : 'block';
        if(nBtn) nBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'none' : 'block';
        if(sBtn) sBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'block' : 'none';
    };

    window.updateProgress = function() {
        const pgText = document.getElementById('progress-text');
        if(pgText) pgText.innerText = `${getAnsweredCount()}/${getTotalScoreItems()}`;
    };

    function formatDuration(sec) {
        const m = Math.floor(sec / 60); const s = sec % 60;
        return `${m}p ${s}s`;
    }

    window.submitQuiz = function() {
        if (!isQuizStarted) return; 
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let score = 0;

        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                if (userAnswers[q.id] === q.correct) score += 0.25; 
            } else if (q.type === 'tf_cluster') {
                let c = 0;
                q.items.forEach(item => { if (userAnswers[q.id + '_' + item.id] === item.correct) c++; });
                
                if (c === 1) score += 0.1;
                else if (c === 2) score += 0.25;
                else if (c === 3) score += 0.75;
                else if (c === 4) score += 1.0;
            }
        });

        score = score.toFixed(2); 

        const record = {
            hoTen: currentStudent.hoTen, lop: currentStudent.lop, tenDe: currentStudent.tenDe,
            diem: parseFloat(score),
            startTime: quizStartTime.toLocaleTimeString(), endTime: quizEndTime.toLocaleTimeString(),
            duration: formatDuration(Math.floor((quizEndTime - quizStartTime) / 1000)),
            thoiGian: new Date().toISOString(), deviceId: deviceId
        };
        
        if(database) {
            scoresRef.push(record, () => { window.showModalResult(score, record.duration); });
        }
    };

    window.showModalResult = function(score, dur) {
        ['login', 'quiz', 'scores', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const resEl = document.getElementById('result-section');
        if(resEl) resEl.classList.remove('hidden');
        const contentEl = document.getElementById('result-content');
        if(contentEl) contentEl.innerHTML = `
        <div class="absolute top-4 left-4 z-50">
            <button onclick="window.goHome()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-sm border border-gray-200 text-sm flex items-center gap-2">🏠 Trang chủ</button>
        </div>
        <div class="text-center mt-12 sm:mt-6">
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-emerald-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2"><span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - Lớp ${currentStudent.lop}</span><br><span class="text-sm font-bold text-gray-400 mt-1 block">${currentStudent.tenDe}</span></p>
        </div>
        <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative text-center">
            <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
            <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
            <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm border border-blue-100">Thời gian làm bài: ${dur}</div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button onclick="window.reviewQuiz()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">👀 Xem lại & Giải chi tiết</button>
            <button onclick="window.viewScoresAction()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
        </div>`;
    };

    window.reviewQuiz = function() {
        showSection('review');
        const container = document.getElementById('review-content');
        if(!container) return;
        let html = '';

        currentQuestions.forEach((q) => {
            if (q.type === 'single') {
                let uAns = userAnswers[q.id];
                let isCorrect = uAns === q.correct;
                let borderColor = isCorrect ? 'border-emerald-300 bg-emerald-50' : 'border-red-300 bg-red-50';
                
                let explanation = q.explanation;
                
                let statusText = '';
                let statusClass = '';
                if (uAns === undefined) {
                    statusText = '⚠️ Bạn chưa làm câu này';
                    statusClass = 'text-orange-500 bg-orange-50 border-orange-200';
                    borderColor = 'border-orange-300 bg-orange-50';
                } else if (isCorrect) {
                    statusText = '✅ Bạn làm đúng rồi!';
                    statusClass = 'text-emerald-600 bg-emerald-50 border-emerald-200';
                } else {
                    statusText = '❌ Bạn làm sai rồi!';
                    statusClass = 'text-red-600 bg-red-50 border-red-200';
                }

                html += `<div class="p-4 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor} relative mt-4 text-left">`;
                html += `<div class="absolute -top-4 right-4 px-4 py-1 rounded-full border-2 ${statusClass} font-bold text-sm shadow-sm">${statusText}</div>`;
                html += `<div class="font-bold text-lg sm:text-xl text-slate-800 mb-4 leading-relaxed math-scroll mt-2">${q.question}</div>`;
                html += `<div class="space-y-2">`;
                
                q.options.forEach((opt, i) => {
                    let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                    if (q.correct === i) {
                        optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                        textStyle = 'font-bold';
                    } else if (uAns === i && !isCorrect) {
                        optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                        textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                    } else { 
                        optBg = 'bg-white text-slate-700 border border-slate-200'; 
                    }

                    let letterBg = (q.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                                   ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                    html += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                ${iconHtml}
                            </div>`;
                });
                html += `</div>`;
                if (q.explanation) html += `<div class="review-explanation mt-4 pt-4 border-t-2 border-gray-200"><p class="text-sm font-black uppercase tracking-widest text-blue-600 mb-2">💡 Giải chi tiết từng bước:</p><p class="text-black font-medium text-base leading-loose math-scroll text-left">${explanation}</p></div>`;
                html += `</div>`;
            } 
            else if (q.type === 'tf_cluster') {
                let displayContext = q.context;

                html += `<div class="p-4 sm:p-6 border-2 border-indigo-200 bg-indigo-50 rounded-2xl shadow-sm mb-6 text-left">`;
                html += `<div class="font-bold text-lg sm:text-xl text-indigo-800 mb-4 math-scroll">${displayContext}</div>`;
                html += `<div class="space-y-4">`;
                q.items.forEach(item => {
                    let uAns = userAnswers[q.id + '_' + item.id];
                    let isCorrect = uAns === item.correct;
                    let ansText = item.correct ? 'ĐÚNG' : 'SAI';
                    let explanation = item.expl;
                    
                    let statusText = '';
                    let statusColor = '';
                    if (uAns === undefined) {
                        statusText = '⚠️ Chưa làm';
                        statusColor = 'text-orange-500 border-orange-200';
                    } else if (isCorrect) {
                        statusText = '✅ Bạn làm đúng rồi!';
                        statusColor = 'text-emerald-600 border-emerald-200 bg-emerald-50';
                    } else {
                        statusText = '❌ Bạn làm sai rồi!';
                        statusColor = 'text-red-600 border-red-200 bg-red-50';
                    }

                    html += `<div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm">
                        <div class="font-bold text-gray-800 math-scroll mb-3">${item.text}</div>
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-100 pb-3 gap-2">
                            <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="${uAns === undefined ? 'text-gray-400' : (uAns ? 'text-blue-600' : 'text-gray-600')} font-black uppercase ${!isCorrect && uAns !== undefined ? 'line-through decoration-red-500 decoration-2 text-red-500' : ''}">${uAns === undefined ? 'Chưa trả lời' : (uAns?'Đúng':'Sai')}</span></span>
                            <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                            <span class="font-bold text-sm ${statusColor} px-3 py-1 rounded-lg border text-center">${statusText}</span>
                        </div>
                        <div class="review-explanation mt-3 pt-2 text-sm text-gray-700 font-medium leading-relaxed math-scroll"><span class="text-indigo-500 font-bold uppercase">Giải chi tiết:</span><br> ${explanation}</div>
                    </div>`;
                });
                html += `</div></div>`;
            }
        });
        container.innerHTML = html;
        if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise([container]);
    };

    window.backToResult = function() { showSection('result'); };

    window.renderScores = function() {
        const tbody = document.getElementById('scores-tbody');
        if(!tbody) return;
        if (allScores.length === 0) { tbody.innerHTML = ''; document.getElementById('no-scores').classList.remove('hidden'); return; }
        const noScore = document.getElementById('no-scores');
        if(noScore) noScore.classList.add('hidden');
        const sorted = [...allScores].sort((a, b) => (a.lop.localeCompare(b.lop)) || (b.diem - a.diem));
        tbody.innerHTML = sorted.map((s, idx) => `<tr class="${s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-slate-50'} transition-colors border-b border-slate-100"><td class="px-4 py-4 text-center font-black text-slate-400 text-sm">#${idx + 1}</td><td class="px-4 py-4 font-black text-blue-600 text-sm">${s.lop}</td><td class="px-4 py-4 font-extrabold text-slate-800 text-sm">${s.hoTen} ${s.deviceId === deviceId ? '<span class="ml-2 bg-pink-500 text-white text-[10px] px-2 rounded-md">Bạn</span>' : ''}</td><td class="px-4 py-4 text-xs font-bold text-blue-500"><span class="bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">${s.tenDe}</span></td><td class="px-4 py-4 text-center"><span class="font-black text-lg ${s.diem >= 5 ? 'text-emerald-600' : 'text-red-500'}">${s.diem}</span></td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.startTime}</td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.endTime}</td><td class="px-4 py-4 text-right font-black text-orange-600 text-xs">${s.duration}</td>
            <td class="px-4 py-4 text-right text-xs text-slate-500 font-bold">${s.thoiGian ? new Date(s.thoiGian).toLocaleDateString('vi-VN') : '--/--/----'}</td></tr>`).join('');
    };

    function showSection(id) {
        ['login', 'quiz', 'scores', 'result', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const tgt = document.getElementById(id+'-section');
        if(tgt) tgt.classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        if(!display) return;
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) window.submitQuiz();
        }, 1000);
    }

    try {
        if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
        deviceId = localStorage.getItem('deviceId');
    } catch (e) { deviceId = 'dev_temp_' + Math.random().toString(36).substr(2); }
  </script>
 </body>
</html>
