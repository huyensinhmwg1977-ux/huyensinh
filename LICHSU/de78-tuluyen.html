  /*================================================================================================
      DATA NGÂN HÀNG CÂU HỎI MÔN LỊCH SỬ - TRÍCH XUẤT TỪ PDF (ĐỀ SỐ 3 VÀ ĐỀ SỐ 4)
      ĐÃ BỔ SUNG LỜI GIẢI THÍCH CHI TIẾT THEO SGK KẾT NỐI TRI THỨC VỚI CUỘC SỐNG
    =================================================================================================*/
    const de1_data = [
        // --- PHẦN I (ĐỀ SỐ 3) ---
        { id: "3_1", type: "single", question: "Câu 1. Chính quyền Xô viết được thành lập sau thắng lợi của", options: ["chiến tranh Trung – Nhật (1894-1895).", "Chiến tranh thế giới thứ nhất (1914–1918).", "chiến tranh Nga – Nhật (1904-1905).", "Cách mạng tháng Mười (11-1917)."], correct: 3, explanation: "Theo SGK Lịch sử 12 (Kết nối tri thức), sau khi Cách mạng tháng Mười Nga giành thắng lợi (11/1917), Đại hội Xô viết toàn Nga lần thứ hai đã tuyên bố thành lập chính quyền Xô viết do V.I. Lê-nin đứng đầu." },
        { id: "3_2", type: "single", question: "Câu 2. Sự kiện nào sau đây chính thức đánh dấu việc hoàn thành quá trình thành lập Liên Xô?", options: ["Các nhà nước Cộng hoà liên minh và giành thắng lợi chống 'thù trong, giặc ngoài'.", "Thông qua bản Hiến pháp đầu tiên, ghi nhận việc hợp tác trên cơ sở tự nguyện.", "Đại hội lần thứ nhất các Xô viết toàn Liên bang thông qua bản Hiệp ước Liên bang.", "Khai mạc Đại hội Xô viết toàn Nga lần thứ hai, thành lập chính quyền Xô viết."], correct: 2, explanation: "Ngày 30-12-1922, Đại hội lần thứ nhất các Xô viết toàn Liên bang đã chính thức thông qua Tuyên ngôn thành lập và Hiệp ước Liên bang. Sự kiện này đánh dấu quá trình thành lập Nhà nước Liên bang Cộng hoà xã hội chủ nghĩa Xô viết (Liên Xô) chính thức hoàn thành." },
        { id: "3_3", type: "single", question: "Câu 3. Trong suốt tiến trình của lịch sử, sự sinh tồn và phát triển của dân tộc Việt Nam luôn gắn liền với", options: ["các cuộc chiến tranh để bảo vệ Tổ quốc.", "quá trình mở rộng lãnh thổ để liên kết với các nước.", "củng cố và xây dựng các căn cứ quân sự để phòng thủ.", "xây dựng lực lượng đấu tranh chính trị để bảo vệ nền độc lập."], correct: 0, explanation: "Lịch sử Việt Nam là lịch sử dựng nước luôn đi đôi với giữ nước. Do vị trí địa lí chiến lược, dân tộc ta luôn phải đối phó với nhiều thế lực ngoại xâm lớn mạnh. Vì vậy, sự sinh tồn và phát triển của dân tộc luôn gắn liền với các cuộc chiến tranh giải phóng dân tộc và bảo vệ Tổ quốc." },
        { id: "3_4", type: "single", question: "Câu 4. Kế sách dùng cọc nhọn đóng xuống sông đánh giặc đã được sử dụng lần đầu tiên trong cuộc kháng chiến chống quân", options: ["Thanh.", "Nguyên.", "Minh.", "Nam Hán."], correct: 3, explanation: "Kế sách cắm cọc nhọn bọc sắt xuống lòng sông Bạch Đằng, lợi dụng thủy triều để đánh giặc được Ngô Quyền sáng tạo và áp dụng lần đầu tiên vào năm 938, đánh tan quân Nam Hán xâm lược." },
        { id: "3_5", type: "single", question: "Câu 5. Hội nghị I-an-ta được triệu tập vào thời điểm nào của Chiến tranh thế giới thứ hai?", options: ["Chiến tranh thế giới thứ hai bùng nổ.", "Chiến tranh thế giới thứ hai bước vào giai đoạn quyết liệt.", "Chiến tranh thế giới thứ hai bước vào giai đoạn kết thúc.", "Chiến tranh thế giới thứ hai đã kết thúc."], correct: 2, explanation: "Hội nghị I-an-ta diễn ra từ ngày 4 đến ngày 11-2-1945, đây là thời điểm Chiến tranh thế giới thứ hai đã bước vào giai đoạn cuối, cục diện chiến trường nghiêng hẳn về phe Đồng minh và việc đánh bại phát xít sắp hoàn thành." },
        { id: "3_6", type: "single", question: "Câu 6. Những quyết định của Hội nghị I-an-ta cùng những thoả thuận sau đó của ba cường quốc đã", options: ["trở thành khuôn khổ của một trật tự thế giới mới.", "thành lập tổ chức Liên hợp quốc để giữ gìn hoà bình và an ninh thế giới.", "chấm dứt Chiến tranh thế giới thứ hai.", "mở ra một thời kì mới trong lịch sử nhân loại – thời kì Chiến tranh lạnh."], correct: 0, explanation: "Những quyết định quan trọng của Hội nghị I-an-ta (phân chia phạm vi ảnh hưởng ở châu Âu, châu Á) cùng những thỏa thuận sau đó của ba cường quốc (Mỹ, Anh, Liên Xô) đã tạo ra bộ khung cho một trật tự thế giới mới, lịch sử gọi là Trật tự thế giới hai cực I-an-ta." },
        { id: "3_7", type: "single", question: "Câu 7. Nhận định nào sau đây là đúng về những chính sách mà Việt Nam có thể áp dụng để hội nhập kinh tế thành công với thế giới?", options: ["Xây dựng kinh tế tự chủ, phát huy nội lực đất nước.", "Liên kết hợp tác chặt chẽ với các nước Đông Nam Á.", "Tìm kiếm những nguồn vốn viện trợ không hoàn lại.", "Gia nhập vào tất cả các tổ chức thương mại thế giới."], correct: 0, explanation: "Quan điểm nhất quán của Đảng ta trong hội nhập kinh tế quốc tế là: Hội nhập đi đôi với việc xây dựng nền kinh tế độc lập, tự chủ. Phát huy tối đa nội lực là nền tảng, kết hợp với ngoại lực để phát triển bền vững." },
        { id: "3_8", type: "single", question: "Câu 8. Hiệp hội các quốc gia Đông Nam Á (ASEAN) được thành lập vào năm 1967 có sự tham gia của các quốc gia nào?", options: ["Thái Lan, Mi-an-ma, Ma-lai-xi-a, Xin-ga-po và Phi-líp-pin.", "Thái Lan, Bru-nây, Ma-lai-xi-a, Xin-ga-po và Phi-líp-pin.", "Thái Lan, In-đô-nê-xi-a, Ma-lai-xi-a, Xin-ga-po và Phi-líp-pin.", "Thái Lan, Cam-pu-chia, Ma-lai-xi-a, Xin-ga-po và Phi-líp-pin."], correct: 2, explanation: "Ngày 8-8-1967, tại Băng Cốc (Thái Lan), 5 quốc gia bao gồm: Thái Lan, In-đô-nê-xi-a, Ma-lai-xi-a, Xin-ga-po và Phi-líp-pin đã kí bản Tuyên bố Băng Cốc, chính thức thành lập ASEAN." },
        { id: "3_9", type: "single", question: "Câu 9. Sự kiện nào sau đây đánh dấu ASEAN chính thức được thành lập vào năm 1967?", options: ["Thông qua Tầm nhìn ASEAN 2020.", "Thông qua Tuyên bố Ba-li II.", "Thông qua Tuyên bố ASEAN.", "Thông qua Tuyên bố Cu-a-la Lăm-pơ."], correct: 2, explanation: "Tuyên bố ASEAN (còn gọi là Tuyên bố Băng Cốc) được 5 nước sáng lập kí kết ngày 8-8-1967 chính là văn kiện nền tảng đánh dấu sự ra đời của tổ chức này." },
        { id: "3_10", type: "single", question: "Câu 10. Sự kiện Việt Nam trở thành thành viên đã đánh dấu mốc quan trọng nào trong sự phát triển của ASEAN?", options: ["Đẩy nhanh quá trình xây dựng ASEAN thành \"ngôi nhà chung\" của các quốc gia Đông Nam Á.", "Góp phần tăng cường số lượng các nước thành viên, mở rộng quá trình hợp tác lâu dài và hiệu quả.", "Chấm dứt sự nghi kị trong khu vực, tạo điều kiện cho các quốc gia Đông Nam Á phát triển và hội nhập với thế giới.", "Thúc đẩy các quốc gia khác nhanh chóng gia nhập ASEAN để xây dựng một nhà nước chung của khu vực."], correct: 0, explanation: "Năm 1995, Việt Nam gia nhập ASEAN. Sự kiện này là bước đột phá, chấm dứt tình trạng đối đầu Đông - Tây ở khu vực, mở đường cho Lào, Mi-an-ma, Campuchia gia nhập sau đó, đẩy nhanh quá trình xây dựng ASEAN thành ngôi nhà chung của 10 quốc gia Đông Nam Á." },
        { id: "3_11", type: "single", question: "Câu 11. Chiều ngày 16-8-1945, một đơn vị Giải phóng quân do Võ Nguyên Giáp chỉ huy, xuất phát từ Tân Trào tiến về giải phóng thị xã", options: ["Cao Bằng.", "Thái Nguyên.", "Tuyên Quang.", "Lào Cai."], correct: 1, explanation: "Ngay sau khi Quốc dân Đại hội Tân Trào kết thúc, chiều 16-8-1945, đội Việt Nam Giải phóng quân do đồng chí Võ Nguyên Giáp chỉ huy đã từ Tân Trào tiến về giải phóng thị xã Thái Nguyên, mở đường tiến về Hà Nội." },
        { id: "3_12", type: "single", question: "Câu 12. Sự kiện nào sau đây đã đánh dấu sự sụp đổ hoàn toàn của chế độ phong kiến Việt Nam?", options: ["Đồng Nai Thượng và Hà Tiên giành được chính quyền.", "Vua Bảo Đại tuyên bố thoái vị.", "Giành chính quyền ở Huế.", "Chủ tịch Hồ Chí Minh đọc bản Tuyên ngôn Độc lập."], correct: 1, explanation: "Chiều ngày 30-8-1945 tại Ngọ Môn (Huế), vua Bảo Đại (vị vua cuối cùng của triều Nguyễn) đã tuyên bố thoái vị và trao ấn kiếm cho đại diện chính quyền cách mạng. Sự kiện này chính thức đánh dấu chế độ phong kiến chuyên chế tại Việt Nam sụp đổ hoàn toàn." },
        { id: "3_13", type: "single", question: "Câu 13. Trong cao trào kháng Nhật, cứu nước, khẩu hiệu nào sau đây đã đáp ứng nguyện vọng cấp bách của người nông dân?", options: ["\"Đánh đuổi phát xít Nhật\".", "\"Đả đảo bù nhìn\".", "\"Việt Nam độc lập\".", "\"Phá kho thóc, giải quyết nạn đói\"."], correct: 3, explanation: "Đầu năm 1945, miền Bắc và Bắc Trung Bộ xảy ra nạn đói khủng khiếp làm hơn 2 triệu người chết. Khẩu hiệu \"Phá kho thóc, giải quyết nạn đói\" của Đảng đã đánh trúng nguyện vọng sinh tồn cấp bách nhất của nhân dân, dấy lên phong trào quần chúng vô cùng mạnh mẽ." },
        { id: "3_14", type: "single", question: "Câu 14. \"Giờ quyết định cho vận mệnh dân tộc ta đã đến. Toàn quốc đồng bào hãy đứng dậy đem sức ta mà tự giải phóng cho ta...\". Đó là lời kêu gọi của", options: ["Đảng tại Hội nghị toàn quốc (từ ngày 14 đến 15 – 8 -1945).", "Uỷ ban Khởi nghĩa toàn quốc ban bố Quân lệnh số 1 (13 – 8 – 1945).", "Đảng tại Đại hội Quốc dân ở Tân Trào (từ ngày 16 đến 17 8 – 1945).", "Hồ Chí Minh trong Thư kêu gọi tổng khởi nghĩa gửi đồng bào cả nước."], correct: 3, explanation: "Đây là một đoạn trích nổi tiếng trong \"Thư kêu gọi Tổng khởi nghĩa\" của Chủ tịch Hồ Chí Minh gửi đồng bào cả nước vào giữa tháng 8-1945, thôi thúc nhân dân vùng lên nắm lấy thời cơ ngàn năm có một." },
        { id: "3_15", type: "single", question: "Câu 15. Nội dung nào sau đây là bài học của Cách mạng tháng Tám năm 1945 và cũng là vấn đề có ý nghĩa quan trọng đối với sự phát triển của nước ta hiện nay?", options: ["Dự đoán, nắm bắt thời cơ, vượt qua thách thức.", "Vận dụng sáng tạo chủ nghĩa Mác – Lê-nin vào thực tiễn cách mạng.", "Tập hợp rộng rãi các lực lượng yêu nước, cô lập kẻ thù.", "Kết hợp linh hoạt các hình thức đấu tranh cách mạng."], correct: 0, explanation: "Thành công của Cách mạng tháng Tám nhờ vào sự nhạy bén chớp đúng 'thời cơ vàng' vô cùng ngắn ngủi (khi Nhật đầu hàng và Đồng minh chưa vào). Trong thời đại hội nhập hiện nay, năng lực dự báo, nắm bắt thời cơ quốc tế và chủ động vượt qua thách thức vẫn là bài học sống còn cho sự phát triển của đất nước." },
        { id: "3_16", type: "single", question: "Câu 16. Đại hội VIII (1996) của Đảng Cộng sản Việt Nam đã xác định Việt Nam chuyển sang thời kì nào sau đây?", options: ["Đẩy mạnh công nghiệp hoá, hiện đại hoá đất nước.", "Thực hiện Ba chương trình kinh tế lớn.", "Ổn định về mọi mặt của đời sống kinh tế – xã hội.", "Miền Bắc được giải phóng, tiến lên xây dựng chủ nghĩa xã hội, tiếp tục nhiệm vụ giải phóng miền Nam, thống nhất đất nước."], correct: 0, explanation: "Đại hội đại biểu toàn quốc lần thứ VIII (6-1996) đánh giá nước ta đã ra khỏi khủng hoảng kinh tế - xã hội, từ đó Đảng xác định nhiệm vụ mới: chuyển đất nước sang thời kỳ đẩy mạnh công nghiệp hóa, hiện đại hóa." },
        { id: "3_17", type: "single", question: "Câu 17. Nội dung nào sau đây không phải là nội dung cơ bản của đường lối Đổi mới giai đoạn 1996 - 2006?", options: ["Đẩy mạnh công nghiệp hoá, hiện đại hoá đất nước.", "Tiếp tục phát triển kinh tế thị trường định hướng xã hội chủ nghĩa.", "Xây dựng nền kinh tế mở, hội nhập với khu vực và thế giới.", "Kiên quyết xoá bỏ cơ chế quản lí kinh tế tập trung quan liêu, bao cấp."], correct: 3, explanation: "Việc 'kiên quyết xóa bỏ cơ chế quản lý kinh tế tập trung quan liêu, bao cấp' là chủ trương, nhiệm vụ cốt lõi của Đại hội VI (1986). Giai đoạn 1996-2006, nền kinh tế nước ta đã chuyển sang vận hành theo cơ chế thị trường định hướng XHCN, nên không còn đặt nhiệm vụ này làm trọng tâm cơ bản nữa." },
        { id: "3_18", type: "single", question: "Câu 18. Nội dung nào sau đây phản ánh đúng điểm khác biệt trong chủ trương về đối ngoại của Đảng, Chính phủ Việt Nam từ năm 2006 đến nay so với giai đoạn trước?", options: ["Thực hiện đa phương hoá, đa dạng hoá quan hệ đối ngoại.", "Hội nhập kinh tế quốc tế và khu vực.", "Chủ động, tích cực hội nhập quốc tế toàn diện và sâu rộng.", "Giữ vững môi trường hoà bình, ổn định."], correct: 2, explanation: "Nếu các giai đoạn trước (như Đại hội VII, VIII) chủ trương của ta tập trung chủ yếu vào hội nhập kinh tế, thì từ Đại hội X (2006) trở đi, chủ trương đối ngoại đã được nâng tầm thành 'chủ động và tích cực hội nhập quốc tế' một cách toàn diện, sâu rộng trên mọi lĩnh vực (chính trị, quốc phòng, văn hóa, giáo dục...)." },
        { id: "3_19", type: "single", question: "Câu 19. Từ tháng 9-1945 đến tháng 12-1946, hoạt động đối ngoại của Chính phủ Việt Nam Dân chủ Cộng hoà là", options: ["chủ động hoà hoãn với Trung Hoa Dân quốc để tránh cùng một lúc đối phó với nhiều kẻ thù.", "tranh thủ sự đồng tình, ủng hộ của nhân dân thế giới.", "tham gia đại hội sáng lập Hội đồng Hoà bình thế giới (1949).", "tiếp tục củng cố mặt trận đoàn kết ba nước Đông Dương."], correct: 0, explanation: "Trong giai đoạn khó khăn (9/1945 - 2/1946), để tránh việc phải đương đầu với hai kẻ thù cùng lúc, Đảng và Chính phủ ta đã thực hiện sách lược chủ động nhân nhượng, hòa hoãn với quân Trung Hoa Dân quốc ở miền Bắc để tập trung lực lượng đánh thực dân Pháp xâm lược ở miền Nam." },
        { id: "3_20", type: "single", question: "Câu 20. Chủ tịch Hồ Chí Minh kí với đại diện Chính phủ Pháp bản Hiệp định Sơ bộ (06-3-1946) nhằm mục đích gì?", options: ["Không cho thực dân Pháp đem quân ra Bắc.", "Đẩy nhanh quân Trung Hoa Dân quốc sang nước khác.", "Có thêm thời gian hoà bình để củng cố chính quyền.", "Hoà hoãn với Pháp, đẩy quân Trung Hoa Dân quốc về nước."], correct: 3, explanation: "Khi Hiệp ước Hoa - Pháp (28/2/1946) được kí kết, quân Tưởng đồng ý để quân Pháp ra Bắc thay thế. Để phá vỡ âm mưu liên minh kẹp chặt của địch, ta chủ động kí Hiệp định Sơ bộ hòa hoãn với Pháp. Mục đích cốt lõi là mượn tay Pháp nhanh chóng tống khứ 20 vạn quân Trung Hoa Dân quốc về nước." },
        { id: "3_21", type: "single", question: "Câu 21. Sau ngày Nhật Bản đảo chính Pháp (09-3-1945), đại diện Mặt trận Việt Minh và Hồ Chí Minh đã tiếp xúc với người Mỹ thể hiện", options: ["nhiệm vụ phối hợp tổ chức huấn luyện quân sự, cung cấp hậu cần, y tế cho Việt Minh.", "thiện chí của Việt Minh muốn tìm kiếm một giải pháp cho vấn đề Đông Dương.", "sách lược ngoại giao mềm dẻo, linh hoạt, sáng tạo của Đảng Cộng sản Đông Dương.", "sự chỉ đạo đúng đắn của Quốc tế Cộng sản đối với vấn đề Đông Dương."], correct: 2, explanation: "Việc ta chủ động tiếp xúc, phối hợp với lực lượng tình báo OSS của Mỹ (lực lượng Đồng minh chống phát xít) trong bối cảnh lịch sử lúc bấy giờ cho thấy tư duy ngoại giao vô cùng mềm dẻo, linh hoạt, thêm bạn bớt thù của Đảng ta và Chủ tịch Hồ Chí Minh." },
        { id: "3_22", type: "single", question: "Câu 22. Sự kiện nào trên thế giới có ảnh hưởng lớn đến cách mạng Việt Nam từ sau Chiến tranh thế giới thứ nhất?", options: ["Sự thành công của Cách mạng tháng Mười Nga (11-1917).", "Nguyễn Ái Quốc gửi bản Yêu sách của nhân dân An Nam đến Hội nghị Véc-xai (6-1919).", "Nguyễn Ái Quốc tham dự Đại hội XVIII của Đảng Xã hội Pháp (12-1920).", "Nước Pháp bị khủng hoảng nghiêm trọng về kinh tế, xã hội."], correct: 0, explanation: "Cách mạng tháng Mười Nga (1917) thắng lợi là một sự kiện vĩ đại làm rung chuyển thế giới. Nó phá vỡ khâu yếu nhất của sợi dây chuyền chủ nghĩa đế quốc, đồng thời mở ra một con đường cứu nước mới (con đường cách mạng vô sản) ảnh hưởng trực tiếp đến sự lựa chọn của Nguyễn Ái Quốc và phong trào cách mạng Việt Nam." },
        { id: "3_23", type: "single", question: "Câu 23. Bối cảnh lịch sử nào quyết định việc Nguyễn Tất Thành ra đi tìm đường cứu nước?", options: ["Thực dân Pháp đặt xong ách thống trị trên đất nước Việt Nam.", "Phong trào kháng chiến chống Pháp của nhân dân ta phát triển mạnh mẽ.", "Các tư tưởng cứu nước mới theo khuynh hướng dân chủ tư sản ảnh hưởng sâu rộng đến nước ta.", "Con đường cứu nước giải phóng dân tộc ở Việt Nam đang bế tắc, chưa có lối thoát."], correct: 3, explanation: "Cuối thế kỉ XIX - đầu thế kỉ XX, các phong trào yêu nước chống Pháp từ lập trường phong kiến (Cần Vương) đến khuynh hướng dân chủ tư sản (Đông Du, Duy Tân...) đều lần lượt thất bại. Sự bế tắc hoàn toàn về đường lối cứu nước đã thôi thúc người thanh niên yêu nước Nguyễn Tất Thành quyết tâm ra nước ngoài tìm một hướng đi mới." },
        { id: "3_24", type: "single", question: "Câu 24. Vì sao Chủ tịch Hồ Chí Minh sống mãi trong lòng nhân dân Việt Nam?", options: ["Người đã dành cả cuộc đời phấn đấu, hi sinh vì lợi ích của Tổ quốc, vì hạnh phúc của nhân dân.", "Người để lại giá trị tư tưởng, việc làm, đức tính tốt đẹp văn hoá của mình đối với thế giới.", "Người là biểu tượng sức mạnh của dân tộc Việt Nam hàng nghìn năm lịch sử.", "Người đã đoàn kết các dân tộc bị áp bức và những người lao động trên thế giới."], correct: 0, explanation: "Nguyên nhân thiêng liêng và cốt lõi nhất khiến Bác Hồ kính yêu trở thành lãnh tụ bất tử trong trái tim mỗi người con đất Việt chính là sự cống hiến trọn vẹn, sự hi sinh vô tư cả cuộc đời mình chỉ với một mục đích duy nhất: Độc lập cho Tổ quốc, Tự do và Hạnh phúc cho Nhân dân." },

        // --- PHẦN II (ĐÚNG/SAI - ĐỀ SỐ 3) ---
        { id: "3_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>Ngày 30-4-1975, cuộc kháng chiến chống Mỹ, cứu nước của nhân dân Việt Nam kết thúc thắng lợi. Đất nước thu về một mối. Ngay sau tháng 4 – 1975 không lâu, nhân dân Việt Nam đã phải đối đầu với cuộc tấn công xâm lược Việt Nam trên toàn tuyến biên giới Tây Nam do quân đội Pôn Pốt tiến hành với sự hỗ trợ về nhiều mặt của các thế lực bên ngoài. Nghiêm trọng hơn, rạng ngày 17-02-1979, Trung Quốc đưa 600 000 quân tấn công toàn tuyến biên giới Việt Nam. Tháng 3 – 1979, quân Trung Quốc phải rút quân nhưng cuộc đấu tranh bảo vệ Tổ quốc ở biên giới phía Bắc chỉ chính thức kết thúc vào năm 1989.<br><span class='italic text-sm'>(Tác giả tổng hợp từ nhiều nguồn)</span>", items: [
            { id: "a", text: "a) Ngay sau Đại thắng Xuân 1975, quan hệ Việt Nam – Trung Quốc, Việt Nam – Cam-pu-chia xuất hiện một số dấu hiệu bất ổn.", correct: true, expl: "Đúng. Dù chúng ta vừa giành độc lập, nhưng các thế lực cầm quyền phản động Pôn Pốt ở Tây Nam và giới cầm quyền Trung Quốc ở phía Bắc đã lập tức có những động thái khiêu khích, thù địch gây bất ổn an ninh lãnh thổ." },
            { id: "b", text: "b) Chính quyền Pôn Pốt đã phát động chiến tranh xâm lược biên giới Tây Nam của Việt Nam dưới sự trợ giúp của quân đội các nước Đồng minh.", correct: false, expl: "Sai. Tập đoàn Pôn Pốt gây chiến tranh dưới sự hà hơi tiếp sức của 'các thế lực bên ngoài' (cụ thể là Trung Quốc lúc bấy giờ). Thuật ngữ 'quân đội Đồng minh' chỉ dùng trong Chiến tranh thế giới thứ hai, hoàn toàn sai bản chất lịch sử ở giai đoạn này." },
            { id: "c", text: "c) Ngày 17-02-1979, cuộc đấu tranh bảo vệ Tổ quốc ở biên giới phía Bắc của nhân dân Việt Nam chính thức bắt đầu.", correct: true, expl: "Đúng. Ngày 17-02-1979, quân đội Trung Quốc mở cuộc tấn công quy mô lớn với 60 vạn quân dọc theo toàn bộ tuyến biên giới 6 tỉnh phía Bắc, buộc quân dân ta phải bước vào cuộc chiến đấu tự vệ chính đáng bảo vệ Tổ quốc." },
            { id: "d", text: "d) Trước sức chiến đấu của quân dân Việt Nam, tháng 3 – 1979, quân Trung Quốc phải rút quân nhưng tình hình biên giới còn rất phức tạp.", correct: true, expl: "Đúng. Mặc dù tuyên bố rút quân vào tháng 3/1979 do thiệt hại nặng nề, nhưng trên thực tế Trung Quốc vẫn liên tục duy trì các hoạt động pháo kích, lấn chiếm biên giới ác liệt ròng rã suốt 10 năm sau đó (đến tận 1989)." }
        ]},
        { id: "3_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>\"Tuyên bố ASEAN nêu rõ mục đích thành lập của ASEAN:<br>1. Thúc đẩy sự tăng trưởng kinh tế, tiến bộ xã hội và phát triển văn hoá trong khu vực thông qua các nỗ lực chung trên tinh thần bình đẳng và hợp tác nhằm tăng cường cơ sở cho một Cộng đồng các quốc gia Đông Nam Á hoà bình và thịnh vượng.<br>2. Thúc đẩy hoà bình và ổn định khu vực bằng việc tôn trọng công lí và nguyên tắc luật pháp trong quan hệ giữa các quốc gia trong vùng và tuân thủ các nguyên tắc của Hiến chương Liên hợp quốc.<br>3. Thúc đẩy sự cộng tác tích cực và giúp đỡ lẫn nhau trong các vấn đề cùng quan tâm trong các lĩnh vực: kinh tế, xã hội, văn hoá, khoa học – kĩ thuật và hành chính,....<br><span class='italic text-sm'>(Tuyên bố ASEAN, Hiệp hội các nước Đông Nam Á (ASEAN), NXB Chính trị quốc gia, Hà Nội, 1998, trang 15, 16)</span>", items: [
            { id: "a", text: "a) Tuyên bố ASEAN được chính thức thông qua tại Băng Cốc (Thái Lan) trong Hội nghị thành lập ASEAN.", correct: true, expl: "Đúng. Bản tuyên bố này (còn gọi là Tuyên bố Băng Cốc) được 5 Ngoại trưởng kí kết vào ngày 8/8/1967 tại thủ đô Băng Cốc, chính thức khai sinh ra ASEAN." },
            { id: "b", text: "b) Tuyên bố ASEAN xác định việc xây dựng một tổ chức khu vực phát triển toàn diện theo những nguyên tắc riêng.", correct: false, expl: "Sai. Đoạn tư liệu ghi rất rõ là ASEAN tuân thủ nguyên tắc luật pháp quốc tế và 'các nguyên tắc của Hiến chương Liên hợp quốc', chứ không hoạt động tùy tiện theo 'những nguyên tắc riêng' biệt lập khỏi cộng đồng thế giới." },
            { id: "c", text: "c) Tuyên bố ASEAN xác định xây dựng Cộng đồng các quốc gia Đông Nam Á phát triển toàn diện, hoà bình và thịnh vượng.", correct: true, expl: "Đúng. Ý số 1 trong đoạn tư liệu đã nêu rõ tầm nhìn muốn 'tăng cường cơ sở cho một Cộng đồng các quốc gia Đông Nam Á hoà bình và thịnh vượng'." },
            { id: "d", text: "d) Tuyên bố ASEAN trở thành khuôn khổ cho những thoả thuận của việc thành lập và xây dựng Cộng đồng ASEAN với ba trụ cột chính.", correct: false, expl: "Sai. Tuyên bố ASEAN (1967) chỉ là nền tảng khởi thủy. Khuôn khổ pháp lý và chính trị thực sự cho việc xây dựng Cộng đồng ASEAN với 3 trụ cột (Chính trị - An ninh, Kinh tế, Văn hóa - Xã hội) là Tuyên bố Ba-li II (năm 2003) và Hiến chương ASEAN (2007)." }
        ]},
        { id: "3_II_3", type: "tf_cluster", context: "Câu 3. Cho những thông tin trong bảng sau đây:<br><br><b>Mỹ:</b> Vẫn là cường quốc đứng đầu thế giới và có ảnh hưởng lớn nhất đến quan hệ quốc tế do nắm sức mạnh về kinh tế, quân sự, khoa học kĩ thuật,...<br><b>Trung Quốc:</b> Vươn lên mạnh mẽ và đã trở thành cường quốc kinh tế đứng thứ 2 thế giới (sau Mỹ) vào năm 2010. Đặc biệt, sức mạnh quân sự không ngừng được tăng cường.<br><b>Nhật Bản:</b> Tiếp tục duy trì địa vị cường quốc kinh tế (hiện nay đứng thứ 4 thế giới) và từng bước tăng cường sức mạnh về chính trị.<br><b>Ấn Độ:</b> Là một cường quốc kinh tế (hiện nay đứng thứ 5 thế giới), quân sự, khoa học – kĩ thuật,... và có ảnh hưởng lớn trong quan hệ quốc tế.<br><b>Nga:</b> Là một trong những cường quốc hàng đầu về quân sự, khoa học – kĩ thuật.", items: [
            { id: "a", text: "a) Một trong những xu thế phát triển của thế giới sau Chiến tranh lạnh là xu thế đa cực trong quan hệ quốc tế.", correct: true, expl: "Đúng. Bảng dữ liệu liệt kê hàng loạt các 'Trung tâm quyền lực' đang mạnh mẽ vươn lên chi phối thế giới (Mỹ, Trung, Nhật, Ấn, Nga) chính là minh chứng rõ nét cho xu thế Đa cực - Nhiều trung tâm." },
            { id: "b", text: "b) Sau Chiến tranh lạnh, Mỹ là cường quốc chi phối tất cả các quốc gia trong quan hệ quốc tế.", correct: false, expl: "Sai. Mỹ có ảnh hưởng lớn nhất nhưng hoàn toàn không thể chi phối 'tất cả' các quốc gia. Việc dùng từ 'tất cả' là tuyệt đối hóa và sai thực tiễn quan hệ quốc tế phức tạp hiện nay." },
            { id: "c", text: "c) Sau Chiến tranh lạnh, Mỹ chịu sự cạnh tranh quyết liệt từ các trung tâm kinh tế lớn trên thế giới.", correct: true, expl: "Đúng. Sự vươn lên thần tốc của Trung Quốc (đứng thứ 2), cùng vị thế của Nhật Bản, Ấn Độ, EU... đã tạo ra sự cạnh tranh gay gắt làm xói mòn tham vọng bá chủ của nước Mỹ." },
            { id: "d", text: "d) Sau Chiến tranh lạnh, Mỹ nhanh chóng thiết lập thành công trật tự thế giới đơn cực do Mỹ lãnh đạo.", correct: false, expl: "Sai. Dù giới cầm quyền Mỹ rất muốn lợi dụng việc Liên Xô sụp đổ để thiết lập trật tự 'đơn cực' do Mỹ làm bá chủ, nhưng họ đã thất bại (chưa bao giờ thiết lập thành công) vì vấp phải sự trỗi dậy của các trung tâm quyền lực khác." }
        ]},
        { id: "3_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>Hội nghị Trung ương lần thứ 15 (mở rộng) \"đề ra nhiệm vụ chung của cách mạng Việt Nam trong giai đoạn hiện nay (kháng chiến chống Mỹ, cứu nước) là: Tăng cường đoàn kết toàn dân, kiên quyết đấu tranh để giữ vững hoà bình; thực hiện thống nhất nước nhà trên cơ sở độc lập và dân chủ, hoàn thành nhiệm vụ cách mạng dân tộc dân chủ nhân dân trong cả nước; ra sức củng cố miền Bắc và đưa miền Bắc tiến lên chủ nghĩa xã hội; xây dựng một nước Việt Nam hoà bình, thống nhất, độc lập, dân chủ và giàu mạnh; tích cực góp phần bảo vệ hoà bình ở Đông Nam Á và thế giới\".<br><span class='italic text-sm'>(Đảng Cộng sản Việt Nam, Văn kiện Đảng toàn tập, tập 20, NXB Chính trị quốc gia, Hà Nội, 2002, trang 63)</span>", items: [
            { id: "a", text: "a) Nhiệm vụ quan trọng của cách mạng Việt Nam trong cuộc kháng chiến chống Mỹ, cứu nước là thống nhất đất nước.", correct: true, expl: "Đúng. Tư liệu khẳng định rõ nhiệm vụ chiến lược xuyên suốt là 'thực hiện thống nhất nước nhà trên cơ sở độc lập và dân chủ'." },
            { id: "b", text: "b) Miền Bắc cần hoàn thành nhiệm vụ cách mạng dân tộc dân chủ nhân dân trong cuộc kháng chiến chống Mỹ, cứu nước.", correct: false, expl: "Sai. Đoạn tư liệu xác định rõ: Miền Bắc 'tiến lên chủ nghĩa xã hội'. Nhiệm vụ cách mạng dân tộc dân chủ nhân dân là áp dụng cho tiền tuyến lớn miền Nam (và hoàn thành trên cả nước khi giải phóng được miền Nam)." },
            { id: "c", text: "c) Độc lập dân tộc và chủ nghĩa xã hội là mục tiêu của cách mạng Việt Nam trong cuộc kháng chiến chống Mỹ, cứu nước.", correct: true, expl: "Đúng. Việc tiến hành song song hai chiến lược cách mạng (Cách mạng XHCN ở miền Bắc và cách mạng giải phóng dân tộc ở miền Nam) chính là sự biểu hiện sinh động của ngọn cờ Độc lập dân tộc gắn liền với Chủ nghĩa xã hội." },
            { id: "d", text: "d) Trong giai đoạn 1954 - 1960, Việt Nam đã tham gia vào lực lượng gìn giữ hoà bình ở Đông Nam Á.", correct: false, expl: "Sai. Tư liệu nói đến định hướng 'tích cực góp phần bảo vệ hòa bình'. Trên thực tế lịch sử, giai đoạn này Việt Nam đang chìm trong khói lửa chiến tranh bảo vệ Tổ quốc, hoàn toàn chưa hề gửi lực lượng tham gia các phái bộ gìn giữ hòa bình quốc tế (Việt Nam mới tham gia Lực lượng Gìn giữ Hòa bình Liên hợp quốc từ năm 2014)." }
        ]}
    ];

    const de2_data = [
        // --- PHẦN I (ĐỀ SỐ 4) ---
        { id: "4_1", type: "single", question: "Câu 1. Thắng lợi có ý nghĩa cơ bản hoàn thành nhiệm vụ đánh cho \"Mỹ cút\", tạo thời cơ thuận lợi để nhân dân ta tiến lên giải phóng hoàn toàn miền Nam là", options: ["cuộc Tổng tiến công và nổi dậy Xuân Mậu Thân 1968.", "Hiệp định Pa-ri về chấm dứt chiến tranh, lập lại hoà bình ở Việt Nam (27-01-1973) được kí kết.", "cuộc Tiến công chiến lược năm 1972.", "chiến thắng \"Điện Biên Phủ trên không\" cuối năm 1972."], correct: 1, explanation: "Hiệp định Pa-ri (27/1/1973) có ý nghĩa vô cùng to lớn. Bằng việc buộc Mỹ phải rút toàn bộ quân đội viễn chinh và quân đồng minh về nước, ta đã căn bản hoàn thành nhiệm vụ chiến lược 'đánh cho Mỹ cút', tạo cán cân lực lượng có lợi trên chiến trường để tiến tới 'đánh cho ngụy nhào' năm 1975." },
        { id: "4_2", type: "single", question: "Câu 2. Đối với nhân dân Liên Xô, sự ra đời của Liên bang Cộng hoà xã hội chủ nghĩa Xô viết không mang đến ý nghĩa nào sau đây?", options: ["Thể hiện sức mạnh đoàn kết, giúp đỡ nhau giữa các dân tộc Xô viết.", "Phù hợp với các lợi ích chung của các dân tộc trên đất nước Xô viết.", "Góp phần tăng cường vị thế của Nhà nước Liên Xô trên trường quốc tế.", "Làm cho chủ nghĩa xã hội phát triển trở thành hệ thống trên thế giới."], correct: 3, explanation: "Nhà nước Liên Xô ra đời năm 1922. Phải đến sau Chiến tranh thế giới thứ hai (năm 1945 trở đi), khi hàng loạt các quốc gia dân chủ nhân dân ở Đông Âu, châu Á ra đời, Chủ nghĩa xã hội mới chính thức vượt ra khỏi phạm vi một nước để trở thành một hệ thống trên thế giới. Do đó phương án D không nằm trong sự kiện năm 1922." },
        { id: "4_3", type: "single", question: "Câu 3. Trước những hạn chế về khuynh hướng cứu nước của các chí sĩ yêu nước đi trước (cuối thế kỉ XIX đầu thế kỉ XX), Nguyễn Tất Thành đã có quyết định gì?", options: ["Ra nước ngoài tìm con đường cứu nước mới cho dân tộc.", "Tích cực tham gia các hoạt động yêu nước.", "Sang Trung Quốc tìm hiểu và nhờ sự giúp đỡ.", "Sang Nga học tập và nhờ sự giúp đỡ."], correct: 0, explanation: "Nhận thấy sự bế tắc trong các con đường cứu nước đương thời (Phan Bội Châu dựa vào Nhật, Phan Châu Trinh dựa vào Pháp cải cách...), người thanh niên Nguyễn Tất Thành đã quyết chí ra đi tìm đường cứu nước mới (ngày 5/6/1911 tại bến cảng Nhà Rồng), đi sang phương Tây - nơi có tư tưởng tự do, bình đẳng, bác ái để tìm hiểu bản chất kẻ thù." },
        { id: "4_4", type: "single", question: "Câu 4. Trong lịch sử chống ngoại xâm của dân tộc Việt Nam, cuộc khởi nghĩa nào sau đây vừa là cuộc đấu tranh giai cấp, vừa đảm nhận sứ mệnh đấu tranh giải phóng dân tộc?", options: ["Phong trào Tây Sơn (thế kỉ XVIII).", "Khởi nghĩa Lam Sơn (1418 – 1427).", "Khởi nghĩa Bà Triệu (248).", "Khởi nghĩa Lý Bí (542 – 544)."], correct: 0, explanation: "Phong trào Tây Sơn bùng nổ mang tính chất là một cuộc khởi nghĩa nông dân chống lại áp bức của các tập đoàn phong kiến trong nước (Nguyễn, Trịnh, Lê). Sau đó, phong trào đã vươn lên đảm nhận sứ mệnh dân tộc cao cả: đánh tan quân xiêm xâm lược (1785) và đại phá 29 vạn quân Thanh (1789), bảo vệ vững chắc nền độc lập." },
        { id: "4_5", type: "single", question: "Câu 5. Một trong những nguyên tắc hoạt động của Liên hợp quốc được quy định trong Hiến chương Liên hợp quốc là", options: ["tôn trọng các nghĩa vụ và luật pháp quốc tế.", "tôn trọng quyết định của 5 nước Uỷ viên thường trực.", "không đưa quân đội Liên hợp quốc vào các khu vực.", "tôn trọng độc lập của 50 nước sáng lập Liên hợp quốc."], correct: 0, explanation: "Điều 2 của Hiến chương Liên hợp quốc quy định rõ các nguyên tắc hoạt động, trong đó có nguyên tắc các quốc gia thành viên phải tận tâm thực hiện các nghĩa vụ quốc tế đã được quy định trong Hiến chương và luật pháp quốc tế để đảm bảo hòa bình." },
        { id: "4_6", type: "single", question: "Câu 6. Trong bối cảnh quốc tế đang diễn ra theo nhiều xu thế mới với những diễn biến phức tạp, chủ trương nhất quán của Đảng và Nhà nước Việt Nam là", options: ["tham gia liên minh chính trị với Mỹ và các nước phương Tây.", "chủ động kết nối các cường quốc để nâng tầm đối tác chiến lược.", "hội nhập quốc tế để thu hút vốn đầu tư bên ngoài bằng mọi giá.", "chủ động nắm bắt thời cơ, đi tắt đón đầu để vượt qua thách thức."], correct: 3, explanation: "Đảng ta luôn xác định hội nhập toàn cầu là một xu thế khách quan mang lại cả cơ hội lớn và thách thức nghiệt ngã. Chủ trương đúng đắn nhất quán là phải giữ vững độc lập tự chủ, phát huy sức mạnh dân tộc để chủ động nắm bắt thời cơ, tận dụng thành tựu cách mạng khoa học kỹ thuật (đi tắt đón đầu) nhằm vượt qua các thách thức." },
        { id: "4_7", type: "single", question: "Câu 7. Từ năm 1949 đến giữa những năm 70 của thế kỉ XX, yếu tố nào sau đây đã tác động đến sự phát triển của chủ nghĩa xã hội ở Đông Âu?", options: ["Sự giúp đỡ to lớn của nhân dân Liên Xô.", "Tình hình chính trị của châu Âu ổn định.", "Nhận viện trợ của hệ thống các nước tư bản chủ nghĩa.", "Sự giúp đỡ của các quốc gia trong phong trào Không liên kết."], correct: 0, explanation: "Trong khuôn khổ Hội đồng Tương trợ Kinh tế (SEV) được thành lập năm 1949, Liên Xô đóng vai trò là anh cả, đã viện trợ vô cùng to lớn về vốn, khoa học kỹ thuật, thiết bị... giúp các nước Đông Âu vượt qua khó khăn, xây dựng thành công cơ sở vật chất - kỹ thuật của CNXH." },
        { id: "4_8", type: "single", question: "Câu 8. Hội nghị toàn quốc của Đảng Cộng sản Đông Dương họp tại Tân Trào (Tuyên Quang) từ ngày 14 đến ngày 15 – 8 – 1945 đưa ra chủ trương nào sau đây?", options: ["Phát động cao trào kháng Nhật, cứu nước.", "Quyết định giành chính quyền ở Hà Nội trước tiên.", "Thông qua kế hoạch lãnh đạo toàn dân Tổng khởi nghĩa.", "Phát động Tổng tiến công quân địch trên toàn quốc."], correct: 2, explanation: "Ngay khi nhận được tin Nhật sắp đầu hàng, Hội nghị toàn quốc của Đảng họp tại Tân Trào (14 - 15/8/1945) đã nhận định thời cơ khởi nghĩa đã chín muồi và chính thức quyết định phát động toàn dân Tổng khởi nghĩa giành chính quyền trước khi quân Đồng minh vào." },
        { id: "4_9", type: "single", question: "Câu 9. Vào đầu thế kỉ XX, hoạt động đối ngoại của Việt Nam gắn với những nhà yêu nước tiêu biểu nào?", options: ["Phan Bội Châu, Phan Châu Trinh, Nguyễn Ái Quốc.", "Phan Bội Châu, Phan Đình Phùng, Nguyễn Ái Quốc.", "Hoàng Hoa Thám, Phan Châu Trinh, Nguyễn Ái Quốc.", "Phan Bội Châu, Phan Châu Trinh, Phan Đình Phùng."], correct: 0, explanation: "Đầu thế kỷ XX, tư duy cứu nước của dân tộc ta có sự chuyển biến mạnh mẽ, chuyển sang hướng ngoại tìm kiếm sự ủng hộ của quốc tế. Những nhân vật tiêu biểu đi tiên phong xuất dương là Phan Bội Châu (sang Nhật Bản), Phan Châu Trinh (vận động cải cách, sau sang Pháp) và Nguyễn Tất Thành - Nguyễn Ái Quốc (sang phương Tây)." },
        { id: "4_10", type: "single", question: "Câu 10. Việt Nam tham gia vào Cộng đồng ASEAN đã đem đến lợi ích gì?", options: ["Thúc đẩy tăng trưởng xã hội, giảm nghèo và phát triển bền vững.", "Nâng cao vị thế và vai trò của Việt Nam trên trường quốc tế.", "Bảo vệ nhân quyền và phát triển môi trường bền vững.", "Loại bỏ hoàn toàn tham nhũng và tội phạm."], correct: 1, explanation: "Gia nhập ASEAN năm 1995 giúp Việt Nam phá thế bao vây cô lập, hội nhập sâu rộng kinh tế thế giới. Đồng thời, qua việc có tiếng nói trong khu vực, chúng ta đã củng cố môi trường hòa bình, nâng cao đáng kể vị thế, uy tín chính trị và tiếng nói của Việt Nam trên trường quốc tế." },
        { id: "4_11", type: "single", question: "Câu 11. Tổng khởi nghĩa giành chính quyền của nhân dân Việt Nam (1945) nổ ra trong bối cảnh quốc tế nào sau đây?", options: ["Liên hợp quốc được thành lập và tuyên bố chống phát xít.", "Quân phiệt Nhật đầu hàng Đồng minh không điều kiện.", "Chiến tranh lạnh bùng nổ và lan rộng khắp thế giới.", "Liên Xô và Mỹ đang ở thế đối đầu gay gắt về quân sự."], correct: 1, explanation: "Ngày 15-8-1945, Nhật hoàng tuyên bố đầu hàng Đồng minh không điều kiện trên đài phát thanh. Quân Nhật ở Đông Dương lập tức rệu rã, hoang mang tột độ. Kẻ thù duy nhất đã gục ngã, tạo ra 'Thời cơ ngàn năm có một' để nhân dân ta vùng lên Tổng khởi nghĩa." },
        { id: "4_12", type: "single", question: "Câu 12. Nhà nước dân chủ nhân dân được thành lập muộn nhất ở Đông Âu là", options: ["Cộng hoà Nhân dân Ba Lan.", "Cộng hoà Nhân dân An-ba-ni.", "Cộng hoà Nhân dân Bun-ga-ri.", "Cộng hoà Dân chủ Đức."], correct: 3, explanation: "Do tình trạng nước Đức bị chia cắt và chiếm đóng sau chiến tranh, phải đến tháng 10 năm 1949, với sự ủng hộ của Liên Xô, nhà nước Cộng hòa Dân chủ Đức mới được thành lập ở phía Đông. Đây là nước Đông Âu ra đời muộn nhất." },
        { id: "4_13", type: "single", question: "Câu 13. Ngay sau Cách mạng tháng Tám năm 1945 thắng lợi, nước Việt Nam Dân chủ Cộng hoà phải đối phó với khó khăn nào sau đây?", options: ["Quân đội các nước đế quốc dưới danh nghĩa quân Đồng minh kéo vào Đông Dương giải giáp quân Nhật.", "Mỹ đưa quân viễn chinh vào miền Nam.", "Chưa có lực lượng vũ trang cách mạng.", "Mỹ tăng cường viện trợ cho Pháp."], correct: 0, explanation: "Theo quyết định của Hội nghị Pốt-xđam, từ vĩ tuyến 16 trở ra Bắc, 20 vạn quân Trung Hoa Dân quốc mang theo bè lũ tay sai ồ ạt kéo vào; từ vĩ tuyến 16 trở vào Nam, quân Anh dọn đường cho Pháp quay lại xâm lược. Đất nước lâm vào tình thế 'ngàn cân treo sợi tóc'." },
        { id: "4_14", type: "single", question: "Câu 14. Tổ chức hợp tác mang tính khu vực nào trên thế giới đã cổ vũ các nước Đông Nam Á tìm cách liên kết lại với nhau?", options: ["Diễn đàn hợp tác Á – Âu (ASEM).", "Diễn đàn hợp tác kinh tế châu Á – Thái Bình Dương (APEC).", "Cộng đồng các quốc gia độc lập (SNG).", "Cộng đồng kinh tế châu Âu (EEC)."], correct: 3, explanation: "Sự ra đời và hoạt động vô cùng hiệu quả, mang lại sự phát triển kinh tế mạnh mẽ của Khối thị trường chung châu Âu (EEC, nay là EU) đã trở thành nguồn cổ vũ, động lực to lớn thúc đẩy các nước Đông Nam Á nhận thức được sức mạnh của việc liên kết khu vực." },
        { id: "4_15", type: "single", question: "Câu 15. Các cuộc kháng chiến bảo vệ Tổ quốc từ năm 1945 đến nay để lại bài học nào sau đây cho công cuộc bảo vệ Tổ quốc Việt Nam xã hội chủ nghĩa?", options: ["Phát huy yếu tố ngoại lực làm nhân tố quyết định sức mạnh bảo vệ Tổ quốc.", "Kết hợp sức mạnh dân tộc và sức mạnh thời đại, kết hợp xây dựng và bảo vệ Tổ quốc.", "Luôn đẩy mạnh các hoạt động ngoại giao để mở đường cho đấu tranh quân sự.", "Tăng cường sức mạnh quân sự là biện pháp duy nhất để bảo vệ Tổ quốc."], correct: 1, explanation: "Bài học lớn nhất của cách mạng Việt Nam là luôn lấy sức mạnh nội lực của dân tộc làm gốc, kết hợp khéo léo với sức mạnh ủng hộ của thời đại (phong trào hòa bình quốc tế, ngoại giao). Đồng thời, luôn gắn kết chặt chẽ hai nhiệm vụ chiến lược: kiến quốc (xây dựng) và kháng chiến (bảo vệ Tổ quốc)." },
        { id: "4_16", type: "single", question: "Câu 16. Nội dung nào sau đây phản ánh đúng quốc sách hàng đầu trong đường lối Đổi mới ở Việt Nam?", options: ["Phát triển giáo dục – đào tạo và khoa học – công nghệ.", "Kiên quyết xoá bỏ cơ chế quản lí kinh tế tập trung, bao cấp.", "Xây dựng Ba chương trình kinh tế lớn.", "Đẩy lùi và kiểm soát lạm phát."], correct: 0, explanation: "Đảng ta luôn khẳng định: Giáo dục - đào tạo cùng với khoa học - công nghệ là quốc sách hàng đầu, là động lực then chốt để phát triển kinh tế tri thức, thực hiện thành công sự nghiệp công nghiệp hóa, hiện đại hóa đất nước." },
        { id: "4_17", type: "single", question: "Câu 17. Vào đầu thế kỉ XX, Phan Bội Châu đã chọn quốc gia nào cho các hoạt động đối ngoại?", options: ["Nhật Bản, Trung Quốc.", "Hàn Quốc, Nhật Bản.", "Trung Quốc, Ấn Độ.", "Pháp, Trung Quốc."], correct: 0, explanation: "Phan Bội Châu chọn Nhật Bản làm điểm đến đầu tiên (với phong trào Đông Du 1905-1908) vì đây là nước châu Á tự cường đánh thắng Nga. Sau khi bị trục xuất, cụ sang hoạt động ở Trung Quốc (thành lập Việt Nam Quang phục hội 1912 tại Quảng Châu)." },
        { id: "4_18", type: "single", question: "Câu 18. Nội dung nào sau đây không phải là nguyên tắc của công cuộc Đổi mới ở Việt Nam từ năm 1986 đến nay?", options: ["Đổi mới chính trị đi trước mở đường cho đổi mới kinh tế.", "Đổi mới kinh tế gắn liền với đổi mới chính trị và văn hoá – xã hội.", "Đổi mới chính trị phải được tiến hành tích cực và vững chắc.", "Đổi mới chính trị không được làm phương hại đến công cuộc Đổi mới."], correct: 0, explanation: "Nguyên tắc cốt lõi của Đảng ta là lấy đổi mới kinh tế làm trọng tâm đầu tiên, từng bước tháo gỡ khó khăn kinh tế để tạo tiền đề cho đổi mới toàn diện. Không có việc lấy đổi mới chính trị đi trước một cách vội vã, nhằm tránh sự mất ổn định, sụp đổ như sai lầm của Liên Xô." },
        { id: "4_19", type: "single", question: "Câu 19. Nội dung nào sau đây không phản ánh đúng mục đích thành lập ASEAN?", options: ["Thúc đẩy sự tăng trưởng kinh tế, tiến bộ xã hội và phát triển văn hoá trong khu vực thông qua các nỗ lực chung và hợp tác nhằm hướng tới một Đông Nam Á hoà bình và thịnh vượng.", "Thúc đẩy sự cộng tác tích cực và giúp đỡ lẫn nhau trong các lĩnh vực: kinh tế xã hội, văn hoá, khoa học kĩ thuật và hành chính.", "Thúc đẩy hoà bình và ổn định khu vực bằng tôn trọng công lí và nguyên tắc luật pháp trong quan hệ giữa các quốc gia trong vùng và tuân thủ các nguyên tắc của Hiến chương Liên hợp quốc.", "Thúc đẩy việc thực hiện các giải pháp chống biến đổi khí hậu; bảo vệ môi trường động, thực vật và nghiên cứu thế giới để phát triển khu vực."], correct: 3, explanation: "Ba mục tiêu A, B, C được ghi nhận rất rõ ràng trong Tuyên bố Băng Cốc (1967) nhằm thúc đẩy phát triển và đảm bảo hòa bình an ninh khu vực. Còn vấn đề biến đổi khí hậu và bảo vệ môi trường toàn cầu chưa phải là mục tiêu trọng tâm trong bối cảnh lịch sử thành lập ASEAN năm 1967." },
        { id: "4_20", type: "single", question: "Câu 20. Nội dung nào sau đây phản ánh đúng một trong những điểm tương đồng giữa bài học kinh nghiệm của các cuộc kháng chiến bảo vệ Tổ quốc từ năm 1945 đến nay và công cuộc Đổi mới ở Việt Nam từ năm 1986 đến nay?", options: ["Gắn độc lập dân tộc với chủ nghĩa xã hội.", "Kết hợp tổng khởi nghĩa và tổng công kích.", "Phát huy vai trò của lực lượng du kích.", "Dựa vào viện trợ của phe xã hội chủ nghĩa."], correct: 0, explanation: "Sợi chỉ đỏ xuyên suốt đường lối cách mạng Việt Nam dưới sự lãnh đạo của Đảng, từ đấu tranh giải phóng dân tộc, bảo vệ Tổ quốc cho đến công cuộc Đổi mới hiện nay đều kiên định mục tiêu: Độc lập dân tộc gắn liền với chủ nghĩa xã hội." },
        { id: "4_21", type: "single", question: "Câu 21. Cuộc kháng chiến chống thực dân Pháp (1945–1954) và cuộc kháng chiến chống Mỹ, cứu nước (1954 - 1975) ở Việt Nam có điểm tương đồng gì về đấu tranh ngoại giao?", options: ["Đấu tranh ngoại giao luôn đi trước mở đường cho đấu tranh quân sự.", "Mặt trận ngoại giao được hình thành ngay từ đầu cuộc kháng chiến.", "Đấu tranh ngoại giao có mối quan hệ chặt chẽ với đấu tranh chính trị.", "Hoạt động ngoại giao chịu sự chi phối hoàn toàn của hoạt động quân sự."], correct: 2, explanation: "Trong nghệ thuật chỉ đạo chiến tranh của Đảng ta, ba mặt trận Quân sự, Chính trị và Ngoại giao luôn được phối hợp nhịp nhàng. Trong đó, ngoại giao là mặt trận quan trọng kết hợp chặt chẽ với đấu tranh chính trị để tố cáo tội ác địch, tranh thủ sự ủng hộ của nhân loại tiến bộ." },
        { 
            id: "4_22", 
            type: "single", 
            question: "Câu 22. Những hoạt động yêu nước đầu tiên của Nguyễn Tất Thành ở Pháp có tác dụng gì đối với cách mạng Việt Nam?", 
            options: [
                "Là cơ sở để Người tiếp nhận ảnh hưởng của Cách mạng tháng Mười Nga.", 
                "Làm chuyển biến mạnh mẽ tư tưởng của Người.", 
                "Tuyên truyền và khích lệ tinh thần yêu nước của Việt kiều ở Pháp.", 
                "Là cơ sở quan trọng để Người xác định con đường cứu nước đúng đắn cho dân tộc Việt Nam."
            ], 
            correct: 3, 
            explanation: "Đáp án chính xác là D. Những hoạt động yêu nước của Nguyễn Tất Thành từ năm 1911 đến năm 1918 (bao gồm những hoạt động đầu tiên tại Pháp) tuy mới chỉ là bước đầu nhưng đã giúp Người thâm nhập vào thực tiễn đời sống của giai cấp công nhân, nhân dân lao động các nước và rút ra những bài học kinh nghiệm quý báu. Đây chính là cơ sở nền tảng, tạo tiền đề quan trọng để Người tiến tới xác định con đường cứu nước đúng đắn cho dân tộc Việt Nam (con đường cách mạng vô sản) trong giai đoạn sau này." 
        },
        { id: "4_23", type: "single", question: "Câu 23. Trải qua hơn 70 năm hoạt động (từ năm 1945 đến nay), Liên hợp quốc đã có nhiều vai trò, đóng góp trên các lĩnh vực, nhưng không có vai trò nào sau đây?", options: ["Góp phần thúc đẩy quá trình phi thực dân hoá ở nhiều nơi trên thế giới.", "Tạo môi trường kinh tế quốc tế bình đẳng.", "Ngăn chặn được các cuộc đối đầu Đông – Tây và xung đột trên thế giới.", "Xây dựng các hiệp ước quốc tế về giải trừ quân bị."], correct: 2, explanation: "Dù Liên hợp quốc đã rất nỗ lực bảo vệ hòa bình, ngăn chặn một cuộc Chiến tranh thế giới thứ ba, nhưng tổ chức này KHÔNG ngăn chặn được Chiến tranh lạnh (sự đối đầu khốc liệt Đông - Tây) và cũng không thể dập tắt hoàn toàn mọi cuộc xung đột vũ trang cục bộ trên thế giới." },
        { id: "4_24", type: "single", question: "Câu 24. Cương lĩnh chính trị đầu tiên (1930) do Nguyễn Ái Quốc soạn thảo và được thông qua tại Hội nghị thành lập Đảng có sự kết hợp đúng đắn giữa vấn đề dân tộc và vấn đề giai cấp vì lí do nào sau đây?", options: ["Xác định nhiệm vụ giải phóng dân tộc và giai cấp ngang hàng nhau.", "Kết hợp vấn đề dân tộc và giai cấp nhưng đặt nhiệm vụ dân tộc lên hàng đầu.", "Coi vấn đề ruộng đất là vấn đề quan trọng nhất của cách mạng.", "Xác định phải tiến hành đồng thời cách mạng giải phóng dân tộc và ruộng đất."], correct: 1, explanation: "Sự thiên tài của Nguyễn Ái Quốc là nhận thức được ở một nước thuộc địa như Việt Nam, mâu thuẫn dân tộc vô cùng sâu sắc. Do đó, Cương lĩnh đã vận dụng sáng tạo chủ nghĩa Mác-Lênin, kiên quyết đặt nhiệm vụ giải phóng dân tộc (đánh đổ đế quốc) lên trên hết, trước hết, khác hoàn toàn với quan điểm dập khuôn đấu tranh giai cấp của Luận cương tháng 10/1930." },

        // --- PHẦN II (ĐÚNG/SAI - ĐỀ SỐ 4) ---
        { id: "4_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>\"Điện Biên Phủ trên không là trận quyết chiến có ý nghĩa chiến lược, là trận thử thách chưa từng có trong lịch sử. Chúng ta đã giành thắng lợi to lớn, toàn diện, buộc Mỹ phải chấp nhận mọi điều khoản của Hiệp định Pa-ri về chấm dứt chiến tranh, lập lại hoà bình ở Việt Nam, phải thực hiện tôn trọng độc lập chủ quyền và toàn vẹn lãnh thổ của Việt Nam, phải rút hết quân Mỹ về nước. Chiến thắng này đã góp phần tạo ra thế và lực mới cho sự nghiệp giải phóng miền Nam, thống nhất đất nước của nhân dân ta, để chúng ta thực hiện trọn vẹn lời dạy của Chủ tịch Hồ Chí Minh kính yêu: “Đánh cho Mỹ cút, đánh cho nguỵ nhào\".<br><span class='italic text-sm'>(Chiến thẳng \"Điện Biên Phủ trên không\": Khẳng định chân lí “Không có gì quý hơn độc lập tự do\", Báo Điện tử Đảng Cộng sản Việt Nam, ngày 15-12-2022)</span>", items: [
            { id: "a", text: "a) Mỹ bắt đầu đàm phán với Việt Nam tại Hội nghị Pa-ri sau khi thất bại trong 12 ngày đêm trong trận \"Điện Biên Phủ trên không\".", correct: false, expl: "Sai. Hội nghị Paris đã bắt đầu đàm phán kéo dài ròng rã suốt 5 năm từ 1968. Thất bại thảm hại trong trận Điện Biên Phủ trên không cuối năm 1972 chỉ đập tan thái độ lật lọng của Mỹ, buộc Mỹ phải quay lại bàn đàm phán và kí chính thức Hiệp định Paris (tháng 1/1973)." },
            { id: "b", text: "b) Theo Hiệp định Pa-ri về chấm dứt chiến tranh, lập lại hoà bình ở Việt Nam, Mỹ phải rút quân khỏi Việt Nam.", correct: true, expl: "Đúng. Tư liệu nhắc lại rõ ràng điều khoản cốt lõi của hiệp định: Mỹ 'phải rút hết quân Mỹ về nước'." },
            { id: "c", text: "c) Thắng lợi trên mặt trận quân sự có ý nghĩa quyết định đến thắng lợi trên bàn đàm phán.", correct: true, expl: "Đúng. Đòn trừng phạt quân sự sấm sét trên bầu trời Hà Nội chính là yếu tố mang tính cưỡng chế, ép Mỹ vô điều kiện phải chấp nhận ký vào Hiệp định. Ngoại giao là phản ánh kết quả trên chiến trường." },
            { id: "d", text: "d) Với Hiệp định Pa-ri, nhân dân Việt Nam đã hoàn thành cuộc cách mạng dân tộc dân chủ nhân dân.", correct: false, expl: "Sai. Hiệp định Paris mới chỉ giúp ta hoàn thành mục tiêu 'Đánh cho Mỹ cút'. Cuộc cách mạng dân tộc dân chủ nhân dân chỉ thực sự hoàn thành thắng lợi trọn vẹn sau Đại thắng mùa Xuân 1975 ('Đánh cho ngụy nhào', giải phóng hoàn toàn miền Nam)." }
        ]},
        { id: "4_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>Vào thập niên 1980, mối quan hệ nồng ấm giữa Tổng thống Mỹ Ri-gân và nhà lãnh đạo Liên Xô Goóc-ba-chốp đã giúp giảm dần tình trạng căng thẳng của Chiến tranh lạnh. Năm 1987, hai nhà lãnh đạo đã đồng ý huỷ bỏ tên lửa hạt nhân tầm trung. Năm 1989, Goóc-ba-chốp cho phép các quốc gia xã hội chủ nghĩa ở Đông Âu bầu ra chính phủ dân chủ, và đến năm 1991, Liên Xô tan rã thành 15 nước Cộng hoà độc lập. Ngày 12 - 3 - 1999, Hun-ga-ri, Ba Lan và Cộng hoà Séc gia nhập khối NATO.<br><span class='italic text-sm'>(Theo Kin-phít-sơ (Nguyễn Đức Tinh và Ngô Minh Châu dịch), Bách khoa thư lịch sử, NXB Từ điển bách khoa, Hà Nội, 2009)</span>", items: [
            { id: "a", text: "a) Trật tự thế giới hai cực I-an-ta bắt đầu bị xói mòn và sụp đổ trong thập niên 80 của thế kỉ XX.", correct: false, expl: "Sai. Trật tự hai cực I-an-ta đã 'bắt đầu bị xói mòn' từ những năm 70 với sự vươn lên cạnh tranh kinh tế của Tây Âu và Nhật Bản. Thập niên 80 chứng kiến các cuộc gặp thượng đỉnh Xô - Mỹ để đi đến kết thúc chiến tranh lạnh, và trật tự này thực sự 'sụp đổ' là vào năm 1991." },
            { id: "b", text: "b) Chiến tranh lạnh kết thúc và Trật tự thế giới hai cực I-an-ta sụp đổ bắt nguồn từ những nguyên nhân khác nhau, nhưng yếu tố Mỹ và Liên Xô vẫn là quyết định.", correct: true, expl: "Đúng. Cả hai siêu cường đều chạy đua vũ trang đến suy kiệt nên buộc phải xích lại gần nhau, thỏa hiệp để chấm dứt Chiến tranh lạnh. Thỏa thuận của hai cực chính là yếu tố quyết định cục diện này." },
            { id: "c", text: "c) Chiến tranh lạnh đã kết thúc và Trật tự thế giới hai cực I-an-ta đã sụp đổ, nhưng nhiều di chứng của nó vẫn còn và đang tiếp diễn ở nhiều nơi trên thế giới.", correct: true, expl: "Đúng. Mặc dù cấu trúc 2 cực đã tan vỡ, nhưng nhiều hệ lụy, mâu thuẫn sắc tộc, tranh chấp lãnh thổ (bị che lấp trong thời kì 2 cực) nay bùng phát, cùng với việc NATO tiếp tục đông tiến bành trướng gây căng thẳng ở nhiều khu vực." },
            { id: "d", text: "d) Chiến tranh lạnh chấm dứt, Trật tự thế giới hai cực I-an-ta sụp đổ đã mở ra chiều hướng và điều kiện để giải quyết quan hệ quốc tế bằng giải pháp hoà bình.", correct: true, expl: "Đúng. Sự chấm dứt đối đầu Xô - Mỹ đã tạo ra môi trường hòa hoãn, đối thoại, lấy đàm phán làm phương thức chủ yếu để giải quyết các xung đột và tranh chấp quốc tế." }
        ]},
        { id: "4_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>“Trong nửa sau thế kỉ XX, có một từ đã xuất hiện trong tiếng nói của những người bảo vệ và kiến tạo hoà bình trên thế giới, một từ mà cùng một lúc mang rất nhiều ý nghĩa đấu tranh, dũng cảm, anh hùng; và nó còn có ý nghĩa là chiến thắng, độc lập, tự do. Từ đó là Việt Nam. Và có một cái tên đã luôn gắn liền với từ này – từ chỉ tên của một đất nước. Đó là Hồ Chí Minh\".<br><span class='italic text-sm'>(Rơ-mét Chan-đờ-ra, Việt Nam và cuộc đấu tranh vì hoà bình, tự do và độc lập trích trong Việt Nam trong thế kỉ XX, tập 1, NXB Chính trị quốc gia, Hà Nội, 2001, trang 48)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu thể hiện sự kính trọng, ngưỡng mộ của nhân dân thế giới đối với Chủ tịch Hồ Chí Minh.", correct: true, expl: "Đúng. Tư liệu nhắc đến Bác với những từ ngữ biểu tượng cho sự dũng cảm, anh hùng và tự do, minh chứng cho sự kính trọng sâu sắc của cộng đồng quốc tế." },
            { id: "b", text: "b) Chủ tịch Hồ Chí Minh đã mở ra cho nhân dân các nước thuộc địa con đường cách mạng vô sản để giải phóng.", correct: false, expl: "Sai. Sự kiện lịch sử khách quan 'mở ra con đường cách mạng vô sản' cho toàn thế giới là Cách mạng tháng Mười Nga (1917). Hồ Chí Minh là người tiếp thu và vận dụng xuất sắc con đường ấy vào Việt Nam và trở thành ngọn cờ cổ vũ phong trào giải phóng dân tộc, nhưng nói Người 'mở ra' con đường này cho tất cả nhân dân thuộc địa trên toàn thế giới là không chính xác về mặt học thuật lịch sử." },
            { id: "c", text: "c) Chủ tịch Hồ Chí Minh là anh hùng giải phóng dân tộc, nhà văn hoá kiệt xuất của Việt Nam. Những đóng góp của Chủ tịch Hồ Chí Minh là sự kết tinh của truyền thống văn hoá Việt Nam và tinh hoa văn hoá nhân loại.", correct: true, expl: "Đúng. Nhận định này hoàn toàn chính xác theo sự tôn vinh của UNESCO (năm 1987) dành cho vị Lãnh tụ vĩ đại của dân tộc ta." },
            { id: "d", text: "d) Chủ tịch Hồ Chí Minh là biểu tượng cao đẹp nhất của chủ nghĩa yêu nước và chủ nghĩa anh hùng cách mạng Việt Nam, góp phần bảo vệ và kiến tạo hoà bình thế giới.", correct: true, expl: "Đúng. Bác Hồ và dân tộc Việt Nam đã trở thành biểu tượng của những người 'bảo vệ và kiến tạo hòa bình' chống lại chủ nghĩa thực dân." }
        ]},
        { id: "4_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>“ASEAN là một điều kì diệu sống động và mang hơi thở của cuộc sống hiện đại. Tại sao? Không một tổ chức khu vực nào khác đã làm được nhiều như Hiệp hội các quốc gia Đông Nam Á (ASEAN) trong việc cải thiện điều kiện sống của một bộ phận đáng kể nhân loại. Hơn 600 triệu người sống trong khu vực có bước tiến đáng kể trong 50 năm qua, kể từ khi Hiệp hội được thành lập. ASEAN đã mang lại hoà bình và thịnh vượng cho một khu vực từng gặp nhiều vấn đề, tạo ra sự hài hoà giữa các nền văn minh ở khu vực vốn đa dạng nhất hành tinh, mang lại niềm hi vọng cho người dân sống tại khu vực. ASEAN có thể cũng đóng vai trò như một chất xúc tác quan trọng cho sự trỗi dậy một cách hoà bình của Trung Quốc. ASEAN vì thế xứng đáng nhận giải Nô-ben Hoà bình hơn bất kì cá nhân và tổ chức nào hiện nay\".<br><span class='italic text-sm'>(Ma-bu-ba-ni & Giép-phơ-ri Sng (Phạm Bình Thục dịch), ASEAN diệu kì vì một Cộng đồng ASEAN phát triển bền vững và thịnh vượng, NXB Thế giới, Hà Nội, 2017, trang 11)</span>", items: [
            { id: "a", text: "a) ASEAN đã có nhiều nỗ lực trong việc kiến tạo hoà bình và thịnh vượng; tạo ra sự hài hoà giữa các nền văn minh đa dạng ở khu vực Đông Nam Á.", correct: true, expl: "Đúng. Đoạn tư liệu khẳng định thành quả lớn lao của ASEAN trong việc mang lại hòa bình, thịnh vượng và dung hòa được sự đa dạng khổng lồ về tôn giáo, văn hóa trong khu vực." },
            { id: "b", text: "b) Sự phát triển của ASEAN đóng vai trò như một chất xúc tác quan trọng, góp phần làm kiềm chế những ảnh hưởng của các nước lớn vào khu vực Đông Nam Á.", correct: true, expl: "Đúng. Bằng chính sách ngoại giao linh hoạt, cân bằng và thúc đẩy các cấu trúc an ninh do ASEAN dẫn dắt (như ARF), ASEAN đã thành công trong việc tạo thế cân bằng, không để một nước lớn nào độc quyền chi phối khu vực." },
            { id: "c", text: "c) ASEAN là một tổ chức hoàn hảo và ít phải đối mặt với các thách thức trong tương lai, mang lại hoà bình, thịnh vượng cho người dân sống tại khu vực.", correct: false, expl: "Sai. Dù đạt nhiều thành tựu 'kỳ diệu', nhưng ASEAN hoàn toàn không phải là một tổ chức 'hoàn hảo'. Khối này vẫn đang đối mặt với muôn vàn thách thức lớn như khoảng cách phát triển, an ninh biển đảo, sự chia rẽ nội khối và sức ép từ cuộc cạnh tranh địa chính trị giữa các siêu cường." },
            { id: "d", text: "d) Lịch sử và văn hoá Đông Nam Á đã ảnh hưởng đến nguyên tắc hoạt động, mục tiêu, định hướng phát triển và là một phần quan trọng để ASEAN trở thành một tổ chức liên kết khu vực thành công.", correct: true, expl: "Đúng. Chính đặc thù lịch sử và sự đa dạng văn hóa đã hình thành nên bản sắc hoạt động rất riêng của ASEAN ('Phương thức ASEAN') – đó là tôn trọng độc lập chủ quyền, không can thiệp nội bộ và luôn giải quyết vấn đề dựa trên sự đồng thuận tuyệt đối." }
        ]}
    ];

    const testBanks = { de1: de1_data, de2: de2_data };
    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    // BẮT ĐẦU BÀI THI
    window.startQuizAction = function() {
        try {
            const errDiv = document.getElementById('login-error');
            if(errDiv) errDiv.classList.add('hidden');
            
            const nameEl = document.getElementById('hoTen');
            const lopEl = document.getElementById('lop');
            
            const name = nameEl.value.trim();
            const lop = lopEl.value.trim();
            const checkedRadio = document.querySelector('input[name="chonDe"]:checked');
            
            if (!name || !lop) {
                if(errDiv) {
                    errDiv.innerText = "⚠️ Nhắc học sinh nhập đầy đủ Họ tên và Lớp cô nhé!";
                    errDiv.classList.remove('hidden');
                }
                return;
            }
            
            if (name && lop && checkedRadio) {
                const maDe = checkedRadio.value;
                const tenDe = checkedRadio.nextElementSibling.querySelector('.de-text').innerText.split('\n')[0].trim();
                currentStudent = { hoTen: name, lop: lop, maDe: maDe, tenDe: tenDe };
                currentQuestions = JSON.parse(JSON.stringify(testBanks[maDe]));
                quizStartTime = new Date();
                
                setTimeout(() => { isQuizStarted = true; }, 1000);
                showSection('quiz');
                
                const titleEl = document.getElementById('quiz-title');
                const infoEl = document.getElementById('student-info');
                if (titleEl) titleEl.innerText = currentStudent.tenDe;
                if (infoEl) infoEl.innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
                
                currentIdx = 0;
                userAnswers = {};
                window.renderQuestion();
                startTimer(50 * 60); 
            }
        } catch (error) {
            console.error(error);
        }
    };

    window.prevQuestion = function() {
        if (currentIdx > 0) { currentIdx--; window.renderQuestion(); }
    };

    window.nextQuestion = function() {
        if (currentIdx < currentQuestions.length - 1) { currentIdx++; window.renderQuestion(); }
    };

    window.viewScoresAction = function() {
        const btn = document.getElementById('view-scores-btn') || document.createElement('button'); 
        btn.innerText = "⏳ Đang tải dữ liệu...";
        if (database) {
            scoresRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                allScores = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                window.renderScores();
                btn.innerText = "🏆 Xem bảng xếp hạng";
                showSection('scores');
            });
        }
    };

    window.goHome = function() {
        if(document.getElementById('hoTen')) document.getElementById('hoTen').value = ''; 
        if(document.getElementById('lop')) document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    };

    function getTotalScoreItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.items.length;
            else count += 1;
        });
        return count; 
    }

    function getAnsweredCount() {
        return Object.keys(userAnswers).length;
    }

    // LƯU ĐÁP ÁN PHẦN I VÀ PHẦN II
    window.selectAnswer = function(qId, val, type) {
        if (type === 'tf') {
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            
            const parts = qId.split('_'); 
            const mainQId = parts.slice(0, 3).join('_'); 
            const itemId = parts[3]; 
            const q = currentQuestions.find(i => i.id === mainQId);
            const item = q.items.find(i => i.id === itemId);
            
            // Gọi Popup giải thích
            window.showFeedbackModal(item, val, 'tf');

        } else if (type === 'single') {
            if (userAnswers[qId] !== undefined) return;
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            const q = currentQuestions[currentIdx];
            window.showFeedbackModal(q, val, 'single');
        }
    };

    // MODAL PHẢN HỒI LỜI GIẢI CHI TIẾT
    window.showFeedbackModal = function(qOrItem, uAns, type = 'single') {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        const header = document.getElementById('feedback-header');
        const body = document.getElementById('feedback-body');
        
        if(!modal || !content) return; 

        window.autoAdvance = (type === 'single' || type === 'short'); // Tự động chuyển câu nếu là trắc nghiệm 1 đáp án

        let isCorrect = false;
        let explanation = qOrItem.explanation || qOrItem.expl || "Chưa có lời giải chi tiết.";
        let optionsHtml = '';
        
        let questionText = "";
        if (type === 'single' || type === 'short') {
            questionText = qOrItem.question || "";
        } else if (type === 'tf') {
            questionText = qOrItem.text || "";
        }

        let questionHtml = `<div class="bg-slate-50 border-l-4 border-blue-500 p-4 rounded-r-xl shadow-sm mb-6 text-left">
            <div class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">Nội dung câu hỏi:</div>
            <div class="text-slate-800 font-bold text-lg math-scroll">${questionText}</div>
        </div>`;

        if (type === 'single') {
            isCorrect = (uAns === qOrItem.correct);
            
            optionsHtml += `<div class="space-y-3 mb-6 mt-4">`;
            qOrItem.options.forEach((opt, i) => {
                let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                if (qOrItem.correct === i) {
                    optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                    textStyle = 'font-bold';
                } else if (uAns === i && !isCorrect) {
                    optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                    textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                } else { 
                    optBg = 'bg-white text-slate-700 border border-slate-200'; 
                }

                let letterBg = (qOrItem.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                               ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                optionsHtml += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                    <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                    <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                    ${iconHtml}
                                </div>`;
            });
            optionsHtml += `</div>`;

        } else if (type === 'tf') {
            isCorrect = (uAns === qOrItem.correct);
            let ansText = qOrItem.correct ? 'ĐÚNG' : 'SAI';
            let uAnsText = uAns ? 'ĐÚNG' : 'SAI';
            
            optionsHtml += `
                <div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm mb-6 mt-4 text-left">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="font-black uppercase ${isCorrect ? 'text-emerald-600' : 'text-red-500 line-through decoration-red-500 decoration-2'}">${uAnsText}</span></span>
                        <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                    </div>
                </div>
            `;
        }
        
        let emoji = isCorrect ? '🎉' : '💡';
        let statusTitle = isCorrect ? 'Chính xác!' : 'Bạn làm sai rồi!';
        let headerColor = isCorrect ? 'text-emerald-600' : 'text-red-600';
        
        header.innerHTML = `<div class="text-6xl mb-4 animate-bounce">${emoji}</div><h3 class="text-3xl font-black ${headerColor} uppercase tracking-widest drop-shadow-sm">${statusTitle}</h3>`;
        
        body.innerHTML = questionHtml + optionsHtml;
        body.innerHTML += `<div class="mt-2"><div class="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-t-xl font-black uppercase text-sm border-b-4 border-blue-500 text-left">📖 Giải chi tiết từng bước:</div><div class="p-5 bg-white border-2 border-blue-200 rounded-b-2xl rounded-tr-2xl shadow-sm text-black font-medium text-base md:text-lg leading-loose math-scroll text-left">${explanation}</div></div>`;

        modal.classList.remove('hidden');
        void modal.offsetWidth;
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');

        if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise([content]);
    };

    window.closeFeedbackModal = function() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        if(!modal) return;
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => { 
            modal.classList.add('hidden'); 
            if (window.autoAdvance) {
                if (currentIdx < currentQuestions.length - 1) {
                    window.nextQuestion();
                }
            }
        }, 300);
    };

    // RENDERING ĐA LOẠI CÂU HỎI
    window.renderQuestion = function() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        if(!container) return;

        let html = `<div class="fade-in w-full">`;
        
        // --- MULTIPLE CHOICE ---
        if (q.type === 'single') {
            const hasAnswered = userAnswers[q.id] !== undefined;
            const uAns = userAnswers[q.id];
            
            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">CÂU HỎI TRẮC NGHIỆM</h3></div>`;
            html += `<div class="flex gap-4 mb-5"><div class="w-full math-scroll"><p class="text-lg sm:text-xl font-bold text-red-600 mt-1 leading-snug tracking-tight">${q.question}</p></div></div>`;
            html += `<div class="space-y-4 md:pl-6 mt-6">`;
            q.options.forEach((opt, i) => {
                const isChecked = (uAns === i) ? 'checked' : '';
                const disabledClass = hasAnswered ? 'disabled-option' : '';
                html += `<div class="flex items-center">
                    <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio" ${isChecked} ${hasAnswered ? 'disabled' : ''} onchange="window.selectAnswer('${q.id}', ${i}, 'single')">
                    <label for="opt_${i}" class="option-label ${disabledClass} w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg cursor-pointer">
                        <div class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50">${String.fromCharCode(65 + i)}</div>
                        <div class="text-gray-700 leading-relaxed math-scroll flex-1">${opt}</div>
                    </label>
                </div>`;
            });
            html += `</div>`;
            
        } 
        // --- TRUE / FALSE ---
        else if (q.type === 'tf_cluster') {
            
            let displayContext = q.context;

            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">TRẮC NGHIỆM ĐÚNG/SAI</h3></div>`;
            html += `<div class="bg-red-50 text-red-700 p-4 rounded-xl font-bold mb-4 border-2 border-red-100 text-lg sm:text-xl leading-relaxed math-scroll">${displayContext}</div>`;
            html += `<div class="space-y-3 mt-6">`;
            q.items.forEach((item) => {
                const combinedId = q.id + '_' + item.id;
                let ans = userAnswers[combinedId];
                let btnT = ans === true ? 'selected' : ''; 
                let btnF = ans === false ? 'selected' : ''; 

                html += `<div class="p-4 sm:p-5 border-2 border-gray-100 rounded-2xl bg-white shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all hover:border-blue-200">
                    <div class="font-bold text-gray-800 flex-1 text-base sm:text-lg math-scroll">${item.text}</div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="window.selectAnswer('${combinedId}', true, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnT}">ĐÚNG</button>
                        <button onclick="window.selectAnswer('${combinedId}', false, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnF}">SAI</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        } 

        html += `</div>`;
        container.innerHTML = html;
        window.updateNav();
        window.updateProgress();
    };

    window.updateNav = function() {
        const pBtn = document.getElementById('prev-btn');
        const nBtn = document.getElementById('next-btn');
        const sBtn = document.getElementById('submit-btn');
        if(pBtn) pBtn.style.display = (currentIdx === 0) ? 'none' : 'block';
        if(nBtn) nBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'none' : 'block';
        if(sBtn) sBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'block' : 'none';
    };

    window.updateProgress = function() {
        const pgText = document.getElementById('progress-text');
        if(pgText) pgText.innerText = `${getAnsweredCount()}/${getTotalScoreItems()}`;
    };

    function formatDuration(sec) {
        const m = Math.floor(sec / 60); const s = sec % 60;
        return `${m}p ${s}s`;
    }

    // CHẤM ĐIỂM BÀI THI LỊCH SỬ
    window.submitQuiz = function() {
        if (!isQuizStarted) return; 
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let score = 0;

        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                if (userAnswers[q.id] === q.correct) score += 0.25; 
            } else if (q.type === 'tf_cluster') {
                let c = 0;
                q.items.forEach(item => { if (userAnswers[q.id + '_' + item.id] === item.correct) c++; });
                
                if (c === 1) score += 0.1;
                else if (c === 2) score += 0.25;
                else if (c === 3) score += 0.75;
                else if (c === 4) score += 1.0;
            }
        });

        score = score.toFixed(2); 

        const record = {
            hoTen: currentStudent.hoTen, lop: currentStudent.lop, tenDe: currentStudent.tenDe,
            diem: parseFloat(score),
            startTime: quizStartTime.toLocaleTimeString(), endTime: quizEndTime.toLocaleTimeString(),
            duration: formatDuration(Math.floor((quizEndTime - quizStartTime) / 1000)),
            thoiGian: new Date().toISOString(), deviceId: deviceId
        };
        
        if(database) {
            scoresRef.push(record, () => { window.showModalResult(score, record.duration); });
        }
    };

    window.showModalResult = function(score, dur) {
        ['login', 'quiz', 'scores', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const resEl = document.getElementById('result-section');
        if(resEl) resEl.classList.remove('hidden');
        const contentEl = document.getElementById('result-content');
        if(contentEl) contentEl.innerHTML = `
        <div class="absolute top-4 left-4 z-50">
            <button onclick="window.goHome()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-sm border border-gray-200 text-sm flex items-center gap-2">🏠 Trang chủ</button>
        </div>
        <div class="text-center mt-12 sm:mt-6">
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-emerald-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2"><span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - Lớp ${currentStudent.lop}</span><br><span class="text-sm font-bold text-gray-400 mt-1 block">${currentStudent.tenDe}</span></p>
        </div>
        <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative text-center">
            <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
            <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
            <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm border border-blue-100">Thời gian làm bài: ${dur}</div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button onclick="window.reviewQuiz()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">👀 Xem lại & Giải chi tiết</button>
            <button onclick="window.viewScoresAction()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
        </div>`;
    };

    window.reviewQuiz = function() {
        showSection('review');
        const container = document.getElementById('review-content');
        if(!container) return;
        let html = '';

        currentQuestions.forEach((q) => {
            if (q.type === 'single') {
                let uAns = userAnswers[q.id];
                let isCorrect = uAns === q.correct;
                let borderColor = isCorrect ? 'border-emerald-300 bg-emerald-50' : 'border-red-300 bg-red-50';
                
                let explanation = q.explanation;
                
                let statusText = '';
                let statusClass = '';
                if (uAns === undefined) {
                    statusText = '⚠️ Bạn chưa làm câu này';
                    statusClass = 'text-orange-500 bg-orange-50 border-orange-200';
                    borderColor = 'border-orange-300 bg-orange-50';
                } else if (isCorrect) {
                    statusText = '✅ Bạn làm đúng rồi!';
                    statusClass = 'text-emerald-600 bg-emerald-50 border-emerald-200';
                } else {
                    statusText = '❌ Bạn làm sai rồi!';
                    statusClass = 'text-red-600 bg-red-50 border-red-200';
                }

                html += `<div class="p-4 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor} relative mt-4 text-left">`;
                html += `<div class="absolute -top-4 right-4 px-4 py-1 rounded-full border-2 ${statusClass} font-bold text-sm shadow-sm">${statusText}</div>`;
                html += `<div class="font-bold text-lg sm:text-xl text-slate-800 mb-4 leading-relaxed math-scroll mt-2">${q.question}</div>`;
                html += `<div class="space-y-2">`;
                
                q.options.forEach((opt, i) => {
                    let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                    if (q.correct === i) {
                        optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                        textStyle = 'font-bold';
                    } else if (uAns === i && !isCorrect) {
                        optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                        textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                    } else { 
                        optBg = 'bg-white text-slate-700 border border-slate-200'; 
                    }

                    let letterBg = (q.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                                   ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                    html += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                ${iconHtml}
                            </div>`;
                });
                html += `</div>`;
                if (q.explanation) html += `<div class="review-explanation mt-4 pt-4 border-t-2 border-gray-200"><p class="text-sm font-black uppercase tracking-widest text-blue-600 mb-2">💡 Giải chi tiết từng bước:</p><p class="text-black font-medium text-base leading-loose math-scroll text-left">${explanation}</p></div>`;
                html += `</div>`;
            } 
            else if (q.type === 'tf_cluster') {
                let displayContext = q.context;

                html += `<div class="p-4 sm:p-6 border-2 border-indigo-200 bg-indigo-50 rounded-2xl shadow-sm mb-6 text-left">`;
                html += `<div class="font-bold text-lg sm:text-xl text-indigo-800 mb-4 math-scroll">${displayContext}</div>`;
                html += `<div class="space-y-4">`;
                q.items.forEach(item => {
                    let uAns = userAnswers[q.id + '_' + item.id];
                    let isCorrect = uAns === item.correct;
                    let ansText = item.correct ? 'ĐÚNG' : 'SAI';
                    let explanation = item.expl;
                    
                    let statusText = '';
                    let statusColor = '';
                    if (uAns === undefined) {
                        statusText = '⚠️ Chưa làm';
                        statusColor = 'text-orange-500 border-orange-200';
                    } else if (isCorrect) {
                        statusText = '✅ Bạn làm đúng rồi!';
                        statusColor = 'text-emerald-600 border-emerald-200 bg-emerald-50';
                    } else {
                        statusText = '❌ Bạn làm sai rồi!';
                        statusColor = 'text-red-600 border-red-200 bg-red-50';
                    }

                    html += `<div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm">
                        <div class="font-bold text-gray-800 math-scroll mb-3">${item.text}</div>
