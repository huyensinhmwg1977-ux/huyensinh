                        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-100 pb-3 gap-2">
                            <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="${uAns === undefined ? 'text-gray-400' : (uAns ? 'text-blue-600' : 'text-gray-600')} font-black uppercase ${!isCorrect && uAns !== undefined ? 'line-through decoration-red-500 decoration-2 text-red-500' : ''}">${uAns === undefined ? 'Chưa trả lời' : (uAns?'Đúng':'Sai')}</span></span>
                            <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                            <span class="font-bold text-sm ${statusColor} px-3 py-1 rounded-lg border text-center">${statusText}</span>
                        </div>
                        <div class="review-explanation mt-3 pt-2 text-sm text-gray-700 font-medium leading-relaxed math-scroll"><span class="text-indigo-500 font-bold uppercase">Giải chi tiết:</span><br> ${explanation}</div>
                    </div>`;
                });
                html += `</div></div>`;
            }
        });
        container.innerHTML = html;
        if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise([container]);
    };

    window.backToResult = function() { showSection('result'); };

    window.renderScores = function() {
        const tbody = document.getElementById('scores-tbody');
        if(!tbody) return;
        if (allScores.length === 0) { tbody.innerHTML = ''; document.getElementById('no-scores').classList.remove('hidden'); return; }
        const noScore = document.getElementById('no-scores');
        if(noScore) noScore.classList.add('hidden');
        const sorted = [...allScores].sort((a, b) => (a.lop.localeCompare(b.lop)) || (b.diem - a.diem));
        tbody.innerHTML = sorted.map((s, idx) => `<tr class="${s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-slate-50'} transition-colors border-b border-slate-100"><td class="px-4 py-4 text-center font-black text-slate-400 text-sm">#${idx + 1}</td><td class="px-4 py-4 font-black text-blue-600 text-sm">${s.lop}</td><td class="px-4 py-4 font-extrabold text-slate-800 text-sm">${s.hoTen} ${s.deviceId === deviceId ? '<span class="ml-2 bg-pink-500 text-white text-[10px] px-2 rounded-md">Bạn</span>' : ''}</td><td class="px-4 py-4 text-xs font-bold text-blue-500"><span class="bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">${s.tenDe}</span></td><td class="px-4 py-4 text-center"><span class="font-black text-lg ${s.diem >= 5 ? 'text-emerald-600' : 'text-red-500'}">${s.diem}</span></td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.startTime}</td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.endTime}</td><td class="px-4 py-4 text-right font-black text-orange-600 text-xs">${s.duration}</td>
            <td class="px-4 py-4 text-right text-xs text-slate-500 font-bold">${s.thoiGian ? new Date(s.thoiGian).toLocaleDateString('vi-VN') : '--/--/----'}</td></tr>`).join('');
    };

    function showSection(id) {
        ['login', 'quiz', 'scores', 'result', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const tgt = document.getElementById(id+'-section');
        if(tgt) tgt.classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        if(!display) return;
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) window.submitQuiz();
        }, 1000);
    }

    try {
        if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
        deviceId = localStorage.getItem('deviceId');
    } catch (e) { deviceId = 'dev_temp_' + Math.random().toString(36).substr(2); }
  </script>
 </body>
</html>
