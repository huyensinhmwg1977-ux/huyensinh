        // --- PHẦN I ---
        { id: "7_1", type: "single", question: "Câu 1. Liên bang Cộng hoà xã hội chủ nghĩa Xô viết được thành lập từ sự kiện nào?", options: ["Đại hội Xô viết toàn Nga lần thứ hai khai mạc tại Điện Xmô-nưi.", "Đại hội lần thứ nhất các Xô viết toàn Liên bang tại Mát-xcơ-va.", "Các nhà nước Cộng hoà liên minh chống \"thù trong, giặc ngoài\".", "Thông qua bản Hiến pháp đầu tiên."], correct: 1, explanation: "Đại hội lần thứ nhất các Xô viết toàn Liên bang diễn ra vào cuối năm 1922 tại Mát-xcơ-va đã thông qua Tuyên ngôn và Hiệp ước thành lập Liên bang Cộng hoà xã hội chủ nghĩa Xô viết." },

        { id: "7_4", type: "single", question: "Câu 4. Sự thất bại của các cuộc khởi nghĩa trong thời kì Bắc thuộc (từ năm 179 TCN đến năm 938) là do", options: ["không được sự ủng hộ của nhân dân.", "chênh lệch về tương quan lực lượng.", "quý tộc người Việt chống đối, đàn áp.", "điều kiện thời tiết quá khắc nghiệt."], correct: 1, explanation: "Nguyên nhân cốt lõi dẫn đến sự thất bại của các cuộc khởi nghĩa thời Bắc thuộc là do sự chênh lệch quá lớn về tương quan lực lượng giữa quân khởi nghĩa và các thế lực phong kiến phương Bắc hùng mạnh." },
        { id: "7_5", type: "single", question: "Câu 5. Trụ sở chính của Liên hợp quốc được đặt tại đâu?", options: ["Niu Oóc (Mỹ).", "La Hay (Hà Lan).", "Pa-ri (Pháp).", "Giơ-ne-vơ (Thuỵ Sỹ)."], correct: 0, explanation: "Sau khi thành lập, trụ sở chính của tổ chức Liên hợp quốc được đặt tại thành phố Niu Oóc (New York) thuộc nước Mỹ." },
        { id: "7_6", type: "single", question: "Câu 6. Trật tự thế giới hai cực I-an-ta kết thúc bằng việc", options: ["thế giới hoàn toàn chuyển sang xu thế đơn cực.", "thế giới từng bước chuyển sang xu thế đa cực.", "hai hệ thống tư bản và xã hội chủ nghĩa sụp đổ.", "Liên Xô và Mỹ không còn là những quốc gia liên bang."], correct: 1, explanation: "Sau khi Trật tự hai cực I-an-ta sụp đổ (đánh dấu bởi sự tan rã của Liên Xô năm 1991), thế giới đã mở ra thời kỳ mới, từng bước chuyển sang xu thế đa cực, nhiều trung tâm." },
        { id: "7_7", type: "single", question: "Câu 7. Trong xu thế của thế giới ngày nay, để tạo ra thời cơ cho sự phát triển, Việt Nam đã", options: ["nỗ lực vươn lên khẳng định vị thế kinh tế và chính trị của mình.", "chủ động tham gia các diễn đàn hợp tác với các cường quốc kinh tế thế giới.", "mở rộng, thiết lập quan hệ hợp tác về ngoại giao và quân sự với các nước lớn.", "tích cực tham gia vào các diễn đàn khu vực và quốc tế với vai trò điều phối."], correct: 1, explanation: "Để tạo ra thời cơ phát triển trong xu thế toàn cầu hóa, chủ trương nhất quán của Đảng ta là mở cửa hội nhập, chủ động tham gia các diễn đàn kinh tế lớn, thu hút vốn và công nghệ để vươn lên." },
        { id: "7_8", type: "single", question: "Câu 8. ASEAN được thành lập trong bối cảnh nào?", options: ["Xu thế hai cực và nhiều trung tâm trở thành tất yếu.", "Xu thế đa cực, nhiều trung tâm trên thế giới đã xuất hiện.", "Xuất hiện xu thế đơn cực trên thế giới và ngày càng rõ nét.", "Xu hướng khu vực hoá xuất hiện và ngày càng phổ biến."], correct: 3, explanation: "Thập niên 60 của thế kỷ XX, sự thành công của khối thị trường chung Châu Âu (EEC) đã cổ vũ mạnh mẽ xu hướng liên kết khu vực hoá trên toàn thế giới, tác động trực tiếp đến sự ra đời của ASEAN năm 1967." },
        { id: "7_9", type: "single", question: "Câu 9. Ý tưởng xây dựng Cộng đồng ASEAN đã khởi nguồn từ khi nào?", options: ["Hội nghị cấp cao ASEAN thông qua văn kiện Tầm nhìn ASEAN 2020 (1997).", "ASEAN được thành lập (1967).", "Tuyên bố Ba-li (2003) được kí kết.", "Kỉ niệm 30 năm thành lập ASEAN (1997)."], correct: 0, explanation: "Năm 1997, \"Tầm nhìn ASEAN 2020\" đã chính thức được thông qua. Đây là văn kiện nền tảng đầu tiên chính thức đề xuất tầm nhìn xây dựng ASEAN trở thành một Cộng đồng gắn kết và bền vững." },
        { id: "7_10", type: "single", question: "Câu 10. Nhu cầu hợp tác của các nước Đông Nam Á xuất hiện vào những năm 50, 60 của thế kỉ XX không chịu tác động bởi yếu tố nào?", options: ["Yêu cầu giành, giữ vững nền độc lập dân tộc.", "Sự phát triển của xu thế khu vực hoá trên thế giới.", "Nhiều tổ chức khu vực đã ra đời ở Đông Nam Á.", "Đẩy mạnh hợp tác, tương trợ lẫn nhau chống lại ảnh hưởng từ bên ngoài."], correct: 2, explanation: "Vào những năm 50-60, khu vực Đông Nam Á chưa hề có \"nhiều tổ chức khu vực ra đời\". Nhu cầu hợp tác chủ yếu xuất phát từ nhu cầu nội tại để giữ vững độc lập và sự cổ vũ của xu thế khu vực hóa từ châu Âu." },
        { id: "7_11", type: "single", question: "Câu 11. Tổng khởi nghĩa giành chính quyền trên phạm vi cả nước trong Cách mạng tháng Tám năm 1945 chính thức được bắt đầu từ sự kiện nào?", options: ["Đại hội Quốc dân được triệu tập tại Tân Trào (Tuyên Quang).", "Nhật hoàng tuyên bố đầu hàng Đồng minh không điều kiện.", "Chính phủ Trần Trọng Kim hoang mang.", "Quân lệnh số 1 được ban bố."], correct: 3, explanation: "Tổng khởi nghĩa giành chính quyền trên phạm vi cả nước trong Cách mạng tháng Tám năm 1945 chính thức được bắt đầu từ sự kiện Ủy ban Khởi nghĩa toàn quốc ban bố Quân lệnh số 1 vào đêm ngày 13/8/1945." },
        { id: "7_12", type: "single", question: "Câu 12. Na-va quyết định điều quân chiếm giữ Điện Biên Phủ sau cuộc tiến công nào của quân đội Việt Nam?", options: ["Tây Bắc.", "Thượng Lào.", "Đông - Xuân 1953 - 1954.", "Trung Lào."], correct: 0, explanation: "Na-va quyết định điều quân chiếm giữ Điện Biên Phủ sau cuộc tiến công lên Tây Bắc của quân đội Việt Nam để bảo vệ Thượng Lào." },
        { id: "7_13", type: "single", question: "Câu 13. Bộ Chính trị quyết định bổ sung, hoàn chỉnh chiến lược giải phóng miền Nam trong hai năm 1975 và 1976 sau chiến thắng", options: ["Đường 14 – Phước Long.", "Khe Sanh.", "Đường 9 – Nam Lào.", "Buôn Ma Thuột."], correct: 0, explanation: "Chiến thắng Đường 14 - Phước Long (đầu năm 1975) đã chứng minh quân đội Sài Gòn suy yếu và sự bất lực của quân Mỹ. Đây là cơ sở thực tiễn quan trọng để Bộ Chính trị hoàn chỉnh kế hoạch chiến lược giải phóng miền Nam." },
        { id: "7_14", type: "single", question: "Câu 14. Nội dung nào sau đây không phản ánh đúng ý nghĩa lịch sử của các cuộc đấu tranh bảo vệ Tổ quốc từ sau tháng 4 – 1975?", options: ["Bảo vệ vững chắc độc lập, chủ quyền, thống nhất và toàn vẹn lãnh thổ quốc gia.", "Làm thất bại âm mưu và hành động xâm lược, chống phá của các thế lực thù địch.", "Tạo điều kiện thuận lợi cho công cuộc xây dựng đất nước.", "Mở ra thời kì độc lập, tự chủ, lâu dài cho dân tộc."], correct: 3, explanation: "Nhận định \"mở ra thời kì độc lập tự chủ lâu dài\" là ý nghĩa lịch sử của Chiến thắng Bạch Đằng năm 938, không phải là ý nghĩa của các cuộc chiến đấu bảo vệ Tổ quốc sau đại thắng mùa Xuân 1975." },
        { id: "7_15", type: "single", question: "Câu 15. Nhân tố nào sau đây là nguồn sức mạnh trở thành nhân tố quyết định thắng lợi của cuộc kháng chiến bảo vệ Tổ quốc từ năm 1945 đến nay?", options: ["Phong trào giải phóng dân tộc trên thế giới phát triển mạnh.", "Sự lãnh đạo đúng đắn của Đảng Lao động Việt Nam.", "Khối đại đoàn kết của toàn thể dân tộc Việt Nam.", "Sự giúp đỡ của Liên Xô, Trung Quốc và các lực lượng tiến bộ."], correct: 1, explanation: "Trong mọi giai đoạn lịch sử từ 1945 đến nay, sự lãnh đạo sáng suốt, đường lối chính trị, quân sự đúng đắn của Đảng luôn là nhân tố mang tính quyết định hàng đầu mọi thắng lợi của cách mạng Việt Nam." },
        { id: "7_16", type: "single", question: "Câu 16. Nội dung cơ bản của đường lối Đổi mới do Đảng Cộng sản Việt Nam đề ra trong giai đoạn 1986 - 1995 xác định trọng tâm là đổi mới về lĩnh vực nào?", options: ["Kinh tế.", "Tư tưởng.", "Chính trị.", "Văn hoá."], correct: 0, explanation: "Quan điểm nhất quán của Đại hội Đảng lần thứ VI (1986) là lấy đổi mới kinh tế làm trọng tâm, từ đó tháo gỡ khó khăn về đời sống để từng bước thực hiện đổi mới chính trị vững chắc." },
        { id: "7_17", type: "single", question: "Câu 17. Một trong những thành tựu tiêu biểu về nhận thức lí luận và thực tiễn quá trình đổi mới chính trị ở Việt Nam đã đem đến là", options: ["hình thành hệ thống quan điểm lí luận về đường lối Đổi mới chủ nghĩa xã hội.", "nền dân chủ thuần tuý được phát huy và mở rộng cùng khối đại đoàn kết.", "chính sách xoá đói giảm nghèo được quan tâm và có nhiều thành tựu.", "vai trò lãnh đạo của Mặt trận Tổ quốc và các tổ chức chính trị là hàng đầu."], correct: 0, explanation: "Thành tựu lớn nhất về mặt chính trị là Đảng ta đã không ngừng bổ sung, hoàn thiện và hình thành được một hệ thống quan điểm lí luận vô cùng sâu sắc, toàn diện về công cuộc Đổi mới đi lên chủ nghĩa xã hội." },
        { id: "7_18", type: "single", question: "Câu 18. Công cuộc Đổi mới ở Việt Nam từ năm 1986 đến nay cho thấy một thực tiễn là", options: ["Đổi mới trong mọi hoàn cảnh phải xuất phát từ yêu cầu thời đại.", "Đổi mới về chính trị phải được quan tâm đặt lên hàng đầu.", "Đổi mới quan trọng nhất phải hướng đến lợi ích của nhân dân.", "Đổi mới, cải cách của các quốc gia đều thành công do Đảng Cộng sản lãnh đạo."], correct: 2, explanation: "Bài học lớn nhất của sự nghiệp Đổi mới là \"lấy dân làm gốc\". Mọi đường lối, chính sách đổi mới phải dựa vào sức mạnh của nhân dân và phục vụ trực tiếp cho quyền lợi thiết thực của quần chúng nhân dân." },
        { id: "7_19", type: "single", question: "Câu 19. Phan Bội Châu đã chọn quốc gia nào cho các hoạt động đối ngoại vào đầu thế kỉ XX?", options: ["Pháp, Trung Quốc.", "Trung Quốc, Ấn Độ.", "Hàn Quốc, Nhật Bản.", "Nhật Bản, Trung Quốc."], correct: 3, explanation: "Cụ Phan Bội Châu là người khởi xướng phong trào Đông Du (đưa thanh niên sang Nhật Bản). Sau khi bị trục xuất khỏi Nhật, cụ sang hoạt động và thành lập Việt Nam Quang phục hội tại Trung Quốc." },
        { id: "7_20", type: "single", question: "Câu 20. Năm 1945, một trong những hoạt động đối ngoại của nước Việt Nam Dân chủ Cộng hoà là", options: ["Chủ tịch Hồ Chí Minh đi thăm các nước xã hội chủ nghĩa.", "gửi thông điệp, thư, điện, công hàm đề nghị Liên hợp quốc và các nước lớn công nhận.", "cử đại biểu tham dự Đại hội Quốc tế Cộng sản.", "kí với đại diện của Chính phủ Pháp bản Hiệp định Sơ bộ."], correct: 1, explanation: "Ngay sau khi thành lập nước (năm 1945), để khẳng định nền độc lập, Chủ tịch Hồ Chí Minh đã liên tục gửi nhiều bức thư, thông điệp đến Liên hợp quốc, Mỹ, Liên Xô... để tranh thủ sự công nhận quốc tế chính danh." },
        { id: "7_21", type: "single", question: "Câu 21. Sau Hiệp định Giơ-ne-vơ (21 - 7 - 1954), hoạt động đối ngoại mà nước Việt Nam Dân chủ Cộng hoà tiến hành không nhằm mục đích nào sau đây?", options: ["Tìm kiếm viện trợ của Liên Xô và các nước trong phong trào Không liên kết.", "Đấu tranh đòi Mỹ - Diệm thi hành hiệp định.", "Củng cố quan hệ ngoại giao với các nước xã hội chủ nghĩa.", "Mở rộng quan hệ ngoại giao, tranh thủ sự giúp đỡ của cộng đồng quốc tế."], correct: 0, explanation: "Giai đoạn này, phong trào Không liên kết chưa phát triển định hình rõ nét. Ngoại giao Việt Nam sau 1954 chủ yếu tập trung thiết lập quan hệ chặt chẽ với phe Xã hội chủ nghĩa, không lấy viện trợ từ phong trào Không liên kết làm mục tiêu trọng tâm." },
        { id: "7_22", type: "single", question: "Câu 22. Ngày 05 – 6 – 1911, người thanh niên Nguyễn Tất Thành ra đi tìm đường cứu nước từ", options: ["Bến cảng Quy Nhơn (tỉnh Bình Định).", "Bến cảng Cam Ranh (tỉnh Khánh Hoà).", "Bến cảng Vũng Tàu (tỉnh Bà Rịa – Vũng Tàu).", "Bến Nhà Rồng (nay thuộc Thành phố Hồ Chí Minh)."], correct: 3, explanation: "Ngày 5 tháng 6 năm 1911, trên con tàu Đô đốc Latouche-Tréville, người thanh niên yêu nước Nguyễn Tất Thành đã từ bến cảng Nhà Rồng (Sài Gòn) ra đi tìm con đường cứu nước mới cho dân tộc." },
        { id: "7_23", type: "single", question: "Câu 23. Tại Việt Nam, hình thức nào sau đây không được sử dụng để vinh danh và tri ân Chủ tịch Hồ Chí Minh?", options: ["Xây dựng một học thuyết, giáo lí về Chủ tịch Hồ Chí Minh.", "Xây dựng các công trình tưởng niệm về Chủ tịch Hồ Chí Minh.", "Xây dựng hình tượng, nhân cách trong văn học, nghệ thuật về Người.", "Xây dựng biểu tượng về một nhân cách sống cao đẹp về Chủ tịch Hồ Chí Minh."], correct: 0, explanation: "Tư tưởng Hồ Chí Minh được coi là kim chỉ nam cho hành động của Đảng, nhưng chúng ta tuyệt đối KHÔNG xây dựng tư tưởng của Người thành một loại \"giáo lý, học thuyết\" mang tính chất tôn giáo, thần thánh hóa." },
        { id: "7_24", type: "single", question: "Câu 24. Lí luận giải phóng dân tộc của Nguyễn Ái Quốc được truyền bá vào Việt Nam trong những năm 1921 - 1929 có điểm gì mới?", options: ["Gắn độc lập dân tộc với chủ nghĩa xã hội.", "Giải phóng dân tộc khỏi sự áp bức của thực dân.", "Gắn vấn đề dân tộc với dân chủ, dân quyền.", "Giành độc lập gắn với khôi phục chế độ quân chủ."], correct: 0, explanation: "Điểm vĩ đại và mới mẻ nhất trong lí luận cách mạng vô sản của Nguyễn Ái Quốc chính là: Độc lập dân tộc không thể tách rời mà phải gắn liền chặt chẽ với việc đi lên xây dựng Chủ nghĩa xã hội." },

        // --- PHẦN II (ĐÚNG / SAI) : ĐẢM BẢO CHÍNH XÁC 2 ĐÚNG / 2 SAI ---
        { id: "7_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>\"Cuối năm 1944, Người (Hồ Chí Minh) sang Côn Minh gặp tướng Sê-nôn, Tư lệnh không quân Mỹ ở Trung Quốc, đặt cơ sở phối hợp giữa Việt Minh với các lực lượng Đồng minh để chống Nhật ở Việt Nam. Do nhu cầu nắm bắt tin tức quân Nhật ở Đông Dương, người Mỹ trong Cơ quan tình báo chiến lược (OSS) và Cơ quan thông tin chiến tranh (OWI) cũng cần liên hệ với phong trào cách mạng Việt Nam\".<br><span class='italic text-sm'>(Lịch sử quan hệ đối ngoại Việt Nam 1940-2020)</span>", items: [
            { id: "a", text: "a) Trong Chiến tranh thế giới thứ hai (1939 – 1945), Mặt trận Việt Minh thể hiện rõ chủ trương phối hợp với lực lượng Đồng minh để chống các tổ chức phản động.", correct: false, expl: "Sai. Trong thời kỳ Thế chiến II, mục tiêu phối hợp của Mặt trận Việt Minh với lực lượng Đồng minh là để \"chống phát xít Nhật\" (kẻ thù chính), chứ không phải để chống chung chung các tổ chức phản động." },
            { id: "b", text: "b) Trong giai đoạn 1942 – 1944, Đảng Cộng sản Đông Dương chủ trương không liên lạc với lực lượng Đồng minh để tránh sự can thiệp của các lực lượng này.", correct: false, expl: "Sai. Đoạn tư liệu khẳng định rõ Chủ tịch Hồ Chí Minh đã chủ động sang Côn Minh \"đặt cơ sở phối hợp giữa Việt Minh với các lực lượng Đồng minh\", thể hiện sự chủ động liên lạc ngoại giao cực kỳ khôn khéo." },
            { id: "c", text: "c) Thông qua Mặt trận Việt Minh, hoạt động đối ngoại của Đảng Cộng sản Đông Dương thể hiện chủ trương đứng về phía Đồng minh để chống quân phiệt Nhật.", correct: true, expl: "Đúng. Việc ta giúp đỡ, bắt tay hợp tác tình báo, quân sự với tổ chức OSS của Mỹ chính là bằng chứng đanh thép cho việc Việt Nam luôn đứng hẳn về phe dân chủ chống phát xít." },
            { id: "d", text: "d) Trong những năm 1930 – 1945, hoạt động đối ngoại của Đảng Cộng sản Đông Dương chủ yếu phục vụ mục tiêu giành độc lập, tự do, góp phần bảo vệ hoà bình.", correct: true, expl: "Đúng. Đây là mục tiêu tối thượng và bao trùm của toàn bộ đường lối cách mạng cũng như hoạt động ngoại giao của Đảng ta trong giai đoạn lịch sử này." }
        ]},
        { id: "7_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>\"Được khích lệ và được thống nhất bởi một tầm nhìn, một bản sắc và một cộng đồng chia sẻ, đùm bọc. Gắn kết với nhau bởi một khát vọng chung và ý chí tập thể được sống trong một khu vực hoà bình, an ninh và ổn định lâu dài, kinh tế tăng trưởng bền vững, tiến bộ xã hội và thịnh vượng chung, nhằm thúc đẩy các lợi ích cốt lõi, lí tưởng và nguyện vọng của chúng ta\".<br><span class='italic text-sm'>(Trích trong Lời mở đầu của Hiến chương ASEAN)</span>", items: [
            { id: "a", text: "a) Hiến chương ASEAN được xem như một văn kiện hiến pháp được các nước thành viên phê chuẩn và cùng thực hiện.", correct: false, expl: "Sai. Mặc dù Hiến chương ASEAN tạo ra khuôn khổ ràng buộc, nhưng bản chất ASEAN không phải là một quốc gia siêu quốc gia. Tuyên bố Hiến chương là \"văn kiện hiến pháp\" (như của một nhà nước) là không chính xác theo khoa học pháp lí quốc tế." },
            { id: "b", text: "b) Hiến chương ASEAN xác định tư cách pháp nhân của các nước thành viên trong quan hệ lẫn nhau và với các quốc gia, các tổ chức quốc tế.", correct: false, expl: "Sai. Hiến chương xác định tư cách pháp nhân của *tổ chức ASEAN* trên trường quốc tế, chứ không phải mang lại tư cách pháp nhân cho *các nước thành viên* (vì bản thân các nước đã là quốc gia độc lập có tư cách pháp nhân rồi)." },
            { id: "c", text: "c) Hiến chương ASEAN cụ thể hoá và phát triển thêm những nguyên tắc, mục đích, thoả thuận trong các văn kiện đã có của ASEAN về xây dựng một cộng đồng vững mạnh.", correct: true, expl: "Đúng. Hiến chương là sự chắt lọc, pháp điển hóa và nâng tầm các nguyên tắc cơ bản (như đồng thuận, không can thiệp nội bộ) đã có từ thời Tuyên bố Băng Cốc năm 1967." },
            { id: "d", text: "d) Hiến chương ASEAN ra đời là sự kế tục và phát triển khung pháp lí của ASEAN trong bối cảnh tổ chức này đang hoạt động hiệu quả.", correct: true, expl: "Đúng. Trong quá trình trưởng thành và hoạt động hiệu quả, để tiến tới xây dựng một Cộng đồng gắn kết hơn, ASEAN đã kế tục và phát triển khung pháp lý thông qua việc kí kết Hiến chương." }
        ]},
        { id: "7_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>...Chúng tôi mới hỏi Hồ Chủ tịch tại sao các đài phát thanh lại đang rùm beng đến thế về Điện Biên Phủ... Bác Hồ lật ngửa chiếc mũ cối trên mặt bàn. “Đây là núi” – Người đưa ngón tay vuốt quanh vành ngoài của chiếc mũ, “Chúng ta đang ở đó. Còn dưới này” – Người nắm tay đặt sâu xuống lòng mũ – “là lòng chảo Điện Biên Phủ\". Ở đó – “là người Pháp. Họ không thể thoát ra ngoài được. Có thể mất thời gian đấy, nhưng họ không thể thoát được\".<br><span class='italic text-sm'>(Wilfred Burchett – Người bạn lớn của nhân dân Việt Nam)</span>", items: [
            { id: "a", text: "a) Chiến dịch Điện Biên Phủ mở màn bằng việc quân đội Việt Nam đánh đồi A1.", correct: false, expl: "Sai. Lịch sử ghi nhận, chiều ngày 13-3-1954, bộ đội ta nổ súng đánh bộc phá mở màn chiến dịch vào cứ điểm Him Lam, không phải là đồi A1 (A1 thuộc đợt tiến công thứ 2)." },
            { id: "b", text: "b) Lần đầu tiên, quân đội Việt Nam sử dụng chiến thuật bao vây đánh tập đoàn cứ điểm.", correct: true, expl: "Đúng. Điện Biên Phủ là chiến dịch đầu tiên và lớn nhất mà bộ đội ta áp dụng thành công nghệ thuật quân sự \"vây, lấn, tấn, phá, triệt, diệt\" đối với một tập đoàn cứ điểm hiện đại." },
            { id: "c", text: "c) Tập đoàn cứ điểm Điện Biên Phủ là trận địa mà Pháp hoàn toàn ở thế chủ động.", correct: false, expl: "Sai. Cách Bác Hồ diễn tả \"người Pháp ở dưới lòng chảo\" và \"không thể thoát ra ngoài được\" cho thấy quân Pháp đã bị ta khoá chặt, bao vây và hoàn toàn lâm vào thế bị động phòng ngự." },
            { id: "d", text: "d) Quyết tâm và niềm tin của Chủ tịch Hồ Chí Minh, toàn Đảng, toàn dân đã chiến thắng.", correct: true, expl: "Đúng. Lời khẳng định đanh thép \"họ không thể thoát được\" của Bác Hồ với phóng viên quốc tế phản ánh niềm tin mãnh liệt vào sức mạnh tất thắng của dân tộc ta." }
        ]},
        { id: "7_II_4", type: "tf_cluster", context: "Câu 4. Bảng thông tin: Hoạt động đối ngoại của Việt Nam.<br><br>- Từ đầu TK XX đến 1945: Đối ngoại thông qua nhà yêu nước tiêu biểu. Tinh thần đấu tranh giải phóng dân tộc. Đặt nền móng ngoại giao hiện đại.<br>- Chống Pháp (1945-1954): Đối ngoại qua vai trò Đảng Cộng sản. Tranh thủ sự ủng hộ quốc tế bảo vệ độc lập.<br>- Chống Mỹ (1954-1975): Đối ngoại qua vai trò Đảng Cộng sản. Phục vụ sự nghiệp giải phóng miền Nam, thống nhất đất nước.", items: [
            { id: "a", text: "a) Mục tiêu hoạt động đối ngoại luôn xác định phù hợp với nhiệm vụ của từng thời kì.", correct: true, expl: "Đúng. Dữ liệu bảng cho thấy sự chuyển biến linh hoạt: khi thì \"tranh thủ quốc tế bảo vệ độc lập\" (chống Pháp), khi thì \"phục vụ giải phóng miền Nam\" (chống Mỹ)." },
            { id: "b", text: "b) Hoạt động đối ngoại quyết định đến thắng lợi của cách mạng Việt Nam trong thời kì 1930-1945.", correct: false, expl: "Sai. Trong suốt tiến trình lịch sử, sức mạnh nội lực và sự vùng lên của toàn dân tộc ở bên trong mới là nhân tố mang tính quyết định, ngoại giao quốc tế chỉ đóng vai trò hỗ trợ vô giá." },
            { id: "c", text: "c) Mục tiêu giành và bảo vệ độc lập dân tộc được thực hiện xuyên suốt trong hoạt động đối ngoại.", correct: true, expl: "Đúng. Sợi chỉ đỏ xuyên suốt mọi hành động ngoại giao của ta trong suốt thế kỉ XX chính là ngọn cờ đấu tranh giành và giữ vững Độc lập cho dân tộc." },
            { id: "d", text: "d) Bất luận thời kì nào, Đảng Cộng sản cũng giữ vai trò quyết định trong hoạt động đối ngoại.", correct: false, expl: "Sai. Bảng dữ liệu chỉ rõ, ở giai đoạn \"Đầu thế kỉ XX\", ngoại giao được thực hiện thông qua \"một số nhà yêu nước tiêu biểu\" (như Phan Bội Châu). Lúc này Đảng Cộng sản chưa hề ra đời (Đảng ra đời năm 1930)." }
        ]}
    ];

        // --- PHẦN I ---
        { id: "8_1", type: "single", question: "Câu 1. Từ năm 1949 đến giữa những năm 70 của thế kỉ XX, yếu tố nào sau đây đã tác động đến sự phát triển của chủ nghĩa xã hội ở Đông Âu?", options: ["Sự giúp đỡ to lớn của nhân dân Liên Xô.", "Tình hình chính trị của châu Âu ổn định.", "Nhận viện trợ của hệ thống các nước tư bản chủ nghĩa.", "Sự giúp đỡ của các quốc gia trong phong trào Không liên kết."], correct: 0, explanation: "Trong khuôn khổ Hội đồng Tương trợ Kinh tế (SEV) được thành lập năm 1949, sự viện trợ vô tư, to lớn về kĩ thuật và vốn của Liên Xô chính là yếu tố then chốt giúp Đông Âu hoàn thành xây dựng chủ nghĩa xã hội." },
        { id: "8_2", type: "single", question: "Câu 2. Sự kiện nào sau đây đánh dấu chủ nghĩa xã hội không còn là hệ thống thế giới?", options: ["Trung Quốc thực hiện cuộc cải cách mở cửa \"mang màu sắc Trung Quốc\".", "Việt Nam thực hiện công cuộc Đổi mới đất nước.", "Cu-ba và Mỹ bình thường hoá quan hệ lẫn nhau giữa hai nước.", "Sự sụp đổ của chủ nghĩa xã hội ở Đông Âu và Liên Xô."], correct: 3, explanation: "Những biến cố chính trị chấn động vào năm 1989-1991, dẫn đến sự tan rã của chế độ Xã hội chủ nghĩa tại Liên Xô và Đông Âu đã chính thức chấm dứt sự tồn tại của hệ thống này trên quy mô toàn cầu." },
        { id: "8_3", type: "single", question: "Câu 3. Cách mạng tháng Tám năm 1945 và cuộc kháng chiến chống thực dân Pháp (1945-1954) có điểm khác nhau nào về nguyên nhân dẫn đến thắng lợi?", options: ["Sự lãnh đạo sáng suốt của Đảng, đứng đầu là Chủ tịch Hồ Chí Minh.", "Truyền thống yêu nước, anh hùng bất khuất của dân tộc.", "Hậu phương vững chắc và tập hợp được khối đoàn kết toàn dân.", "Tình đoàn kết chiến đấu của nhân dân ba nước Đông Dương."], correct: 3, explanation: "Cách mạng tháng Tám (1945) là thắng lợi tự lực tự cường của riêng nhân dân Việt Nam. Còn kháng chiến chống Pháp (1945-1954) có thêm yếu tố mới vô cùng quan trọng: sự liên minh đoàn kết chiến đấu khăng khít của 3 nước Đông Dương (Việt-Miên-Lào)." },
        { id: "8_4", type: "single", question: "Câu 4. Để tranh thủ sự ủng hộ của nhân dân, phong trào Tây Sơn đã đề ra khẩu hiệu", options: ["“Lấy của người giàu chia cho người nghèo\".", "\"Ruộng đất cho người nông dân mất ruộng\".", "“Phá kho thóc của chúa, chia cho nông dân\".", "“Tất cả ruộng đất là của nhân dân lao động\"."], correct: 0, explanation: "Khởi nghĩa nông dân Tây Sơn bùng nổ (1771) với khẩu hiệu vô cùng thiết thực hợp lòng dân lúc bấy giờ là: \"Lấy của người giàu chia cho người nghèo\", qua đó lôi kéo được đông đảo quần chúng tham gia." },
        { id: "8_5", type: "single", question: "Câu 5. Trong trật tự thế giới đa cực, sự gia tăng vai trò của các trung tâm, tổ chức quốc tế phản ánh điều gì?", options: ["Sự gia tăng sức mạnh của Mỹ đến các trung tâm, tổ chức quốc tế.", "Tương quan so sánh lực lượng mới trong quan hệ quốc tế sau Chiến tranh lạnh.", "Mỹ vẫn trở thành chủ thể áp đảo, chi phối sự phát triển của thế giới.", "Sự gia tăng vai trò điều phối của Liên hợp quốc trên phạm vi toàn cầu."], correct: 1, explanation: "Sự vươn lên mạnh mẽ của các trung tâm kinh tế, chính trị (như Trung Quốc, EU, Nhật Bản...) phản ánh sự thay đổi về tương quan so sánh lực lượng mới trên thế giới theo xu hướng đa cực, nhiều trung tâm sau khi Chiến tranh lạnh kết thúc." },
        { id: "8_6", type: "single", question: "Câu 6. Trật tự thế giới hai cực I-an-ta có điểm khác biệt nào so với Trật tự Véc-xai - Oa-sinh-tơn?", options: ["Kết quả đem lại là quyền lợi tập trung vào các nước lớn.", "Thành lập các tổ chức quốc tế để giám sát và duy trì trật tự thế giới.", "Cơ sở chia thế giới thành phe tư bản chủ nghĩa và phe xã hội chủ nghĩa.", "Hệ quả của các cuộc chiến tranh thế giới diễn ra trong thế kỉ XX."], correct: 2, explanation: "Điểm khác biệt lớn nhất là trật tự I-an-ta dựa trên sự phân tuyến triệt để, chia thế giới thành 2 phe đối lập gay gắt về hệ tư tưởng: phe Tư bản chủ nghĩa (do Mỹ đứng đầu) và phe Xã hội chủ nghĩa (do Liên Xô đứng đầu)." },
        { id: "8_7", type: "single", question: "Câu 7. Trước khi ASEAN ra đời, khu vực Đông Nam Á đã có sự thành lập của", options: ["Hiệp hội Đông Nam Á và APSC.", "Hiệp hội Đông Nam Á và AEC.", "Hiệp hội Đông Nam Á và ASCC.", "Hiệp hội Đông Nam Á và tổ chức MAPHILINDO."], correct: 3, explanation: "Trước khi ASEAN chính thức được thành lập vào năm 1967, trong khu vực đã từng xuất hiện các tổ chức liên kết tiền thân nhưng hoạt động khá mờ nhạt như: Hiệp hội Đông Nam Á (ASA) và tổ chức MAPHILINDO." },
        { id: "8_8", type: "single", question: "Câu 8. Trong cuộc kháng chiến chống ngoại xâm của dân tộc trước Cách mạng tháng Tám năm 1945, cuộc kháng chiến nào không giành được thắng lợi?", options: ["Kháng chiến chống quân Triệu của An Dương Vương (179 TCN).", "Kháng chiến chống quân Thanh của Quang Trung (1789).", "Kháng chiến chống quân Nguyên lần thứ ba của nhà Trần (1287 – 1288).", "Kháng chiến chống quân Nam Hán của Ngô Quyền (938)."], correct: 0, explanation: "Do sự chủ quan, mất cảnh giác của An Dương Vương, cuộc kháng chiến chống quân xâm lược Triệu Đà đã thất bại, mở đầu cho thời kỳ Bắc thuộc đau thương kéo dài hơn nghìn năm của dân tộc." },
        { id: "8_9", type: "single", question: "Câu 9. Nguyên tắc hoạt động của ASEAN có điểm khác biệt nào so với Liên hợp quốc?", options: ["Tôn trọng độc lập, chủ quyền, bình đẳng, toàn vẹn lãnh thổ và bản sắc dân tộc của tất cả các quốc gia thành viên.", "Giải quyết các tranh chấp bằng biện pháp hoà bình.", "Không can thiệp vào công việc nội bộ của các quốc gia thành viên.", "Không xâm lược, sử dụng hoặc đe doạ sử dụng vũ lực hay các hành động khác dưới bất kì hình thức nào trái với luật pháp quốc tế."], correct: 2, explanation: "Điểm khác biệt lớn nhất trong nguyên tắc hoạt động của ASEAN so với Liên hợp quốc là nguyên tắc đồng thuận và đặc biệt là không can thiệp vào công việc nội bộ của nhau một cách tuyệt đối (thường được gọi là 'Phương cách ASEAN' - ASEAN Way)." },
        { id: "8_10", type: "single", question: "Câu 10. Sự kiện nào sau đây đã đánh dấu sự sụp đổ hoàn toàn của chế độ phong kiến Việt Nam?", options: ["Quần chúng cách mạng và tự vệ chiếm Phủ Khâm sai (Bắc Bộ Phủ).", "Nhân dân Sài Gòn mít tinh mừng khởi nghĩa giành thắng lợi.", "Chủ tịch Hồ Chí Minh tuyên bố thành lập nước Việt Nam Dân chủ Cộng hoà.", "Vua Bảo Đại tuyên bố thoái vị."], correct: 3, explanation: "Việc vua Bảo Đại thoái vị và trao ấn kiếm cho cách mạng vào chiều ngày 30-8-1945 tại Huế đã chính thức đánh dấu chế độ quân chủ chuyên chế đã hoàn toàn sụp đổ ở Việt Nam." },
        { id: "8_11", type: "single", question: "Câu 11. Chiến dịch Biên giới thu – đông (1950) của quân dân Việt Nam đã làm phá sản hoàn toàn kế hoạch quân sự nào của thực dân Pháp?", options: ["Kế hoạch Rơ-ve.", "Kế hoạch Na-va.", "Kế hoạch Đờ Lát đơ Tát-xi-nhi.", "Kế hoạch “hành quân kép\"."], correct: 0, explanation: "Thắng lợi rực rỡ của quân dân ta trong chiến dịch Biên giới năm 1950 đã đập tan phòng tuyến trên đường số 4, qua đó làm phá sản hoàn toàn kế hoạch Rơ-ve của Pháp." },
        { id: "8_12", type: "single", question: "Câu 12. Việc Mỹ tuyên bố “Mỹ hoá\" chiến tranh xâm lược Việt Nam đánh dấu sự thất bại của chiến lược", options: ["\"Việt Nam hoá chiến tranh\".", "“Chiến tranh đơn phương\".", "\"Chiến tranh cục bộ\".", "\"Chiến tranh đặc biệt\"."], correct: 3, explanation: "Thuật ngữ \"Mỹ hóa\" ám chỉ việc Mỹ buộc phải ồ ạt đưa quân viễn chinh vào Nam (chiến lược Chiến tranh cục bộ). Sự can thiệp lính Mỹ chứng minh chiến lược dùng quân ngụy trước đó (\"Chiến tranh đặc biệt\") đã bị phá sản." },
        { id: "8_13", type: "single", question: "Câu 13. Năm nước nào là Uỷ viên thường trực của Hội đồng Bảo an Liên hợp quốc?", options: ["Mỹ, Anh, Đức, Liên bang Nga và Trung Quốc.", "Mỹ, Anh, Pháp, Liên bang Nga và Trung Quốc.", "Mỹ, Anh, Đức, I-ta-li-a và Trung Quốc.", "Mỹ, Anh, Pháp, Liên bang Nga và Nhật Bản."], correct: 1, explanation: "Hội đồng Bảo an có 5 thành viên thường trực nắm quyền Veto cực kỳ quyền lực, bao gồm: Mỹ, Anh, Pháp, Liên bang Nga và Trung Quốc." },
        { id: "8_14", type: "single", question: "Câu 14. Sự kiện nào sau đây đã tạo nên sự thay đổi căn bản trong so sánh lực lượng có lợi cho cách mạng miền Nam Việt Nam kể từ đầu năm 1973?", options: ["Mỹ tuyên bố ngừng ném bom đánh phá hoàn toàn miền Bắc.", "Hiệp định Pa-ri về chấm dứt chiến tranh, lập lại hoà bình ở Việt Nam được kí kết và Mỹ rút quân đội về nước.", "Hiệp định Viêng Chăn về lập lại hoà bình, thực hiện hoà hợp dân tộc ở Lào được kí kết.", "Vùng giải phóng của ta được mở rộng và lớn mạnh."], correct: 1, explanation: "Với Hiệp định Pa-ri (1/1973), Mỹ và quân Đồng minh buộc phải rút hết quân về nước, trong khi lực lượng vũ trang cách mạng của ta vẫn giữ nguyên vị trí. Điều này tạo ra sự thay đổi so sánh lực lượng vô cùng có lợi cho ta tiến tới giải phóng hoàn toàn miền Nam." },
        { id: "8_15", type: "single", question: "Câu 15. Trong đường lối Đổi mới đất nước từ năm 1986 đến nay, Đảng Cộng sản Việt Nam chủ trương hình thành cơ chế kinh tế", options: ["thị trường.", "tập trung.", "bao cấp.", "kế hoạch hoá."], correct: 0, explanation: "Thành tựu cốt lõi của công cuộc Đổi mới (khởi xướng từ 1986) là việc xoá bỏ cơ chế bao cấp kìm hãm, từng bước thiết lập nền kinh tế thị trường định hướng xã hội chủ nghĩa." },
        { id: "8_16", type: "single", question: "Câu 16. Bản Tuyên ngôn thành lập Liên bang Cộng hoà xã hội chủ nghĩa Xô viết (30-12-1922) được thông qua tại", options: ["Xta-lin-grát.", "Mát-xcơ-va.", "Pê-tơ-rô-grát.", "Điện Xmô-nưi."], correct: 1, explanation: "Vào ngày 30-12-1922, Đại hội lần thứ nhất các Xô viết toàn Liên bang đã được tổ chức trang trọng tại thủ đô Mát-xcơ-va của nước Nga." },
        { id: "8_17", type: "single", question: "Câu 17. Đường lối Đổi mới của Việt Nam có điểm tương đồng nào với đường lối cải cách mở cửa của Trung Quốc?", options: ["Lấy chính trị làm nền tảng.", "Xây dựng một xã hội mang màu sắc riêng.", "Giữ vững bản sắc văn hoá.", "Lấy phát triển kinh tế làm trọng tâm."], correct: 3, explanation: "Cả công cuộc Đổi mới ở Việt Nam (1986) và Cải cách mở cửa ở Trung Quốc (1978) đều rút ra bài học kinh nghiệm sinh tử: phải lấy phát triển kinh tế làm trọng tâm hàng đầu." },
        { id: "8_18", type: "single", question: "Câu 18. Trong giai đoạn 1906 – 1925, Phan Châu Trinh đã đến hoạt động ở các quốc gia", options: ["Nhật Bản, Trung Quốc.", "Trung Quốc, Ấn Độ.", "Hàn Quốc, Nhật Bản.", "Nhật Bản, Pháp."], correct: 3, explanation: "Ban đầu cụ Phan Châu Trinh có sang Nhật Bản gặp Phan Bội Châu. Sau đó (từ 1911), cụ sang Pháp hoạt động để đề cao tư tưởng tự do, dân quyền và vận động cải cách." },
        { id: "8_19", type: "single", question: "Câu 19. Sau Cách mạng tháng Tám năm 1945, nước Việt Nam Dân chủ Cộng hoà đã gặp phải một trong những khó khăn nào sau đây?", options: ["Quân phiệt Nhật chưa chấp nhận đầu hàng.", "Phải đối phó với thù trong và giặc ngoài.", "Hai mươi vạn quân Trung Hoa Dân quốc ở miền Nam.", "Anh, Mỹ cho Pháp tiến quân ra miền Bắc."], correct: 1, explanation: "Mối đe dọa khốc liệt nhất đe dọa đến chính quyền non trẻ là sự xâm lăng của nhiều thế lực quân đội nước ngoài (giặc ngoài) câu kết với bọn phản động (thù trong) hòng lật đổ chính phủ ta." },
        { id: "8_20", type: "single", question: "Câu 20. Nội dung nào sau đây phản ánh không đúng ý nghĩa của công cuộc Đổi mới đất nước ở Việt Nam từ năm 1986 đến nay?", options: ["Giải phóng sức sản xuất, cải thiện đáng kể đời sống của nhân dân.", "Từng bước đưa Việt Nam ra khỏi nhóm quốc gia có thu nhập trung bình.", "Ổn định tình hình chính trị – xã hội, giữ vững định hướng xã hội chủ nghĩa.", "Tạo điều kiện nội lực để đẩy mạnh hội nhập quốc tế sâu rộng, toàn diện."], correct: 1, explanation: "Hiện nay, Việt Nam đang nằm trong nhóm quốc gia đang phát triển có thu nhập trung bình. Nhận định \"đưa Việt Nam ra khỏi nhóm quốc gia có thu nhập trung bình\" là không phản ánh đúng thực tế kinh tế hiện nay." },
        { id: "8_21", type: "single", question: "Câu 21. Từ năm 1986 đến nay, để giải quyết những tranh chấp về chủ quyền biên giới với Trung Quốc, Việt Nam luôn duy trì nguyên tắc đối ngoại nào?", options: ["Giải quyết các tranh chấp thông qua biện pháp hoà bình.", "Giải quyết các tranh chấp bằng phô trương sức mạnh quốc phòng.", "Giải quyết các tranh chấp thông qua diễn đàn của các nước lớn.", "Giải quyết các tranh chấp bằng liên kết với các nước có chung lợi ích."], correct: 0, explanation: "Trong đường lối đối ngoại độc lập tự chủ, Việt Nam luôn đề cao và ưu tiên giải quyết mọi bất đồng, tranh chấp lãnh thổ thông qua đối thoại và các biện pháp hoà bình dựa trên luật pháp quốc tế." },
        { id: "8_22", type: "single", question: "Câu 22. Sự kiện nào đánh dấu việc Nguyễn Ái Quốc nhận thức được sự nghiệp cách mạng của Việt Nam không thể trông chờ vào sự giúp đỡ của bên ngoài?", options: ["Gửi bản Yêu sách của nhân dân An Nam đến Hội nghị Véc-xai.", "Bỏ phiếu tán thành Quốc tế Cộng sản và tham gia sáng lập Đảng Cộng sản Pháp.", "Tham gia sáng lập Hội Liên hiệp thuộc địa.", "Thành lập Hội Việt Nam Cách mạng Thanh niên."], correct: 0, explanation: "Sự kiện bản Yêu sách bị các cường quốc tại hội nghị Véc-xai (1919) làm ngơ đã khiến Nguyễn Ái Quốc nhận ra bản chất của đế quốc. Người hiểu rằng các dân tộc bị áp bức phải tự lực tự cường giải phóng chính mình." },
        { id: "8_23", type: "single", question: "Câu 23. Trong cuộc kháng chiến chống Mỹ, cứu nước (1954 – 1975), Chủ tịch Hồ Chí Minh cùng với Trung ương Đảng đã đưa ra chỉ đạo sáng tạo nào sau đây?", options: ["Chỉ rõ cách mạng xã hội chủ nghĩa ở miền Bắc giữ vai trò quyết định.", "Xuất bản báo Nhân dân làm cơ quan ngôn luận của Trung ương Đảng.", "Định hướng đưa cách mạng miền Bắc tiến nhanh lên chủ nghĩa xã hội.", "Xây dựng hậu phương miền Bắc, tăng cường sức mạnh cho tiền tuyến miền Nam."], correct: 3, explanation: "Tiến hành song song hai chiến lược cách mạng là một quyết sách vĩ đại. Việc kiên quyết xây dựng miền Bắc vững mạnh để làm bệ phóng chi viện cho tiền tuyến miền Nam đã bảo đảm thắng lợi cho cuộc kháng chiến." },
        { id: "8_24", type: "single", question: "Câu 24. Nhận định nào sau đây là đúng về vai trò của Chủ tịch Hồ Chí Minh với phong trào cộng sản và công nhân quốc tế?", options: ["Chủ tịch Hồ Chí Minh là một chiến sĩ lỗi lạc.", "Người lãnh đạo cao nhất của Quốc tế cộng sản.", "Hoạch định đường lối cho các dân tộc thuộc địa.", "Biểu tượng cho nền hoà bình, an ninh của thế giới."], correct: 0, explanation: "Bên cạnh tư cách là lãnh tụ dân tộc, Bác Hồ còn được toàn thể nhân dân tiến bộ thế giới tôn vinh là một nhà quốc tế cộng sản kiên trung, một chiến sĩ lỗi lạc của phong trào công nhân." },

        // --- PHẦN II (ĐÚNG / SAI) : ĐẢM BẢO CHÍNH XÁC 2 ĐÚNG / 2 SAI ---
        { id: "8_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>“Duy trì hoà bình và an ninh quốc tế và để đạt được mục đích đó, thi hành những biện pháp tập thể có hiệu quả để phòng ngừa và loại trừ các mối đe doạ hoà bình, cấm mọi hành vi xâm lược và phá hoại hoà bình khác, điều chỉnh hoặc giải quyết các vụ tranh chấp hoặc những tình thế có tính chất quốc tế có thể đưa đến sự phá hoại hoà bình, bằng phương pháp hoà bình theo đúng nguyên tắc của công lí và pháp luật quốc tế\".<br><span class='italic text-sm'>(Trích trong Điều 1, Hiến chương Liên hợp quốc)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu thể hiện mục tiêu của Liên hợp quốc là duy trì hoà bình và an ninh quốc tế cho tất cả các quốc gia.", correct: false, expl: "Sai. Văn bản Hiến chương chỉ nêu nguyên tắc là \"duy trì hoà bình và an ninh quốc tế\", tuyệt đối không có cụm từ \"cho tất cả các quốc gia\" vô điều kiện như một mệnh đề bảo bọc cho cả những quốc gia xâm lược." },
            { id: "b", text: "b) Trong các mục tiêu của Liên hợp quốc, duy trì hoà bình và an ninh quốc tế là mục tiêu được đặt lên hàng đầu.", correct: true, expl: "Đúng. Đây là mục tiêu quan trọng và cốt lõi nhất, được quy định ngay tại dòng đầu tiên của Hiến chương Liên hợp quốc." },
            { id: "c", text: "c) Một trong những mục tiêu của Liên hợp quốc là giải quyết các vụ tranh chấp quốc tế bằng pháp luật của các quốc gia.", correct: false, expl: "Sai. Đoạn trích chỉ rõ việc giải quyết tranh chấp phải được dựa trên nguyên tắc của công lí và \"pháp luật quốc tế\", chứ không phải pháp luật riêng rẽ của từng quốc gia." },
            { id: "d", text: "d) Hiện nay, Liên hợp quốc vẫn tiếp tục thực hiện mục tiêu giải quyết các vụ tranh chấp, xung đột quốc tế bằng phương pháp hoà bình.", correct: true, expl: "Đúng. Việc điều chỉnh và giải quyết các xung đột bằng đối thoại, phương pháp hoà bình vẫn là sứ mệnh lớn nhất của LHQ trong bối cảnh toàn cầu hiện nay." }
        ]},
        { id: "8_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>Tháng 10 – 2003, lãnh đạo các nước ASEAN đã kí Tuyên bố Hoà hợp ASEAN II (Tuyên bố Ba-li II), nhất trí đề ra mục tiêu hình thành Cộng đồng ASEAN vào năm 2020 với ba trụ cột chính: Cộng đồng An ninh (sau chuyển thành Chính trị – An ninh); Cộng đồng Kinh tế và Cộng đồng Văn hoá – Xã hội; đồng thời, khẳng định ASEAN sẽ tiếp tục mở rộng quan hệ với các đối tác bên ngoài vì mục tiêu hoà bình, ổn định và hợp tác...<br><span class='italic text-sm'>(Tầm nhìn và triển vọng của ASEAN sau năm 2025)</span>", items: [
            { id: "a", text: "a) Cộng đồng Chính trị – An ninh ASEAN là tổ chức hợp tác về chính trị – an ninh toàn diện nhằm nâng cao vấn đề chính trị – an ninh lên một tầm cao mới.", correct: true, expl: "Đúng. Trụ cột APSC được xây dựng chính là để nâng tầm sự hợp tác chính trị và an ninh của toàn khối lên một mức độ toàn diện và sâu sắc hơn." },
            { id: "b", text: "b) Cộng đồng Kinh tế ASEAN hoạt động dựa trên nguyên tắc thống nhất cao của các nước thành viên có nền kinh tế phát triển có khả năng làm thay đổi ASEAN.", correct: false, expl: "Sai. Cơ chế của ASEAN luôn linh hoạt, tự nguyện và chấp nhận sự đa dạng. AEC không đòi hỏi sự \"thống nhất cao\" tuyệt đối hay chỉ ưu tiên tạo lợi thế cho các nước đã phát triển." },
            { id: "c", text: "c) Cộng đồng Văn hoá – Xã hội ASEAN có mục tiêu xây dựng một cộng đồng các dân tộc ASEAN hài hoà, đoàn kết, sống đùm bọc và chia sẻ.", correct: true, expl: "Đúng. Đây là mục tiêu nhân văn cốt lõi của trụ cột ASCC nhằm mang lại chất lượng cuộc sống tốt nhất cho nhân dân các nước thành viên." },
            { id: "d", text: "d) Ba trụ cột sau khi thành lập đã tạo thành thế ba chân vững chắc cho Cộng đồng ASEAN phát triển.", correct: false, expl: "Sai. Tuyên bố Ba-li II (2003) chỉ mới \"nhất trí đề ra mục tiêu hình thành\", phải đến cuối năm 2015 Cộng đồng ASEAN mới thực sự được thành lập. Vì vậy nói \"sau khi thành lập (2003) đã tạo thế ba chân\" là sai mốc thời gian lịch sử." }
        ]},
        { id: "8_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>“Năm 1945-1946 là một thời điểm có ý nghĩa chiến lược đối với quan hệ Việt – Pháp... Ban Thường vụ Trung ương và Chủ tịch Hồ Chí Minh dự đoán đúng chiều hướng chính sách các nước lớn... từ đó đã kịp thời đề ra quyết sách \"hoà để tiến\"... Chủ tịch Hồ Chí Minh đã khéo léo lợi dụng mâu thuẫn giữa các nước này với nhau và có sách lược phù hợp với từng đối tượng: giữ Mỹ đứng trung lập, kiên nhẫn tránh mọi xung đột với lực lượng của Tưởng, kiên quyết kháng chiến chống thực dân Pháp xâm lược ở miền Nam, đồng thời tìm giải pháp hoà bình khi Tưởng và Pháp thoả hiệp cho phép quân đội Pháp ra miền Bắc\".<br><span class='italic text-sm'>(Ngoại giao Việt Nam 1945-2000)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu đề cập đến đường lối, chủ trương, sách lược ngoại giao mềm dẻo của Đảng, Chính phủ, Chủ tịch Hồ Chí Minh trong thời kì 1945 – 1946.", correct: true, expl: "Đúng. Những quyết sách \"hoà để tiến\", \"lợi dụng mâu thuẫn\" chính là đỉnh cao của đường lối ngoại giao vô cùng khôn khéo, mềm dẻo của Đảng ta." },
            { id: "b", text: "b) Đấu tranh ngoại giao là một mặt trận khẳng định giá trị những thắng lợi trên mặt trận quân sự để bảo vệ nền độc lập của dân tộc Việt Nam.", correct: false, expl: "Sai. Trong bối cảnh cụ thể 1945-1946, ta chưa có những chiến dịch quân sự lớn để \"khẳng định giá trị thắng lợi\". Nhiệm vụ ngoại giao lúc này chủ yếu là để kéo dài thời gian hoà bình, chuẩn bị lực lượng cho kháng chiến." },
            { id: "c", text: "c) Nguyên tắc của đấu tranh ngoại giao “dĩ bất biến, ứng vạn biến\" trong thời kì 1945 – 1946 đúng với mọi giai đoạn cách mạng Việt Nam sau này.", correct: true, expl: "Đúng. Giữ vững tính nguyên tắc cốt lõi (độc lập dân tộc) kết hợp với sự uyển chuyển về sách lược (vạn biến) là bài học xương máu áp dụng cho mọi thời kì cách mạng." },
            { id: "d", text: "d) Đấu tranh ngoại giao trong giai đoạn 1945 – 1946 là giữ vững thành quả Cách mạng tháng Tám năm 1945 và bảo vệ nhà nước xã hội chủ nghĩa đầu tiên ở Đông Nam Á.", correct: false, expl: "Sai. Nước Việt Nam Dân chủ Cộng hoà khi mới thành lập (1945) mang bản chất là một nhà nước Dân chủ nhân dân, lúc bấy giờ ta chưa tiến lên xây dựng một nhà nước mang hình thái \"xã hội chủ nghĩa\"." }
        ]},
        { id: "8_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>\"Trong nửa sau thế kỉ XX, có một từ đã xuất hiện trong tiếng nói của những người bảo vệ và kiến tạo hoà bình trên thế giới, một từ mà cùng một lúc mang rất nhiều ý nghĩa: đấu tranh, dũng cảm, anh hùng; và nó còn có ý nghĩa là chiến thắng, độc lập, tự do. Từ đó là Việt Nam.<br>Và có một cái tên đã luôn gắn liền với từ này – từ chỉ tên của một đất nước. Đó là Hồ Chí Minh\".<br><span class='italic text-sm'>(Việt Nam và cuộc đấu tranh vì hoà bình, tự do và độc lập)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu thể hiện sự kính trọng, ngưỡng mộ của nhân dân thế giới đối với Chủ tịch Hồ Chí Minh.", correct: true, expl: "Đúng. Tác giả đã dùng những từ ngữ vĩ đại nhất (anh hùng, dũng cảm, tự do, chiến thắng) để bày tỏ sự ngưỡng mộ tuyệt đối đối với Bác Hồ và dân tộc Việt Nam." },
            { id: "b", text: "b) Chủ tịch Hồ Chí Minh đã mở ra cho nhân dân các nước thuộc địa con đường cách mạng vô sản để giải phóng.", correct: false, expl: "Sai. Sự kiện lịch sử thế giới mở ra con đường cách mạng vô sản cho nhân loại là cuộc Cách mạng tháng Mười Nga (1917), không phải do Chủ tịch Hồ Chí Minh là người mở ra đầu tiên." },
            { id: "c", text: "c) Chủ tịch Hồ Chí Minh là anh hùng giải phóng dân tộc, nhà văn hoá kiệt xuất của Việt Nam. Những đóng góp của Chủ tịch Hồ Chí Minh là sự kết tinh của truyền thống văn hoá Việt Nam và tinh hoa văn hoá nhân loại.", correct: false, expl: "Sai. Mặc dù nhận định này đúng với quan điểm của UNESCO, nhưng nếu đọc kĩ nguyên tắc làm bài Đ/S, đoạn trích dẫn của tác giả Rơ-mét Chan-đờ-ra hoàn toàn KHÔNG hề có bất kì thông tin nào nhắc đến cụm từ \"nhà văn hoá kiệt xuất\" hay \"kết tinh văn hoá nhân loại\"." },
            { id: "d", text: "d) Chủ tịch Hồ Chí Minh là biểu tượng cao đẹp nhất của chủ nghĩa yêu nước và chủ nghĩa anh hùng cách mạng Việt Nam, góp phần bảo vệ và kiến tạo hoà bình thế giới.", correct: true, expl: "Đúng. Bác Hồ và đất nước Việt Nam đã trở thành biểu tượng tinh thần to lớn cho \"những người bảo vệ và kiến tạo hoà bình trên thế giới\" theo đúng như đoạn tư liệu đã đề cập." }
        ]}
    ];

    const testBanks = { de7: de7_data, de8: de8_data };
    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    // BẮT ĐẦU BÀI THI
    window.startQuizAction = function() {
        try {
            const errDiv = document.getElementById('login-error');
            if(errDiv) errDiv.classList.add('hidden');
            
            const nameEl = document.getElementById('hoTen');
            const lopEl = document.getElementById('lop');
            
            const name = nameEl.value.trim();
            const lop = lopEl.value.trim();
            const checkedRadio = document.querySelector('input[name="chonDe"]:checked');
            
            if (!name || !lop) {
                if(errDiv) {
                    errDiv.innerText = "⚠️ Nhắc học sinh nhập đầy đủ Họ tên và Lớp cô nhé!";
                    errDiv.classList.remove('hidden');
                }
                return;
            }
            
            if (name && lop && checkedRadio) {
                const maDe = checkedRadio.value;
                const tenDe = checkedRadio.nextElementSibling.querySelector('.de-text').innerText.split('\n')[0].trim();
                currentStudent = { hoTen: name, lop: lop, maDe: maDe, tenDe: tenDe };
                currentQuestions = JSON.parse(JSON.stringify(testBanks[maDe]));
                quizStartTime = new Date();
                
                setTimeout(() => { isQuizStarted = true; }, 1000);
                showSection('quiz');
                
                const titleEl = document.getElementById('quiz-title');
                const infoEl = document.getElementById('student-info');
                if (titleEl) titleEl.innerText = currentStudent.tenDe;
                if (infoEl) infoEl.innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
                
                currentIdx = 0;
                userAnswers = {};
                window.renderQuestion();
                startTimer(50 * 60); 
            }
        } catch (error) {
            console.error(error);
        }
    };

    window.prevQuestion = function() {
        if (currentIdx > 0) { currentIdx--; window.renderQuestion(); }
    };

    window.nextQuestion = function() {
        if (currentIdx < currentQuestions.length - 1) { currentIdx++; window.renderQuestion(); }
    };

    window.viewScoresAction = function() {
        const btn = document.getElementById('view-scores-btn') || document.createElement('button'); 
        btn.innerText = "⏳ Đang tải dữ liệu...";
        if (database) {
            scoresRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                allScores = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                window.renderScores();
                btn.innerText = "🏆 Xem bảng xếp hạng";
                showSection('scores');
            });
        }
    };

    window.goHome = function() {
        if(document.getElementById('hoTen')) document.getElementById('hoTen').value = ''; 
        if(document.getElementById('lop')) document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    };

    function getTotalScoreItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.items.length;
            else count += 1;
        });
        return count; 
    }

    function getAnsweredCount() {
        return Object.keys(userAnswers).length;
    }

    // LƯU ĐÁP ÁN PHẦN I VÀ PHẦN II
    window.selectAnswer = function(qId, val, type) {
        if (type === 'tf') {
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            
            const parts = qId.split('_'); 
            const itemId = parts[parts.length - 1]; 
            const mainQId = parts.slice(0, parts.length - 1).join('_');
            
            const q = currentQuestions.find(i => i.id === mainQId);
            if (q) {
                const item = q.items.find(i => i.id === itemId);
                if (item) {
                    window.showFeedbackModal(item, val, 'tf');
                }
            }

        } else if (type === 'single') {
            if (userAnswers[qId] !== undefined) return;
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            const q = currentQuestions[currentIdx];
            window.showFeedbackModal(q, val, 'single');
        }
    };

    window.showFeedbackModal = function(qOrItem, uAns, type = 'single') {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        const header = document.getElementById('feedback-header');
        const body = document.getElementById('feedback-body');
        
        if(!modal || !content) return; 

        window.autoAdvance = (type === 'single' || type === 'short'); 

        let isCorrect = false;
        let explanation = qOrItem.explanation || qOrItem.expl || "Chưa có lời giải chi tiết.";
        let optionsHtml = '';
        
        let questionText = "";
        if (type === 'single' || type === 'short') {
            questionText = qOrItem.question || "";
        } else if (type === 'tf') {
            questionText = qOrItem.text || "";
        }

        let questionHtml = `<div class="bg-slate-50 border-l-4 border-blue-500 p-4 rounded-r-xl shadow-sm mb-6 text-left">
            <div class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">Nội dung câu hỏi:</div>
            <div class="text-slate-800 font-bold text-lg math-scroll">${questionText}</div>
        </div>`;

        if (type === 'single') {
            isCorrect = (uAns === qOrItem.correct);
            
            optionsHtml += `<div class="space-y-3 mb-6 mt-4">`;
            qOrItem.options.forEach((opt, i) => {
                let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                if (qOrItem.correct === i) {
                    optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                    textStyle = 'font-bold';
                } else if (uAns === i && !isCorrect) {
                    optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                    textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                } else { 
                    optBg = 'bg-white text-slate-700 border border-slate-200'; 
                }

                let letterBg = (qOrItem.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                               ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                optionsHtml += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                    <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                    <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                    ${iconHtml}
                                </div>`;
            });
            optionsHtml += `</div>`;

        } else if (type === 'tf') {
            isCorrect = (uAns === qOrItem.correct);
            let ansText = qOrItem.correct ? 'ĐÚNG' : 'SAI';
            let uAnsText = uAns ? 'ĐÚNG' : 'SAI';
            
            optionsHtml += `
                <div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm mb-6 mt-4 text-left">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="font-black uppercase ${isCorrect ? 'text-emerald-600' : 'text-red-500 line-through decoration-red-500 decoration-2'}">${uAnsText}</span></span>
                        <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                    </div>
                </div>
            `;
        }
        
        let emoji = isCorrect ? '🎉' : '💡';
        let statusTitle = isCorrect ? 'Chính xác!' : 'Bạn làm sai rồi!';
        let headerColor = isCorrect ? 'text-emerald-600' : 'text-red-600';
        
        header.innerHTML = `<div class="text-6xl mb-4 animate-bounce">${emoji}</div><h3 class="text-3xl font-black ${headerColor} uppercase tracking-widest drop-shadow-sm">${statusTitle}</h3>`;
        
        body.innerHTML = questionHtml + optionsHtml;
        body.innerHTML += `<div class="mt-2"><div class="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-t-xl font-black uppercase text-sm border-b-4 border-blue-500 text-left">📖 Giải chi tiết từng bước:</div><div class="p-5 bg-white border-2 border-blue-200 rounded-b-2xl rounded-tr-2xl shadow-sm text-black font-medium text-base md:text-lg leading-loose math-scroll text-left">${explanation}</div></div>`;

        modal.classList.remove('hidden');
        void modal.offsetWidth;
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');

    };

    window.closeFeedbackModal = function() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        if(!modal) return;
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => { 
            modal.classList.add('hidden'); 
            if (window.autoAdvance) {
                if (currentIdx < currentQuestions.length - 1) {
                    window.nextQuestion();
                }
            }
        }, 300);
    };

    window.renderQuestion = function() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        if(!container) return;

        let html = `<div class="fade-in w-full">`;
        
        if (q.type === 'single') {
            const hasAnswered = userAnswers[q.id] !== undefined;
            const uAns = userAnswers[q.id];
            
            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">CÂU HỎI TRẮC NGHIỆM</h3></div>`;
            html += `<div class="flex gap-4 mb-5"><div class="w-full math-scroll"><p class="text-lg sm:text-xl font-bold text-red-600 mt-1 leading-snug tracking-tight">${q.question}</p></div></div>`;
            html += `<div class="space-y-4 md:pl-6 mt-6">`;
            q.options.forEach((opt, i) => {
                const isChecked = (uAns === i) ? 'checked' : '';
                const disabledClass = hasAnswered ? 'disabled-option' : '';
                html += `<div class="flex items-center">
                    <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio" ${isChecked} ${hasAnswered ? 'disabled' : ''} onchange="window.selectAnswer('${q.id}', ${i}, 'single')">
                    <label for="opt_${i}" class="option-label ${disabledClass} w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg cursor-pointer">
                        <div class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50">${String.fromCharCode(65 + i)}</div>
                        <div class="text-gray-700 leading-relaxed math-scroll flex-1">${opt}</div>
                    </label>
                </div>`;
            });
            html += `</div>`;
            
        } 
        else if (q.type === 'tf_cluster') {
            
            let displayContext = q.context;

            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">TRẮC NGHIỆM ĐÚNG/SAI</h3></div>`;
            html += `<div class="bg-red-50 text-red-700 p-4 rounded-xl font-bold mb-4 border-2 border-red-100 text-lg sm:text-xl leading-relaxed math-scroll">${displayContext}</div>`;
            html += `<div class="space-y-3 mt-6">`;
            q.items.forEach((item) => {
                const combinedId = q.id + '_' + item.id;
                let ans = userAnswers[combinedId];
                let btnT = ans === true ? 'selected' : ''; 
                let btnF = ans === false ? 'selected' : ''; 

                html += `<div class="p-4 sm:p-5 border-2 border-gray-100 rounded-2xl bg-white shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all hover:border-blue-200">
                    <div class="font-bold text-gray-800 flex-1 text-base sm:text-lg math-scroll">${item.text}</div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="window.selectAnswer('${combinedId}', true, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnT}">ĐÚNG</button>
                        <button onclick="window.selectAnswer('${combinedId}', false, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnF}">SAI</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        } 

        html += `</div>`;
        container.innerHTML = html;
        window.updateNav();
        window.updateProgress();
    };

    window.updateNav = function() {
        const pBtn = document.getElementById('prev-btn');
        const nBtn = document.getElementById('next-btn');
        const sBtn = document.getElementById('submit-btn');
        if(pBtn) pBtn.style.display = (currentIdx === 0) ? 'none' : 'block';
        if(nBtn) nBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'none' : 'block';
        if(sBtn) sBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'block' : 'none';
    };

    window.updateProgress = function() {
        const pgText = document.getElementById('progress-text');
        if(pgText) pgText.innerText = `${getAnsweredCount()}/${getTotalScoreItems()}`;
    };

    function formatDuration(sec) {
        const m = Math.floor(sec / 60); const s = sec % 60;
        return `${m}p ${s}s`;
    }

    window.submitQuiz = function() {
        if (!isQuizStarted) return; 
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let score = 0;

        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                if (userAnswers[q.id] === q.correct) score += 0.25; 
            } else if (q.type === 'tf_cluster') {
                let c = 0;
                q.items.forEach(item => { if (userAnswers[q.id + '_' + item.id] === item.correct) c++; });
                
                if (c === 1) score += 0.1;
                else if (c === 2) score += 0.25;
                else if (c === 3) score += 0.75;
                else if (c === 4) score += 1.0;
            }
        });

        score = score.toFixed(2); 

        const record = {
            hoTen: currentStudent.hoTen, lop: currentStudent.lop, tenDe: currentStudent.tenDe,
            diem: parseFloat(score),
            startTime: quizStartTime.toLocaleTimeString(), endTime: quizEndTime.toLocaleTimeString(),
            duration: formatDuration(Math.floor((quizEndTime - quizStartTime) / 1000)),
            thoiGian: new Date().toISOString(), deviceId: deviceId
        };
        
        if(database) {
            scoresRef.push(record, () => { window.showModalResult(score, record.duration); });
        }
    };

    window.showModalResult = function(score, dur) {
        ['login', 'quiz', 'scores', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const resEl = document.getElementById('result-section');
        if(resEl) resEl.classList.remove('hidden');
        const contentEl = document.getElementById('result-content');
        if(contentEl) contentEl.innerHTML = `
        <div class="absolute top-4 left-4 z-50">
            <button onclick="window.goHome()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-sm border border-gray-200 text-sm flex items-center gap-2">🏠 Trang chủ</button>
        </div>
        <div class="text-center mt-12 sm:mt-6">
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-emerald-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2"><span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - Lớp ${currentStudent.lop}</span><br><span class="text-sm font-bold text-gray-400 mt-1 block">${currentStudent.tenDe}</span></p>
        </div>
        <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative text-center">
            <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
            <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
            <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm border border-blue-100">Thời gian làm bài: ${dur}</div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button onclick="window.reviewQuiz()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">👀 Xem lại & Giải chi tiết</button>
            <button onclick="window.viewScoresAction()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
        </div>`;
    };

    window.reviewQuiz = function() {
        showSection('review');
        const container = document.getElementById('review-content');
        if(!container) return;
        let html = '';

        currentQuestions.forEach((q) => {
            if (q.type === 'single') {
                let uAns = userAnswers[q.id];
                let isCorrect = uAns === q.correct;
                let borderColor = isCorrect ? 'border-emerald-300 bg-emerald-50' : 'border-red-300 bg-red-50';
                
                let explanation = q.explanation;
                
                let statusText = '';
                let statusClass = '';
                if (uAns === undefined) {
                    statusText = '⚠️ Bạn chưa làm câu này';
                    statusClass = 'text-orange-500 bg-orange-50 border-orange-200';
                    borderColor = 'border-orange-300 bg-orange-50';
                } else if (isCorrect) {
                    statusText = '✅ Bạn làm đúng rồi!';
                    statusClass = 'text-emerald-600 bg-emerald-50 border-emerald-200';
                } else {
                    statusText = '❌ Bạn làm sai rồi!';
                    statusClass = 'text-red-600 bg-red-50 border-red-200';
                }

                html += `<div class="p-4 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor} relative mt-4 text-left">`;
                html += `<div class="absolute -top-4 right-4 px-4 py-1 rounded-full border-2 ${statusClass} font-bold text-sm shadow-sm">${statusText}</div>`;
                html += `<div class="font-bold text-lg sm:text-xl text-slate-800 mb-4 leading-relaxed math-scroll mt-2">${q.question}</div>`;
                html += `<div class="space-y-2">`;
                
                q.options.forEach((opt, i) => {
                    let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                    if (q.correct === i) {
                        optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                        textStyle = 'font-bold';
                    } else if (uAns === i && !isCorrect) {
                        optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                        textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                    } else { 
                        optBg = 'bg-white text-slate-700 border border-slate-200'; 
                    }

                    let letterBg = (q.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                                   ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                    html += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                ${iconHtml}
                            </div>`;
                });
                html += `</div>`;
                if (q.explanation) html += `<div class="review-explanation mt-4 pt-4 border-t-2 border-gray-200"><p class="text-sm font-black uppercase tracking-widest text-blue-600 mb-2">💡 Giải chi tiết từng bước:</p><p class="text-black font-medium text-base leading-loose math-scroll text-left">${explanation}</p></div>`;
                html += `</div>`;
            } 
            else if (q.type === 'tf_cluster') {
                let displayContext = q.context;

                html += `<div class="p-4 sm:p-6 border-2 border-indigo-200 bg-indigo-50 rounded-2xl shadow-sm mb-6 text-left">`;
                html += `<div class="font-bold text-lg sm:text-xl text-indigo-800 mb-4 math-scroll">${displayContext}</div>`;
                html += `<div class="space-y-4">`;
                q.items.forEach(item => {
                    let uAns = userAnswers[q.id + '_' + item.id];
                    let isCorrect = uAns === item.correct;
                    let ansText = item.correct ? 'ĐÚNG' : 'SAI';
                    let explanation = item.expl;
                    
                    let statusText = '';
                    let statusColor = '';
                    if (uAns === undefined) {
                        statusText = '⚠️ Chưa làm';
                        statusColor = 'text-orange-500 border-orange-200';
                    } else if (isCorrect) {
                        statusText = '✅ Bạn làm đúng rồi!';
                        statusColor = 'text-emerald-600 border-emerald-200 bg-emerald-50';
                    } else {
                        statusText = '❌ Bạn làm sai rồi!';
                        statusColor = 'text-red-600 border-red-200 bg-red-50';
                    }

                    html += `<div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm">
                        <div class="font-bold text-gray-800 math-scroll mb-3">${item.text}</div>
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-100 pb-3 gap-2">
                            <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="${uAns === undefined ? 'text-gray-400' : (uAns ? 'text-blue-600' : 'text-gray-600')} font-black uppercase ${!isCorrect && uAns !== undefined ? 'line-through decoration-red-500 decoration-2 text-red-500' : ''}">${uAns === undefined ? 'Chưa trả lời' : (uAns?'Đúng':'Sai')}</span></span>
                            <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                            <span class="font-bold text-sm ${statusColor} px-3 py-1 rounded-lg border text-center">${statusText}</span>
                        </div>
                        <div class="review-explanation mt-3 pt-2 text-sm text-gray-700 font-medium leading-relaxed math-scroll"><span class="text-indigo-500 font-bold uppercase">Giải chi tiết:</span><br> ${explanation}</div>
                    </div>`;
                });
                html += `</div></div>`;
            }
        });
        container.innerHTML = html;
    };

    window.backToResult = function() { showSection('result'); };

    window.renderScores = function() {
        const tbody = document.getElementById('scores-tbody');
        if(!tbody) return;
        if (allScores.length === 0) { tbody.innerHTML = ''; document.getElementById('no-scores').classList.remove('hidden'); return; }
        const noScore = document.getElementById('no-scores');
        if(noScore) noScore.classList.add('hidden');
        const sorted = [...allScores].sort((a, b) => (a.lop.localeCompare(b.lop)) || (b.diem - a.diem));
        tbody.innerHTML = sorted.map((s, idx) => `<tr class="${s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-slate-50'} transition-colors border-b border-slate-100"><td class="px-4 py-4 text-center font-black text-slate-400 text-sm">#${idx + 1}</td><td class="px-4 py-4 font-black text-blue-600 text-sm">${s.lop}</td><td class="px-4 py-4 font-extrabold text-slate-800 text-sm">${s.hoTen} ${s.deviceId === deviceId ? '<span class="ml-2 bg-pink-500 text-white text-[10px] px-2 rounded-md">Bạn</span>' : ''}</td><td class="px-4 py-4 text-xs font-bold text-blue-500"><span class="bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">${s.tenDe}</span></td><td class="px-4 py-4 text-center"><span class="font-black text-lg ${s.diem >= 5 ? 'text-emerald-600' : 'text-red-500'}">${s.diem}</span></td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.startTime}</td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.endTime}</td><td class="px-4 py-4 text-right font-black text-orange-600 text-xs">${s.duration}</td>
            <td class="px-4 py-4 text-right text-xs text-slate-500 font-bold">${s.thoiGian ? new Date(s.thoiGian).toLocaleDateString('vi-VN') : '--/--/----'}</td></tr>`).join('');
    };

    function showSection(id) {
        ['login', 'quiz', 'scores', 'result', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const tgt = document.getElementById(id+'-section');
        if(tgt) tgt.classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        if(!display) return;
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) window.submitQuiz();
        }, 1000);
    }

    try {
        if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
        deviceId = localStorage.getItem('deviceId');
    } catch (e) { deviceId = 'dev_temp_' + Math.random().toString(36).substr(2); }
  </script>
 </body>
</html>
