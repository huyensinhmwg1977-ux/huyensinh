    // =====================================================================
    // DỮ LIỆU ĐỀ SỐ 11 VÀ ĐỀ SỐ 12 (TRÍCH XUẤT 100% BẢN GỐC, KHÔNG ÉP "2 ĐÚNG 2 SAI")
    // =====================================================================
    const de11_data = [
        // --- PHẦN I ---
        { id: "11_1", type: "single", question: "Câu 1. Sau khi thành lập, yếu tố tạo nên sức mạnh cho sự phát triển nhanh chóng của Liên Xô là", options: ["tinh thần tự lực, tự cường của dân tộc Nga.", "tình đoàn kết và sự hợp tác, giúp đỡ giữa các dân tộc.", "phát huy sức mạnh độc lập của mỗi dân tộc.", "sự viện trợ kinh tế, quân sự của các nước bên ngoài."], correct: 1, explanation: "Theo SGK Lịch sử 12, sự ra đời của Liên Xô dựa trên sự tự nguyện và bình đẳng. Chính tình đoàn kết, hợp tác và sự giúp đỡ lẫn nhau giữa các dân tộc Xô viết là yếu tố then chốt tạo nên sức mạnh vĩ đại giúp Liên Xô phát triển nhanh chóng." },
        { id: "11_2", type: "single", question: "Câu 2. Sự ra đời của Liên Xô đã để lại bài học nào sau đây cho Việt Nam trong công cuộc xây dựng và bảo vệ đất nước hiện nay?", options: ["Tinh thần đoàn kết, hợp tác và sự giúp đỡ nhau giữa các dân tộc.", "Chỉ có mở rộng hợp tác quốc tế mới khẳng định vị thế của đất nước.", "Đoàn kết, tập hợp lực lượng để đấu tranh chống ngoại xâm giữa các dân tộc.", "Tham gia các liên minh quân sự để tăng cường sức mạnh hợp tác."], correct: 0, explanation: "Liên Xô là một quốc gia đa sắc tộc giống Việt Nam. Bài học lớn nhất từ việc thành lập Liên Xô đối với chúng ta chính là bài học về việc củng cố tinh thần đại đoàn kết, hợp tác và giúp đỡ lẫn nhau giữa 54 dân tộc anh em." },
        { id: "11_3", type: "single", question: "Câu 3. Một trong những truyền thống tốt đẹp của dân tộc Việt Nam được hình thành và phát triển trong các cuộc kháng chiến chống ngoại xâm là", options: ["truyền thống yêu nước.", "truyền thống hiếu học.", "truyền thống gia trưởng.", "truyền thống hiếu thảo."], correct: 0, explanation: "Trải qua hàng ngàn năm dựng nước và giữ nước oanh liệt, truyền thống yêu nước nồng nàn luôn là truyền thống quý báu nhất, là sợi chỉ đỏ xuyên suốt lịch sử dân tộc Việt Nam." },
        { id: "11_4", type: "single", question: "Câu 4. Trần Quốc Tuấn đã hiến kế cho vua Trần một bài học kinh nghiệm có giá trị to lớn được rút ra từ các cuộc kháng chiến chống quân Mông – Nguyên (thế kỉ XIII) là", options: ["\"tiên phát chế nhân\".", "\"khoan thư sức dân\".", "\"tâm công\".", "\"đánh nhanh, thắng nhanh\"."], correct: 1, explanation: "Khi vua Trần rưng rưng hỏi về kế sách giữ nước lâu dài, Hưng Đạo vương Trần Quốc Tuấn đã khẳng định: \"Khoan thư sức dân để làm kế sâu rễ bền gốc, đó là thượng sách giữ nước vậy\"." },
        { id: "11_5", type: "single", question: "Câu 5. Nhằm duy trì hoà bình và an ninh thế giới sau chiến tranh, Hội nghị I-an-ta (02 – 1945) đã có quyết định quan trọng nào sau đây?", options: ["Thành lập Tổ chức Hiệp ước Vác-sa-va.", "Thành lập Tổ chức NATO.", "Thành lập Hội Quốc liên.", "Thành lập Liên hợp quốc."], correct: 3, explanation: "Tại Hội nghị I-an-ta (tháng 2/1945), ba cường quốc (Liên Xô, Mỹ, Anh) đã nhất trí một quyết định vô cùng quan trọng: thành lập tổ chức Liên hợp quốc nhằm duy trì hòa bình và an ninh thế giới sau chiến tranh." },
        { id: "11_6", type: "single", question: "Câu 6. Nội dung nào sau đây phản ánh đúng tác động của sự sụp đổ Trật tự thế giới hai cực I-an-ta (1991) đến các quốc gia trên thế giới?", options: ["Đóng vai trò quan trọng trong việc thúc đẩy, tạo môi trường thuận lợi để phát triển kinh tế, tài chính và thương mại quốc tế.", "Tạo điều kiện cho các cường quốc mới nổi có vị trí, vai trò lớn hơn trong quan hệ quốc tế.", "Suy giảm sức mạnh tương đối của Mỹ trong tương quan so sánh với các cường quốc khác.", "Gia tăng các vấn đề an ninh phi truyền thống như: ô nhiễm môi trường, biến đổi khí hậu, dịch bệnh,..."], correct: 1, explanation: "Sự sụp đổ của trật tự 2 cực đã giải phóng thế giới khỏi sự đối đầu cứng nhắc, tạo không gian địa chính trị thuận lợi cho các cường quốc mới nổi (như Trung Quốc, Ấn Độ, Brazil...) vươn lên khẳng định tiếng nói mạnh mẽ hơn trong quan hệ quốc tế." },
        { id: "11_7", type: "single", question: "Câu 7. Trật tự thế giới hai cực I-an-ta sụp đổ (1991) có tác động gì đến quốc tế?", options: ["Mở ra một thời kì phát triển mới trong quan hệ quốc tế.", "Cổ vũ các dân tộc bị áp bức đứng lên đấu tranh.", "Xây dựng một thế giới an toàn hơn, công bằng hơn.", "Thách thức an ninh đến từ cạnh tranh chiến lược giữa các nước lớn."], correct: 0, explanation: "Với sự sụp đổ của trật tự I-an-ta, Chiến tranh lạnh kết thúc, mở ra một thời kì phát triển hoàn toàn mới trong quan hệ quốc tế: lấy kinh tế làm trọng tâm và giải quyết các vấn đề bằng đàm phán, hòa bình." },
        { id: "11_8", type: "single", question: "Câu 8. Tháng 11-2007, các thành viên của ASEAN đã kí bản Hiến chương ASEAN nhằm xây dựng ASEAN thành một cộng đồng", options: ["hoà bình và thịnh vượng ở Đông Nam Á.", "vững mạnh.", "kinh tế ASEAN.", "chính trị - an ninh ASEAN."], correct: 1, explanation: "Việc kí kết Hiến chương ASEAN (2007) là nhằm tạo ra một khuôn khổ pháp lý, thể chế hóa các nguyên tắc để thúc đẩy quá trình liên kết, tiến tới xây dựng ASEAN thành một Cộng đồng vững mạnh và gắn kết." },
        { id: "11_9", type: "single", question: "Câu 9. Nội dung nào sau đây không phản ánh đúng nhiệm vụ của ASEAN trong giai đoạn từ năm 2015 đến nay?", options: ["Hoàn thiện cơ cấu tổ chức, tăng cường hợp tác nội khối và ngoại khối.", "Thành lập và xây dựng Cộng đồng ASEAN với ba trụ cột chính.", "Đẩy mạnh hợp tác bên trong, bên ngoài ASEAN với các đối tác đối thoại.", "Nâng cao uy tín, vai trò của ASEAN ở khu vực và trên thế giới."], correct: 1, explanation: "Cộng đồng ASEAN đã được *chính thức thành lập* vào cuối năm 2015. Do đó, \"Thành lập Cộng đồng\" là mục tiêu của giai đoạn *trước* 2015. Từ sau 2015 đến nay, nhiệm vụ là củng cố, hoàn thiện và phát triển Tầm nhìn mới." },
        { id: "11_10", type: "single", question: "Câu 10. Nguyên tắc hoạt động của ASEAN có điểm khác biệt nào so với Liên hợp quốc?", options: ["Tôn trọng độc lập, chủ quyền, bình đẳng, toàn vẹn lãnh thổ và bản sắc dân tộc của tất cả các quốc gia thành viên.", "Giải quyết các tranh chấp bằng biện pháp hoà bình.", "Không can thiệp vào công việc nội bộ của các quốc gia thành viên.", "Không xâm lược, sử dụng hoặc đe doạ sử dụng vũ lực hay các hành động khác dưới bất kì hình thức nào trái với luật pháp quốc tế."], correct: 2, explanation: "Nguyên tắc 'Không can thiệp vào công việc nội bộ' được các nước ASEAN tuân thủ một cách khắt khe và tuyệt đối (Phương cách ASEAN), tạo nên sự khác biệt rõ nét so với Liên hợp quốc." },
        { id: "11_11", type: "single", question: "Câu 11. Một trong những ý nghĩa lịch sử của Cách mạng tháng Tám năm 1945 đối với thế giới là", options: ["kết thúc ách cai trị hơn 80 năm của thực dân Pháp và gần 5 năm của quân phiệt Nhật.", "góp phần cổ vũ các dân tộc thuộc địa và phụ thuộc đứng lên đấu tranh tự giải phóng.", "giáng đòn nặng nề vào tham vọng xâm lược, nô dịch của chủ nghĩa đế quốc sau Chiến tranh thế giới thứ hai.", "chấm dứt ách thống trị của chủ nghĩa đế quốc, mở ra kỉ nguyên mới: kỉ nguyên cả nước độc lập, thống nhất, đi lên chủ nghĩa xã hội."], correct: 1, explanation: "Cách mạng tháng Tám ở Việt Nam là một trong những cuộc cách mạng giải phóng dân tộc thành công sớm nhất, giáng một đòn chí mạng vào chủ nghĩa thực dân, qua đó cổ vũ mạnh mẽ phong trào giải phóng dân tộc trên toàn thế giới." },
        { id: "11_12", type: "single", question: "Câu 12. Một trong những thuận lợi của Việt Nam sau ngày Cách mạng tháng Tám năm 1945 thành công là", options: ["nhân dân đã giành được quyền làm chủ đất nước.", "quân đội các nước Đồng minh kéo vào nước ta để giải giáp quân đội Nhật.", "miền Bắc được giải phóng, chuyển sang giai đoạn cách mạng xã hội chủ nghĩa.", "nước Cộng hoà Nhân dân Trung Hoa ra đời."], correct: 0, explanation: "Sau Cách mạng tháng Tám, nhân dân ta từ thân phận nô lệ đã vươn lên làm chủ vận mệnh của chính mình. Sự gắn bó máu thịt giữa nhân dân và chính quyền mới là nền tảng vững chắc nhất để bảo vệ đất nước." },
        { id: "11_13", type: "single", question: "Câu 13. Trong những năm 1969 – 1973, chiến lược “Việt Nam hoá chiến tranh\" của Mỹ triển khai ở miền Nam bằng lực lượng nào là chủ yếu?", options: ["Quân đội Sài Gòn, cố vấn Mỹ.", "Quân Mỹ, quân Đồng minh và quân đội Sài Gòn.", "Quân Anh, quân Trung Hoa Dân quốc.", "Quân đội Sài Gòn."], correct: 3, explanation: "Bản chất của chiến lược \"Việt Nam hóa chiến tranh\" là dùng người Việt đánh người Việt. Mỹ rút dần quân viễn chinh về nước và sử dụng Quân đội Sài Gòn làm lực lượng chiến đấu chủ yếu trên chiến trường." },
        { id: "11_14", type: "single", question: "Câu 14. Chiến dịch nào đã mở ra bước phát triển mới của cuộc kháng chiến chống thực dân Pháp (1945-1954) của nhân dân ta?", options: ["Biên giới thu – đông năm 1950.", "Điện Biên Phủ năm 1954.", "Hoà Bình đông - xuân năm 1951-1952.", "Việt Bắc thu – đông năm 1947."], correct: 0, explanation: "Thắng lợi vang dội của chiến dịch Biên giới thu - đông (1950) đã giúp quân đội ta giành được thế chủ động trên chiến trường chính (Bắc Bộ), đánh dấu một bước chuyển biến cục diện cực kỳ quan trọng." },
        { id: "11_15", type: "single", question: "Câu 15. Điểm giống nhau giữa chiến dịch Điện Biên Phủ (1954) và Chiến dịch Hồ Chí Minh (1975) của nhân dân Việt Nam là", options: ["những thắng lợi có ý nghĩa quyết định kết thúc cuộc kháng chiến.", "cuộc tiến công của lực lượng vũ trang.", "buộc kẻ thù phải kí hiệp định kết thúc chiến tranh.", "cuộc tiến công của lực lượng vũ trang và đấu tranh ngoại giao."], correct: 0, explanation: "Cả hai đều là những trận quyết chiến chiến lược vĩ đại nhất, đập tan mọi hi vọng cuối cùng của kẻ thù và quyết định trực tiếp đến thắng lợi cuối cùng của toàn bộ cuộc kháng chiến." },
        { id: "11_16", type: "single", question: "Câu 16. Nội dung nào sau đây không phải là thành tựu của công cuộc Đổi mới ở Việt Nam trong lĩnh vực văn hoá từ năm 1986 đến nay?", options: ["Nhiều di sản lịch sử, văn hoá của Việt Nam được UNESCO ghi danh là di sản văn hoá của thế giới.", "Nền văn hoá tiên tiến, đậm đà bản sắc dân tộc được chú trọng xây dựng và phát triển.", "Cơ cấu kinh tế dịch chuyển theo hướng tích cực.", "Giao lưu văn hoá với nhiều quốc gia và khu vực."], correct: 2, explanation: "Việc 'Cơ cấu kinh tế dịch chuyển theo hướng tích cực' rõ ràng là một thành tựu trên mặt trận Kinh tế, hoàn toàn không thuộc về lĩnh vực Văn hóa." },
        { id: "11_17", type: "single", question: "Câu 17. Nội dung nào sau đây là thành tựu của công cuộc Đổi mới ở Việt Nam trong lĩnh vực hội nhập quốc tế từ năm 1986 đến nay?", options: ["Văn hoá truyền thống được bảo tồn và phát huy.", "Công cuộc xoá đói, giảm nghèo đã được thực hiện thành công.", "Tốc độ tăng trưởng của Việt Nam khá cao và tương đối bền vững.", "Mở rộng quan hệ hợp tác với các quốc gia và vùng lãnh thổ, các tổ chức khu vực và quốc tế."], correct: 3, explanation: "Thành tựu chói lọi của quá trình hội nhập là Việt Nam đã phá thế bao vây cô lập, không ngừng mở rộng quan hệ đối ngoại đa phương hóa, đa dạng hóa với hàng loạt quốc gia, tổ chức trên toàn cầu." },
        { id: "11_18", type: "single", question: "Câu 18. Nội dung nào sau đây phản ánh bài học kinh nghiệm của công cuộc Đổi mới ở Việt Nam từ năm 1986 đến nay?", options: ["Kiên trì mục tiêu độc lập dân tộc và chủ nghĩa xã hội.", "Không ngừng phát huy tinh thần yêu nước của các tầng lớp nhân dân.", "Xây dựng khối liên minh công nông và mặt trận dân tộc thống nhất.", "Xác định thời cơ, tạo và chớp thời cơ."], correct: 0, explanation: "Một trong những bài học lớn, mang tính nguyên tắc sống còn của Đảng ta trong suốt quá trình Đổi mới là: Đổi mới toàn diện nhưng phải kiên định mục tiêu Độc lập dân tộc gắn liền với Chủ nghĩa xã hội." },
        { id: "11_19", type: "single", question: "Câu 19. Hoạt động đối ngoại của Đảng Cộng sản Đông Dương thời kì 1930 – 1940 là", options: ["ủng hộ Liên Xô cùng lực lượng Đồng minh trong cuộc chiến chống phát xít.", "duy trì liên lạc với Quốc tế Cộng sản, các đảng cộng sản và phong trào vô sản ở các nước.", "thiết lập quan hệ ngoại giao với các nước xã hội chủ nghĩa và một số nước Đông Âu.", "đẩy mạnh hoạt động ngoại giao hoà bình, hữu nghị với các quốc gia và các tổ chức quốc tế."], correct: 1, explanation: "Trong giai đoạn này (trước Cách mạng tháng 8), Đảng ta hoạt động bí mật, nên đối ngoại chủ yếu tập trung vào việc duy trì đường dây liên lạc mật thiết với Quốc tế Cộng sản và phong trào vô sản thế giới để tranh thủ sự chỉ đạo." },
        { id: "11_20", type: "single", question: "Câu 20. Sau khi Hiệp định Giơ-ne-vơ (21–7–1954) về chấm dứt chiến tranh, lập lại hoà bình ở Đông Dương được kí kết, trọng tâm hoạt động đối ngoại của Việt Nam là", options: ["cử phái đoàn ngoại giao tham dự hội nghị và kí kết Hiệp định Giơ-ne-vơ.", "đấu tranh yêu cầu thực hiện Hiệp định Giơ-ne-vơ.", "tăng cường quan hệ đoàn kết giữa ba nước Đông Dương.", "đẩy mạnh đối ngoại nhân dân."], correct: 1, explanation: "Ngay khi Hiệp định vừa kí kết, do Mỹ rắp tâm phá hoại và dựng lên chính quyền Ngô Đình Diệm, nhiệm vụ pháp lý cao nhất của ngoại giao ta là kiên quyết đấu tranh đòi địch phải thi hành nghiêm chỉnh các điều khoản của Hiệp định (đặc biệt là việc tổng tuyển cử)." },
        


        { id: "11_21", type: "single", question: "Câu 21. Hoạt động nào sau đây không nằm trong tiến trình hoạt động cách mạng của Nguyễn Ái Quốc từ năm 1911 đến năm 1941?", options: ["Trở lại hoạt động ở Pháp.", "Tích cực tìm hiểu cuộc sống của nhân dân lao động.", "Liên hệ với một số thành viên trong Liên minh Nhân quyền và Đảng Xã hội Pháp.", "Thành lập Hội Việt Nam Cách mạng Thanh niên, ra báo Thanh niên."], correct: 0, explanation: "Hành trình của Nguyễn Ái Quốc từ năm 1911 đến 1941 là: Việt Nam  đi qua nhiều nước  Pháp (1917-1923) , Liên Xô, Trung Quốc,  Thái Lan,  Trung Quốc,  về thẳng Việt Nam (1941). Người chưa từng quay trở lại nước Pháp để hoạt động một lần nào nữa sau năm 1923." },
        { id: "11_22", type: "single", question: "Câu 22. Vai trò của Nguyễn Ái Quốc trong việc thành lập Đảng Cộng sản Việt Nam (đầu năm 1930) là", options: ["triệu tập và chủ trì Hội nghị thành lập Đảng (từ ngày 06 – 01 đến ngày 07-02-1930).", "khởi thảo Chương trình cứu nước của Việt Minh hướng tới hai mục tiêu: làm cho nước Việt Nam hoàn toàn độc lập, làm cho dân Việt Nam được sung sướng, tự do.", "thực hiện chủ trương \"hoà để tiến\" trong việc giải quyết mối quan hệ Việt – Pháp.", "phân tích tình hình, chỉ đạo toàn dân đánh Mỹ, đưa ra dự báo và thể hiện quyết tâm thắng Mỹ."], correct: 0, explanation: "Đứng trước nguy cơ phong trào cộng sản trong nước bị chia rẽ, bằng uy tín to lớn của mình, Nguyễn Ái Quốc đã kịp thời triệu tập và chủ trì thành công Hội nghị hợp nhất các tổ chức cộng sản tại Hương Cảng (Trung Quốc)." },
        { id: "11_23", type: "single", question: "Câu 23. Nội dung nào sau đây không phản ánh đúng lí do UNESCO tôn vinh Chủ tịch Hồ Chí Minh là nhà văn hoá kiệt xuất của Việt Nam?", options: ["Người có đóng góp nhiều mặt về văn hoá, giáo dục, nghệ thuật.", "Người đại diện cho khát vọng khẳng định bản sắc văn hoá của các dân tộc.", "Những đóng góp của Người là kết tinh truyền thống văn hoá của Việt Nam.", "Những đóng góp của Người ảnh hưởng trực tiếp đến nền văn hoá mọi quốc gia."], correct: 3, explanation: "Việc cho rằng đóng góp của Bác 'ảnh hưởng trực tiếp đến nền văn hóa mọi quốc gia' là một sự phóng đại tuyệt đối hóa, sai lệch so với tinh thần của bản Nghị quyết UNESCO." },
        { id: "11_24", type: "single", question: "Câu 24. Tư tưởng cốt lõi trong Cương lĩnh chính trị đầu tiên của Đảng Cộng sản Việt Nam do Nguyễn Ái Quốc soạn thảo là", options: ["độc lập dân tộc và chủ nghĩa xã hội.", "độc lập dân tộc và dân chủ.", "độc lập dân tộc và tự do.", "độc lập dân tộc và mọi người sống sung sướng."], correct: 2, explanation: "Sợi chỉ đỏ xuyên suốt của Cương lĩnh là giải phóng dân tộc. Tư tưởng cốt lõi được Nguyễn Ái Quốc cô đọng trong việc: làm cho nước Nam được hoàn toàn độc lập, làm cho dân chúng được tự do." },

        // --- PHẦN II (ĐỀ 11 - HIỂN THỊ CHÍNH XÁC SỰ THẬT, KHÔNG ÉP 2 ĐÚNG 2 SAI) ---
        { id: "11_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>Ngày 30-4-1975, cuộc kháng chiến chống Mỹ, cứu nước của nhân dân Việt Nam kết thúc thắng lợi. Đất nước thu về một mối. Ngay sau tháng 4 – 1975 không lâu, nhân dân Việt Nam đã phải đối đầu với cuộc tấn công xâm lược Việt Nam trên toàn tuyến biên giới Tây Nam do quân đội Pôn Pốt tiến hành với sự hỗ trợ về nhiều mặt của các thế lực bên ngoài. Nghiêm trọng hơn, rạng ngày 17-02-1979, Trung Quốc đưa 600 000 quân tấn công toàn tuyến biên giới Việt Nam. Tháng 3 – 1979, quân Trung Quốc phải rút quân nhưng cuộc đấu tranh bảo vệ Tổ quốc ở biên giới phía Bắc chỉ chính thức kết thúc vào năm 1989.", items: [
            { id: "a", text: "a) Ngay sau Đại thắng Xuân 1975, quan hệ Việt Nam – Trung Quốc, Việt Nam – Cam-pu-chia xuất hiện một số dấu hiệu bất ổn.", correct: true, expl: "Đúng. Mặc dù Việt Nam vừa giành được độc lập trọn vẹn, nhưng các tập đoàn cầm quyền ở Campuchia (Pôn Pốt) và Trung Quốc lập tức có những động thái gây hấn, thù địch." },
            { id: "b", text: "b) Chính quyền Pôn Pốt đã phát động chiến tranh xâm lược biên giới Tây Nam của Việt Nam dưới sự trợ giúp của quân đội các nước Đồng minh.", correct: false, expl: "Sai. Pôn Pốt gây chiến dưới sự chống lưng của 'các thế lực bên ngoài' (chủ yếu là Trung Quốc khi đó). Khái niệm 'các nước Đồng minh' chỉ được dùng trong bối cảnh lịch sử của Chiến tranh thế giới thứ hai." },
            { id: "c", text: "c) Ngày 17-02-1979, cuộc đấu tranh bảo vệ Tổ quốc ở biên giới phía Bắc của nhân dân Việt Nam chính thức bắt đầu.", correct: true, expl: "Đúng. Ngày 17/2/1979 là mốc lịch sử khi 60 vạn quân Trung Quốc tràn sang tấn công toàn tuyến biên giới, buộc quân và dân ta phải dũng cảm cầm súng đứng lên tự vệ." },
            { id: "d", text: "d) Trước sức chiến đấu của quân dân Việt Nam, tháng 3 – 1979, quân Trung Quốc phải rút quân nhưng tình hình biên giới còn rất phức tạp.", correct: true, expl: "Đúng. Mặc dù Trung Quốc tuyên bố rút quân, nhưng ròng rã 10 năm sau đó (đến 1989), chiến sự pháo kích và giành giật các điểm cao ở biên giới vẫn diễn ra vô cùng khốc liệt." }
        ]},
        { id: "11_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>Vào thập niên 1980, mối quan hệ nồng ấm giữa Tổng thống Mỹ Ri-gân và nhà lãnh đạo Liên Xô Goóc-ba-chốp đã giúp giảm dần tình trạng căng thẳng của Chiến tranh lạnh. Năm 1987, hai nhà lãnh đạo đã đồng ý huỷ bỏ tên lửa hạt nhân tầm trung. Năm 1989, Goóc-ba-chốp cho phép các quốc gia xã hội chủ nghĩa ở Đông Âu bầu ra chính phủ dân chủ, và đến năm 1991, Liên Xô tan rã thành 15 nước Cộng hoà độc lập. Ngày 12 - 3 - 1999, Hun-ga-ri, Ba Lan và Cộng hoà Séc gia nhập khối NATO.", items: [
            { id: "a", text: "a) Trật tự thế giới hai cực I-an-ta bắt đầu bị xói mòn và sụp đổ trong thập niên 80 của thế kỉ XX.", correct: false, expl: "Sai. Trật tự hai cực I-an-ta đã bắt đầu bị xói mòn từ trước đó (những năm 70) với sự vươn lên của Tây Âu, Nhật Bản. Đến thập niên 80 là giai đoạn hai siêu cường gặp gỡ để chấm dứt Chiến tranh lạnh. Trật tự này thực sự sụp đổ là vào năm 1991." },
            { id: "b", text: "b) Chiến tranh lạnh kết thúc và Trật tự thế giới hai cực I-an-ta sụp đổ bắt nguồn từ những nguyên nhân khác nhau, nhưng yếu tố Mỹ và Liên Xô vẫn là quyết định.", correct: true, expl: "Đúng. Sự kiệt quệ do chạy đua vũ trang đã buộc Mỹ và Liên Xô phải ngồi lại thỏa hiệp. Quyết định của hai cực chính là chìa khóa tháo gỡ căng thẳng toàn cầu." },
            { id: "c", text: "c) Chiến tranh lạnh đã kết thúc và Trật tự thế giới hai cực I-an-ta đã sụp đổ, nhưng nhiều di chứng của nó vẫn còn và đang tiếp diễn ở nhiều nơi trên thế giới.", correct: true, expl: "Đúng. Sự tan vỡ của trật tự cũ làm bùng phát các mâu thuẫn sắc tộc, tôn giáo bị che lấp trước đây, đồng thời việc NATO liên tục đông tiến (kết nạp Đông Âu) vẫn đang để lại di chứng căng thẳng kéo dài." },
            { id: "d", text: "d) Chiến tranh lạnh chấm dứt, Trật tự thế giới hai cực I-an-ta sụp đổ đã mở ra chiều hướng và điều kiện để giải quyết quan hệ quốc tế bằng giải pháp hoà bình.", correct: true, expl: "Đúng. Với sự chấm dứt đối đầu Xô-Mỹ, đối thoại và hòa giải đã dần thay thế cho đối đầu, trở thành phương thức chủ yếu để giải quyết các xung đột quốc tế." }
        ]},
        { id: "11_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>\"Tuyên bố ASEAN nêu rõ mục đích thành lập của ASEAN:<br>1. Thúc đẩy sự tăng trưởng kinh tế, tiến bộ xã hội và phát triển văn hoá trong khu vực thông qua các nỗ lực chung trên tinh thần bình đẳng và hợp tác nhằm tăng cường cơ sở cho một Cộng đồng các quốc gia Đông Nam Á hoà bình và thịnh vượng.<br>2. Thúc đẩy hoà bình và ổn định khu vực bằng việc tôn trọng công lí và nguyên tắc luật pháp trong quan hệ giữa các quốc gia trong vùng và tuân thủ các nguyên tắc của Hiến chương Liên hợp quốc.<br>3. Thúc đẩy sự cộng tác tích cực và giúp đỡ lẫn nhau trong các vấn đề cùng quan tâm trong các lĩnh vực: kinh tế, xã hội, văn hoá, khoa học – kĩ thuật và hành chính,....<br><span class='italic text-sm'>(Tuyên bố ASEAN, Hiệp hội các nước Đông Nam Á)</span>", items: [
            { id: "a", text: "a) Tuyên bố ASEAN được chính thức thông qua tại Băng Cốc (Thái Lan) trong Hội nghị thành lập ASEAN.", correct: true, expl: "Đúng. Bản Tuyên bố này (còn gọi là Tuyên bố Băng Cốc) được 5 nước sáng lập kí kết vào ngày 8/8/1967 tại thủ đô Thái Lan." },
            { id: "b", text: "b) Tuyên bố ASEAN xác định việc xây dựng một tổ chức khu vực phát triển toàn diện theo những nguyên tắc riêng.", correct: false, expl: "Sai. Đoạn tư liệu khẳng định rất rõ rằng ASEAN phải 'tôn trọng công lí... và tuân thủ các nguyên tắc của Hiến chương Liên hợp quốc', chứ không hoạt động theo một bộ luật lệ tùy tiện, riêng rẽ." },
            { id: "c", text: "c) Tuyên bố ASEAN xác định xây dựng Cộng đồng các quốc gia Đông Nam Á phát triển toàn diện, hoà bình và thịnh vượng.", correct: true, expl: "Đúng. Ở điểm 1 của tư liệu đã ghi rõ mục tiêu hướng tới 'một Cộng đồng các quốc gia Đông Nam Á hoà bình và thịnh vượng'." },
            { id: "d", text: "d) Tuyên bố ASEAN trở thành khuôn khổ cho những thoả thuận của việc thành lập và xây dựng Cộng đồng ASEAN với ba trụ cột chính.", correct: false, expl: "Sai. Tuyên bố Băng Cốc 1967 chỉ là nền móng ban đầu. Khuôn khổ cho việc xây dựng Cộng đồng ASEAN với 3 trụ cột thực sự được xác lập tại Tuyên bố Ba-li II (2003) và Hiến chương ASEAN (2007)." }
        ]},
        { id: "11_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>“Các hoạt động đối ngoại của dân tộc Việt Nam từ thuở dựng nước đến Cách mạng tháng Tám năm 1945 chủ yếu phục vụ cho mục tiêu tối cao của dân tộc là chống xâm lược, khẳng định quyền độc lập và tự chủ của nước nhà. Chủ nghĩa yêu nước và ý chí sắt đá vì độc lập, tự do của dân tộc đã trở thành nền tảng vững chắc và là nguồn sức mạnh của ngoại giao Việt Nam. Đây là một truyền thống tốt đẹp của ngoại giao Việt Nam\".<br><span class='italic text-sm'>(Đối ngoại Việt Nam: Truyền thống và hiện đại)</span>", items: [
            { id: "a", text: "a) Nền tảng của ngoại giao Việt Nam là chủ nghĩa yêu nước truyền thống và ý chí vì độc lập, tự do.", correct: true, expl: "Đúng. Đoạn trích khẳng định chủ nghĩa yêu nước và ý chí tự do chính là 'nền tảng vững chắc và là nguồn sức mạnh' của nền ngoại giao Việt Nam." },
            { id: "b", text: "b) Hoạt động đối ngoại của dân tộc Việt Nam từ thuở dựng nước tập trung phục vụ cho mục tiêu tối cao là quyền độc lập và tự chủ.", correct: true, expl: "Đúng. Đây là mục đích sinh tồn bất biến, do vị trí địa lý luôn bị ngoại bang dòm ngó, ngoại giao ta luôn đặt độc lập tự chủ lên hàng đầu." },
            { id: "c", text: "c) Chủ nghĩa yêu nước và ý chí sắt đá vì độc lập, tự do của dân tộc đã phát huy bản sắc văn hoá, mở rộng giao lưu với nước ngoài.", correct: false, expl: "Sai. Dù việc phát huy bản sắc văn hóa là có thật, nhưng theo đoạn tư liệu được cung cấp, trọng tâm của chủ nghĩa yêu nước là để 'chống xâm lược, khẳng định quyền độc lập', không hề nhắc đến việc 'mở rộng giao lưu văn hóa'." },
            { id: "d", text: "d) Những hoạt động đối ngoại đầu tiên của dân tộc Việt Nam đều hướng đến vùng Địa Trung Hải và khu vực Bắc Phi.", correct: false, expl: "Sai. Lịch sử ngoại giao thời phong kiến của Việt Nam chủ yếu là ngoại giao láng giềng (với phương Bắc, Chăm-pa, Chân Lạp), hoàn toàn chưa có tầm vươn xa tới Địa Trung Hải hay Bắc Phi." }
        ]}
    ];

    const de12_data = [
        // --- PHẦN I ---
        { id: "12_1", type: "single", question: "Câu 1. Sau thắng lợi của Cách mạng tháng Mười (1917), nhiệm vụ hàng đầu đặt ra cho chính quyền Xô viết là", options: ["hàn gắn vết thương chiến tranh và tập thể hoá nông nghiệp.", "đập tan bộ máy nhà nước cũ, xây dựng nhà nước mới.", "khôi phục phát triển kinh tế, chống chủ nghĩa phát xít.", "thực hiện công nghiệp hoá, tiến lên chủ nghĩa xã hội."], correct: 1, explanation: "Theo SGK, sau khi giành được chính quyền, nhiệm vụ sinh tử, cấp bách nhất của Cách mạng tháng Mười là phải đập tan ngay lập tức bộ máy nhà nước cũ của giai cấp tư sản để xây dựng bộ máy nhà nước kiểu mới của người lao động." },
        { id: "12_2", type: "single", question: "Câu 2. Kế sách dùng cọc nhọn đóng xuống sông đánh giặc đã được sử dụng lần đầu tiên trong cuộc kháng chiến", options: ["chống quân Thanh.", "chống quân Nguyên.", "chống quân Minh.", "chống quân Nam Hán."], correct: 3, explanation: "Đây là trận địa mai phục thủy chiến độc đáo do Ngô Quyền sáng tạo và áp dụng lần đầu tại cửa sông Bạch Đằng năm 938, đánh tan quân Nam Hán." },
        { id: "12_3", type: "single", question: "Câu 3. Sau Chiến tranh thế giới thứ hai, sự mở rộng của chủ nghĩa xã hội ở châu Á đánh dấu bằng việc các quốc gia nào đã lựa chọn con đường đi lên chủ nghĩa xã hội?", options: ["Trung Quốc, Việt Nam, Cam-pu-chia.", "Việt Nam, Lào, Cam-pu-chia.", "Trung Quốc, Việt Nam, Lào.", "In-đô-nê-xia, Trung Quốc, Việt Nam."], correct: 2, explanation: "Ở khu vực châu Á sau Thế chiến II, các nước kiên định đi theo con đường Xã hội chủ nghĩa bao gồm: Trung Quốc, Việt Nam, Triều Tiên và sau này là Lào." },
        { id: "12_4", type: "single", question: "Câu 4. Năm 1942, đại diện 26 nước Đồng minh họp tại Oa-sinh-tơn (Mỹ) đã kí văn kiện nào để cam kết thành lập một tổ chức quốc tế giữ gìn hoà bình thế giới sau Chiến tranh thế giới thứ hai?", options: ["Hiến chương Liên hợp quốc.", "Hiệp ước cấm phổ biến vũ khí hạt nhân.", "Tuyên bố Liên hợp quốc.", "Hiệp ước cấm thử hạt nhân toàn diện."], correct: 2, explanation: "Ngày 1-1-1942, đại diện 26 quốc gia chống phát xít đã kí bản Tuyên bố Liên hợp quốc (Declaration by United Nations), cam kết cùng nhau đánh bại phe Trục và đặt nền móng cho việc thành lập tổ chức LHQ sau này." },
        { id: "12_5", type: "single", question: "Câu 5. Trong đường lối Đổi mới từ năm 1986, Đảng Cộng sản Việt Nam chủ trương xây dựng nền kinh tế hàng hoá nhiều thành phần có sự quản lí của Nhà nước nhằm", options: ["giải quyết tình trạng khủng hoảng kéo dài về chính trị.", "phát triển kinh tế theo định hướng tư bản chủ nghĩa.", "phát huy quyền làm chủ kinh tế của nhân dân.", "xoá bỏ hoàn toàn thành phần kinh tế quốc doanh."], correct: 2, explanation: "Việc đa dạng hóa các thành phần kinh tế (thay vì chỉ có kinh tế quốc doanh và tập thể như trước) chính là biện pháp cởi trói để giải phóng sức sản xuất, tạo điều kiện phát huy cao độ quyền làm chủ kinh tế, khuyến khích nhân dân làm giàu chính đáng." },
        { id: "12_6", type: "single", question: "Câu 6. Việt Nam đã vận dụng nguyên tắc nào sau đây của Hiến chương Liên hợp quốc để giải quyết vấn đề phức tạp ở Biển Đông hiện nay?", options: ["Tôn trọng chủ quyền và quyền tự quyết của các nước lớn.", "Chủ động thương lượng, nhân nhượng để bảo đảm hoà bình.", "Không cần sự hỗ trợ của các tổ chức ở khu vực và quốc tế.", "Giải quyết các tranh chấp quốc tế bằng biện pháp hoà bình."], correct: 3, explanation: "Trước những hành động ngang ngược vi phạm chủ quyền trên Biển Đông, Việt Nam luôn tuân thủ nguyên tắc tôn trọng luật pháp quốc tế (UNCLOS 1982), kiên trì giải quyết tranh chấp bằng biện pháp đàm phán hòa bình." },
        { id: "12_7", type: "single", question: "Câu 7. Đường lối kháng chiến toàn dân chống thực dân Pháp (1946 – 1954) của nhân dân Việt Nam có nội dung nào sau đây?", options: ["Kháng chiến toàn dân, toàn diện, trường kì và tự chủ.", "Kháng chiến dựa vào sức mình và tranh thủ sự ủng hộ từ bên ngoài.", "Phải liên kết với cuộc kháng chiến của Lào và Cam-pu-chia.", "Toàn dân, toàn diện, trường kì, tự lực cánh sinh và tranh thủ sự ủng hộ của quốc tế."], correct: 3, explanation: "Đây là đường lối kháng chiến vô cùng hoàn chỉnh và sáng tạo của Đảng ta: Huy động sức mạnh Toàn dân, đánh trên Toàn diện các mặt trận, đánh Trường kỳ (lâu dài), tự lực cánh sinh là chính đồng thời tranh thủ tối đa sự ủng hộ của quốc tế." },
        { id: "12_8", type: "single", question: "Câu 8. Năm 2015, các nhà lãnh đạo ASEAN đã thông qua quyết định nào sau đây?", options: ["Kí Tuyên bố về sự Hoà hợp ASEAN II.", "Chính thức thành lập Cộng đồng ASEAN.", "Đẩy nhanh tiến trình liên kết nội khối dựa trên cơ sở pháp lí là Hiến chương ASEAN.", "Xác định văn kiện Tầm nhìn ASEAN 2020."], correct: 1, explanation: "Ngày 31-12-2015 là một cột mốc lịch sử mang tính bước ngoặt khi các nhà lãnh đạo chính thức tuyên bố thành lập Cộng đồng ASEAN (kết nối vững chắc trên 3 trụ cột: Kinh tế, Chính trị-An ninh và Văn hóa-Xã hội)." },
        { id: "12_9", type: "single", question: "Câu 9. Trong Cách mạng tháng Tám năm 1945, nhân dân Việt Nam giành chính quyền từ tay", options: ["quân phiệt Nhật.", "thực dân Pháp.", "đế quốc Anh.", "đế quốc Mỹ."], correct: 0, explanation: "Sau sự kiện Nhật đảo chính Pháp (9/3/1945), quân Pháp đã hoàn toàn thất bại và đầu hàng. Vì vậy, kẻ thù duy nhất đang nắm giữ Đông Dương mà nhân dân ta lật đổ trong Cách mạng tháng Tám chính là phát xít Nhật." },
        { id: "12_10", type: "single", question: "Câu 10. Nội dung nào sau đây không phản ánh đúng những hành động của Trung Quốc làm tổn hại đến tình hữu nghị Việt – Trung vào cuối năm 1978 – đầu năm 1979?", options: ["Cho quân khiêu khích dọc biên giới phía Bắc của Việt Nam.", "Dựng lên sự kiện “nạn kiểu\".", "Cắt viện trợ, rút hết các chuyên gia về nước.", "Giúp đỡ Việt Nam trong cuộc đấu tranh bảo vệ Tổ quốc ở biên giới Tây Nam."], correct: 3, explanation: "Trong giai đoạn này, Trung Quốc không hề 'giúp đỡ' Việt Nam ở biên giới Tây Nam, mà ngược lại, họ chính là thế lực đứng sau, tài trợ vũ khí và xúi giục tập đoàn phản động Pôn Pốt xâm lược Việt Nam." },
        { id: "12_11", type: "single", question: "Câu 11. Cuộc khởi nghĩa của Khúc Thừa Dụ (đầu thế kỉ X) có ý nghĩa gì đối với dân tộc Việt Nam?", options: ["Giành lại nền độc lập lâu dài, bền vững.", "Chấm dứt thời kì phong kiến Bắc thuộc.", "Mở ra kỉ nguyên mới cho lịch sử dân tộc.", "Đã bước đầu khôi phục chủ quyền dân tộc."], correct: 3, explanation: "Năm 905, Khúc Thừa Dụ nhân lúc nhà Đường suy yếu đã nổi dậy xưng Tiết độ sứ. Sự kiện này mang ý nghĩa cực lớn khi bước đầu giành lại quyền tự chủ, đặt nền móng vững chắc để giải phóng dân tộc hoàn toàn." },
        { id: "12_12", type: "single", question: "Câu 12. Quan hệ quốc tế từ sau Chiến tranh thế giới thứ hai đến đầu những năm 70 của thế kỉ XX có đặc điểm nổi bật nào?", options: ["Hai siêu cường Mỹ – Liên Xô đối đầu gay gắt.", "Hoà bình, hợp tác trở thành xu thế chủ đạo.", "Các nước đều tập trung vào phát triển kinh tế.", "Hợp tác chính trị – văn hoá là xu thế chủ đạo."], correct: 0, explanation: "Đây là giai đoạn đỉnh cao của Chiến tranh lạnh. Cục diện thế giới được định hình bởi sự phân tuyến đối kháng cực kỳ gay gắt trên mọi lĩnh vực giữa hai cực, hai phe do Mỹ và Liên Xô đứng đầu." },
        { id: "12_13", type: "single", question: "Câu 13. Việc Mỹ tuyên bố \"Mỹ hoá\" chiến tranh xâm lược Việt Nam đánh dấu sự thất bại của chiến lược", options: ["\"Việt Nam hoá chiến tranh\".", "\"Chiến tranh đơn phương\".", "\"Chiến tranh cục bộ\".", "\"Chiến tranh đặc biệt\"."], correct: 3, explanation: "Khi chiến lược \"Chiến tranh đặc biệt\" (dùng quân Ngụy) bị phá sản trước đòn tiến công của ta, Mỹ buộc phải vứt bỏ bộ mặt nguỵ trang, \"Mỹ hóa\" cuộc chiến bằng cách ồ ạt đổ quân viễn chinh Mỹ vào miền Nam." },
        { id: "12_14", type: "single", question: "Câu 14. Thắng lợi của cuộc Tiến công chiến lược Đông – Xuân 1953 – 1954 của quân dân Việt Nam có ý nghĩa nào sau đây?", options: ["Làm phá sản kế hoạch Na-va, đưa cuộc kháng chiến sang giai đoạn mới.", "Khai thông con đường liên lạc của ta với các nước xã hội chủ nghĩa.", "Chuẩn bị vật chất và tinh thần để ta mở chiến dịch vào Điện Biên Phủ.", "Tạo điều kiện để quân ta giành thế chủ động trên chiến trường Bắc Bộ."], correct: 2, explanation: "Bằng nghệ thuật điều địch tài tình, các đòn tiến công Đông Xuân đã buộc tướng Na-va phải phân tán khối cơ động chiến lược. Thắng lợi này đã đập tan thế mạnh của địch, tạo đà tâm lý và vật chất hoàn hảo để ta quyết chiến tại Điện Biên Phủ." },
        { id: "12_15", type: "single", question: "Câu 15. Sự mở rộng từ ASEAN 5 thành ASEAN 10 không có ý nghĩa nào sau đây?", options: ["Biến Đông Nam Á thành khu vực hoà bình, ổn định, phát triển và biệt lập.", "Thể hiện sự phù hợp với mong muốn và lợi ích của mỗi nước thành viên.", "Đảm bảo nền hoà bình, ổn định của khu vực trước biến động của thế giới.", "Nâng cao vị thế của ASEAN trên trường quốc tế."], correct: 0, explanation: "Mục tiêu của ASEAN là mở cửa, hội nhập toàn cầu. Việc dùng từ \"biệt lập\" (đóng cửa, tách rời thế giới) là hoàn toàn đi ngược lại với tôn chỉ và thực tiễn hoạt động của ASEAN." },
        { id: "12_16", type: "single", question: "Câu 16. Thủ đoạn của Mỹ trong chiến lược \"Việt Nam hoá chiến tranh\" (1969-1973) có điểm gì mới so với chiến lược “Chiến tranh cục bộ\" (1965 – 1968)?", options: ["Sử dụng chiến thuật \"dùng người Việt đánh người Việt\".", "Được tiến hành bằng quân đội Mỹ, quân đội một số nước Đồng minh.", "Sử dụng cố vấn quân sự, phương tiện chiến tranh của Mỹ.", "Quân đội Sài Gòn được sử dụng là lực lượng xung kích ở Đông Dương."], correct: 3, explanation: "Để giảm bớt xương máu lính Mỹ, Ních-xơn đã dùng tiền bạc và vũ khí để biến Quân đội Sài Gòn thành đội quân xung kích, mở rộng chiến tranh tràn sang xâm lược cả Campuchia và Lào (Đông Dương hóa chiến tranh)." },
        { id: "12_17", type: "single", question: "Câu 17. Đại hội VI của Đảng Cộng sản Việt Nam (12-1986), chủ trương Đổi mới về chính trị là xây dựng Nhà nước", options: ["pháp quyền xã hội chủ nghĩa.", "chuyên chính dân chủ hoá.", "đại đoàn kết toàn thể dân tộc.", "phân chia quyền lực rõ ràng."], correct: 0, explanation: "Một trong những định hướng cốt lõi của Đổi mới chính trị là chuyển từ tư duy quản lý nhà nước bằng mệnh lệnh hành chính sang quản lý bằng pháp luật, xây dựng thành công Nhà nước pháp quyền XHCN của dân, do dân, vì dân." },
        { id: "12_18", type: "single", question: "Câu 18. Bài học kinh nghiệm cơ bản nào được Đảng Cộng sản Việt Nam rút ra từ khi tiến hành công cuộc Đổi mới đất nước (12-1986) đến nay?", options: ["Huy động cả hệ thống chính trị vào công cuộc Đổi mới.", "Tranh thủ sự giúp đỡ của các nước trong khu vực.", "Tập trung khắc phục tình trạng tham nhũng, lãng phí.", "Đẩy mạnh các mối quan hệ đối ngoại hoà bình, ổn định."], correct: 0, explanation: " Trong tiến trình thực hiện công cuộc Đổi mới từ năm 1986 đến nay, một trong những bài học kinh nghiệm cốt lõi mang ý nghĩa quyết định thắng lợi được Đảng khẳng định chính là sự đồng bộ, phối hợp chặt chẽ bằng cách huy động toàn bộ hệ thống chính trị (bao gồm Đảng lãnh đạo, Nhà nước quản lý, Mặt trận Tổ quốc và các đoàn thể nhân dân) tham gia chủ động vào công cuộc cải cách, đổi mới." },
        { id: "12_19", type: "single", question: "Câu 19. Nguyễn Ái Quốc đã tham gia sáng lập hai tổ chức có tính quốc tế nào sau đây?", options: ["Đông Á đồng minh và Hội Liên hiệp thuộc địa.", "Hội Liên hiệp thuộc địa và Hội Liên hiệp các dân tộc bị áp bức ở Á Đông.", "Hội Liên hiệp các dân tộc bị áp bức ở Á Đông và Đông Á đồng minh.", "Hội Liên hiệp thuộc địa và Chấn Hoa Hưng Á."], correct: 1, explanation: "Năm 1921 tại Pháp, Bác tham gia sáng lập \"Hội Liên hiệp thuộc địa\". Đến năm 1925 tại Trung Quốc, Bác tiếp tục tham gia sáng lập \"Hội Liên hiệp các dân tộc bị áp bức Á Đông\". Cả hai đều mang tính chất quốc tế rộng lớn." },
        { id: "12_20", type: "single", question: "Câu 20. Trong giai đoạn 1975 – 1985, để thực hiện chủ trương đấu tranh bảo vệ hoà bình Việt Nam đã tham gia vào", options: ["Phong trào bảo vệ hoà bình thế giới.", "lực lượng bảo vệ hoà bình của khu vực.", "lực lượng gìn giữ hoà bình của Liên hợp quốc.", "phong trào Không liên kết một cách tích cực."], correct: 3, explanation: "Năm 1976, ngay sau khi thống nhất, Việt Nam chính thức gia nhập và trở thành thành viên vô cùng tích cực của Phong trào Không liên kết, đấu tranh vì hòa bình và chống chủ nghĩa đế quốc." },
        { id: "12_21", type: "single", question: "Câu 21. Nguyễn Ái Quốc gửi bản Yêu sách của nhân dân An Nam tới Hội nghị Véc-xai (1919) trong lúc hoạt động ở", options: ["Trung Quốc", "Liên Xô.", "Xiêm.", "Pháp."], correct: 3, explanation: "Sau Chiến tranh thế giới I, năm 1919, lúc bấy giờ Nguyễn Ái Quốc đang sinh sống và hoạt động tích cực tại thủ đô Pa-ri của nước Pháp." },
        { id: "12_22", type: "single", question: "Câu 22. Tuyên bố nào sau đây được thông qua, đánh dấu ASEAN chính thức được thành lập năm 1967?", options: ["Tuyên bố ASEAN.", "Tuyên bố về sự Hoà hợp ASEAN I.", "Tuyên bố Ba-li II.", "Tuyên bố Cu-a-la Lăm-po."], correct: 0, explanation: "Tuyên bố ASEAN (còn được biết đến rộng rãi với tên gọi Tuyên bố Băng Cốc), được kí kết ngày 8/8/1967 chính là văn bản khai sinh ra Hiệp hội các quốc gia Đông Nam Á." },
        { id: "12_23", type: "single", question: "Câu 23. Hội nghị hợp nhất ba tổ chức cộng sản ở Việt Nam tổ chức thành công là do nguyên nhân nào quyết định?", options: ["Giữa đại biểu các tổ chức cộng sản không có mâu thuẫn về hệ tư tưởng.", "Đại biểu của các tổ chức cộng sản đều tuân theo điều lệ quốc tế vô sản.", "Đáp ứng yêu cầu thực tiễn Việt Nam và vai trò của Nguyễn Ái Quốc.", "Quốc tế Cộng sản quan tâm chỉ đạo và uy tín cao của Nguyễn Ái Quốc."], correct: 2, explanation: "Mặc dù có sự chỉ đạo của Quốc tế Cộng sản, nhưng yếu tố quyết định nhất là việc hợp nhất đáp ứng đúng yêu cầu khách quan bức thiết của lịch sử Việt Nam, cộng với uy tín, tài năng tổ chức kiệt xuất của cá nhân lãnh tụ Nguyễn Ái Quốc." },
        { id: "12_24", type: "single", question: "Câu 24. Trong thời kì Đổi mới từ năm 1986 đến nay, hoạt động đối ngoại của Việt Nam không tập trung vào vấn đề nào sau đây?", options: ["Phá thể bao vây cấm vận, đưa đất nước ra thoát khỏi cuộc khủng hoảng.", "Củng cố quan hệ với đối tác truyền thống, mở rộng các quan hệ đối ngoại khác.", "Nâng cao vị thế, đưa Việt Nam trở thành thành viên thứ 149 của Liên hợp quốc.", "Tích cực chủ động hội nhập ngày càng sâu rộng vào khu vực và thế giới."], correct: 2, explanation: "Việt Nam chính thức trở thành thành viên thứ 149 của Liên hợp quốc vào ngày 20/9/1977. Sự kiện này diễn ra rất lâu trước khi chúng ta bắt đầu công cuộc Đổi mới (năm 1986)." },

        // --- PHẦN II (ĐỀ 12 - HIỂN THỊ CHÍNH XÁC SỰ THẬT) ---
        { id: "12_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>“Điện Biên Phủ trên không là trận quyết chiến có ý nghĩa chiến lược, là trận thử thách chưa từng có trong lịch sử. Chúng ta đã giành thắng lợi to lớn, toàn diện, buộc Mỹ phải chấp nhận mọi điều khoản của Hiệp định Pa-ri về chấm dứt chiến tranh, lập lại hoà bình ở Việt Nam, phải thực hiện tôn trọng độc lập chủ quyền và toàn vẹn lãnh thổ của Việt Nam, phải rút hết quân Mỹ về nước. Chiến thắng này đã góp phần tạo ra thế và lực mới cho sự nghiệp giải phóng miền Nam, thống nhất đất nước của nhân dân ta, để chúng ta thực hiện trọn vẹn lời dạy của Chủ tịch Hồ Chí Minh kính yêu: “Đánh cho Mỹ cút, đánh cho nguỵ nhào\".<br><span class='italic text-sm'>(Báo Điện tử Đảng Cộng sản Việt Nam, ngày 15-12-2022)</span>", items: [
            { id: "a", text: "a) Mỹ bắt đầu đàm phán với Việt Nam tại Hội nghị Pa-ri sau khi thất bại trong 12 ngày đêm trong trận \"Điện Biên Phủ trên không\".", correct: false, expl: "Sai. Hội nghị Paris đã bắt đầu đàm phán từ tận năm 1968. Thất bại thảm hại trong trận Điện Biên Phủ trên không cuối năm 1972 chỉ đập tan thái độ lật lọng của Mỹ, buộc chúng phải quay lại bàn đàm phán để kí kết Hiệp định." },
            { id: "b", text: "b) Theo Hiệp định Pa-ri về chấm dứt chiến tranh, lập lại hoà bình ở Việt Nam, Mỹ phải rút quân khỏi Việt Nam.", correct: true, expl: "Đúng. Tư liệu nhắc lại rõ ràng điều khoản cốt lõi của hiệp định là Mỹ 'phải rút hết quân Mỹ về nước'." },
            { id: "c", text: "c) Thắng lợi trên mặt trận quân sự có ý nghĩa quyết định đến thắng lợi trên bàn đàm phán.", correct: true, expl: "Đúng. Đòn trừng phạt quân sự sấm sét trên bầu trời Hà Nội chính là sức ép thực tế mang tính cưỡng chế, ép Mỹ vô điều kiện phải chấp nhận ký vào Hiệp định." },
            { id: "d", text: "d) Với Hiệp định Pa-ri, nhân dân Việt Nam đã hoàn thành cuộc cách mạng dân tộc dân chủ nhân dân.", correct: false, expl: "Sai. Hiệp định Paris mới chỉ giúp ta hoàn thành vế 'Đánh cho Mỹ cút'. Cuộc cách mạng dân tộc dân chủ nhân dân chỉ thực sự hoàn thành trọn vẹn sau Đại thắng mùa Xuân 1975 ('Đánh cho ngụy nhào')." }
        ]},
        { id: "12_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>\"Cộng đồng Kinh tế ASEAN (AEC) đã và đang tạo ra những cơ hội và cả thách thức đối với nền kinh tế, doanh nghiệp và người dân nước ta. Gia nhập AEC cũng như tham gia các hiệp định thương mại tự do giữa ASEAN với các đối tác, một mặt giúp Việt Nam thu hút đầu tư trực tiếp nước ngoài, mặt khác cũng là cầu nối để Việt Nam tiếp cận các thị trường tiềm năng trong và ngoài khu vực. Việc thực hiện các cam kết trong ASEAN đã và đang tạo nền tảng để Việt Nam tiếp tục mở rộng và tăng cường quan hệ với các đối tác ngoài ASEAN, nhất là các nước lớn, qua đó góp phần nâng cao vai trò và vị thế quốc tế của Việt Nam. Có thể nói, hội nhập ASEAN cho đến nay vẫn được coi là \"điểm tựa\" quan trọng cho quá trình hội nhập kinh tế quốc tế của Việt Nam. Tất nhiên, bên cạnh cơ hội là những thách thức... Một trong những thách thức lớn nhất của Việt Nam khi tham gia vào AEC là sự chênh lệch về trình độ phát triển so với 6 nước thành viên ban đầu của ASEAN (ASEAN 6). Tuy nhiên, trong 26 năm qua, khoảng cách... đã được thu hẹp một cách đáng kể\".<br><span class='italic text-sm'>(Báo Điện tử Đảng Cộng sản Việt Nam, ngày 11-8-2021)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu cung cấp thông tin khẳng định thời cơ và thách thức của Việt Nam khi gia nhập ASEAN.", correct: true, expl: "Đúng. Toàn bộ tư liệu tập trung phân tích 2 mặt biện chứng: những 'cơ hội' (thu hút đầu tư, tiếp cận thị trường) song hành cùng những 'thách thức' (chênh lệch trình độ) của Việt Nam." },
            { id: "b", text: "b) Thách thức lớn nhất của Việt Nam khi gia nhập vào Cộng đồng Kinh tế ASEAN là sự chênh lệch về trình độ phát triển so với 6 nước thành viên ban đầu.", correct: true, expl: "Đúng. Đoạn văn bản chỉ rõ: 'Một trong những thách thức lớn nhất của Việt Nam khi tham gia vào AEC là sự chênh lệch về trình độ phát triển so với 6 nước thành viên ban đầu'." },
            { id: "c", text: "c) Việt Nam gia nhập AEC chỉ mang lại thời cơ duy nhất là thúc đẩy sự phát triển vì hội nhập kinh tế quốc tế của Việt Nam.", correct: false, expl: "Sai. Việc khẳng định 'chỉ mang lại thời cơ duy nhất' là sai bóp méo bản chất, vì tư liệu đã phân tích rất rõ Việt Nam còn phải đối mặt với nhiều 'thách thức'." },
            { id: "d", text: "d) Thách thức lớn nhất của Việt Nam khi gia nhập ASEAN là sự chênh lệch về trình độ phát triển so với 10 nước thành viên.", correct: false, expl: "Sai. Tư liệu nói sự chênh lệch này là so với '6 nước thành viên ban đầu của ASEAN (ASEAN 6)', chứ không phải gộp so sánh với toàn bộ 10 nước thành viên." }
        ]},
        { id: "12_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>“Nếu Đại hội lần thứ VII của Đảng tuyên bố “Việt Nam muốn là bạn với tất cả các nước trong cộng đồng thế giới, phấn đấu vì hoà bình, độc lập và phát triển thì Đại hội lần thứ X của Đảng nêu \"Việt Nam là bạn, đối tác tin cậy của các nước trong cộng đồng quốc tế, Đại hội lần thứ XI nâng lên – Việt Nam là bạn, đối tác tin cậy và thành viên có trách nhiệm trong cộng đồng quốc tế, tạo môi trường hoà bình, ổn định để xây dựng và phát triển đất nước. Đây không chỉ là sự khác biệt về câu chữ mà là sự thay đổi vị thế quốc tế và từ đó xác định trách nhiệm của Việt Nam trong cộng đồng các quốc gia trên thế giới\".<br><span class='italic text-sm'>(GS. Vũ Dương Ninh, Lịch sử quan hệ đối ngoại Việt Nam 1940-2020)</span>", items: [
            { id: "a", text: "a) Việt Nam được cộng đồng quốc tế tín nhiệm, bầu Việt Nam làm Uỷ viên không thường trực Hội đồng Bảo an Liên hợp quốc từ năm 2020 đến nay.", correct: false, expl: "Sai. Thực tế lịch sử Việt Nam chỉ được bầu làm Ủy viên không thường trực nhiệm kì 2020-2021. Khẳng định làm Ủy viên 'từ 2020 đến nay' là sai kiến thức thực tế." },
            { id: "b", text: "b) Các hoạt động đối ngoại của Việt Nam từ năm 1986 đến nay được thực hiện nhằm phục vụ mục tiêu phát triển kinh tế và nâng cao vị thế trên trường quốc tế.", correct: true, expl: "Đúng. Đây là mục tiêu cốt lõi của công tác đối ngoại thời kì đổi mới: ngoại giao phục vụ kinh tế và định vị quốc gia." },
            { id: "c", text: "c) Năm 2023, Việt Nam đã thiết lập quan hệ đối tác chiến lược toàn diện với Mỹ và Hàn Quốc.", correct: false, expl: "Sai. Việt Nam nâng cấp quan hệ đối tác chiến lược toàn diện với Hàn Quốc vào năm 2022. Mỹ và Nhật Bản mới là hai quốc gia được nâng cấp vào năm 2023." },
            { id: "d", text: "d) Đường lối đối ngoại qua các kì Đại hội Đảng nhất quán về tư tưởng, rất đặc sắc và độc đáo, mang đậm bản sắc ngoại giao \"cây tre Việt Nam\".", correct: true, expl: "Đúng. Ngoại giao 'cây tre' (gốc vững, thân chuyển, cành uyển chuyển) là hình tượng xuất sắc phản ánh sự kiên định trong nguyên tắc và linh hoạt trong sách lược của ta qua các thời kì Đại hội." }
        ]},
        { id: "12_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>...Chúng ta không thể né tránh, kiêng kị cơ chế thị trường, vì đó là sự vận động của quy luật khách quan ngoài ý muốn của ta... Trong cơ chế tập trung, quan liêu, bao cấp, chúng ta đã bác bỏ cơ chế thị trường, làm trái quy luật khách quan, gây ra những hậu quả nghiêm trọng kéo dài; rốt cuộc vẫn phải bị động chạy theo tính tự phát của thị trường tự do. Đó là sai lầm cần phải khắc phục\".<br><span class='italic text-sm'>(Trường Chinh, Đổi mới là đòi hỏi bức thiết của đất nước và của thời đại)</span>", items: [
            { id: "a", text: "a) Trước khi Đổi mới đất nước, cơ chế quản lí kinh tế của nước ta là tập trung, quan liêu, bao cấp.", correct: true, expl: "Đúng. Lời đồng chí Trường Chinh đã chỉ thẳng mặt, gọi đúng tên cơ chế lỗi thời mà ta đã áp dụng trước 1986 là 'cơ chế tập trung, quan liêu, bao cấp'." },
            { id: "b", text: "b) Cơ chế quản lí kinh tế của đất nước đi trái với quy luật khách quan, gây ra những hậu quả nghiêm trọng kéo dài, đất nước khủng hoảng trầm trọng.", correct: true, expl: "Đúng. Việc cố tình 'bác bỏ cơ chế thị trường' bằng mệnh lệnh hành chính đã để lại hệ lụy khốc liệt, làm nền kinh tế đình đốn, lạm phát." },
            { id: "c", text: "c) Từ Đại hội VI (12-1986), Đảng chủ trương tiến hành đổi mới trên nhiều lĩnh vực, trọng tâm là đổi mới trên lĩnh vực chính trị.", correct: false, expl: "Sai. Chủ trương đúng đắn của Đảng khởi xướng tại Đại hội VI là lấy Đổi mới KINH TẾ làm trọng tâm, chứ không phải vội vã đổi mới chính trị." },
            { id: "d", text: "d) Đổi mới kinh tế chỉ tập trung vào chuyển sang cơ chế thị trường có sự quản lí của Nhà nước, đặc biệt đối với nền kinh tế quốc doanh.", correct: false, expl: "Sai. Việc đổi mới không 'chỉ tập trung' vào một thành phần, mà là cuộc cách mạng toàn diện xây dựng nền kinh tế hàng hóa NHIỀU THÀNH PHẦN, giải phóng mọi nguồn lực xã hội." }
        ]}
    ];

    const testBanks = { de11: de11_data, de12: de12_data };
    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    // BẮT ĐẦU BÀI THI
    window.startQuizAction = function() {
        try {
            const errDiv = document.getElementById('login-error');
            if(errDiv) errDiv.classList.add('hidden');
            
            const nameEl = document.getElementById('hoTen');
            const lopEl = document.getElementById('lop');
            
            const name = nameEl.value.trim();
            const lop = lopEl.value.trim();
            const checkedRadio = document.querySelector('input[name="chonDe"]:checked');
            
            if (!name || !lop) {
                if(errDiv) {
                    errDiv.innerText = "⚠️ Nhắc học sinh nhập đầy đủ Họ tên và Lớp cô nhé!";
                    errDiv.classList.remove('hidden');
                }
                return;
            }
            
            if (name && lop && checkedRadio) {
                const maDe = checkedRadio.value;
                const tenDe = checkedRadio.nextElementSibling.querySelector('.de-text').innerText.split('\n')[0].trim();
                currentStudent = { hoTen: name, lop: lop, maDe: maDe, tenDe: tenDe };
                currentQuestions = JSON.parse(JSON.stringify(testBanks[maDe]));
                quizStartTime = new Date();
                
                setTimeout(() => { isQuizStarted = true; }, 1000);
                showSection('quiz');
                
                const titleEl = document.getElementById('quiz-title');
                const infoEl = document.getElementById('student-info');
                if (titleEl) titleEl.innerText = currentStudent.tenDe;
                if (infoEl) infoEl.innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
                
                currentIdx = 0;
                userAnswers = {};
                window.renderQuestion();
                startTimer(50 * 60); 
            }
        } catch (error) {
            console.error(error);
        }
    };

    window.prevQuestion = function() {
        if (currentIdx > 0) { currentIdx--; window.renderQuestion(); }
    };

    window.nextQuestion = function() {
        if (currentIdx < currentQuestions.length - 1) { currentIdx++; window.renderQuestion(); }
    };

    window.viewScoresAction = function() {
        const btn = document.getElementById('view-scores-btn') || document.createElement('button'); 
        btn.innerText = "⏳ Đang tải dữ liệu...";
        if (database) {
            scoresRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                allScores = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                window.renderScores();
                btn.innerText = "🏆 Xem bảng xếp hạng";
                showSection('scores');
            });
        }
    };

    window.goHome = function() {
        if(document.getElementById('hoTen')) document.getElementById('hoTen').value = ''; 
        if(document.getElementById('lop')) document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    };

    function getTotalScoreItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.items.length;
            else count += 1;
        });
        return count; 
    }

    function getAnsweredCount() {
        return Object.keys(userAnswers).length;
    }

    // LƯU ĐÁP ÁN PHẦN I VÀ PHẦN II
    window.selectAnswer = function(qId, val, type) {
        if (type === 'tf') {
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            
            // Xử lý tách ID 
            const parts = qId.split('_'); 
            const itemId = parts[parts.length - 1]; 
            const mainQId = parts.slice(0, parts.length - 1).join('_');
            
            const q = currentQuestions.find(i => i.id === mainQId);
            if (q) {
                const item = q.items.find(i => i.id === itemId);
                if (item) {
                    window.showFeedbackModal(item, val, 'tf');
                }
            }

        } else if (type === 'single') {
            if (userAnswers[qId] !== undefined) return;
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            const q = currentQuestions[currentIdx];
            window.showFeedbackModal(q, val, 'single');
        }
    };

    window.showFeedbackModal = function(qOrItem, uAns, type = 'single') {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        const header = document.getElementById('feedback-header');
        const body = document.getElementById('feedback-body');
        
        if(!modal || !content) return; 

        window.autoAdvance = (type === 'single' || type === 'short'); 

        let isCorrect = false;
        let explanation = qOrItem.explanation || qOrItem.expl || "Chưa có lời giải chi tiết.";
        let optionsHtml = '';
        
        let questionText = "";
        if (type === 'single' || type === 'short') {
            questionText = qOrItem.question || "";
        } else if (type === 'tf') {
            questionText = qOrItem.text || "";
        }

        let questionHtml = `<div class="bg-slate-50 border-l-4 border-blue-500 p-4 rounded-r-xl shadow-sm mb-6 text-left">
            <div class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">Nội dung câu hỏi:</div>
            <div class="text-slate-800 font-bold text-lg math-scroll">${questionText}</div>
        </div>`;

        if (type === 'single') {
            isCorrect = (uAns === qOrItem.correct);
            
            optionsHtml += `<div class="space-y-3 mb-6 mt-4">`;
            qOrItem.options.forEach((opt, i) => {
                let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                if (qOrItem.correct === i) {
                    optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                    textStyle = 'font-bold';
                } else if (uAns === i && !isCorrect) {
                    optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                    textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                } else { 
                    optBg = 'bg-white text-slate-700 border border-slate-200'; 
                }

                let letterBg = (qOrItem.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                               ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                optionsHtml += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                    <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                    <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                    ${iconHtml}
                                </div>`;
            });
            optionsHtml += `</div>`;

        } else if (type === 'tf') {
            isCorrect = (uAns === qOrItem.correct);
            let ansText = qOrItem.correct ? 'ĐÚNG' : 'SAI';
            let uAnsText = uAns ? 'ĐÚNG' : 'SAI';
            
            optionsHtml += `
                <div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm mb-6 mt-4 text-left">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="font-black uppercase ${isCorrect ? 'text-emerald-600' : 'text-red-500 line-through decoration-red-500 decoration-2'}">${uAnsText}</span></span>
                        <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                    </div>
                </div>
            `;
        }
        
        let emoji = isCorrect ? '🎉' : '💡';
        let statusTitle = isCorrect ? 'Chính xác!' : 'Bạn làm sai rồi!';
        let headerColor = isCorrect ? 'text-emerald-600' : 'text-red-600';
        
        header.innerHTML = `<div class="text-6xl mb-4 animate-bounce">${emoji}</div><h3 class="text-3xl font-black ${headerColor} uppercase tracking-widest drop-shadow-sm">${statusTitle}</h3>`;
        
        body.innerHTML = questionHtml + optionsHtml;
        body.innerHTML += `<div class="mt-2"><div class="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-t-xl font-black uppercase text-sm border-b-4 border-blue-500 text-left">📖 Giải chi tiết từng bước:</div><div class="p-5 bg-white border-2 border-blue-200 rounded-b-2xl rounded-tr-2xl shadow-sm text-black font-medium text-base md:text-lg leading-loose math-scroll text-left">${explanation}</div></div>`;

        modal.classList.remove('hidden');
        void modal.offsetWidth;
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');

    };

    window.closeFeedbackModal = function() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        if(!modal) return;
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => { 
            modal.classList.add('hidden'); 
            if (window.autoAdvance) {
                if (currentIdx < currentQuestions.length - 1) {
                    window.nextQuestion();
                }
            }
        }, 300);
    };

    window.renderQuestion = function() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        if(!container) return;

        let html = `<div class="fade-in w-full">`;
        
        if (q.type === 'single') {
            const hasAnswered = userAnswers[q.id] !== undefined;
            const uAns = userAnswers[q.id];
            
            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">CÂU HỎI TRẮC NGHIỆM</h3></div>`;
            html += `<div class="flex gap-4 mb-5"><div class="w-full math-scroll"><p class="text-lg sm:text-xl font-bold text-red-600 mt-1 leading-snug tracking-tight">${q.question}</p></div></div>`;
            html += `<div class="space-y-4 md:pl-6 mt-6">`;
            q.options.forEach((opt, i) => {
                const isChecked = (uAns === i) ? 'checked' : '';
                const disabledClass = hasAnswered ? 'disabled-option' : '';
                html += `<div class="flex items-center">
                    <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio" ${isChecked} ${hasAnswered ? 'disabled' : ''} onchange="window.selectAnswer('${q.id}', ${i}, 'single')">
                    <label for="opt_${i}" class="option-label ${disabledClass} w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg cursor-pointer">
                        <div class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50">${String.fromCharCode(65 + i)}</div>
                        <div class="text-gray-700 leading-relaxed math-scroll flex-1">${opt}</div>
                    </label>
                </div>`;
            });
            html += `</div>`;
            
        } 
        else if (q.type === 'tf_cluster') {
            
            let displayContext = q.context;

            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">TRẮC NGHIỆM ĐÚNG/SAI</h3></div>`;
            html += `<div class="bg-red-50 text-red-700 p-4 rounded-xl font-bold mb-4 border-2 border-red-100 text-lg sm:text-xl leading-relaxed math-scroll">${displayContext}</div>`;
            html += `<div class="space-y-3 mt-6">`;
            q.items.forEach((item) => {
                const combinedId = q.id + '_' + item.id;
                let ans = userAnswers[combinedId];
                let btnT = ans === true ? 'selected' : ''; 
                let btnF = ans === false ? 'selected' : ''; 

                html += `<div class="p-4 sm:p-5 border-2 border-gray-100 rounded-2xl bg-white shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all hover:border-blue-200">
                    <div class="font-bold text-gray-800 flex-1 text-base sm:text-lg math-scroll">${item.text}</div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="window.selectAnswer('${combinedId}', true, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnT}">ĐÚNG</button>
                        <button onclick="window.selectAnswer('${combinedId}', false, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnF}">SAI</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        } 

        html += `</div>`;
        container.innerHTML = html;
        window.updateNav();
        window.updateProgress();
    };

    window.updateNav = function() {
        const pBtn = document.getElementById('prev-btn');
        const nBtn = document.getElementById('next-btn');
        const sBtn = document.getElementById('submit-btn');
        if(pBtn) pBtn.style.display = (currentIdx === 0) ? 'none' : 'block';
        if(nBtn) nBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'none' : 'block';
        if(sBtn) sBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'block' : 'none';
    };

    window.updateProgress = function() {
        const pgText = document.getElementById('progress-text');
        if(pgText) pgText.innerText = `${getAnsweredCount()}/${getTotalScoreItems()}`;
    };

    function formatDuration(sec) {
        const m = Math.floor(sec / 60); const s = sec % 60;
        return `${m}p ${s}s`;
    }

    window.submitQuiz = function() {
        if (!isQuizStarted) return; 
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let score = 0;

        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                if (userAnswers[q.id] === q.correct) score += 0.25; 
            } else if (q.type === 'tf_cluster') {
                let c = 0;
                q.items.forEach(item => { if (userAnswers[q.id + '_' + item.id] === item.correct) c++; });
                
                if (c === 1) score += 0.1;
                else if (c === 2) score += 0.25;
                else if (c === 3) score += 0.75;
                else if (c === 4) score += 1.0;
            }
        });

        score = score.toFixed(2); 

        const record = {
            hoTen: currentStudent.hoTen, lop: currentStudent.lop, tenDe: currentStudent.tenDe,
            diem: parseFloat(score),
            startTime: quizStartTime.toLocaleTimeString(), endTime: quizEndTime.toLocaleTimeString(),
            duration: formatDuration(Math.floor((quizEndTime - quizStartTime) / 1000)),
            thoiGian: new Date().toISOString(), deviceId: deviceId
        };
        
        if(database) {
            scoresRef.push(record, () => { window.showModalResult(score, record.duration); });
        }
    };

    window.showModalResult = function(score, dur) {
        ['login', 'quiz', 'scores', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const resEl = document.getElementById('result-section');
        if(resEl) resEl.classList.remove('hidden');
        const contentEl = document.getElementById('result-content');
        if(contentEl) contentEl.innerHTML = `
        <div class="absolute top-4 left-4 z-50">
            <button onclick="window.goHome()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-sm border border-gray-200 text-sm flex items-center gap-2">🏠 Trang chủ</button>
        </div>
        <div class="text-center mt-12 sm:mt-6">
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-emerald-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2"><span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - Lớp ${currentStudent.lop}</span><br><span class="text-sm font-bold text-gray-400 mt-1 block">${currentStudent.tenDe}</span></p>
        </div>
        <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative text-center">
            <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
            <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
            <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm border border-blue-100">Thời gian làm bài: ${dur}</div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button onclick="window.reviewQuiz()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">👀 Xem lại & Giải chi tiết</button>
            <button onclick="window.viewScoresAction()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
        </div>`;
    };

    window.reviewQuiz = function() {
        showSection('review');
        const container = document.getElementById('review-content');
        if(!container) return;
        let html = '';

        currentQuestions.forEach((q) => {
            if (q.type === 'single') {
                let uAns = userAnswers[q.id];
                let isCorrect = uAns === q.correct;
                let borderColor = isCorrect ? 'border-emerald-300 bg-emerald-50' : 'border-red-300 bg-red-50';
                
                let explanation = q.explanation;
                
                let statusText = '';
                let statusClass = '';
                if (uAns === undefined) {
                    statusText = '⚠️ Bạn chưa làm câu này';
                    statusClass = 'text-orange-500 bg-orange-50 border-orange-200';
                    borderColor = 'border-orange-300 bg-orange-50';
                } else if (isCorrect) {
                    statusText = '✅ Bạn làm đúng rồi!';
                    statusClass = 'text-emerald-600 bg-emerald-50 border-emerald-200';
                } else {
                    statusText = '❌ Bạn làm sai rồi!';
                    statusClass = 'text-red-600 bg-red-50 border-red-200';
                }

                html += `<div class="p-4 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor} relative mt-4 text-left">`;
                html += `<div class="absolute -top-4 right-4 px-4 py-1 rounded-full border-2 ${statusClass} font-bold text-sm shadow-sm">${statusText}</div>`;
                html += `<div class="font-bold text-lg sm:text-xl text-slate-800 mb-4 leading-relaxed math-scroll mt-2">${q.question}</div>`;
                html += `<div class="space-y-2">`;
                
                q.options.forEach((opt, i) => {
                    let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                    if (q.correct === i) {
                        optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                        textStyle = 'font-bold';
                    } else if (uAns === i && !isCorrect) {
                        optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                        textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                    } else { 
                        optBg = 'bg-white text-slate-700 border border-slate-200'; 
                    }

                    let letterBg = (q.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                                   ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                    html += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                ${iconHtml}
                            </div>`;
                });
                html += `</div>`;
                if (q.explanation) html += `<div class="review-explanation mt-4 pt-4 border-t-2 border-gray-200"><p class="text-sm font-black uppercase tracking-widest text-blue-600 mb-2">💡 Giải chi tiết từng bước:</p><p class="text-black font-medium text-base leading-loose math-scroll text-left">${explanation}</p></div>`;
                html += `</div>`;
            } 
            else if (q.type === 'tf_cluster') {
                let displayContext = q.context;

                html += `<div class="p-4 sm:p-6 border-2 border-indigo-200 bg-indigo-50 rounded-2xl shadow-sm mb-6 text-left">`;
                html += `<div class="font-bold text-lg sm:text-xl text-indigo-800 mb-4 math-scroll">${displayContext}</div>`;
                html += `<div class="space-y-4">`;
                q.items.forEach(item => {
                    let uAns = userAnswers[q.id + '_' + item.id];
                    let isCorrect = uAns === item.correct;
                    let ansText = item.correct ? 'ĐÚNG' : 'SAI';
                    let explanation = item.expl;
                    
                    let statusText = '';
                    let statusColor = '';
                    if (uAns === undefined) {
                        statusText = '⚠️ Chưa làm';
                        statusColor = 'text-orange-500 border-orange-200';
                    } else if (isCorrect) {
                        statusText = '✅ Bạn làm đúng rồi!';
                        statusColor = 'text-emerald-600 border-emerald-200 bg-emerald-50';
                    } else {
                        statusText = '❌ Bạn làm sai rồi!';
                        statusColor = 'text-red-600 border-red-200 bg-red-50';
                    }

                    html += `<div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm">
                        <div class="font-bold text-gray-800 math-scroll mb-3">${item.text}</div>
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-100 pb-3 gap-2">
                            <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="${uAns === undefined ? 'text-gray-400' : (uAns ? 'text-blue-600' : 'text-gray-600')} font-black uppercase ${!isCorrect && uAns !== undefined ? 'line-through decoration-red-500 decoration-2 text-red-500' : ''}">${uAns === undefined ? 'Chưa trả lời' : (uAns?'Đúng':'Sai')}</span></span>
                            <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                            <span class="font-bold text-sm ${statusColor} px-3 py-1 rounded-lg border text-center">${statusText}</span>
                        </div>
                        <div class="review-explanation mt-3 pt-2 text-sm text-gray-700 font-medium leading-relaxed math-scroll"><span class="text-indigo-500 font-bold uppercase">Giải chi tiết:</span><br> ${explanation}</div>
                    </div>`;
                });
                html += `</div></div>`;
            }
        });
        container.innerHTML = html;
        if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise([container]);
    };

    window.backToResult = function() { showSection('result'); };

    window.renderScores = function() {
        const tbody = document.getElementById('scores-tbody');
        if(!tbody) return;
        if (allScores.length === 0) { tbody.innerHTML = ''; document.getElementById('no-scores').classList.remove('hidden'); return; }
        const noScore = document.getElementById('no-scores');
        if(noScore) noScore.classList.add('hidden');
        const sorted = [...allScores].sort((a, b) => (a.lop.localeCompare(b.lop)) || (b.diem - a.diem));
        tbody.innerHTML = sorted.map((s, idx) => `<tr class="${s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-slate-50'} transition-colors border-b border-slate-100"><td class="px-4 py-4 text-center font-black text-slate-400 text-sm">#${idx + 1}</td><td class="px-4 py-4 font-black text-blue-600 text-sm">${s.lop}</td><td class="px-4 py-4 font-extrabold text-slate-800 text-sm">${s.hoTen} ${s.deviceId === deviceId ? '<span class="ml-2 bg-pink-500 text-white text-[10px] px-2 rounded-md">Bạn</span>' : ''}</td><td class="px-4 py-4 text-xs font-bold text-blue-500"><span class="bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">${s.tenDe}</span></td><td class="px-4 py-4 text-center"><span class="font-black text-lg ${s.diem >= 5 ? 'text-emerald-600' : 'text-red-500'}">${s.diem}</span></td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.startTime}</td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.endTime}</td><td class="px-4 py-4 text-right font-black text-orange-600 text-xs">${s.duration}</td>
            <td class="px-4 py-4 text-right text-xs text-slate-500 font-bold">${s.thoiGian ? new Date(s.thoiGian).toLocaleDateString('vi-VN') : '--/--/----'}</td></tr>`).join('');
    };

    function showSection(id) {
        ['login', 'quiz', 'scores', 'result', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const tgt = document.getElementById(id+'-section');
        if(tgt) tgt.classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        if(!display) return;
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) window.submitQuiz();
        }, 1000);
    }

    try {
        if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
        deviceId = localStorage.getItem('deviceId');
    } catch (e) { deviceId = 'dev_temp_' + Math.random().toString(36).substr(2); }
  </script>
 </body>
</html>
