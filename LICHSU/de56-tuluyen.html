  <script>

    /*================================================================================================
      DATA NGÂN HÀNG CÂU HỎI MÔN LỊCH SỬ - TRÍCH XUẤT TỪ ẢNH & PDF (ĐỀ SỐ 1 VÀ ĐỀ SỐ 2)
      ĐÃ BỔ SUNG LỜI GIẢI THÍCH CHI TIẾT
    =================================================================================================*/
    const de1_data = [
        // --- PHẦN I ---
        { id: "1_1", type: "single", question: "Câu 1. Khi thành lập, nước Cộng hoà nào sau đây không nằm trong Liên bang Cộng hoà xã hội chủ nghĩa Xô viết (gọi tắt là Liên Xô)?", options: ["Tát-gi-ki-xtan.", "Nga.", "U-crai-na.", "Bê-lô-rút-xi-a."], correct: 0, explanation: "Khi mới thành lập (tháng 12/1922), Liên Xô chỉ bao gồm 4 nước Cộng hòa Xô viết đầu tiên là: Nga, U-crai-na, Bê-lô-rút-xi-a và Ngoại Cáp-ca-dơ. Tát-gi-ki-xtan gia nhập ở giai đoạn sau." },
        { id: "1_2", type: "single", question: "Câu 2. Theo Hiến pháp năm 1924, Quốc huy của Liên Xô có biểu tượng nào sau đây?", options: ["Một nửa bánh xe răng cưa đặt giữa hai bó lúa.", "Liềm và búa trên quả địa cầu.", "Thiên An Môn ở bên dưới năm ngôi sao.", "Bánh xe răng cưa đặt giữa hai bó lúa."], correct: 1, explanation: "Theo Hiến pháp 1924, Quốc huy Liên Xô có hình búa liềm chéo nhau đặt trên nền quả địa cầu, thể hiện liên minh công - nông vững chắc và khát vọng giải phóng giai cấp vô sản trên toàn thế giới." },
        { id: "1_3", type: "single", question: "Câu 3. Mâu thuẫn bao trùm xã hội Việt Nam thời kì Bắc thuộc là mâu thuẫn giữa", options: ["toàn thể nông dân và chính quyền đô hộ.", "quý tộc người Việt và chính quyền đô hộ.", "nhân dân và những quý tộc người Việt.", "toàn thể nhân dân và chính quyền đô hộ."], correct: 3, explanation: "Trong thời kỳ Bắc thuộc, chính quyền phong kiến phương Bắc thi hành chính sách cai trị và bóc lột vô cùng tàn bạo. Do đó, mâu thuẫn cơ bản và bao trùm nhất là mâu thuẫn giữa toàn thể nhân dân Việt Nam với chính quyền đô hộ." },
        { id: "1_4", type: "single", question: "Câu 4. Khẩu hiệu phong trào Tây Sơn để ra nhằm tranh thủ sự ủng hộ của nhân dân là", options: ["“Lấy của người giàu chia cho người nghèo”.", "“Ruộng đất cho người nông dân mất ruộng”.", "“Phá kho thóc của chúa, chia cho nông dân”.", "“Tất cả ruộng đất là của nhân dân lao động”."], correct: 0, explanation: "Ngay từ những ngày đầu khởi nghĩa, phong trào Tây Sơn đã nêu cao khẩu hiệu “Lấy của người giàu chia cho người nghèo” để tập hợp đông đảo nhân dân, đặc biệt là tầng lớp nông dân nghèo khổ tham gia." },
        { id: "1_5", type: "single", question: "Câu 5. Bản Hiến chương Liên hợp quốc được thông qua tại hội nghị nào sau đây?", options: ["Hội nghị I-an-ta.", "Hội nghị Xan Phran-xi-xcô.", "Hội nghị Pốt-xđam.", "Hội nghị Tê-hê-ran."], correct: 1, explanation: "Bản Hiến chương Liên hợp quốc được thông qua tại Hội nghị Xan Phran-xi-xcô (Mỹ), diễn ra từ tháng 4 đến tháng 6 năm 1945 với sự tham gia của đại biểu 50 nước." },
       { 
    id: "1_6", 
    type: "single", 
    question: "Câu 6. Trong cuộc kháng chiến chống quân Tống thời Lý (1075 – 1077), sau khi đánh bại lực lượng quân sự của kẻ thù, Lý Thường Kiệt đã chủ động", 
    options: ["kí hiệp định để giữ thế thắng.", "cầu hoà để giữ quan hệ hoà hiếu.", "thương lượng để lấy lại đất đai.", "giảng hoà để chấm dứt chiến tranh."], 
    correct: 3, 
    explanation: "Sự thật lịch sử: Sau khi chặn đứng quân Tống trên phòng tuyến sông Như Nguyệt và mở cuộc tấn công quyết định làm suy yếu hoàn toàn ý chí xâm lược của địch, Lý Thường Kiệt đã chủ động giảng hoà. Mục đích: Việc này nhằm mở đường lui cho quân Tống rút về nước mà không bị mất thể diện nước lớn, giúp chấm dứt chiến tranh nhanh chóng, bảo toàn lực lượng cho đất nước và giữ vững mối quan hệ hòa hiếu lâu dài." 
},
        { id: "1_7", type: "single", question: "Câu 7. Việc phát triển mối quan hệ hữu nghị giữa các dân tộc trong Liên hợp quốc dựa trên cơ sở nền tảng nào sau đây?", options: ["Tôn trọng chủ quyền và toàn vẹn lãnh thổ.", "Không can thiệp vào công việc nội bộ của nhau.", "Tôn trọng quyền bình đẳng, quyền tự quyết dân tộc.", "Hợp tác phát triển có hiệu quả trong các lĩnh vực kinh tế, văn hoá, xã hội."], correct: 2, explanation: "Theo Điều 1 của Hiến chương, việc phát triển các mối quan hệ hữu nghị giữa các dân tộc phải được xây dựng dựa trên nguyên tắc tôn trọng quyền bình đẳng và quyền tự quyết của các dân tộc." },
        { id: "1_8", type: "single", question: "Câu 8. Yếu tố quốc tế nào sau đây có tác động quyết định đến quá trình thành lập của ASEAN?", options: ["Cuộc chiến tranh Đông Dương biến Đông Nam Á thành địa điểm tranh giành giữa các nước lớn.", "Chính phủ các nước Đông Nam Á nhận thức rõ sự cần thiết phải tiến tới thành lập một tổ chức khu vực.", "Các nước Đông Nam Á muốn giảm sự chi phối của các nước lớn bằng cách liên kết và dựa vào nhau trong một tổ chức khu vực.", "Xu thế liên kết khu vực trên thế giới đang phát triển."], correct: 3, explanation: "Sự xuất hiện của các tổ chức liên kết khu vực mang lại hiệu quả cao (tiêu biểu như Khối thị trường chung châu Âu - EEC) là xu thế mang tính thời đại, đã cổ vũ và tác động trực tiếp đến quyết định liên kết của các nước Đông Nam Á." },
        { id: "1_9", type: "single", question: "Câu 9. Trước khi ASEAN ra đời, khu vực Đông Nam Á đã có sự thành lập của các tổ chức nào?", options: ["Hiệp hội Đông Nam Á và APSC.", "Hiệp hội Đông Nam Á và AEC.", "Hiệp hội Đông Nam Á và tổ chức MAPHILINDO.", "Hiệp hội Đông Nam Á và ASCC."], correct: 2, explanation: "Trước khi Hiệp hội các quốc gia Đông Nam Á (ASEAN) ra đời vào năm 1967, khu vực này đã từng thử nghiệm thành lập Hiệp hội Đông Nam Á (ASA - 1961) và tổ chức MAPHILINDO (1963)." },
       { 
    id: "1_10", 
    type: "single", 
    question: "Câu 10. Trước khi ASEAN ra đời, các tổ chức được thành lập ở khu vực Đông Nam Á chỉ tồn tại trong thời gian ngắn là do", 
    options: ["không thống nhất được mục tiêu thành lập của tổ chức.", "chịu ảnh hưởng và sự can thiệp của các nước lớn.", "các quốc gia tham gia tổ chức khu vực chưa được độc lập hoàn toàn.", "bất đồng trong quan hệ song phương giữa các nước thành viên."], 
    correct: 3, 
    explanation: "Đáp án chính xác tuyệt đối theo Sách giáo khoa Lịch sử 12 hiện hành (Bộ Kết nối tri thức với cuộc sống, trang 22). Đầu những năm 60 của thế kỉ XX, một số tổ chức khu vực được thành lập, tuy nhiên, các tổ chức này chỉ tồn tại trong một thời gian ngắn, do những bất đồng trong quan hệ song phương giữa một số nước thành viên. Sự thật lịch sử: Các tổ chức tiền thân như ASA (1961) hay MAPHILINDO (1963) nhanh chóng sụp đổ là do xung đột trực tiếp giữa các nước: Malaysia tranh chấp chủ quyền vùng Sabah với Philippines, đồng thời bị Indonesia phản đối và thực hiện chính sách đối đầu (Konfrontasi)." 
},
        { id: "1_11", type: "single", question: "Câu 11. Một trong bốn địa phương giành được chính quyền sớm nhất khi Tổng khởi nghĩa trong Cách mạng tháng Tám năm 1945 là", options: ["Hải Phòng.", "Tuyên Quang.", "Bắc Giang.", "Phú Thọ."], correct: 2, explanation: "Bốn tỉnh giành chính quyền sớm nhất trong Tổng khởi nghĩa tháng 8/1945 (vào ngày 18/8/1945) là: Bắc Giang, Hải Dương, Hà Tĩnh và Quảng Nam." },
        { id: "1_12", type: "single", question: "Câu 12. Người viết bản Tuyên ngôn Độc lập khai sinh ra nước Việt Nam Dân chủ Cộng hoà là", options: ["Trần Phú.", "Hồ Chí Minh.", "Trường Chinh.", "Phạm Văn Đồng."], correct: 1, explanation: "Tại căn nhà số 48 phố Hàng Ngang (Hà Nội), Chủ tịch Hồ Chí Minh đã trực tiếp soạn thảo và sau đó đọc bản Tuyên ngôn Độc lập ngày 2/9/1945 tại Quảng trường Ba Đình." },
        { id: "1_13", type: "single", question: "Câu 13. \"Toàn thể dân Việt Nam quyết đem tất cả tinh thần và lực lượng, tính mệnh và của cải để giữ vững quyền tự do và độc lập ấy\". Đoạn tư liệu trên được trích trong văn kiện nào sau đây?", options: ["Tuyên ngôn Độc lập.", "Chỉ thị Toàn dân kháng chiến.", "Lời kêu gọi toàn quốc kháng chiến.", "Tác phẩm Kháng chiến nhất định thắng lợi."], correct: 0, explanation: "Đoạn trích này nằm ở phần kết luận của bản Tuyên ngôn Độc lập, là lời thề đanh thép của toàn thể dân tộc Việt Nam nhằm bảo vệ nền độc lập vừa giành được." },
        { id: "1_14", type: "single", question: "Câu 14. Thời cơ tiến hành Tổng khởi nghĩa giành chính quyền trong Cách mạng tháng Tám năm 1945 của nhân dân Việt Nam xuất hiện khi", options: ["Mỹ ném hai quả bom nguyên tử xuống Nhật Bản.", "Liên Xô tiến công quân Nhật ở Đông Bắc Trung Quốc.", "quân phiệt Nhật tuyên bố đầu hàng Đồng minh không điều kiện.", "phát xít Đức đầu hàng Đồng minh không điều kiện."], correct: 2, explanation: "Sự kiện quân phiệt Nhật tuyên bố đầu hàng Đồng minh không điều kiện (15/8/1945) đã làm kẻ thù duy nhất của cách mạng nước ta gục ngã, tạo ra thời cơ khách quan chín muồi." },
        { id: "1_15", type: "single", question: "Câu 15. Thời cơ “ngàn năm có một\" trong Cách mạng tháng Tám năm 1945 tồn tại vào khoảng thời gian nào?", options: ["Khi quân phiệt Nhật đầu hàng Đồng minh đến trước khi quân Đồng minh vào Đông Dương.", "Khi quân phiệt Nhật đảo chính Pháp đến trước khi quân Đồng minh vào Đông Dương.", "Khi quân phiệt Nhật vào Đông Dương đến trước ngày Nhật đảo chính Pháp.", "Khi quân Đồng minh vào Đông Dương giải giáp quân Nhật."], correct: 0, explanation: "Thời cơ vàng vô cùng ngắn ngủi: Bắt đầu từ khi Nhật tuyên bố đầu hàng (kẻ thù đã gục ngã) và kết thúc ngay trước khi quân Đồng minh (Anh, Tưởng) tiến vào Đông Dương giải giáp quân Nhật." },
        { id: "1_16", type: "single", question: "Câu 16. Đại hội nào sau đây của Đảng Cộng sản Việt Nam đã mở đầu cho công cuộc Đổi mới đất nước?", options: ["Đại hội V (1982).", "Đại hội VI (1986).", "Đại hội VII (1991).", "Đại hội VIII (1996)."], correct: 1, explanation: "Đại hội đại biểu toàn quốc lần thứ VI của Đảng (tháng 12/1986) đã đề ra đường lối đổi mới toàn diện đất nước, mở ra một bước ngoặt lịch sử cho Việt Nam." },
        { id: "1_17", type: "single", question: "Câu 17. Việt Nam thực hiện đường lối Đổi mới đất nước trong hoàn cảnh", options: ["lực lượng sản xuất còn nhỏ bé, cơ sở vật chất kĩ thuật lạc hậu, năng suất lao động thấp.", "năng suất lao động và hiệu quả kinh tế chưa cao, chưa có tích luỹ từ nội bộ nền kinh tế.", "nền kinh tế mất cân đối, lạm phát ở mức cao, lao động thiếu việc làm.", "đất nước lâm vào tình trạng khủng hoảng trầm trọng, trước hết là khủng hoảng kinh tế – xã hội."], correct: 3, explanation: "Việt Nam tiến hành đổi mới (1986) trong bối cảnh cả trong nước và quốc tế đều gặp khó khăn, đặc biệt là tình trạng khủng hoảng kinh tế - xã hội trầm trọng kéo dài." },
        { id: "1_18", type: "single", question: "Câu 18. Nội dung nào sau đây phản ánh điểm xuyên suốt về mục tiêu trong đường lối Đổi mới ở Việt Nam từ năm 1986 đến nay?", options: ["Làm cho mục tiêu xã hội chủ nghĩa được thực hiện có hiệu quả hơn.", "Hoàn thành cuộc cách mạng dân tộc dân chủ nhân dân trong cả nước.", "Thực hiện hoà bình, thống nhất hai miền về lãnh thổ, về nhà nước.", "Xoá bỏ tàn dư của chế độ phong kiến, thực hiện người cày có ruộng."], correct: 0, explanation: "Bản chất của Đổi mới không phải là thay đổi mục tiêu Chủ nghĩa Xã hội, mà là tìm ra con đường, biện pháp phù hợp để thực hiện mục tiêu đó một cách có hiệu quả hơn." },
        { id: "1_19", type: "single", question: "Câu 19. Người đi tiên phong trong các hoạt động đối ngoại của các nhà yêu nước Việt Nam trong những năm đầu thế kỉ XX là", options: ["Phan Bội Châu.", "Hoàng Hoa Thám.", "Huỳnh Thúc Kháng.", "Trần Quý Cáp."], correct: 0, explanation: "Phan Bội Châu là người tiên phong xuất dương hướng ra nước ngoài (sang Nhật Bản với phong trào Đông Du) để tìm kiếm sự giúp đỡ từ bạn bè quốc tế." },
        { id: "1_20", type: "single", question: "Câu 20. Hoạt động đối ngoại của Phan Bội Châu và tổ chức Duy Tân hội từ năm 1905 đến năm 1908 nhằm mục đích gì?", options: ["Học khoa học – kĩ thuật và quân sự của Nhật Bản.", "Tìm kiếm sự giúp đỡ của người Nhật Bản.", "Bắt liên lạc với Công sứ Đức.", "Thành lập các tổ chức cứu quốc."], correct: 1, explanation: "Phong trào Đông Du do Phan Bội Châu khởi xướng có mục đích cốt lõi là đưa thanh niên sang học tập để chuẩn bị lực lượng, đồng thời cầu viện Nhật Bản giúp đỡ vũ khí để đánh Pháp." },
        { id: "1_21", type: "single", question: "Câu 21. Điểm tương đồng trong hai con đường cứu nước của Phan Bội Châu và Phan Châu Trinh trong những năm đầu thế kỉ XX là đều", options: ["đi theo khuynh hướng dân chủ tư sản.", "thực hiện đường lối vũ trang bạo động.", "chủ trương nâng cao tinh thần dân chủ, khai dân trí.", "xây dựng các tổ chức chính trị riêng."], correct: 0, explanation: "Dù khác nhau về phương pháp (Phan Bội Châu chọn bạo động, Phan Châu Trinh chọn cải cách), cả hai cụ đều mong muốn thiết lập một thể chế chính trị mới theo khuynh hướng dân chủ tư sản." },
        { id: "1_22", type: "single", question: "Câu 22. Nguyễn Tất Thành sinh ra trong một gia đình", options: ["nhà Nho yêu nước.", "địa chủ nhỏ yêu nước.", "nông dân nghèo yêu nước.", "công nhân nghèo yêu nước."], correct: 0, explanation: "Nguyễn Tất Thành (Chủ tịch Hồ Chí Minh) sinh ra tại Kim Liên, Nam Đàn, Nghệ An trong một gia đình nhà Nho nghèo, yêu nước (cha là cụ Phó bảng Nguyễn Sinh Sắc)." },
        { id: "1_23", type: "single", question: "Câu 23. Đối với các nhà yêu nước tiền bối, Nguyễn Tất Thành có thái độ như thế nào?", options: ["Khâm phục tinh thần yêu nước và hướng theo con đường cứu nước của họ.", "Không tán thành việc hướng ra nước ngoài tìm đường cứu nước của họ.", "Khâm phục tinh thần yêu nước, nhưng không tán thành con đường cứu nước của họ.", "Cho rằng con đường cứu nước của họ là bước đi đúng đắn nhưng chưa triệt để."], correct: 2, explanation: "Nguyễn Tất Thành rất khâm phục tinh thần cứu nước của các bậc tiền bối như Phan Bội Châu, Phan Châu Trinh. Tuy nhiên, Người nhận thấy những hạn chế và sự bế tắc trong con đường của họ nên không tán thành." },
        { id: "1_24", type: "single", question: "Câu 24. Trước những hạn chế về khuynh hướng cứu nước của các chí sĩ yêu nước đi trước (cuối thế kỉ XIX - đầu thế kỉ XX), Nguyễn Tất Thành đã có quyết định gì?", options: ["Ra nước ngoài tìm con đường cứu nước mới cho dân tộc.", "Tích cực tham gia các hoạt động yêu nước để tìm hiểu thêm.", "Sang Trung Quốc tìm hiểu và nhờ sự giúp đỡ.", "Sang Nga học tập và nhờ sự giúp đỡ."], correct: 0, explanation: "Nhận thấy sự bế tắc của các con đường cứu nước đương thời, ngày 5/6/1911 tại bến cảng Nhà Rồng, Nguyễn Tất Thành đã quyết định ra đi tìm một con đường cứu nước mới cho dân tộc." },

        // --- PHẦN II (ĐÚNG/SAI) ---
        { id: "1_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>“Duy trì hoà bình và an ninh quốc tế và để đạt được mục đích đó, thi hành những biện pháp tập thể có hiệu quả để phòng ngừa và loại trừ các mối đe doạ hoà bình, cấm mọi hành vi xâm lược và phá hoại hoà bình khác, điều chỉnh hoặc giải quyết các vụ tranh chấp hoặc những tình thế có tính chất quốc tế có thể đưa đến sự phá hoại hoà bình, bằng phương pháp hoà bình theo đúng nguyên tắc của công lí và pháp luật quốc tế”.<br><span class='italic text-sm'>(Trích trong Điều 1, Hiến chương Liên hợp quốc)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu thể hiện mục tiêu của Liên hợp quốc là duy trì hoà bình và an ninh quốc tế cho tất cả các quốc gia.", correct: false, expl: "Mục tiêu của Liên hợp quốc là duy trì hòa bình và an ninh quốc tế nói chung, không phân biệt và không bảo kê riêng biệt cho hành động phi pháp của 'tất cả' các quốc gia." },
            { id: "b", text: "b) Một trong những mục tiêu của Liên hợp quốc là giải quyết các vụ tranh chấp quốc tế bằng pháp luật của các quốc gia.", correct: false, expl: "Tư liệu ghi rõ việc giải quyết tranh chấp dựa trên 'pháp luật quốc tế', không phải bằng pháp luật riêng biệt của từng quốc gia." },
            { id: "c", text: "c) Trong các mục tiêu của Liên hợp quốc, duy trì hoà bình và an ninh quốc tế là mục tiêu được đặt lên hàng đầu.", correct: true, expl: "Theo Điều 1 của Hiến chương, duy trì hòa bình và an ninh thế giới luôn là mục tiêu bao trùm và quan trọng hàng đầu của tổ chức này." },
            { id: "d", text: "d) Hiện nay, Liên hợp quốc vẫn tiếp tục thực hiện mục tiêu giải quyết các vụ tranh chấp, xung đột quốc tế bằng phương pháp hoà bình.", correct: true, expl: "Thực tiễn ngày nay, Liên hợp quốc vẫn luôn nỗ lực đóng vai trò trung gian hòa giải các cuộc xung đột vũ trang bằng phương pháp đàm phán hòa bình." }
        ]},

        { id: "1_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>\"Chủ tịch Hồ Chí Minh không chỉ là vị lãnh tụ kính yêu của nhân dân Việt Nam mà còn là nhà lãnh đạo, người anh hùng giải phóng dân tộc được nhân dân thế giới ngưỡng mộ với tình cảm chân thành. Rất nhiều quốc gia đã dựng tượng đài, lấy tên Người đặt cho nhiều công trình để bày tỏ sự kính ngưỡng sâu sắc dành cho người đã khai sinh ra nước Việt Nam hiện đại. Theo thống kê, đến nay tượng và tượng đài tưởng niệm Hồ Chủ tịch đã có mặt tại khoảng 20 nước trên thế giới... Ngoài việc dựng tượng Chủ tịch Hồ Chí Minh, tên của Người cũng đã được đặt cho nhiều quảng trường, trường học và đại lộ tại Nga, Pháp, Buốc-ki-na Pha-sô, Mô-dăm-bích, Ấn Độ,... Tại những quốc gia nơi Bác Hồ từng đặt chân tới trên chặng đường hoạt động cách mạng đều có những công trình di tích tưởng niệm Người...\".<br><span class='italic text-sm'>(Những công trình mang tên Hồ Chí Minh trên khắp thế giới, Báo Điện tử Chính phủ, ngày 18-5-2017)</span>", items: [

        { id: "1_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>“Phát biểu tại lễ mừng Quốc khánh ngày 02 – 9 – 1955, Người (Chủ tịch Hồ Chí Minh) nhấn mạnh: “Đoàn kết là một lực lượng vô địch. Lực lượng đoàn kết đã giúp Cách mạng tháng Tám thành công. Lực lượng đoàn kết đã giúp kháng chiến thắng lợi. Lực lượng đoàn kết sẽ động viên nhân dân từ Bắc đến Nam đấu tranh thực hiện hoà bình, thống nhất, độc lập, dân chủ trong cả nước”.<br><span class='italic text-sm'>(Hồ Chí Minh với tư tưởng xuyên suốt về đoàn kết, Báo Điện tử Chính phủ, ngày 19-8-2019)</span>", items: [

        { id: "2_12", type: "single", question: "Câu 12. Cách mạng tháng Tám năm 1945 giành thắng lợi có ý nghĩa là đã", options: ["mở ra kỉ nguyên cả nước độc lập, thống nhất, đi lên chủ nghĩa xã hội.", "mở ra kỉ nguyên độc lập, tự do cho dân tộc Việt Nam.", "cổ vũ phong trào giải phóng dân tộc ở châu Á, châu Phi và khu vực Mỹ La-tinh.", "tác động mạnh mẽ đến tình hình nước Mỹ."], correct: 1, explanation: "Thắng lợi vĩ đại của Cách mạng tháng 8 đã phá tan ách áp bức hơn 80 năm của thực dân Pháp, lật đổ chế độ phong kiến, mở ra kỷ nguyên mới: kỷ nguyên độc lập, tự do cho dân tộc Việt Nam." },
        { id: "2_13", type: "single", question: "Câu 13. Trong thời kì Đổi mới, Việt Nam ưu tiên quan hệ hợp tác trên những lĩnh vực nào?", options: ["Đối ngoại và quốc phòng – an ninh.", "Văn hoá, y tế và giáo dục.", "Kinh tế và văn hoá.", "Kinh tế và quốc phòng – an ninh."], correct: 2, explanation: "Đảng ta xác định trọng tâm của công cuộc Đổi mới là phát triển kinh tế làm trung tâm, đồng thời coi trọng phát triển các giá trị văn hóa làm nền tảng tinh thần của xã hội." },
        { id: "2_14", type: "single", question: "Câu 14. Yếu tố nào giữ vai trò quyết định đến việc tìm đường cứu nước của Nguyễn Tất Thành?", options: ["Do mâu thuẫn giữa toàn thể dân tộc Việt Nam với thực dân Pháp và tay sai.", "Thực dân Pháp xâm lược và đặt ách cai trị ở Việt Nam.", "Do tinh thần yêu nước, thương dân, ý chí đánh đuổi giặc Pháp của Nguyễn Tất Thành.", "Những hoạt động yêu nước của các vị tiền bối diễn ra sôi nổi nhưng đều thất bại."], correct: 2, explanation: "Các yếu tố về bối cảnh lịch sử chỉ là điều kiện khách quan. Chính lòng yêu nước nồng nàn, thương dân sâu sắc và nhãn quan chính trị nhạy bén của cá nhân Nguyễn Tất Thành mới là nhân tố chủ quan quyết định." },
        { id: "2_15", type: "single", question: "Câu 15. Một trong những quan điểm chủ đạo trong công cuộc bảo vệ Tổ quốc Việt Nam từ sau tháng 4 – 1975 là", options: ["coi ngoại lực là nhân tố quyết định mọi thắng lợi, thành công.", "kiên định mục tiêu độc lập dân tộc gắn liền với chủ nghĩa xã hội.", "chỉ chú trọng xây dựng sức mạnh của đất nước về văn hoá – xã hội.", "kết hợp chặt chẽ hai nhiệm vụ chiến lược: kháng chiến và kiến quốc."], correct: 1, explanation: "Đây là sợi chỉ đỏ xuyên suốt đường lối cách mạng Việt Nam. Sau năm 1975, Đảng vẫn kiên định chân lý: Độc lập dân tộc là điều kiện tiên quyết để xây dựng thành công chủ nghĩa xã hội." },
        { id: "2_16", type: "single", question: "Câu 16. Nội dung nào sau đây là thành tựu về kinh tế của công cuộc Đổi mới ở Việt Nam từ năm 1986 đến nay?", options: ["Thiết lập mối quan hệ ngoại giao với nhiều nước trên thế giới.", "Xây dựng nền văn hoá tiên tiến, đậm đà bản sắc dân tộc.", "Xây dựng nhà nước pháp quyền xã hội chủ nghĩa.", "Tổng kim ngạch xuất, nhập khẩu hàng hoá tăng mạnh."], correct: 3, explanation: "Các đáp án A, B, C lần lượt thuộc về các lĩnh vực ngoại giao, văn hóa và chính trị. Chỉ có đáp án D (tổng kim ngạch xuất, nhập khẩu tăng) là thành tựu nổi bật về mặt kinh tế." },
        { id: "2_17", type: "single", question: "Câu 17. Yếu tố khách quan nào sau đây đã tạo thời cơ thuận lợi để Cách mạng tháng Tám năm 1945 ở Việt Nam diễn ra nhanh chóng và ít đổ máu?", options: ["Sự chuẩn bị chu đáo về mọi mặt suốt 15 năm của ta.", "Quân phiệt Nhật tuyên bố đầu hàng Đồng minh không điều kiện.", "Tinh thần yêu nước của nhân dân Việt Nam.", "Sự lãnh đạo đúng đắn của Đảng Cộng sản Đông Dương."], correct: 1, explanation: "Sự kiện phát xít Nhật đầu hàng Đồng minh đã tạo ra khoảng trống quyền lực, làm suy sụp hoàn toàn tinh thần quân Nhật ở Đông Dương, đây là yếu tố khách quan vô cùng thuận lợi." },
        { id: "2_18", type: "single", question: "Câu 18. Nội dung nào sau đây phản ánh đúng thành tựu cơ bản về kinh tế của công cuộc Đổi mới ở Việt Nam trong giai đoạn 1986 - 1995?", options: ["Đưa đất nước thoát khỏi khủng hoảng kinh tế.", "Đẩy mạnh phát triển và chuyển dịch cơ cấu kinh tế theo hướng công nghiệp hoá, hiện đại hoá.", "Chú trọng đẩy mạnh phát triển và ứng dụng khoa học, công nghệ.", "Tập trung giải quyết tốt chính sách lao động, việc làm và thu nhập, bảo đảm an sinh xã hội cho người dân."], correct: 0, explanation: "Trong giai đoạn bước đầu Đổi mới (1986-1995), mục tiêu và thành tựu quan trọng nhất của nước ta là chặn đứng siêu lạm phát, bước đầu đưa đất nước thoát khỏi tình trạng khủng hoảng kinh tế - xã hội." },
        { id: "2_19", type: "single", question: "Câu 19. Việt Nam đã vận dụng nguyên tắc nào sau đây của Hiến chương Liên hợp quốc để giải quyết vấn đề phức tạp ở Biển Đông hiện nay?", options: ["Tôn trọng chủ quyền và quyền tự quyết của các nước lớn.", "Chủ động thương lượng, nhân nhượng để bảo đảm hoà bình.", "Không cần sự hỗ trợ của các tổ chức ở khu vực và quốc tế.", "Giải quyết các tranh chấp quốc tế bằng biện pháp hoà bình."], correct: 3, explanation: "Dựa trên Hiến chương Liên hợp quốc, Việt Nam luôn kiên trì lập trường: giải quyết mọi tranh chấp chủ quyền trên Biển Đông bằng các biện pháp hòa bình, tôn trọng luật pháp quốc tế (UNCLOS 1982)." },
        { id: "2_20", type: "single", question: "Câu 20. Từ năm 1905 đến năm 1917, các tổ chức mà Phan Bội Châu thành lập nhằm mục đích nào sau đây?", options: ["Vận động cải cách và duy tân.", "Cải cách kinh tế, chính trị để phát triển đất nước.", "Đánh đuổi thực dân Pháp, giành độc lập cho dân tộc.", "Lật độ chế độ quân chủ chuyên chế."], correct: 2, explanation: "Xuyên suốt quá trình hoạt động (từ Duy Tân hội đến Việt Nam Quang phục hội), mục tiêu tối thượng và không thay đổi của cụ Phan Bội Châu vẫn là dùng bạo lực đánh đuổi Pháp, khôi phục độc lập dân tộc." },
        { id: "2_21", type: "single", question: "Câu 21. Từ kết quả của Hiệp định Pa-ri về chấm dứt chiến tranh, lập lại hoà bình ở Việt Nam (27-01-1973), Đảng đã rút ra bài học kinh nghiệm nào cho vấn đề ngoại giao hiện nay?", options: ["Bài học về sự kết hợp giữa đấu tranh quân sự, kinh tế và ngoại giao.", "Bài học về sự kết hợp giữa đấu tranh quân sự, binh vận và ngoại giao.", "Bài học về sự kết hợp giữa đấu tranh quân sự, chính trị và ngoại giao.", "Bài học về sự kết hợp giữa đấu tranh văn hoá, chính trị và ngoại giao."], correct: 2, explanation: "Thắng lợi của Hiệp định Paris là đỉnh cao của sự phối hợp nhịp nhàng giữa 3 mặt trận: đánh địch trên chiến trường (quân sự), đấu tranh của quần chúng (chính trị) và đàm phán trên bàn hội nghị (ngoại giao)." },
        { id: "2_22", type: "single", question: "Câu 22. Cộng đồng Chính trị – An ninh ASEAN (APSC) xác định nguyên tắc hoạt động nào sau đây?", options: ["Dựa trên cơ sở các nguyên tắc cơ bản của ASEAN.", "Kế thừa các nguyên tắc hoạt động của Liên hợp quốc.", "Tiếp thu những điểm tiến bộ trong nguyên tắc hoạt động của EU.", "Xây dựng nguyên tắc hoạt động mới cho Cộng đồng ASEAN."], correct: 0, explanation: "APSC không tạo ra các nguyên tắc mới mà hoạt động hoàn toàn dựa trên nền tảng các nguyên tắc cơ bản đã được khẳng định trong Hiệp ước Bali (TAC) và Hiến chương ASEAN." },
        { id: "2_23", type: "single", question: "Câu 23. Nguyễn Ái Quốc gửi bản Yêu sách của nhân dân An Nam tới Hội nghị Véc-xai (1919) trong lúc hoạt động ở", options: ["Trung Quốc.", "Liên Xô.", "Xiêm.", "Pháp."], correct: 3, explanation: "Năm 1919, Nguyễn Ái Quốc đang sống và hoạt động tại Paris (Pháp). Người đã thay mặt những người Việt Nam yêu nước gửi bản Yêu sách 8 điểm tới Hội nghị Véc-xai đang họp tại đây." },
        { id: "2_24", type: "single", question: "Câu 24. Nội dung nào sau đây phản ánh đúng điểm khác biệt trong chủ trương về đối ngoại của Đảng, Chính phủ Việt Nam từ năm 2006 đến nay so với giai đoạn trước?", options: ["Chủ trương mở rộng quan hệ đối ngoại nhằm tạo điều kiện quốc tế thuận lợi cho công cuộc xây dựng và bảo vệ Tổ quốc.", "Chú trọng hội nhập kinh tế quốc tế và khu vực.", "Chủ động tích cực hội nhập quốc tế toàn diện.", "Xây dựng nền kinh tế mở, hội nhập với thế giới."], correct: 2, explanation: "Nếu các giai đoạn trước ta chủ yếu chú trọng hội nhập kinh tế, thì từ Đại hội X (2006), Đảng chính thức chủ trương chủ động và tích cực hội nhập quốc tế toàn diện, sâu rộng trên mọi lĩnh vực." },

        // --- PHẦN II (ĐÚNG/SAI) ---
        { id: "2_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>\"Không giống như Liên minh châu Âu (EU), ASEAN không theo đuổi mô hình siêu quốc gia, không có Quốc hội và toà án chung. Hợp tác ASEAN thường dựa vào các thoả thuận lỏng và không chính thức, quan hệ cá nhân giữa các nhà lãnh đạo và quan chức, sự đồng thuận và lợi ích chung, hơn là các cam kết có tính ràng buộc. Cựu Bộ trưởng Ngoại giao In-đô-nê-xi-a Móc-ta Ku-su-ma-át-ma-gia đã có nhận xét: “Bản chất sự hợp tác khu vực giữa các nước thành viên là lỏng lẻo, một sự hợp tác thật sự tự nguyện giữa các nước có chủ quyền, không có các cơ quan siêu quốc gia hoặc các thể chế. Về hình thức, nó thật sự là một Hiệp hội chứ không phải là một tổ chức\".<br><span class='italic text-sm'>(PGS.TS Đặng Cẩm Tú (Chủ biên), Gần kết và chủ động thích ứng: Tám nhìn và triển vọng của ASEAN sau năm 2025, NXB Chính trị quốc gia Sự thật, Hà Nội, 2021)</span>", items: [
            { id: "a", text: "a) ASEAN hoạt động theo cơ chế đảm bảo sự đồng thuận dựa trên sự đoàn kết giữa tất cả các quốc gia thành viên.", correct: true, expl: "Đúng. Tư liệu nhắc đến 'sự đồng thuận và lợi ích chung', đây là một trong những nguyên tắc cốt lõi giúp duy trì sự đoàn kết của ASEAN." },
            { id: "b", text: "b) ASEAN là một Hiệp hội rất chặt chẽ về mặt pháp lý và luôn dựa trên các cam kết có tính ràng buộc cao.", correct: false, expl: "Sai. Tư liệu nêu rõ hợp tác ASEAN dựa vào 'các thỏa thuận lỏng và không chính thức', 'hơn là các cam kết có tính ràng buộc'." },
            { id: "c", text: "c) Liên minh châu Âu (EU) có mô hình hoạt động lỏng lẻo và tự nguyện y hệt như tổ chức ASEAN.", correct: false, expl: "Sai. Ngay câu đầu tiên của tư liệu đã khẳng định 'Không giống như Liên minh châu Âu (EU), ASEAN không theo đuổi mô hình siêu quốc gia'." },
            { id: "d", text: "d) Bản chất hợp tác của ASEAN là sự tự nguyện giữa các quốc gia độc lập có chủ quyền.", correct: true, expl: "Đúng. Cựu Bộ trưởng Ngoại giao Indonesia đã nhận xét bản chất hợp tác của ASEAN là 'một sự hợp tác thật sự tự nguyện giữa các nước có chủ quyền'." }
        ]},
        { id: "2_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>\"Nhân danh toàn thể loài người, nhân danh tất cả các đảng viên xã hội, cả phái tả lẫn phái hữu chúng tôi kêu gọi các đồng chí, hãy cứu chúng tôi! Tiếng gọi sôi nổi của Nguyễn Ái Quốc vang lên từ diễn đàn của Đại hội đại biểu toàn quốc lần thứ XVIII của Đảng Xã hội Pháp, họp tại thành phố Tua từ ngày 25 đến ngày 30-12-1920. Đáp lại, là những tràng vỗ tay và những tiếng hoan hô nhiệt liệt. Thật vậy, chỉ riêng sự có mặt của một đại biểu Đông Dương, người \"bản xứ duy nhất, tại Đại hội của một chính đảng Pháp, cũng đủ khiến mọi người chú ý rồi, huống hồ người đại biểu Đông Dương đó là Nguyễn Ái Quốc, tức Nguyễn – người yêu nước – đã nổi tiếng vì đã gửi cho Hội nghị Véc-xai yêu sách đòi tự do và bình đẳng cho dân tộc Việt Nam\".<br><span class='italic text-sm'>(Mai Văn Bộ, Con đường vạn dặm của Hồ Chí Minh, NXB Trẻ, Thành phố Hồ Chí Minh, 2011)</span>", items: [
            { id: "a", text: "a) Nguyễn Ái Quốc là người bản xứ duy nhất tham dự Đại hội đại biểu toàn quốc lần thứ XVIII của Đảng Xã hội Pháp.", correct: true, expl: "Đúng. Đoạn tư liệu khẳng định Nguyễn Ái Quốc là đại biểu Đông Dương và là 'người bản xứ duy nhất' có mặt tại Đại hội." },
            { id: "b", text: "b) Sự kiện này đánh dấu Nguyễn Ái Quốc chính thức tìm ra con đường cứu nước đúng đắn cho dân tộc Việt Nam.", correct: false, expl: "Sai. Bác Hồ tìm ra con đường cứu nước từ tháng 7/1920 khi đọc Sơ thảo Luận cương của Lê-nin, Đại hội Tua (tháng 12/1920) là lúc Người bước ngoặt chính thức đứng vào hàng ngũ cộng sản." },
            { id: "c", text: "c) Sự có mặt của Nguyễn Ái Quốc đã thu hút sự chú ý của đại hội vì Người nổi tiếng với bản Yêu sách gửi Hội nghị Véc-xai.", correct: true, expl: "Đúng. Tư liệu nhắc lại việc Người 'đã nổi tiếng vì đã gửi cho Hội nghị Véc-xai yêu sách đòi tự do và bình đẳng' nên khiến mọi người rất chú ý." },
            { id: "d", text: "d) Tại Đại hội này, Nguyễn Ái Quốc kêu gọi sự giúp đỡ bằng vũ lực quân sự từ chính phủ Pháp.", correct: false, expl: "Sai. Lời kêu gọi của Bác là 'nhân danh tất cả các đảng viên xã hội', kêu gọi sự ủng hộ về mặt chính trị và nhân đạo, không phải xin vũ lực quân sự." }
        ]},
        { id: "2_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>\"Từ cuối năm 1972 đến tháng 01 – 1973, Việt Nam làm thất bại thủ đoạn lật ngược thế trận trên chiến trường và trên bàn đàm phán, buộc Mỹ và chính quyền Sài Gòn phải kí Hiệp định Pa-ri trong thế thất bại.... Hiệp định Pa-ri được kí kết là một thắng lợi tổng hợp của cuộc đấu tranh trên cả 3 mặt trận chính trị, quân sự, ngoại giao. Với Hiệp định Pa-ri, Mỹ buộc phải chấm dứt chiến tranh rút khỏi Việt Nam và Đông Dương, chấm dứt sự dính líu về quân sự. Chính quyền và quân đội Sài Gòn không còn chỗ dựa, bị suy yếu và lún sâu vào khủng hoảng. Hiệp định Pa-ri là cơ sở pháp lí không cho phép Mỹ tiếp tục dính líu và can thiệp trở lại ở Việt Nam\".<br><span class='italic text-sm'>(Viện Hàn lâm Khoa học Xã hội Việt Nam – Viện Sử học, Lịch sử Việt Nam, tập 13, NXB Khoa học Xã hội, Hà Nội, 2017)</span>", items: [
            { id: "a", text: "a) Sau thất bại 12 ngày đêm (cuối năm 1972), Mỹ mới bắt đầu đến Hội nghị Pa-ri để đàm phán với Việt Nam.", correct: false, expl: "Sai. Hội nghị Paris đã bắt đầu đàm phán từ tháng 5/1968. Thất bại Điện Biên Phủ trên không cuối năm 1972 chỉ buộc Mỹ phải ngừng ném bom và quay lại ký kết Hiệp định." },
            { id: "b", text: "b) Hiệp định Pa-ri là thắng lợi tổng hợp của cuộc đấu tranh kiên cường trên cả 3 mặt trận: chính trị, quân sự, ngoại giao.", correct: true, expl: "Đúng. Thắng lợi trên bàn đàm phán phản ánh chính xác kết quả của những đòn tấn công kết hợp nhịp nhàng trên mặt trận quân sự và chính trị." },
            { id: "c", text: "c) Với Hiệp định Pa-ri, đế quốc Mỹ buộc phải chấm dứt chiến tranh và rút toàn bộ quân viễn chinh khỏi Việt Nam.", correct: true, expl: "Đúng. Tư liệu ghi rõ 'Mỹ buộc phải chấm dứt chiến tranh rút khỏi Việt Nam và Đông Dương, chấm dứt sự dính líu về quân sự'." },
            { id: "d", text: "d) Hiệp định Pa-ri được kí kết đã đánh dấu kết thúc hoàn toàn cuộc kháng chiến chống Mỹ cứu nước.", correct: false, expl: "Sai. Hiệp định Paris mới chỉ đánh bại đế quốc Mỹ (đánh cho Mỹ cút), nhân dân ta phải tiếp tục chiến đấu đến năm 1975 mới giải phóng hoàn toàn miền Nam (đánh cho ngụy nhào)." }
        ]},
        { id: "2_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>\"Năm 1945-1946 là một thời điểm có ý nghĩa chiến lược đối với quan hệ Việt – Pháp, liên quan tới vấn đề chiến tranh hay hoà bình ở Việt Nam... Ban Thường vụ Trung ương và Chủ tịch Hồ Chí Minh dự đoán đúng chiều hướng chính sách các nước lớn, cũng thấy những mặt hạn chế trong mưu đồ của Tưởng và Pháp khi thoả thuận việc Pháp trở lại Bắc Đông Dương, từ đó đã kịp thời để ra quyết sách \"hoà để tiến\"... Chủ tịch Hồ Chí Minh đã khéo léo lợi dụng mâu thuẫn giữa các nước này với nhau và có sách lược phù hợp với từng đối tượng: giữ Mỹ đứng trung lập, kiên nhẫn tránh mọi xung đột với lực lượng của Tưởng, kiên quyết kháng chiến chống thực dân Pháp xâm lược ở miền Nam, đồng thời tìm giải pháp hoà bình khi Tưởng và Pháp thoả hiệp cho phép quân đội Pháp ra miền Bắc\".<br><span class='italic text-sm'>(Nguyễn Đình Bin (Chủ biên), Ngoại giao Việt Nam (1945 – 2000), NXB Chính trị quốc gia, Hà Nội, 2015)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu đề cập đến đường lối, sách lược ngoại giao vô cùng mềm dẻo của Đảng và Chủ tịch Hồ Chí Minh trong thời kì 1945 - 1946.", correct: true, expl: "Đúng. Tư liệu phân tích rõ quyết sách 'hòa để tiến' và cách Bác Hồ khéo léo dùng ngoại giao để bảo vệ chính quyền non trẻ." },
            { id: "b", text: "b) Mục tiêu của đấu tranh ngoại giao lúc này là tìm mọi cách nhân nhượng vô điều kiện với thực dân Pháp để giữ hòa bình.", correct: false, expl: "Sai. Ta nhân nhượng có nguyên tắc (Dĩ bất biến ứng vạn biến), tuyệt đối giữ vững độc lập chủ quyền chứ không bao giờ nhân nhượng vô điều kiện." },
            { id: "c", text: "c) Đảng và Chủ tịch Hồ Chí Minh đã khéo léo lợi dụng mâu thuẫn giữa quân Tưởng và quân Pháp để đề ra sách lược phù hợp.", correct: true, expl: "Đúng. Việc khéo léo lợi dụng mâu thuẫn này đã giúp ta phân hóa hàng ngũ kẻ thù, tránh việc phải đối phó với nhiều kẻ thù cùng một lúc." },
            { id: "d", text: "d) Đấu tranh ngoại giao trong giai đoạn này đã giúp nước Việt Nam Dân chủ Cộng hòa ngay lập tức được gia nhập Liên hợp quốc.", correct: false, expl: "Sai. Giai đoạn 1945-1946 ta đang bị bao vây cô lập, chưa được nước nào công nhận và hoàn toàn chưa thể gia nhập Liên hợp quốc." }
        ]}
    ];

    const testBanks = { de1: de1_data, de2: de2_data };
    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    // BẮT ĐẦU BÀI THI
    window.startQuizAction = function() {
        try {
            const errDiv = document.getElementById('login-error');
            if(errDiv) errDiv.classList.add('hidden');
            
            const nameEl = document.getElementById('hoTen');
            const lopEl = document.getElementById('lop');
            
            const name = nameEl.value.trim();
            const lop = lopEl.value.trim();
            const checkedRadio = document.querySelector('input[name="chonDe"]:checked');
            
            if (!name || !lop) {
                if(errDiv) {
                    errDiv.innerText = "⚠️ Nhắc học sinh nhập đầy đủ Họ tên và Lớp cô nhé!";
                    errDiv.classList.remove('hidden');
                }
                return;
            }
            
            if (name && lop && checkedRadio) {
                const maDe = checkedRadio.value;
                const tenDe = checkedRadio.nextElementSibling.querySelector('.de-text').innerText.split('\n')[0].trim();
                currentStudent = { hoTen: name, lop: lop, maDe: maDe, tenDe: tenDe };
                currentQuestions = JSON.parse(JSON.stringify(testBanks[maDe]));
                quizStartTime = new Date();
                
                setTimeout(() => { isQuizStarted = true; }, 1000);
                showSection('quiz');
                
                const titleEl = document.getElementById('quiz-title');
                const infoEl = document.getElementById('student-info');
                if (titleEl) titleEl.innerText = currentStudent.tenDe;
                if (infoEl) infoEl.innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
                
                currentIdx = 0;
                userAnswers = {};
                window.renderQuestion();
                startTimer(50 * 60); 
            }
        } catch (error) {
            console.error(error);
        }
    };

    window.prevQuestion = function() {
        if (currentIdx > 0) { currentIdx--; window.renderQuestion(); }
    };

    window.nextQuestion = function() {
        if (currentIdx < currentQuestions.length - 1) { currentIdx++; window.renderQuestion(); }
    };

    window.viewScoresAction = function() {
        const btn = document.getElementById('view-scores-btn') || document.createElement('button'); 
        btn.innerText = "⏳ Đang tải dữ liệu...";
        if (database) {
            scoresRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                allScores = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                window.renderScores();
                btn.innerText = "🏆 Xem bảng xếp hạng";
                showSection('scores');
            });
        }
    };

    window.goHome = function() {
        if(document.getElementById('hoTen')) document.getElementById('hoTen').value = ''; 
        if(document.getElementById('lop')) document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    };

    function getTotalScoreItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.items.length;
            else count += 1;
        });
        return count; 
    }

    function getAnsweredCount() {
        return Object.keys(userAnswers).length;
    }

    // LƯU ĐÁP ÁN PHẦN I VÀ PHẦN II
    window.selectAnswer = function(qId, val, type) {
        if (type === 'tf') {
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            
            const parts = qId.split('_'); 
            const mainQId = parts.slice(0, 3).join('_'); 
            const itemId = parts[3]; 
            const q = currentQuestions.find(i => i.id === mainQId);
            const item = q.items.find(i => i.id === itemId);
            
            // Gọi Popup giải thích
            window.showFeedbackModal(item, val, 'tf');

        } else if (type === 'single') {
            if (userAnswers[qId] !== undefined) return;
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            const q = currentQuestions[currentIdx];
            window.showFeedbackModal(q, val, 'single');
        }
    };

    // MODAL PHẢN HỒI LỜI GIẢI CHI TIẾT
    window.showFeedbackModal = function(qOrItem, uAns, type = 'single') {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        const header = document.getElementById('feedback-header');
        const body = document.getElementById('feedback-body');
        
        if(!modal || !content) return; 

        window.autoAdvance = (type === 'single' || type === 'short'); // Tự động chuyển câu nếu là trắc nghiệm 1 đáp án

        let isCorrect = false;
        let explanation = qOrItem.explanation || qOrItem.expl || "Chưa có lời giải chi tiết.";
        let optionsHtml = '';
        
        let questionText = "";
        if (type === 'single' || type === 'short') {
            questionText = qOrItem.question || "";
        } else if (type === 'tf') {
            questionText = qOrItem.text || "";
        }

        let questionHtml = `<div class="bg-slate-50 border-l-4 border-blue-500 p-4 rounded-r-xl shadow-sm mb-6 text-left">
            <div class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">Nội dung câu hỏi:</div>
            <div class="text-slate-800 font-bold text-lg math-scroll">${questionText}</div>
        </div>`;

        if (type === 'single') {
            isCorrect = (uAns === qOrItem.correct);
            
            optionsHtml += `<div class="space-y-3 mb-6 mt-4">`;
            qOrItem.options.forEach((opt, i) => {
                let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                if (qOrItem.correct === i) {
                    optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                    textStyle = 'font-bold';
                } else if (uAns === i && !isCorrect) {
                    optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                    textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                } else { 
                    optBg = 'bg-white text-slate-700 border border-slate-200'; 
                }

                let letterBg = (qOrItem.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                               ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                optionsHtml += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                    <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                    <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                    ${iconHtml}
                                </div>`;
            });
            optionsHtml += `</div>`;

        } else if (type === 'tf') {
            isCorrect = (uAns === qOrItem.correct);
            let ansText = qOrItem.correct ? 'ĐÚNG' : 'SAI';
            let uAnsText = uAns ? 'ĐÚNG' : 'SAI';
            
            optionsHtml += `
                <div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm mb-6 mt-4 text-left">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="font-black uppercase ${isCorrect ? 'text-emerald-600' : 'text-red-500 line-through decoration-red-500 decoration-2'}">${uAnsText}</span></span>
                        <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                    </div>
                </div>
            `;
        }
        
        let emoji = isCorrect ? '🎉' : '💡';
        let statusTitle = isCorrect ? 'Chính xác!' : 'Bạn làm sai rồi!';
        let headerColor = isCorrect ? 'text-emerald-600' : 'text-red-600';
        
        header.innerHTML = `<div class="text-6xl mb-4 animate-bounce">${emoji}</div><h3 class="text-3xl font-black ${headerColor} uppercase tracking-widest drop-shadow-sm">${statusTitle}</h3>`;
        
        body.innerHTML = questionHtml + optionsHtml;
        body.innerHTML += `<div class="mt-2"><div class="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-t-xl font-black uppercase text-sm border-b-4 border-blue-500 text-left">📖 Giải chi tiết từng bước:</div><div class="p-5 bg-white border-2 border-blue-200 rounded-b-2xl rounded-tr-2xl shadow-sm text-black font-medium text-base md:text-lg leading-loose math-scroll text-left">${explanation}</div></div>`;

        modal.classList.remove('hidden');
        void modal.offsetWidth;
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');

        if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise([content]);
    };

    window.closeFeedbackModal = function() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        if(!modal) return;
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => { 
            modal.classList.add('hidden'); 
            if (window.autoAdvance) {
                if (currentIdx < currentQuestions.length - 1) {
                    window.nextQuestion();
                }
            }
        }, 300);
    };

    // RENDERING ĐA LOẠI CÂU HỎI
    window.renderQuestion = function() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        if(!container) return;

        let html = `<div class="fade-in w-full">`;
        
        // --- MULTIPLE CHOICE ---
        if (q.type === 'single') {
            const hasAnswered = userAnswers[q.id] !== undefined;
            const uAns = userAnswers[q.id];
            
            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">CÂU HỎI TRẮC NGHIỆM</h3></div>`;
            html += `<div class="flex gap-4 mb-5"><div class="w-full math-scroll"><p class="text-lg sm:text-xl font-bold text-red-600 mt-1 leading-snug tracking-tight">${q.question}</p></div></div>`;
            html += `<div class="space-y-4 md:pl-6 mt-6">`;
            q.options.forEach((opt, i) => {
                const isChecked = (uAns === i) ? 'checked' : '';
                const disabledClass = hasAnswered ? 'disabled-option' : '';
                html += `<div class="flex items-center">
                    <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio" ${isChecked} ${hasAnswered ? 'disabled' : ''} onchange="window.selectAnswer('${q.id}', ${i}, 'single')">
                    <label for="opt_${i}" class="option-label ${disabledClass} w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg cursor-pointer">
                        <div class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50">${String.fromCharCode(65 + i)}</div>
                        <div class="text-gray-700 leading-relaxed math-scroll flex-1">${opt}</div>
                    </label>
                </div>`;
            });
            html += `</div>`;
            
        } 
        // --- TRUE / FALSE ---
        else if (q.type === 'tf_cluster') {
            
            let displayContext = q.context;

            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">TRẮC NGHIỆM ĐÚNG/SAI</h3></div>`;
            html += `<div class="bg-red-50 text-red-700 p-4 rounded-xl font-bold mb-4 border-2 border-red-100 text-lg sm:text-xl leading-relaxed math-scroll">${displayContext}</div>`;
            html += `<div class="space-y-3 mt-6">`;
            q.items.forEach((item) => {
                const combinedId = q.id + '_' + item.id;
                let ans = userAnswers[combinedId];
                let btnT = ans === true ? 'selected' : ''; 
                let btnF = ans === false ? 'selected' : ''; 

                html += `<div class="p-4 sm:p-5 border-2 border-gray-100 rounded-2xl bg-white shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all hover:border-blue-200">
                    <div class="font-bold text-gray-800 flex-1 text-base sm:text-lg math-scroll">${item.text}</div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="window.selectAnswer('${combinedId}', true, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnT}">ĐÚNG</button>
                        <button onclick="window.selectAnswer('${combinedId}', false, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnF}">SAI</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        } 

        html += `</div>`;
        container.innerHTML = html;
        window.updateNav();
        window.updateProgress();
    };

    window.updateNav = function() {
        const pBtn = document.getElementById('prev-btn');
        const nBtn = document.getElementById('next-btn');
        const sBtn = document.getElementById('submit-btn');
        if(pBtn) pBtn.style.display = (currentIdx === 0) ? 'none' : 'block';
        if(nBtn) nBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'none' : 'block';
        if(sBtn) sBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'block' : 'none';
    };

    window.updateProgress = function() {
        const pgText = document.getElementById('progress-text');
        if(pgText) pgText.innerText = `${getAnsweredCount()}/${getTotalScoreItems()}`;
    };

    function formatDuration(sec) {
        const m = Math.floor(sec / 60); const s = sec % 60;
        return `${m}p ${s}s`;
    }

    // CHẤM ĐIỂM BÀI THI LỊCH SỬ
    window.submitQuiz = function() {
        if (!isQuizStarted) return; 
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let score = 0;

        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                if (userAnswers[q.id] === q.correct) score += 0.25; 
            } else if (q.type === 'tf_cluster') {
                let c = 0;
                q.items.forEach(item => { if (userAnswers[q.id + '_' + item.id] === item.correct) c++; });
                
                if (c === 1) score += 0.1;
                else if (c === 2) score += 0.25;
                else if (c === 3) score += 0.75;
                else if (c === 4) score += 1.0;
            }
        });

        score = score.toFixed(2); 

        const record = {
            hoTen: currentStudent.hoTen, lop: currentStudent.lop, tenDe: currentStudent.tenDe,
            diem: parseFloat(score),
            startTime: quizStartTime.toLocaleTimeString(), endTime: quizEndTime.toLocaleTimeString(),
            duration: formatDuration(Math.floor((quizEndTime - quizStartTime) / 1000)),
            thoiGian: new Date().toISOString(), deviceId: deviceId
        };
        
        if(database) {
            scoresRef.push(record, () => { window.showModalResult(score, record.duration); });
        }
    };

    window.showModalResult = function(score, dur) {
        ['login', 'quiz', 'scores', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const resEl = document.getElementById('result-section');
        if(resEl) resEl.classList.remove('hidden');
        const contentEl = document.getElementById('result-content');
        if(contentEl) contentEl.innerHTML = `
        <div class="absolute top-4 left-4 z-50">
            <button onclick="window.goHome()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-sm border border-gray-200 text-sm flex items-center gap-2">🏠 Trang chủ</button>
        </div>
        <div class="text-center mt-12 sm:mt-6">
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-emerald-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2"><span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - Lớp ${currentStudent.lop}</span><br><span class="text-sm font-bold text-gray-400 mt-1 block">${currentStudent.tenDe}</span></p>
        </div>
        <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative text-center">
            <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
            <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
            <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm border border-blue-100">Thời gian làm bài: ${dur}</div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button onclick="window.reviewQuiz()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">👀 Xem lại & Giải chi tiết</button>
            <button onclick="window.viewScoresAction()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
        </div>`;
    };

    window.reviewQuiz = function() {
        showSection('review');
        const container = document.getElementById('review-content');
        if(!container) return;
        let html = '';

        currentQuestions.forEach((q) => {
            if (q.type === 'single') {
                let uAns = userAnswers[q.id];
                let isCorrect = uAns === q.correct;
                let borderColor = isCorrect ? 'border-emerald-300 bg-emerald-50' : 'border-red-300 bg-red-50';
                
                let explanation = q.explanation;
                
                let statusText = '';
                let statusClass = '';
                if (uAns === undefined) {
                    statusText = '⚠️ Bạn chưa làm câu này';
                    statusClass = 'text-orange-500 bg-orange-50 border-orange-200';
                    borderColor = 'border-orange-300 bg-orange-50';
                } else if (isCorrect) {
                    statusText = '✅ Bạn làm đúng rồi!';
                    statusClass = 'text-emerald-600 bg-emerald-50 border-emerald-200';
                } else {
                    statusText = '❌ Bạn làm sai rồi!';
                    statusClass = 'text-red-600 bg-red-50 border-red-200';
                }

                html += `<div class="p-4 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor} relative mt-4 text-left">`;
                html += `<div class="absolute -top-4 right-4 px-4 py-1 rounded-full border-2 ${statusClass} font-bold text-sm shadow-sm">${statusText}</div>`;
                html += `<div class="font-bold text-lg sm:text-xl text-slate-800 mb-4 leading-relaxed math-scroll mt-2">${q.question}</div>`;
                html += `<div class="space-y-2">`;
                
                q.options.forEach((opt, i) => {
                    let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                    if (q.correct === i) {
                        optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                        textStyle = 'font-bold';
                    } else if (uAns === i && !isCorrect) {
                        optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                        textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                    } else { 
                        optBg = 'bg-white text-slate-700 border border-slate-200'; 
                    }

                    let letterBg = (q.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                                   ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                    html += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                ${iconHtml}
                            </div>`;
                });
                html += `</div>`;
                if (q.explanation) html += `<div class="review-explanation mt-4 pt-4 border-t-2 border-gray-200"><p class="text-sm font-black uppercase tracking-widest text-blue-600 mb-2">💡 Giải chi tiết từng bước:</p><p class="text-black font-medium text-base leading-loose math-scroll text-left">${explanation}</p></div>`;
                html += `</div>`;
            } 
            else if (q.type === 'tf_cluster') {
                let displayContext = q.context;

                html += `<div class="p-4 sm:p-6 border-2 border-indigo-200 bg-indigo-50 rounded-2xl shadow-sm mb-6 text-left">`;
                html += `<div class="font-bold text-lg sm:text-xl text-indigo-800 mb-4 math-scroll">${displayContext}</div>`;
                html += `<div class="space-y-4">`;
                q.items.forEach(item => {
                    let uAns = userAnswers[q.id + '_' + item.id];
                    let isCorrect = uAns === item.correct;
                    let ansText = item.correct ? 'ĐÚNG' : 'SAI';
                    let explanation = item.expl;
                    
                    let statusText = '';
                    let statusColor = '';
                    if (uAns === undefined) {
                        statusText = '⚠️ Chưa làm';
                        statusColor = 'text-orange-500 border-orange-200';
                    } else if (isCorrect) {
                        statusText = '✅ Bạn làm đúng rồi!';
                        statusColor = 'text-emerald-600 border-emerald-200 bg-emerald-50';
                    } else {
                        statusText = '❌ Bạn làm sai rồi!';
                        statusColor = 'text-red-600 border-red-200 bg-red-50';
                    }

                    html += `<div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm">
                        <div class="font-bold text-gray-800 math-scroll mb-3">${item.text}</div>
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-100 pb-3 gap-2">
                            <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="${uAns === undefined ? 'text-gray-400' : (uAns ? 'text-blue-600' : 'text-gray-600')} font-black uppercase ${!isCorrect && uAns !== undefined ? 'line-through decoration-red-500 decoration-2 text-red-500' : ''}">${uAns === undefined ? 'Chưa trả lời' : (uAns?'Đúng':'Sai')}</span></span>
                            <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                            <span class="font-bold text-sm ${statusColor} px-3 py-1 rounded-lg border text-center">${statusText}</span>
                        </div>
                        <div class="review-explanation mt-3 pt-2 text-sm text-gray-700 font-medium leading-relaxed math-scroll"><span class="text-indigo-500 font-bold uppercase">Giải chi tiết:</span><br> ${explanation}</div>
                    </div>`;
                });
                html += `</div></div>`;
            }
        });
        container.innerHTML = html;
        if (window.MathJax && typeof MathJax.typesetPromise === 'function') MathJax.typesetPromise([container]);
    };

    window.backToResult = function() { showSection('result'); };

    window.renderScores = function() {
        const tbody = document.getElementById('scores-tbody');
        if(!tbody) return;
        if (allScores.length === 0) { tbody.innerHTML = ''; document.getElementById('no-scores').classList.remove('hidden'); return; }
        const noScore = document.getElementById('no-scores');
        if(noScore) noScore.classList.add('hidden');
        const sorted = [...allScores].sort((a, b) => (a.lop.localeCompare(b.lop)) || (b.diem - a.diem));
        tbody.innerHTML = sorted.map((s, idx) => `<tr class="${s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-slate-50'} transition-colors border-b border-slate-100"><td class="px-4 py-4 text-center font-black text-slate-400 text-sm">#${idx + 1}</td><td class="px-4 py-4 font-black text-blue-600 text-sm">${s.lop}</td><td class="px-4 py-4 font-extrabold text-slate-800 text-sm">${s.hoTen} ${s.deviceId === deviceId ? '<span class="ml-2 bg-pink-500 text-white text-[10px] px-2 rounded-md">Bạn</span>' : ''}</td><td class="px-4 py-4 text-xs font-bold text-blue-500"><span class="bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">${s.tenDe}</span></td><td class="px-4 py-4 text-center"><span class="font-black text-lg ${s.diem >= 5 ? 'text-emerald-600' : 'text-red-500'}">${s.diem}</span></td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.startTime}</td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.endTime}</td><td class="px-4 py-4 text-right font-black text-orange-600 text-xs">${s.duration}</td>
            <td class="px-4 py-4 text-right text-xs text-slate-500 font-bold">${s.thoiGian ? new Date(s.thoiGian).toLocaleDateString('vi-VN') : '--/--/----'}</td></tr>`).join('');
    };

    function showSection(id) {
        ['login', 'quiz', 'scores', 'result', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const tgt = document.getElementById(id+'-section');
        if(tgt) tgt.classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        if(!display) return;
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) window.submitQuiz();
        }, 1000);
    }

    try {
        if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
        deviceId = localStorage.getItem('deviceId');
    } catch (e) { deviceId = 'dev_temp_' + Math.random().toString(36).substr(2); }
  </script>
 </body>
</html>
