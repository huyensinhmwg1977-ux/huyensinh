    const de5_data = [
        { id: "5_1", type: "single", question: "Câu 1. Sau thắng lợi của Cách mạng tháng Mười (1917), nhiệm vụ hàng đầu đặt ra cho chính quyền Xô viết là", options: ["khôi phục kinh tế, xây dựng chủ nghĩa xã hội và bảo vệ đất nước.", "đập tan bộ máy nhà nước cũ, xây dựng nhà nước mới của những người lao động.", "tiến hành cải cách ruộng đất, quốc hữu hoá các nhà máy, xí nghiệp của tư bản.", "cải cách dân chủ trên các lĩnh vực kinh tế, chính trị, xã hội."], correct: 1, explanation: "Theo Lịch sử 12, sau khi giành được chính quyền, nhiệm vụ hàng đầu của Cách mạng tháng Mười là phải đập tan bộ máy nhà nước cũ của giai cấp tư sản, xây dựng bộ máy nhà nước kiểu mới của những người lao động (chính quyền Xô viết)." },
        { id: "5_2", type: "single", question: "Câu 2. Đại hội lần thứ nhất các Xô viết toàn Liên bang (30-12-1922) tổ chức tại Mát-xcơ-va (Nga) đã thông qua", options: ["Tuyên ngôn thành lập Liên bang Cộng hoà xã hội chủ nghĩa Xô viết.", "Hiến pháp đầu tiên của Liên bang Cộng hoà xã hội chủ nghĩa Xô viết.", "Tuyên ngôn về quyền của các dân tộc ở nước Nga.", "Sắc lệnh hoà bình và Sắc lệnh ruộng đất."], correct: 0, explanation: "Ngày 30-12-1922, Đại hội lần thứ nhất các Xô viết toàn Liên bang đã thông qua Tuyên ngôn thành lập Liên bang Cộng hoà xã hội chủ nghĩa Xô viết và Hiệp ước Liên bang." },
        { id: "5_3", type: "single", question: "Câu 3. Lời dụ \"Đánh cho để dài tóc,... Đánh cho sử tri Nam quốc anh hùng chi hữu chủ\" được phát ra từ cuộc kháng chiến chống", options: ["quân Thanh thời Tây Sơn.", "quân Nguyên thời Trần.", "quân Tống thời Lý.", "thực dân Pháp thời Nguyễn."], correct: 0, explanation: "Đây là lời hịch khích lệ tướng sĩ của Quang Trung - Nguyễn Huệ trong chiến dịch đại phá 29 vạn quân Thanh xâm lược vào mùa xuân năm Kỷ Dậu (1789)." },
        { id: "5_4", type: "single", question: "Câu 4. Phong trào Tây Sơn (thế kỉ XVIII) đã thực hiện được nhiệm vụ nào?", options: ["Đập tan âm mưu thủ tiêu nền văn hoá Đại Việt.", "Chấm dứt thời kì quân chủ hơn 1000 năm.", "Xoá bỏ tình trạng đất nước bị chia cắt.", "Giáng đòn nặng nề vào tham vọng xâm lược, nô dịch của chủ nghĩa đế quốc."], correct: 2, explanation: "Phong trào Tây Sơn đã liên tiếp đánh đổ các tập đoàn phong kiến Nguyễn (Đàng Trong), Trịnh, Lê (Đàng Ngoài), bước đầu hoàn thành sự nghiệp thống nhất đất nước, xoá bỏ tình trạng chia cắt lâu dài." },
        { id: "5_5", type: "single", question: "Câu 5. Liên hợp quốc được thành lập trong bối cảnh lịch sử nào sau đây?", options: ["Chiến tranh lạnh bùng nổ và lan rộng ra toàn thế giới.", "Liên Xô xây dựng chủ nghĩa xã hội và đạt được nhiều thành tựu to lớn.", "Phe phát xít Đức – I-ta-li-a – Nhật Bản phát triển và mở rộng lãnh thổ.", "Chiến tranh thế giới thứ hai đi đến giai đoạn cuối, sắp kết thúc."], correct: 3, explanation: "Đầu năm 1945, khi Chiến tranh thế giới thứ hai bước vào giai đoạn kết thúc, các nước Đồng minh nhận thấy cần thiết phải có một tổ chức quốc tế mới để duy trì hòa bình sau chiến tranh, dẫn đến sự ra đời của Liên hợp quốc." },
        { id: "5_6", type: "single", question: "Câu 6. Những quyết định của Hội nghị I-an-ta cùng sự thoả thuận của Liên Xô, Mỹ, Anh ở Hội nghị Pốt-xđam (1945) đã trở thành khuôn khổ của một trật tự thế giới mới vì", options: ["duy trì được hoà bình và an ninh quốc tế.", "đã phân chia xong phạm vi ảnh hưởng giữa các nước thắng trận.", "thúc đẩy sự cộng tác tích cực và giúp đỡ lẫn nhau trong các vấn đề cùng quan tâm thuộc các lĩnh vực kinh tế, xã hội...", "gia tăng sức mạnh, tầm ảnh hưởng và vị thế về kinh tế, chính trị, quân sự,... của các nước lớn."], correct: 1, explanation: "Trật tự thế giới 2 cực I-an-ta thực chất là sự thỏa thuận phân chia khu vực đóng quân và phạm vi ảnh hưởng ở châu Âu và châu Á giữa các cường quốc thắng trận, chủ yếu là giữa Liên Xô và Mỹ." },
        { id: "5_7", type: "single", question: "Câu 7. Nhận xét nào sau đây đúng với xu thế phát triển của thế giới sau Chiến tranh lạnh?", options: ["Trật tự thế giới mới được hình thành theo xu hướng đa cực.", "Trật tự thế giới hai cực I-an-ta tiếp tục được duy trì.", "Thế giới phát triển theo xu thế một cực và nhiều trung tâm.", "Mỹ vươn lên trở thành một cực duy nhất."], correct: 0, explanation: "Sau khi Chiến tranh lạnh kết thúc và Liên Xô sụp đổ, thế giới đang trong quá trình hình thành một trật tự thế giới mới theo xu hướng \"đa cực\", với sự vươn lên của nhiều trung tâm kinh tế, chính trị lớn như Mỹ, Trung Quốc, EU, Nhật Bản, Nga." },
        { id: "5_8", type: "single", question: "Câu 8. Yếu tố quốc tế nào sau đây có tác động quyết định đến sự thành lập của ASEAN?", options: ["Khu vực Đông Nam Á trở thành địa điểm tranh giành của các nước lớn trong chiến tranh Đông Dương.", "Nhận thức được sự cần thiết phải thành lập một tổ chức khu vực của chính phủ các nước Đông Nam Á.", "Các nước Đông Nam Á muốn giảm sự chi phối của các nước lớn bằng cách liên kết và dựa vào nhau trong một tổ chức khu vực.", "Xu thế liên kết khu vực trên thế giới đang phát triển."], correct: 3, explanation: "Sự thành công của Cộng đồng kinh tế châu Âu (EEC) là một biểu hiện của xu thế liên kết khu vực mạnh mẽ trên thế giới lúc bấy giờ. Yếu tố quốc tế này đã cổ vũ và tác động trực tiếp thúc đẩy các nước Đông Nam Á liên kết lại với nhau." },
        { id: "5_9", type: "single", question: "Câu 9. Cộng đồng ASEAN được xây dựng với ba trụ cột chính nào sau đây?", options: ["Kinh tế - Chính trị, Văn hoá, Xã hội.", "Chính trị, Kinh tế, Văn hoá – Lịch sử.", "Chính trị – An ninh, Kinh tế, Văn hoá – Xã hội.", "Kinh tế, Xã hội, Văn hoá – Thể dục thể thao."], correct: 2, explanation: "Cộng đồng ASEAN (thành lập cuối năm 2015) dựa trên 3 trụ cột cơ bản: Cộng đồng Chính trị - An ninh (APSC), Cộng đồng Kinh tế (AEC), và Cộng đồng Văn hóa - Xã hội (ASCC)." },
        { id: "5_10", type: "single", question: "Câu 10. Thuật ngữ ASEAN 5 được hiểu là", options: ["ASEAN xác định 5 mục tiêu khi thành lập.", "ASEAN thông qua 5 tuyên bố đầu tiên khi thành lập.", "ASEAN tuyên bố 5 nguyên tắc về sự hoà hợp giữa các nước thành viên.", "ASEAN với sự tham gia của 5 nước thành viên đầu tiên."], correct: 3, explanation: "ASEAN 5 để chỉ 5 quốc gia đầu tiên sáng lập nên ASEAN vào ngày 8/8/1967 tại Băng Cốc, bao gồm: In-đô-nê-xi-a, Ma-lai-xi-a, Phi-líp-pin, Xin-ga-po và Thái Lan." },
        { id: "5_11", type: "single", question: "Câu 11. Thời cơ “ngàn năm có một\" trong Cách mạng tháng Tám năm 1945 được Đảng Cộng sản Đông Dương xác định vào khoảng thời gian khi", options: ["quân phiệt Nhật đầu hàng Đồng minh đến trước khi quân Đồng minh vào Đông Dương.", "quân Đồng minh vào Đông Dương.", "Mỹ can thiệp vào chiến tranh Đông Dương.", "kháng chiến toàn quốc chống thực dân Pháp bùng nổ."], correct: 0, explanation: "Thời cơ chín muồi của Cách mạng tháng Tám tồn tại trong khoảng thời gian rất ngắn (khoảng 15 ngày), bắt đầu từ khi Nhật tuyên bố đầu hàng Đồng minh (15/8/1945) và kết thúc khi quân Đồng minh kéo vào Đông Dương (đầu tháng 9/1945)." },
        { id: "5_12", type: "single", question: "Câu 12. Tổ chức chính trị nào ra đời từ khí thế của phong trào Đồng khởi (1959 – 1960) ở miền Nam Việt Nam?", options: ["Chính phủ Cách mạng lâm thời Cộng hoà miền Nam Việt Nam.", "Mặt trận Dân tộc giải phóng miền Nam Việt Nam.", "Trung ương Cục miền Nam.", "Liên minh nhân dân Việt Nam – Lào – Cam-pu-chia."], correct: 1, explanation: "Được sự cổ vũ mạnh mẽ từ thắng lợi của phong trào Đồng khởi, ngày 20-12-1960, Mặt trận Dân tộc giải phóng miền Nam Việt Nam được thành lập, đánh dấu sự ra đời của tổ chức chính trị đại diện hợp pháp cho nhân dân miền Nam." },
        { id: "5_13", type: "single", question: "Câu 13. Chiến thắng nào của quân dân miền Nam trong cuộc kháng chiến chống Mỹ, cứu nước (1954 - 1975) mở ra cao trào \"tìm Mỹ mà đánh, lùng nguỵ mà diệt\" trên khắp miền Nam?", options: ["Phong trào Đồng khởi (1959–1960).", "Chiến thắng Ấp Bắc (01 – 1963).", "Chiến thắng Vạn Tường (8 – 1965).", "Chiến thắng Đường 14 – Phước Long (01 – 1975)."], correct: 2, explanation: "Chiến thắng Vạn Tường (Quảng Ngãi, tháng 8/1965) đã chứng minh quân dân ta hoàn toàn có khả năng đánh bại quân viễn chinh Mỹ trong chiến lược \"Chiến tranh cục bộ\", từ đó dấy lên cao trào \"tìm Mỹ mà đánh, lùng ngụy mà diệt\"." },
        { id: "5_14", type: "single", question: "Câu 14. Nội dung nào sau đây không phản ánh đúng ý nghĩa lịch sử của các cuộc đấu tranh bảo vệ Tổ quốc Việt Nam từ sau tháng 4 – 1975?", options: ["Làm thất bại âm mưu và hành động xâm lược, chống phá của các thế lực thù địch.", "Bảo vệ vững chắc độc lập, chủ quyền, thống nhất và toàn vẹn lãnh thổ Tổ quốc.", "Tạo thuận lợi cho sự nghiệp xây dựng chủ nghĩa xã hội trên phạm vi cả nước.", "Giúp Việt Nam đặt quan hệ ngoại giao, hợp tác với tất cả các nước trên thế giới."], correct: 3, explanation: "Giai đoạn ngay sau 1975, nước ta phải đối đầu với chiến tranh biên giới Tây Nam và phía Bắc, đồng thời bị Mỹ và một số thế lực bao vây, cấm vận. Do đó việc \"đặt quan hệ ngoại giao với tất cả các nước\" trong giai đoạn này là không đúng lịch sử." },
        { id: "5_15", type: "single", question: "Câu 15. Ở Việt Nam, việc kết hợp sức mạnh dân tộc với sức mạnh thời đại là một trong những bài học lớn, xuyên suốt quá trình đấu tranh giành độc lập dân tộc, trong đó", options: ["sức mạnh dân tộc là yếu tố quyết định.", "sức mạnh thời đại là yếu tố quyết định.", "sức mạnh dân tộc chưa được phát huy.", "sức mạnh quốc tế chưa được phát huy."], correct: 0, explanation: "Trong quan hệ biện chứng này, Đảng luôn khẳng định nội lực (sức mạnh dân tộc) là nền tảng cốt lõi và mang tính chất quyết định, còn sức mạnh thời đại (ngoại lực) là yếu tố bổ trợ vô cùng quan trọng." },
        { id: "5_16", type: "single", question: "Câu 16. Đại hội VI (1986) của Đảng Cộng sản Việt Nam tổ chức thực hiện Ba chương trình kinh tế lớn là", options: ["Lương thực – Nông sản, Hàng tiêu dùng và Hàng nhập khẩu.", "Lương thực – Hàng tiêu dùng, Hàng xuất khẩu và Nông sản.", "Lương thực - Thực phẩm, Hàng xuất khẩu và Hàng quân sự.", "Lương thực - Thực phẩm, Hàng tiêu dùng và Hàng xuất khẩu."], correct: 3, explanation: "Tại Đại hội VI (12/1986), Đảng đã đề ra trọng tâm thực hiện 3 chương trình kinh tế lớn: Lương thực - Thực phẩm, Hàng tiêu dùng và Hàng xuất khẩu nhằm giải quyết nhu cầu thiết yếu và tạo nguồn tích lũy." },
        { id: "5_17", type: "single", question: "Câu 17. Việt Nam tiến hành công cuộc Đổi mới đất nước nhằm", options: ["cứu nguy cho sự sụp đổ của chủ nghĩa xã hội trên thế giới.", "chứng tỏ tiềm lực kinh tế, chính trị mạnh của đất nước.", "khắc phục hạn chế của đường lối xây dựng chủ nghĩa xã hội.", "đưa Việt Nam tiến nhanh, tiến mạnh lên chủ nghĩa xã hội."], correct: 2, explanation: "Đổi mới không phải là thay đổi mục tiêu XHCN, mà là để khắc phục những sai lầm, khuyết điểm (sự chủ quan, duy ý chí trong cơ chế bao cấp) nhằm đưa đất nước vượt qua khủng hoảng kinh tế - xã hội trầm trọng." },
        { id: "5_18", type: "single", question: "Câu 18. Bài học kinh nghiệm nào được Đảng rút ra từ công cuộc Đổi mới (12-1986) để phát triển đất nước hiện nay?", options: ["Nhạy bén trước sự chuyển biến của tình hình thế giới, coi trọng nhập khẩu công nghệ.", "Tôn trọng quy luật kinh tế – xã hội, bám sát thực tiễn để đề ra chủ trương phù hợp.", "Quan tâm, giải quyết tất cả các nguyện vọng của quần chúng nhân dân.", "Tăng cường sự hợp tác giữa Đảng Cộng sản Việt Nam với các chính đảng khác."], correct: 1, explanation: "Thành công của Đổi mới bắt nguồn từ việc từ bỏ cơ chế bao cấp mệnh lệnh, biết tôn trọng và hành động theo quy luật khách quan (như quy luật giá trị, cung cầu), bám sát thực tiễn để đề ra đường lối." },
        { id: "5_19", type: "single", question: "Câu 19. Sau khi bị trục xuất khỏi Nhật Bản, Phan Bội Châu và Duy Tân hội đã đến hoạt động ở những quốc gia nào?", options: ["Pháp, Trung Quốc, Xiêm.", "Trung Quốc, Lào, Xiêm.", "An-giê-ri, Ai Cập, Xu-đăng.", "Pháp, An-giê-ri, Ma-rốc."], correct: 1, explanation: "Năm 1908, sau khi bị Nhật trục xuất, Phan Bội Châu cùng các đồng chí phải sang nương náu và hoạt động ở một số địa bàn như Trung Quốc, Xiêm (Thái Lan) để tiếp tục gây dựng lực lượng." },
        { id: "5_20", type: "single", question: "Câu 20. Trong cuộc kháng chiến chống thực dân Pháp (1945 – 1954), nước Việt Nam Dân chủ Cộng hoà đã mở các cơ quan đại diện ở châu lục nào?", options: ["Châu Phi.", "Châu Mỹ.", "Châu Úc.", "Châu Á."], correct: 3, explanation: "Trong KCCP, Việt Nam đã thiết lập quan hệ và mở cơ quan đại diện ngoại giao ở một số nước thuộc khu vực Châu Á (như Trung Quốc, Thái Lan...) để liên hệ vận động quốc tế." },
        { id: "5_21", type: "single", question: "Câu 21. Hoạt động đối ngoại của Việt Nam với các nước xã hội chủ nghĩa trong giai đoạn 1975 - 1985 không tập trung vào vấn đề nào sau đây?", options: ["Gia nhập Tổ chức Hiệp ước Vác-sa-va của các nước xã hội chủ nghĩa.", "Coi trọng quan hệ hợp tác chặt chẽ với Liên Xô và các nước xã hội chủ nghĩa.", "Kí kết nhiều hiệp ước về chính trị, kinh tế, văn hoá, khoa học – kĩ thuật.", "Gia nhập Hội đồng tương trợ kinh tế (SEV) của các nước xã hội chủ nghĩa."], correct: 0, explanation: "Việt Nam gia nhập SEV (1978) và có quan hệ rất chặt chẽ với Liên Xô. Tuy nhiên, Việt Nam KHÔNG gia nhập Tổ chức Hiệp ước Vác-sa-va (vì đây là khối liên minh quân sự của các nước Đông Âu và Liên Xô)." },
        { id: "5_22", type: "single", question: "Câu 22. Tháng 6 – 1925, Nguyễn Ái Quốc đã thành lập tổ chức nào?", options: ["Tâm tâm xã.", "Việt Nam Quốc dân đảng.", "Hội Việt Nam Cách mạng Thanh niên.", "Tân Việt Cách mạng đảng."], correct: 2, explanation: "Tháng 6-1925, tại Quảng Châu (Trung Quốc), Nguyễn Ái Quốc đã thành lập Hội Việt Nam Cách mạng Thanh niên - tổ chức tiền thân của Đảng Cộng sản Việt Nam." },
        { id: "5_23", type: "single", question: "Câu 23. Việc Nguyễn Ái Quốc tìm ra con đường cứu nước cho dân tộc có ý nghĩa như thế nào?", options: ["Bổ sung một con đường cứu nước để tăng khả năng đánh thắng kẻ thù.", "Củng cố lòng tin cho dân tộc Việt Nam vào thắng lợi chống thực dân Pháp.", "Giải quyết mâu thuẫn dân tộc và giai cấp trong xã hội Việt Nam.", "Góp phần trực tiếp vào việc giải quyết khủng hoảng về đường lối cứu nước ở Việt Nam."], correct: 3, explanation: "Cuối thế kỷ 19 đầu 20, phong trào yêu nước Việt Nam lâm vào khủng hoảng bế tắc trầm trọng về đường lối. Việc Nguyễn Ái Quốc tìm ra con đường cách mạng vô sản đã mở ra hướng đi đúng đắn, chấm dứt sự khủng hoảng này." },
        { id: "5_24", type: "single", question: "Câu 24. So với các bậc tiền bối, con đường cứu nước của Nguyễn Ái Quốc có điểm gì mới và khác?", options: ["Gửi yêu sách đòi Pháp thừa nhận các quyền dân tộc của Việt Nam.", "Tiếp thu nền văn minh phương Tây để giúp đất nước đi đến phú cường.", "Đi sang phương Tây, khảo sát thực tiễn, tìm hiểu cách mạng thế giới.", "Nhờ các nước phương Tây đào tạo lực lượng để chuẩn bị chống Pháp."], correct: 2, explanation: "Khác với các sĩ phu tiền bối hướng sang phương Đông (Nhật, Tàu), Nguyễn Ái Quốc đã quyết định đi hẳn sang phương Tây - nơi có tư tưởng tự do, bình đẳng, bác ái và cũng là sào huyệt của kẻ thù để tìm hiểu thực tiễn." },

        // --- PHẦN II ---
        { id: "5_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>Nghị quyết số 24C/18.6.5 ngày 20-11-1987 của UNESCO đã khẳng định Chủ tịch Hồ Chí Minh là \"anh hùng giải phóng dân tộc và nhà văn hoá kiệt xuất của Việt Nam\". Người \"đã cống hiến trọn đời mình cho sự nghiệp giải phóng dân tộc của nhân dân Việt Nam, góp phần vào cuộc đấu tranh chung của các dân tộc vì hoà bình, độc lập dân tộc, dân chủ và tiến bộ xã hội”. Người đã có \"những đóng góp quan trọng và nhiều mặt trên các lĩnh vực văn hoá, giáo dục và nghệ thuật...\". Người là \"sự kết tinh của truyền thống văn hoá hàng ngàn năm của nhân dân Việt Nam, và những tư tưởng của Người là hiện thân của những khát vọng của các dân tộc mong muốn được khẳng định bản sắc văn hoá của mình và mong muốn tăng cường sự hiểu biết lẫn nhau giữa các dân tộc...<br><span class='italic text-sm'>(Theo UNESCO với sự kiện tôn vinh Chủ tịch Hồ Chí Minh)</span>", items: [
            { id: "a", text: "a) UNESCO tôn vinh Chủ tịch Hồ Chí Minh là anh hùng giải phóng dân tộc và nhà văn hoá kiệt xuất của Việt Nam.", correct: true, expl: "Đúng. Đây là nội dung chính được khẳng định ngay trong câu đầu của Nghị quyết UNESCO năm 1987." },
            { id: "b", text: "b) Tên của Chủ tịch Hồ Chí Minh được đặt cho nhiều quảng trường, đường phố ở tất cả các quốc gia trên thế giới.", correct: false, expl: "Sai. Tên của Người được đặt ở \"nhiều\" quốc gia, nhưng dùng từ \"tất cả\" các quốc gia trên thế giới là sự tuyệt đối hóa không chính xác." },
            { id: "c", text: "c) Chủ tịch Hồ Chí Minh có những đóng góp quan trọng trong lĩnh vực quân sự cho thế giới.", correct: false, expl: "Sai. Đoạn tư liệu của UNESCO không hề đề cập đến việc Bác có đóng góp quan trọng trong \"lĩnh vực quân sự cho thế giới\", mà nhấn mạnh đóng góp về văn hóa, giáo dục và nghệ thuật." },
            { id: "d", text: "d) Chủ tịch Hồ Chí Minh được UNESCO vinh danh do đã góp phần vào sự nghiệp đấu tranh vì hoà bình, dân chủ, tự do và tiến bộ xã hội trên thế giới.", correct: true, expl: "Đúng. Đoạn tư liệu nêu rõ Bác đã \"góp phần vào cuộc đấu tranh chung của các dân tộc vì hoà bình, độc lập dân tộc, dân chủ và tiến bộ xã hội\"." }
        ]},
        { id: "5_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>\"Trong thập niên 1990, các nước ASEAN đã xúc tiến việc thực hiện những mục tiêu của Tuyên bố ZOPFAN nhằm biến Đông Nam Á thành khu vực tự do, hoà bình và trung lập. Từ tháng 12 – 1987, Hội nghị cấp cao ASEAN-3 tại Ma-ni-la, các nước ASEAN đã khẳng định quyết tâm biến Đông Nam Á thành khu vực phi vũ khí hạt nhân. Sau đó, tại Hội nghị cấp cao ASEAN-5 ở Băng Cốc (12 – 1995), các nhà lãnh đạo ASEAN đã kí kết Hiệp ước Đông Nam Á không có vũ khí hạt nhân (SEANWFZ)\".<br><span class='italic text-sm'>(Đông Nam Á: Lịch sử từ nguyên thuỷ đến ngày nay)</span>", items: [
            { id: "a", text: "a) Hoạt động của ASEAN trong giai đoạn này nhằm xây dựng một khu vực chính trị ổn định và có uy tín trên trường quốc tế.", correct: true, expl: "Đúng. Việc xây dựng khu vực phi hạt nhân và trung lập (ZOPFAN) chính là nhằm duy trì nền an ninh, chính trị ổn định của toàn khối." },
            { id: "b", text: "b) Các quốc gia Đông Nam Á cùng đồng thuận xây dựng nơi đây trở thành khu vực tự do, hoà bình và trung lập.", correct: true, expl: "Đúng. Tư liệu nhắc đến mục tiêu của Tuyên bố ZOPFAN là \"biến Đông Nam Á thành khu vực tự do, hoà bình và trung lập\"." },
            { id: "c", text: "c) Các Hội nghị cấp cao ASEAN tập trung hướng đến xây dựng một khu vực hoà bình và không có vũ khí hạt nhân.", correct: true, expl: "Đúng. Các hội nghị tại Manila (1987) và Băng Cốc (1995) đã đi đến quyết tâm và chính thức kí kết Hiệp ước SEANWFZ bảo đảm khu vực phi vũ khí hạt nhân." },
            { id: "d", text: "d) Các Hội nghị cấp cao ASEAN tập trung thảo luận việc hợp tác an ninh và ngăn chặn phổ biến vũ khí hạt nhân.", correct: true, expl: "Đúng. Việc thông qua hiệp ước không có vũ khí hạt nhân chính là nỗ lực hợp tác an ninh nhằm ngăn chặn hiểm họa răn đe hạt nhân trong khu vực." }
        ]},
        { id: "5_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>“Một số người cho rằng việc khôi phục chủ quyền quốc gia, giành lại độc lập dân tộc là điều kiện tiên quyết... Xu hướng này thường được gọi là chủ trương bạo động, tiêu biểu là cụ Phan Bội Châu. Một số sĩ phu yêu nước khác thì lại xem duy tân là tiền đề dẫn đến khôi phục quốc gia độc lập, trong đó đề cao công cuộc vận động duy tân 'Khai dân trí, chấn dân khí, hậu dân sinh', chứ chưa chủ trương đánh đuổi thực dân Pháp. Xu hướng này thường được gọi là chủ trương cải cách mà đại diện tiêu biểu là cụ Phan Châu Trinh...\".<br><span class='italic text-sm'>(Hoạt động đối ngoại của Đảng Cộng sản Đông Dương thời kì 1930 – 1945)</span>", items: [
            { id: "a", text: "a) Đoạn tư liệu đề cập đến chủ trương cứu nước theo con đường dân chủ tư sản của Phan Bội Châu và Phan Châu Trinh.", correct: true, expl: "Đúng. Dù phương pháp bạo động hay cải cách khác nhau, nhưng cả hai Cụ đều là những đại diện tiêu biểu cho phong trào yêu nước theo khuynh hướng dân chủ tư sản đầu thế kỉ XX." },
            { id: "b", text: "b) Phan Bội Châu và Phan Châu Trinh đề ra chủ trương cầu viện bên ngoài để giành độc lập cho dân tộc.", correct: false, expl: "Sai. Chỉ có Phan Bội Châu chủ trương bạo động và tìm kiếm ngoại viện (Nhật Bản). Cụ Phan Châu Trinh chủ trương cải cách, dựa vào Pháp để duy tân, không cầu viện nước ngoài đánh Pháp." },
            { id: "c", text: "c) Con đường cứu nước của Phan Bội Châu và Phan Châu Trinh có sự khác nhau về chủ trương thực hiện.", correct: true, expl: "Đúng. Một bên là bạo động vũ trang (Phan Bội Châu), một bên là ôn hòa, cải cách duy tân (Phan Châu Trinh)." },
            { id: "d", text: "d) Chủ trương cứu nước của Phan Bội Châu và Phan Châu Trinh đều được khởi xướng từ việc đề cao công cuộc vận động duy tân \"Khai dân trí, chấn dân khí, hậu dân sinh\".", correct: false, expl: "Sai. Việc đề cao tư tưởng \"Khai dân trí, chấn dân khí, hậu dân sinh\" chỉ là đặc trưng cốt lõi trong đường lối cải cách của cụ Phan Châu Trinh." }
        ]},
        { id: "5_II_4", type: "tf_cluster", context: "Câu 4. Cho đoạn tư liệu sau đây:<br><br>“Theo nhận thức của chúng ta, kinh tế thị trường định hướng xã hội chủ nghĩa là nền kinh tế thị trường hiện đại, hội nhập quốc tế, vận hành đầy đủ, đồng bộ theo các quy luật của kinh tế thị trường, có sự quản lí của nhà nước pháp quyền xã hội chủ nghĩa, do Đảng Cộng sản Việt Nam lãnh đạo; bảo đảm định hướng xã hội chủ nghĩa, nhằm mục tiêu 'dân giàu, nước mạnh, công bằng, dân chủ, văn minh'...\".<br><span class='italic text-sm'>(Một số vấn đề lí luận và thực tiễn về chủ nghĩa xã hội và con đường đi lên chủ nghĩa xã hội ở Việt Nam)</span>", items: [
            { id: "a", text: "a) Việt Nam đã chuyển đổi thành công từ nền kinh tế kế hoạch hoá tập trung, bao cấp sang nền kinh tế hàng hoá nhiều thành phần.", correct: true, expl: "Đúng. Đây là thành quả lớn nhất của công cuộc Đổi mới khởi xướng năm 1986, xóa bỏ cơ chế cũ kỹ kìm hãm để vươn lên." },
            { id: "b", text: "b) Nền kinh tế Việt Nam ngày nay từng bước được hình thành và phát triển theo nền kinh tế thị trường định hướng xã hội chủ nghĩa.", correct: true, expl: "Đúng. Đoạn tư liệu khẳng định nền tảng kinh tế nước ta hiện nay chính là kinh tế thị trường định hướng XHCN." },
            { id: "c", text: "c) Nhận thức về nền kinh tế thị trường định hướng xã hội chủ nghĩa ngày càng sáng tỏ và lí luận soi đường cho thành công.", correct: true, expl: "Đúng. Đảng ta đã không ngừng bổ sung, hoàn thiện nhận thức lý luận về mô hình này trong quá trình đổi mới đất nước." },
            { id: "d", text: "d) Trong quá trình đổi mới, chính trị được xem là lĩnh vực trọng tâm, đạt được sự ổn định xã hội tạo tiền đề cho sự phát triển kinh tế.", correct: false, expl: "Sai. Nguyên tắc Đổi mới của Đảng xác định \"kinh tế\" mới là lĩnh vực trọng tâm, đổi mới kinh tế để tháo gỡ khó khăn làm tiền đề từng bước đổi mới chính trị, chứ không phải lấy chính trị làm trọng tâm trước." }
        ]}
    ];

    const de6_data = [
        { id: "6_1", type: "single", question: "Câu 1. Yếu tố nào sau đây đã tạo điều kiện thuận lợi cho sự thành lập các nhà nước dân chủ nhân dân ở Đông Âu?", options: ["Thắng lợi của Hồng quân Liên Xô trong việc tiêu diệt chủ nghĩa phát xít ở châu Âu.", "Hồng quân Liên Xô tiêu diệt tận gốc chủ nghĩa phát xít trên toàn thế giới.", "Chủ nghĩa phát xít Đức và Nhật tuyên bố đầu hàng Đồng minh không điều kiện.", "Các Đảng Cộng sản ở Đông Âu liên minh chống chủ nghĩa phát xít thắng lợi."], correct: 0, explanation: "Sự kiện Hồng quân Liên Xô tiến vào giải phóng châu Âu khỏi ách thống trị của phát xít Đức (1944-1945) đã tạo cơ hội ngàn vàng cho nhân dân các nước Đông Âu nổi dậy giành chính quyền." },
        { id: "6_2", type: "single", question: "Câu 2. Nhà nước dân chủ nhân dân đầu tiên được thành lập ở Đông Âu là", options: ["Cộng hoà Nhân dân Ba Lan.", "Cộng hoà Hun-ga-ri.", "Cộng hoà Bun-ga-ri.", "Cộng hoà Dân chủ Đức."], correct: 0, explanation: "Ủy ban giải phóng dân tộc Ba Lan ra đời tháng 7/1944 đã tuyên bố Ba Lan là nhà nước Dân chủ nhân dân đầu tiên trong khu vực Đông Âu." },
        { id: "6_3", type: "single", question: "Câu 3. Nội dung nào sau đây là chủ trương chung trong đường lối Đổi mới của Đảng Cộng sản Việt Nam từ năm 2006 đến nay?", options: ["Đổi mới cơ chế quản lí kinh tế, xoá bỏ cơ chế tập trung quan liêu, bao cấp.", "Tiếp tục đẩy mạnh công nghiệp hoá, hiện đại hoá, hội nhập quốc tế sâu rộng.", "Chủ trương mở rộng quan hệ đối ngoại nhằm tạo điều kiện thuận lợi cho công cuộc xây dựng và bảo vệ Tổ quốc.", "Đổi mới cơ cấu kinh tế, xây dựng nền kinh tế hàng hoá nhiều thành phần."], correct: 1, explanation: "Từ Đại hội X (2006) đến nay, công cuộc Đổi mới bước sang một tầm cao mới: Việt Nam chủ trương chủ động và tích cực \"hội nhập quốc tế sâu rộng\" trên mọi mặt, đẩy mạnh CNH-HĐH gắn với phát triển kinh tế tri thức." },
        { id: "6_4", type: "single", question: "Câu 4. Trong lịch sử dân tộc Việt Nam, thuật ngữ “kháng chiến\" được hiểu là", options: ["cuộc đấu tranh giành lại độc lập, tự chủ.", "phong trào đấu tranh của nông dân nghèo.", "phong trào đấu tranh của thợ thủ công.", "cuộc đấu tranh bảo vệ nền độc lập, chủ quyền."], correct: 3, explanation: "Trong khoa học lịch sử, \"kháng chiến\" dùng để chỉ các cuộc đấu tranh của nhân dân nhằm chống lại quân xâm lược để \"bảo vệ\" nền độc lập chủ quyền đã có." },
        { id: "6_5", type: "single", question: "Câu 5. Trong cuộc kháng chiến chống quân Tống thời Lý (1075 – 1077), sau khi đánh bại lực lượng quân sự của kẻ thù, Lý Thường Kiệt đã chủ động", options: ["kí hiệp định để giữ thế thắng.", "cầu hoà để giữ quan hệ hoà hiếu.", "thương lượng để lấy lại đất đai.", "giảng hoà để chấm dứt chiến tranh."], correct: 3, explanation: "Khi quân Tống lâm vào thế cùng lực kiệt, để tránh đổ máu vô ích và giữ thể diện cho nước lớn, Lý Thường Kiệt đã khéo léo dùng biện pháp ngoại giao \"chủ động giảng hòa\" mở đường cho giặc rút quân." },
        { id: "6_6", type: "single", question: "Câu 6. Sau Cách mạng tháng Tám năm 1945, nước Việt Nam Dân chủ Cộng hoà đã gặp phải một trong những khó khăn nào sau đây?", options: ["Quân phiệt Nhật chưa chấp nhận đầu hàng.", "Phải đối phó với thù trong và giặc ngoài.", "Hai mươi vạn quân Trung Hoa Dân quốc ở miền Nam.", "Anh, Mỹ cho Pháp tiến quân miền ra Bắc."], correct: 1, explanation: "Thách thức cực kỳ to lớn đe dọa trực tiếp sự tồn vong của chính quyền non trẻ là sự xuất hiện ồ ạt của quân đội nước ngoài (Tưởng, Anh, Pháp) cùng sự phá hoại của các thế lực phản động tay sai (thù trong, giặc ngoài)." },
        { id: "6_7", type: "single", question: "Câu 7. Khi Chiến tranh thế giới thứ hai bước vào giai đoạn cuối, yêu cầu bức thiết nào sau đây được đặt ra cho các nước Đồng minh?", options: ["Tăng cường sức mạnh tổng hợp, đặc biệt là kinh tế và khoa học – kĩ thuật.", "Tăng cường đối thoại, giải quyết bất đồng và mâu thuẫn bằng thương lượng.", "Tiêu diệt hoàn toàn chủ nghĩa phát xít và tổ chức lại thế giới.", "Mở rộng các công ty xuyên quốc gia, các tổ chức tài chính thế giới."], correct: 2, explanation: "Đầu 1945, yêu cầu cấp bách của Liên Xô, Mỹ, Anh là nhanh chóng đánh bại hoàn toàn các thế lực phát xít và phân chia khu vực đóng quân để thiết lập một trật tự thế giới mới sau chiến tranh." },
        { id: "6_8", type: "single", question: "Câu 8. Mỹ và Liên Xô quyết định chấm dứt Chiến tranh lạnh (1947 – 1989) xuất phát từ lí do nào sau đây?", options: ["Sự vươn lên mạnh mẽ của Nhật Bản, Tây Âu.", "Các nước Cộng hoà trong liên bang đòi li khai.", "Nước Mỹ khủng hoảng kinh tế, chính trị sâu sắc.", "Nhân dân hai nước đều phản đối Chiến tranh lạnh."], correct: 0, explanation: "Cuộc chạy đua vũ trang dai dẳng làm cả Liên Xô và Mỹ suy giảm thế mạnh nghiêm trọng. Cùng lúc đó, sự vươn lên của các trung tâm kinh tế khác (Tây Âu, Nhật Bản) buộc 2 siêu cường phải thoả hiệp chấm dứt Chiến tranh lạnh để giữ vị thế." },
        { id: "6_9", type: "single", question: "Câu 9. Tổ chức hợp tác mang tính khu vực nào trên thế giới đã khuyến khích các nước Đông Nam Á tìm cách gắn kết với nhau?", options: ["Nhóm các nước có nền kinh tế mới nổi (BRICS).", "Cộng đồng kinh tế châu Âu (EEC).", "Diễn đàn hợp tác kinh tế châu Á – Thái Bình Dương (APEC).", "Khu vực tự do thương mại châu Mỹ (FTTA)."], correct: 1, explanation: "Sự thành công vang dội của Cộng đồng kinh tế châu Âu (EEC) vào thập niên 1950 - 1960 là nguồn cảm hứng trực tiếp cổ vũ các nước Đông Nam Á đi tìm một mô hình liên kết khu vực tương tự." },
        { id: "6_10", type: "single", question: "Câu 10. Trong xu thế phát triển chung của thế giới hiện nay, Việt Nam có thể tận dụng được thời cơ nào sau đây để xây dựng và phát triển đất nước?", options: ["Không bị áp dụng luật chống bán phá giá.", "Sự ổn định tình hình chính trị trong nước.", "Quan tâm mua các bằng phát minh với giá rẻ.", "Thu hút vốn, tiếp thu thành tựu khoa học."], correct: 3, explanation: "Xu thế toàn cầu hóa tạo ra cơ hội to lớn giúp Việt Nam chủ động hội nhập để thu hút nguồn vốn đầu tư quốc tế và chuyển giao, tiếp thu các công nghệ, thành tựu khoa học kỹ thuật tiên tiến." },
        { id: "6_11", type: "single", question: "Câu 11. Kế hoạch Tổng thể xây dựng Cộng đồng Chính trị – An ninh ASEAN (2009 – 2015) không xác định nội dung hoạt động nào sau đây?", options: ["Xây dựng một cộng đồng dựa trên các giá trị và chuẩn mực chung.", "Tạo dựng một khu vực gắn kết, hoà bình và tự cường đảm bảo an ninh.", "Hướng tới khu vực năng động, rộng mở với bên ngoài.", "Tạo ra một thị trường và những cơ sở sản xuất chung."], correct: 3, explanation: "Việc \"Tạo ra một thị trường và cơ sở sản xuất chung\" là mục tiêu của trụ cột Cộng đồng Kinh tế ASEAN (AEC), chứ không thuộc Kế hoạch của trụ cột Chính trị - An ninh (APSC)." },
        { id: "6_12", type: "single", question: "Câu 12. Trong Cách mạng tháng Tám năm 1945, những địa phương nào giành được chính quyền sớm nhất trong cả nước?", options: ["Bắc Giang, Hải Dương, Hà Tĩnh, Quảng Nam.", "Thái Nguyên, Bắc Giang, Hải Dương, Hà Nội.", "Hà Nội, Huế, Sài Gòn, Quảng Nam, Hải Dương.", "Hà Tiên, Đồng Nai Thượng, Bắc Giang, Hải Dương."], correct: 0, explanation: "Vào khoảng ngày 18/8/1945, 4 tỉnh giành được chính quyền cấp tỉnh sớm nhất trong cả nước bao gồm: Bắc Giang, Hải Dương, Hà Tĩnh và Quảng Nam." },
        { id: "6_13", type: "single", question: "Câu 13. Người chính thức xác lập mối quan hệ giữa cách mạng Việt Nam với Quốc tế Cộng sản và cách mạng thế giới là ai?", options: ["Huỳnh Thúc Kháng.", "Phan Châu Trinh.", "Phan Bội Châu.", "Nguyễn Ái Quốc."], correct: 3, explanation: "Nguyễn Ái Quốc (sau khi bỏ phiếu tán thành Quốc tế Cộng sản năm 1920) là người chiến sĩ cộng sản đầu tiên của Việt Nam, chính thức kết nối phong trào cách mạng nước nhà với phong trào vô sản thế giới." },
        { id: "6_14", type: "single", question: "Câu 14. Cuộc kháng chiến toàn quốc chống thực dân Pháp của nhân dân Việt Nam bùng nổ vào ngày 19 – 12 – 1946 sau sự kiện nào?", options: ["Quân Pháp xả súng khi nhân dân Sài Gòn – Chợ Lớn mít tinh mừng ngày Độc lập.", "Quân Pháp đánh úp trụ sở Uỷ ban nhân dân Nam Bộ.", "Pháp gửi tối hậu thư cho Chính phủ Việt Nam Dân chủ Cộng hoà.", "Cuộc đàm phán ở Phông-ten-nơ-blô (Pháp) thất bại."], correct: 2, explanation: "Ngày 18/12/1946, quân Pháp ngông cuồng gửi \"tối hậu thư\" đòi ta phải giải tán lực lượng tự vệ và giao quyền kiểm soát Thủ đô cho chúng. Giọt nước tràn ly, ngày 19/12/1946 ta phát động Toàn quốc kháng chiến." },
        { id: "6_15", type: "single", question: "Câu 15. Cuối năm 1974 – đầu năm 1975, Bộ Chính trị Ban Chấp hành Trung ương Đảng Lao động Việt Nam đề ra kế hoạch", options: ["tranh thủ thời cơ giải phóng miền Nam vào đầu năm 1975.", "giải phóng hoàn toàn miền Nam trong hai năm 1975 và 1976.", "tổng tiến công giải phóng miền Nam trong năm 1976.", "giải phóng hoàn toàn miền Nam ngay vào đầu năm 1976."], correct: 1, explanation: "Kế hoạch chiến lược vĩ đại ban đầu được đề ra là giải phóng hoàn toàn miền Nam trong 2 năm 1975 và 1976. Tuy nhiên Bộ Chính trị cũng dự kiến nếu thời cơ đến đầu năm 1975 thì sẽ lập tức giải phóng miền Nam trong năm 1975." },
        { id: "6_16", type: "single", question: "Câu 16. Nhiệm vụ chủ yếu của quân dân Việt Nam trong cuộc chiến đấu chống thực dân Pháp ở các đô thị phía Bắc vĩ tuyến 16 (từ tháng 12 – 1946 đến tháng 02 – 1947) là", options: ["bảo vệ Hà Nội và các đô thị.", "củng cố hậu phương kháng chiến.", "tiêu diệt toàn bộ sinh lực địch.", "giam chân quân Pháp tại các đô thị."], correct: 3, explanation: "Mục đích lớn nhất của các trận đánh nội đô không phải là cố thủ bảo vệ thành phố bằng mọi giá, mà là để \"giam chân địch\", tiêu hao sinh lực, tạo thời gian cho các cơ quan đầu não và nhân dân di tản an toàn lên chiến khu Việt Bắc." },
        { id: "6_17", type: "single", question: "Câu 17. Điểm chung về nghệ thuật chỉ đạo chiến tranh cách mạng của Đảng Cộng sản Đông Dương trong cuộc kháng chiến chống Pháp (1945–1954) và cuộc kháng chiến chống Mỹ (1954-1975) là gì?", options: ["Kết hợp tiến công của bộ đội chủ lực và nổi dậy của nhân dân.", "Kết hợp đấu tranh trên hai mặt trận quân sự và ngoại giao.", "Kết hợp khởi nghĩa từng phần với chiến tranh cách mạng.", "Giành thắng lợi từng bước đi đến giành thắng lợi hoàn toàn."], correct: 3, explanation: "Lịch sử cho thấy Đảng ta luôn sử dụng sách lược đánh lâu dài, đánh đổ từng bộ phận, giành những thắng lợi mang tính bước ngoặt trên chiến trường (như Biên Giới 1950, Mậu Thân 1968) trước khi tung đòn quyết định (Điện Biên Phủ, Hồ Chí Minh) để giành thắng lợi hoàn toàn." },
        { id: "6_18", type: "single", question: "Câu 18. Đại hội VIII (1996) của Đảng Cộng sản Việt Nam đã xác định lĩnh vực nào sau đây là quốc sách hàng đầu?", options: ["Kinh tế và đối ngoại.", "Giáo dục và đào tạo.", "An ninh và quốc phòng.", "Chính trị."], correct: 1, explanation: "Đại hội VIII xác định đất nước chuyển sang thời kỳ đẩy mạnh CNH-HĐH, trong đó Giáo dục - đào tạo và khoa học - công nghệ được xem là \"quốc sách hàng đầu\" để bồi dưỡng nhân lực." },
        { id: "6_19", type: "single", question: "Câu 19. Yếu tố nào sau đây đã có tác động to lớn đến tình hình đối ngoại của Việt Nam trong cuộc kháng chiến chống thực dân Pháp (1945-1954)?", options: ["Sự tồn tại của trật tự thế giới đa cực, nhiều trung tâm trong quan hệ quốc tế.", "Sự tồn tại của Trật tự thế giới hai cực I-an-ta, Chiến tranh lạnh.", "Thế giới diễn ra xu thế toàn cầu hoá mạnh mẽ.", "Các quốc gia điều chỉnh chiến lược phát triển và xây dựng sức mạnh tổng hợp."], correct: 1, explanation: "Sự phân tuyến rõ rệt của Trật tự hai cực Ianta (Mỹ chi viện cho Pháp xâm lược, Liên Xô và Trung Quốc công nhận và viện trợ cho VNDCCH) đã tác động sâu sắc đến chính sách ngoại giao và cục diện cuộc chiến tranh Đông Dương." },
        { id: "6_20", type: "single", question: "Câu 20. Hoạt động đối ngoại của Việt Nam trong giai đoạn 1975 – 1985 diễn ra trong bối cảnh nào sau đây?", options: ["Thế bao vây, cấm vận Việt Nam đã được dỡ bỏ.", "Việt Nam đã hoàn thành công cuộc thống nhất đất nước.", "Nhân dân Việt Nam tiến hành cuộc kháng chiến chống Mỹ, cứu nước.", "20 quốc gia trên thế giới thiết lập quan hệ ngoại giao với Việt Nam Dân chủ Cộng hoà."], correct: 1, explanation: "Giai đoạn 1975-1985 bắt đầu ngay sau khi cuộc kháng chiến chống Mỹ toàn thắng, đất nước đã được thống nhất hoàn toàn về mặt lãnh thổ và nhà nước." },
        { id: "6_21", type: "single", question: "Câu 21. Những thành tựu mà Việt Nam đạt được trong việc thực hiện kế hoạch 5 năm (1986-1990) đã chứng tỏ", options: ["đường lối Đổi mới là đúng, bước đi của công cuộc Đổi mới cơ bản là phù hợp.", "Việt Nam đã thoát khỏi tình trạng khủng hoảng kinh tế – xã hội.", "Việt Nam đã giải quyết được sự mất cân đối của nền kinh tế.", "đường lối Đổi mới về cơ bản là đúng đắn, cần phải có những bước đi phù hợp."], correct: 0, explanation: "Dù vẫn còn lạm phát và khó khăn, nhưng những bước đầu giải quyết được lương thực, hàng tiêu dùng (sau KH 5 năm đầu tiên) đã là một minh chứng khẳng định đường lối Đổi mới do Đại hội VI đề ra là hoàn toàn đúng đắn." },
        { id: "6_22", type: "single", question: "Câu 22. Việt Nam duy trì nguyên tắc cơ bản nào trong đàm phán Hiệp định Sơ bộ (1946), Hiệp định Giơ-ne-vơ (1954) và Hiệp định Pa-ri (1973)?", options: ["Tôn trọng quyền dân tộc cơ bản của Việt Nam.", "Phạm vi đóng quân chia thành vùng riêng biệt.", "Các bên tham chiến phải nhanh chóng rút quân.", "Không được sử dụng các loại vũ khí huỷ diệt."], correct: 0, explanation: "Trong bất kỳ hoàn cảnh nào (hòa hoãn tạm thời hay kết thúc chiến tranh), nguyên tắc tối thượng không bao giờ thay đổi trên mặt trận ngoại giao của Việt Nam là: Buộc kẻ thù phải công nhận các \"quyền dân tộc cơ bản\" (Độc lập, chủ quyền, thống nhất và toàn vẹn lãnh thổ)." },
        { id: "6_23", type: "single", question: "Câu 23. Văn kiện Tầm nhìn ASEAN 2020 đề cập đến vấn đề nào sau đây?", options: ["Xây dựng Cộng đồng ASEAN, định hướng cho sự phát triển của ASEAN.", "Xây dựng ASEAN thành tổ chức hợp tác liên Chính phủ liên kết sâu rộng và ràng buộc hơn.", "ASEAN trở thành một cộng đồng gắn kết về chính trị, liên kết về kinh tế.", "Giữ vai trò trung tâm ở khu vực thông qua nhiều khuôn khổ."], correct: 0, explanation: "Năm 1997, \"Tầm nhìn ASEAN 2020\" đã chính thức được thông qua với quyết định lịch sử: Định hướng xây dựng ASEAN trở thành một Cộng đồng bền vững gắn kết trong khu vực." },
        { id: "6_24", type: "single", question: "Câu 24. Cuộc kháng chiến chống thực dân Pháp (1945 – 1954) và cuộc kháng chiến chống Mỹ, cứu nước (1954 - 1975) ở Việt Nam có điểm tương đồng gì về đấu tranh ngoại giao?", options: ["Đấu tranh ngoại giao luôn đi trước mở đường cho đấu tranh quân sự.", "Mặt trận ngoại giao được hình thành ngay từ đầu cuộc kháng chiến.", "Đấu tranh ngoại giao có mối quan hệ chặt chẽ với đấu tranh chính trị.", "Hoạt động ngoại giao chịu sự chi phối hoàn toàn của hoạt động quân sự."], correct: 2, explanation: "Ngoại giao luôn luôn được kết hợp chặt chẽ, khăng khít với mặt trận chính trị để tố cáo tội ác của kẻ thù ra thế giới, đồng thời tranh thủ tối đa sự ủng hộ của bạn bè quốc tế đối với nhân dân ta." },

        // --- PHẦN II ---
        { id: "6_II_1", type: "tf_cluster", context: "Câu 1. Cho đoạn tư liệu sau đây:<br><br>...Chúng ta không thể né tránh, kiêng kị cơ chế thị trường, vì đó là sự vận động của quy luật khách quan ngoài ý muốn của ta... Trong cơ chế tập trung quan liêu, bao cấp, chúng ta đã bác bỏ cơ chế thị trường, làm trái quy luật khách quan, gây ra những hậu quả nghiêm trọng kéo dài; rốt cuộc vẫn phải bị động chạy theo tính tự phát của thị trường tự do. Đó là sai lầm cần phải khắc phục\".<br><span class='italic text-sm'>(Trường Chinh, Đổi mới là đòi hỏi bức thiết của đất nước và của thời đại)</span>", items: [
            { id: "a", text: "a) Đổi mới kinh tế chỉ tập trung vào chuyển sang cơ chế thị trường có sự quản lí của Nhà nước, đặc biệt đối với nền kinh tế quốc doanh.", correct: false, expl: "Sai. Đổi mới kinh tế không \"chỉ tập trung\" vào kinh tế quốc doanh mà là xây dựng nền kinh tế hàng hóa nhiều thành phần." },
            { id: "b", text: "b) Trước khi Đổi mới đất nước, cơ chế quản lí kinh tế của nước ta là tập trung, quan liêu, bao cấp.", correct: true, expl: "Đúng. Đoạn tư liệu xác nhận rõ sai lầm trước đây của ta là duy trì \"cơ chế tập trung quan liêu, bao cấp\"." },
            { id: "c", text: "c) Từ Đại hội VI (12-1986), Đảng chủ trương tiến hành đổi mới trên nhiều lĩnh vực, trọng tâm là đổi mới trên lĩnh vực chính trị.", correct: false, expl: "Sai. Trọng tâm của Đổi mới theo Đại hội VI là đổi mới \"Kinh tế\" chứ không phải chính trị." },
            { id: "d", text: "d) Cơ chế quản lí kinh tế của đất nước đi trái với quy luật khách quan, gây ra những hậu quả nghiêm trọng kéo dài, đất nước khủng hoảng trầm trọng.", correct: true, expl: "Đúng. Đoạn tư liệu khẳng định việc bác bỏ cơ chế thị trường là \"làm trái quy luật khách quan, gây ra những hậu quả nghiêm trọng\"." }
        ]},
        { id: "6_II_2", type: "tf_cluster", context: "Câu 2. Cho đoạn tư liệu sau đây:<br><br>Cộng đồng ASEAN sẽ được thành lập gồm ba trụ cột là hợp tác chính trị và an ninh, hợp tác kinh tế và hợp tác văn hoá – xã hội được gắn kết chặt chẽ và cùng tăng cường cho mục đích đảm bảo hoà bình, ổn định lâu dài, cùng thịnh vượng trong khu vực\".<br><span class='italic text-sm'>(Trích Tuyên bố Ba-li II, năm 2003)</span>", items: [
            { id: "a", text: "a) Ba trụ cột của Cộng đồng ASEAN có sự gắn kết chặt chẽ, trong đó, hợp tác văn hoá - xã hội giữ vai trò thúc đẩy hợp tác kinh tế và chính trị – an ninh.", correct: false, expl: "Sai. Cả ba trụ cột có vai trò gắn kết tương hỗ ngang nhau, không có tài liệu nào khẳng định văn hóa - xã hội đóng vai trò là động lực \"thúc đẩy\" hai trụ cột còn lại." },
            { id: "b", text: "b) Cộng đồng ASEAN chính thức được thành lập năm 2007 dựa trên cơ sở sự đồng thuận của 11 quốc gia trong khu vực.", correct: false, expl: "Sai. Cộng đồng ASEAN chính thức thành lập năm 2015 và ASEAN lúc bấy giờ chỉ có 10 thành viên chính thức." },
            { id: "c", text: "c) Cộng đồng ASEAN được thành lập 10 năm sau khi Hiến chương ASEAN chính thức được thông qua.", correct: false, expl: "Sai. Hiến chương ASEAN kí năm 2007. Cộng đồng thành lập 2015. Chỉ cách nhau 8 năm chứ không phải 10 năm." },
            { id: "d", text: "d) Mục đích thành lập Cộng đồng ASEAN kế thừa từ sự ra đời của ASEAN, hướng đến xây dựng khu vực Đông Nam Á hoà bình, phát triển, thịnh vượng.", correct: true, expl: "Đúng. Mục tiêu bất biến từ năm 1967 đến nay của ASEAN đều là vì một khu vực \"hòa bình, ổn định lâu dài, cùng thịnh vượng\"." }
        ]},
        { id: "6_II_3", type: "tf_cluster", context: "Câu 3. Cho đoạn tư liệu sau đây:<br><br>\"Đấu tranh quân sự và đấu tranh chính trị ở miền Nam là nhân tố chủ yếu quyết định thắng lợi trên chiến trường, làm cơ sở cho thắng lợi trên mặt trận ngoại giao. Chúng ta chỉ có thể giành được trên bàn hội nghị những cái mà chúng ta đã giành trên chiến trường. Tuy nhiên, đấu tranh ngoại giao không chỉ đơn thuần phản ánh cuộc đấu tranh trên chiến trường, mà trong tình hình quốc tế hiện nay với tính chất cuộc chiến tranh giữa ta và địch, đấu tranh ngoại giao giữ một vai trò quan trọng, tích cực và chủ động\".<br><span class='italic text-sm'>(Đảng Cộng sản Việt Nam, Văn kiện Đảng toàn tập, tập 28)</span>", items: [
            { id: "a", text: "a) Trong cuộc kháng chiến chống Mỹ, cứu nước (1954 - 1975), chủ trương của Đảng là kết hợp đấu tranh quân sự, chính trị và ngoại giao.", correct: true, expl: "Đúng. Đảng đã chỉ đạo phát huy sức mạnh tổng hợp trên ba mặt trận cốt lõi: Quân sự, Chính trị và Ngoại giao." },
            { id: "b", text: "b) Đấu tranh quân sự, chính trị giữ vai trò quyết định thắng lợi trên chiến trường, chi phối thắng lợi trên bàn đàm phán ngoại giao theo nguyên tắc tích cực và chủ động.", correct: true, expl: "Đúng. \"Chỉ có thể giành được trên bàn hội nghị những cái mà chúng ta đã giành trên chiến trường\" chính là sự chi phối quyết định này." },
            { id: "c", text: "c) Việc kết hợp đấu tranh quân sự, chính trị vào ngoại giao được tiến hành ngay từ khi bắt đầu cuộc kháng chiến chống Mỹ, cứu nước.", correct: false, expl: "Sai. Mặt trận đàm phán ngoại giao chính thức giữa Việt Nam và Mỹ chỉ thực sự mở ra và quyết liệt từ sau thắng lợi Mậu Thân 1968 (Hội nghị Paris), không phải \"ngay từ khi bắt đầu\" kháng chiến (1954)." },
            { id: "d", text: "d) Những thắng lợi quân sự, chính trị và ngoại giao của Việt Nam đã đẩy nước Mỹ vào thế bị Đồng minh và cộng đồng quốc tế cô lập.", correct: true, expl: "Đúng. Sự vận dụng khéo léo của ngoại giao đã làm rõ tính phi nghĩa của cuộc chiến tranh do Mỹ gây ra, khiến Mỹ vấp phải làn sóng phản đối dữ dội ngay từ các nước đồng minh và nhân dân thế giới." }
        ]},
        { id: "6_II_4", type: "tf_cluster", context: "Câu 4. Cho những thông tin trong bảng sau đây về hoạt động của Nguyễn Ái Quốc:<br><br>- Đầu năm 1941: Về nước, chọn Cao Bằng xây dựng căn cứ.<br>- Tháng 5-1941: Chủ trì Hội nghị Trung ương 8, đặt nhiệm vụ giải phóng dân tộc lên hàng đầu.<br>- Cuối 1944: Chỉ thị thành lập Đội VNTT Giải phóng quân.<br>- 16&17/8/1945: Đại hội Quốc dân tại Tân Trào.<br>- 02/9/1945: Đọc Tuyên ngôn Độc lập.", items: [
            { id: "a", text: "a) Đoạn thông tin đề cập đến những hoạt động thể hiện đóng góp của Nguyễn Ái Quốc cho cách mạng Việt Nam.", correct: true, expl: "Đúng. Bảng thông tin điểm lại những dấu mốc vĩ đại do lãnh tụ Nguyễn Ái Quốc trực tiếp chỉ đạo trong giai đoạn 1941 - 1945." },
            { id: "b", text: "b) Nguyễn Ái Quốc chọn Cao Bằng, Việt Bắc để xây dựng căn cứ địa dựa trên cơ sở lực lượng chính trị được tổ chức và phát triển mạnh.", correct: true, expl: "Đúng. Cao Bằng hội tụ đủ thiên thời địa lợi, phong trào quần chúng ở đây sớm được giác ngộ mạnh mẽ, phù hợp làm cái nôi nuôi dưỡng cách mạng." },
            { id: "c", text: "c) Nguyễn Ái Quốc là người soạn thảo và đọc bản Tuyên ngôn Độc lập, khai sinh ra nước Việt Nam Dân chủ Cộng hoà.", correct: true, expl: "Đúng. Ngày 2/9/1945, Bác Hồ (Nguyễn Ái Quốc) đã dõng dạc đọc bản Tuyên ngôn Độc lập do chính tay Người soạn thảo tại Quảng trường Ba Đình." },
            { id: "d", text: "d) Các hoạt động của Nguyễn Ái Quốc thể hiện sự nhất quán về đường lối và phương pháp cách mạng Việt Nam, góp phần vào thắng lợi của Cách mạng tháng Tám năm 1945.", correct: true, expl: "Đúng. Từ việc chuyển hướng đặt nhiệm vụ giải phóng dân tộc lên hàng đầu (1941) đến việc lập lực lượng vũ trang (1944) đều là sự chuẩn bị hoàn hảo dẫn đến Đại thắng của CMT8." }
        ]}
    ];

    const testBanks = { de5: de5_data, de6: de6_data };
    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    // BẮT ĐẦU BÀI THI
    window.startQuizAction = function() {
        try {
            const errDiv = document.getElementById('login-error');
            if(errDiv) errDiv.classList.add('hidden');
            
            const nameEl = document.getElementById('hoTen');
            const lopEl = document.getElementById('lop');
            
            const name = nameEl.value.trim();
            const lop = lopEl.value.trim();
            const checkedRadio = document.querySelector('input[name="chonDe"]:checked');
            
            if (!name || !lop) {
                if(errDiv) {
                    errDiv.innerText = "⚠️ Nhắc học sinh nhập đầy đủ Họ tên và Lớp cô nhé!";
                    errDiv.classList.remove('hidden');
                }
                return;
            }
            
            if (name && lop && checkedRadio) {
                const maDe = checkedRadio.value;
                const tenDe = checkedRadio.nextElementSibling.querySelector('.de-text').innerText.split('\n')[0].trim();
                currentStudent = { hoTen: name, lop: lop, maDe: maDe, tenDe: tenDe };
                currentQuestions = JSON.parse(JSON.stringify(testBanks[maDe]));
                quizStartTime = new Date();
                
                setTimeout(() => { isQuizStarted = true; }, 1000);
                showSection('quiz');
                
                const titleEl = document.getElementById('quiz-title');
                const infoEl = document.getElementById('student-info');
                if (titleEl) titleEl.innerText = currentStudent.tenDe;
                if (infoEl) infoEl.innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
                
                currentIdx = 0;
                userAnswers = {};
                window.renderQuestion();
                startTimer(50 * 60); 
            }
        } catch (error) {
            console.error(error);
        }
    };

    window.prevQuestion = function() {
        if (currentIdx > 0) { currentIdx--; window.renderQuestion(); }
    };

    window.nextQuestion = function() {
        if (currentIdx < currentQuestions.length - 1) { currentIdx++; window.renderQuestion(); }
    };

    window.viewScoresAction = function() {
        const btn = document.getElementById('view-scores-btn') || document.createElement('button'); 
        btn.innerText = "⏳ Đang tải dữ liệu...";
        if (database) {
            scoresRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                allScores = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                window.renderScores();
                btn.innerText = "🏆 Xem bảng xếp hạng";
                showSection('scores');
            });
        }
    };

    window.goHome = function() {
        if(document.getElementById('hoTen')) document.getElementById('hoTen').value = ''; 
        if(document.getElementById('lop')) document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    };

    function getTotalScoreItems() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (q.type === 'tf_cluster') count += q.items.length;
            else count += 1;
        });
        return count; 
    }

    function getAnsweredCount() {
        return Object.keys(userAnswers).length;
    }

    // LƯU ĐÁP ÁN PHẦN I VÀ PHẦN II
    window.selectAnswer = function(qId, val, type) {
        if (type === 'tf') {
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            
            const parts = qId.split('_'); 
            const itemId = parts[parts.length - 1]; 
            const mainQId = parts.slice(0, parts.length - 1).join('_');
            
            const q = currentQuestions.find(i => i.id === mainQId);
            if (q) {
                const item = q.items.find(i => i.id === itemId);
                if (item) {
                    window.showFeedbackModal(item, val, 'tf');
                }
            }

        } else if (type === 'single') {
            if (userAnswers[qId] !== undefined) return;
            userAnswers[qId] = val;
            window.updateProgress();
            window.renderQuestion();
            const q = currentQuestions[currentIdx];
            window.showFeedbackModal(q, val, 'single');
        }
    };

    window.showFeedbackModal = function(qOrItem, uAns, type = 'single') {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        const header = document.getElementById('feedback-header');
        const body = document.getElementById('feedback-body');
        
        if(!modal || !content) return; 

        window.autoAdvance = (type === 'single' || type === 'short'); 

        let isCorrect = false;
        let explanation = qOrItem.explanation || qOrItem.expl || "Chưa có lời giải chi tiết.";
        let optionsHtml = '';
        
        let questionText = "";
        if (type === 'single' || type === 'short') {
            questionText = qOrItem.question || "";
        } else if (type === 'tf') {
            questionText = qOrItem.text || "";
        }

        let questionHtml = `<div class="bg-slate-50 border-l-4 border-blue-500 p-4 rounded-r-xl shadow-sm mb-6 text-left">
            <div class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-2">Nội dung câu hỏi:</div>
            <div class="text-slate-800 font-bold text-lg math-scroll">${questionText}</div>
        </div>`;

        if (type === 'single') {
            isCorrect = (uAns === qOrItem.correct);
            
            optionsHtml += `<div class="space-y-3 mb-6 mt-4">`;
            qOrItem.options.forEach((opt, i) => {
                let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                if (qOrItem.correct === i) {
                    optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                    textStyle = 'font-bold';
                } else if (uAns === i && !isCorrect) {
                    optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                    iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                    textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                } else { 
                    optBg = 'bg-white text-slate-700 border border-slate-200'; 
                }

                let letterBg = (qOrItem.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                               ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                optionsHtml += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                    <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                    <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                    ${iconHtml}
                                </div>`;
            });
            optionsHtml += `</div>`;

        } else if (type === 'tf') {
            isCorrect = (uAns === qOrItem.correct);
            let ansText = qOrItem.correct ? 'ĐÚNG' : 'SAI';
            let uAnsText = uAns ? 'ĐÚNG' : 'SAI';
            
            optionsHtml += `
                <div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm mb-6 mt-4 text-left">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="font-black uppercase ${isCorrect ? 'text-emerald-600' : 'text-red-500 line-through decoration-red-500 decoration-2'}">${uAnsText}</span></span>
                        <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                    </div>
                </div>
            `;
        }
        
        let emoji = isCorrect ? '🎉' : '💡';
        let statusTitle = isCorrect ? 'Chính xác!' : 'Bạn làm sai rồi!';
        let headerColor = isCorrect ? 'text-emerald-600' : 'text-red-600';
        
        header.innerHTML = `<div class="text-6xl mb-4 animate-bounce">${emoji}</div><h3 class="text-3xl font-black ${headerColor} uppercase tracking-widest drop-shadow-sm">${statusTitle}</h3>`;
        
        body.innerHTML = questionHtml + optionsHtml;
        body.innerHTML += `<div class="mt-2"><div class="inline-block bg-blue-100 text-blue-800 px-4 py-2 rounded-t-xl font-black uppercase text-sm border-b-4 border-blue-500 text-left">📖 Giải chi tiết từng bước:</div><div class="p-5 bg-white border-2 border-blue-200 rounded-b-2xl rounded-tr-2xl shadow-sm text-black font-medium text-base md:text-lg leading-loose math-scroll text-left">${explanation}</div></div>`;

        modal.classList.remove('hidden');
        void modal.offsetWidth;
        content.classList.remove('scale-95', 'opacity-0');
        content.classList.add('scale-100', 'opacity-100');

    };

    window.closeFeedbackModal = function() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('feedback-modal-content');
        if(!modal) return;
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => { 
            modal.classList.add('hidden'); 
            if (window.autoAdvance) {
                if (currentIdx < currentQuestions.length - 1) {
                    window.nextQuestion();
                }
            }
        }, 300);
    };

    window.renderQuestion = function() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        if(!container) return;

        let html = `<div class="fade-in w-full">`;
        
        if (q.type === 'single') {
            const hasAnswered = userAnswers[q.id] !== undefined;
            const uAns = userAnswers[q.id];
            
            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">CÂU HỎI TRẮC NGHIỆM</h3></div>`;
            html += `<div class="flex gap-4 mb-5"><div class="w-full math-scroll"><p class="text-lg sm:text-xl font-bold text-red-600 mt-1 leading-snug tracking-tight">${q.question}</p></div></div>`;
            html += `<div class="space-y-4 md:pl-6 mt-6">`;
            q.options.forEach((opt, i) => {
                const isChecked = (uAns === i) ? 'checked' : '';
                const disabledClass = hasAnswered ? 'disabled-option' : '';
                html += `<div class="flex items-center">
                    <input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio" ${isChecked} ${hasAnswered ? 'disabled' : ''} onchange="window.selectAnswer('${q.id}', ${i}, 'single')">
                    <label for="opt_${i}" class="option-label ${disabledClass} w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg cursor-pointer">
                        <div class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50">${String.fromCharCode(65 + i)}</div>
                        <div class="text-gray-700 leading-relaxed math-scroll flex-1">${opt}</div>
                    </label>
                </div>`;
            });
            html += `</div>`;
            
        } 
        else if (q.type === 'tf_cluster') {
            
            let displayContext = q.context;

            html += `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">TRẮC NGHIỆM ĐÚNG/SAI</h3></div>`;
            html += `<div class="bg-red-50 text-red-700 p-4 rounded-xl font-bold mb-4 border-2 border-red-100 text-lg sm:text-xl leading-relaxed math-scroll">${displayContext}</div>`;
            html += `<div class="space-y-3 mt-6">`;
            q.items.forEach((item) => {
                const combinedId = q.id + '_' + item.id;
                let ans = userAnswers[combinedId];
                let btnT = ans === true ? 'selected' : ''; 
                let btnF = ans === false ? 'selected' : ''; 

                html += `<div class="p-4 sm:p-5 border-2 border-gray-100 rounded-2xl bg-white shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-4 transition-all hover:border-blue-200">
                    <div class="font-bold text-gray-800 flex-1 text-base sm:text-lg math-scroll">${item.text}</div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="window.selectAnswer('${combinedId}', true, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnT}">ĐÚNG</button>
                        <button onclick="window.selectAnswer('${combinedId}', false, 'tf')" class="btn-tf w-20 sm:w-24 py-2 sm:py-3 rounded-xl font-extrabold ${btnF}">SAI</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
        } 

        html += `</div>`;
        container.innerHTML = html;
        window.updateNav();
        window.updateProgress();
    };

    window.updateNav = function() {
        const pBtn = document.getElementById('prev-btn');
        const nBtn = document.getElementById('next-btn');
        const sBtn = document.getElementById('submit-btn');
        if(pBtn) pBtn.style.display = (currentIdx === 0) ? 'none' : 'block';
        if(nBtn) nBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'none' : 'block';
        if(sBtn) sBtn.style.display = (currentIdx === currentQuestions.length - 1) ? 'block' : 'none';
    };

    window.updateProgress = function() {
        const pgText = document.getElementById('progress-text');
        if(pgText) pgText.innerText = `${getAnsweredCount()}/${getTotalScoreItems()}`;
    };

    function formatDuration(sec) {
        const m = Math.floor(sec / 60); const s = sec % 60;
        return `${m}p ${s}s`;
    }

    window.submitQuiz = function() {
        if (!isQuizStarted) return; 
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let score = 0;

        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                if (userAnswers[q.id] === q.correct) score += 0.25; 
            } else if (q.type === 'tf_cluster') {
                let c = 0;
                q.items.forEach(item => { if (userAnswers[q.id + '_' + item.id] === item.correct) c++; });
                
                if (c === 1) score += 0.1;
                else if (c === 2) score += 0.25;
                else if (c === 3) score += 0.75;
                else if (c === 4) score += 1.0;
            }
        });

        score = score.toFixed(2); 

        const record = {
            hoTen: currentStudent.hoTen, lop: currentStudent.lop, tenDe: currentStudent.tenDe,
            diem: parseFloat(score),
            startTime: quizStartTime.toLocaleTimeString(), endTime: quizEndTime.toLocaleTimeString(),
            duration: formatDuration(Math.floor((quizEndTime - quizStartTime) / 1000)),
            thoiGian: new Date().toISOString(), deviceId: deviceId
        };
        
        if(database) {
            scoresRef.push(record, () => { window.showModalResult(score, record.duration); });
        }
    };

    window.showModalResult = function(score, dur) {
        ['login', 'quiz', 'scores', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const resEl = document.getElementById('result-section');
        if(resEl) resEl.classList.remove('hidden');
        const contentEl = document.getElementById('result-content');
        if(contentEl) contentEl.innerHTML = `
        <div class="absolute top-4 left-4 z-50">
            <button onclick="window.goHome()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition-colors shadow-sm border border-gray-200 text-sm flex items-center gap-2">🏠 Trang chủ</button>
        </div>
        <div class="text-center mt-12 sm:mt-6">
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-emerald-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2"><span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - Lớp ${currentStudent.lop}</span><br><span class="text-sm font-bold text-gray-400 mt-1 block">${currentStudent.tenDe}</span></p>
        </div>
        <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative text-center">
            <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">ĐIỂM SỐ CỦA BẠN</div>
            <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${score} <span class="text-2xl text-gray-400">/ 10</span></div>
            <div class="text-base sm:text-lg font-extrabold text-indigo-600 mt-4 bg-white inline-block px-5 py-2 rounded-full shadow-sm border border-blue-100">Thời gian làm bài: ${dur}</div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button onclick="window.reviewQuiz()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">👀 Xem lại & Giải chi tiết</button>
            <button onclick="window.viewScoresAction()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
        </div>`;
    };

    window.reviewQuiz = function() {
        showSection('review');
        const container = document.getElementById('review-content');
        if(!container) return;
        let html = '';

        currentQuestions.forEach((q) => {
            if (q.type === 'single') {
                let uAns = userAnswers[q.id];
                let isCorrect = uAns === q.correct;
                let borderColor = isCorrect ? 'border-emerald-300 bg-emerald-50' : 'border-red-300 bg-red-50';
                
                let explanation = q.explanation;
                
                let statusText = '';
                let statusClass = '';
                if (uAns === undefined) {
                    statusText = '⚠️ Bạn chưa làm câu này';
                    statusClass = 'text-orange-500 bg-orange-50 border-orange-200';
                    borderColor = 'border-orange-300 bg-orange-50';
                } else if (isCorrect) {
                    statusText = '✅ Bạn làm đúng rồi!';
                    statusClass = 'text-emerald-600 bg-emerald-50 border-emerald-200';
                } else {
                    statusText = '❌ Bạn làm sai rồi!';
                    statusClass = 'text-red-600 bg-red-50 border-red-200';
                }

                html += `<div class="p-4 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor} relative mt-4 text-left">`;
                html += `<div class="absolute -top-4 right-4 px-4 py-1 rounded-full border-2 ${statusClass} font-bold text-sm shadow-sm">${statusText}</div>`;
                html += `<div class="font-bold text-lg sm:text-xl text-slate-800 mb-4 leading-relaxed math-scroll mt-2">${q.question}</div>`;
                html += `<div class="space-y-2">`;
                
                q.options.forEach((opt, i) => {
                    let optBg = ''; let iconHtml = ''; let textStyle = 'font-medium';
                    if (q.correct === i) {
                        optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2 shadow-sm'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">✅</div>';
                        textStyle = 'font-bold';
                    } else if (uAns === i && !isCorrect) {
                        optBg = 'bg-red-50 text-red-900 border-red-300 border-2 opacity-75'; 
                        iconHtml = '<div class="text-2xl drop-shadow-sm ml-auto pl-2 flex-shrink-0">❌</div>';
                        textStyle = 'font-bold line-through decoration-red-500 decoration-2';
                    } else { 
                        optBg = 'bg-white text-slate-700 border border-slate-200'; 
                    }

                    let letterBg = (q.correct === i) ? 'bg-emerald-200 text-emerald-800' : 
                                   ((uAns === i && !isCorrect) ? 'bg-red-200 text-red-800' : 'bg-slate-100');

                    html += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3 transition-all">
                                <div class="w-8 h-8 flex items-center justify-center rounded-lg ${letterBg} text-sm font-black shadow-sm flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                                <div class="${textStyle} flex-1 math-scroll text-left">${opt}</div>
                                ${iconHtml}
                            </div>`;
                });
                html += `</div>`;
                if (q.explanation) html += `<div class="review-explanation mt-4 pt-4 border-t-2 border-gray-200"><p class="text-sm font-black uppercase tracking-widest text-blue-600 mb-2">💡 Giải chi tiết từng bước:</p><p class="text-black font-medium text-base leading-loose math-scroll text-left">${explanation}</p></div>`;
                html += `</div>`;
            } 
            else if (q.type === 'tf_cluster') {
                let displayContext = q.context;

                html += `<div class="p-4 sm:p-6 border-2 border-indigo-200 bg-indigo-50 rounded-2xl shadow-sm mb-6 text-left">`;
                html += `<div class="font-bold text-lg sm:text-xl text-indigo-800 mb-4 math-scroll">${displayContext}</div>`;
                html += `<div class="space-y-4">`;
                q.items.forEach(item => {
                    let uAns = userAnswers[q.id + '_' + item.id];
                    let isCorrect = uAns === item.correct;
                    let ansText = item.correct ? 'ĐÚNG' : 'SAI';
                    let explanation = item.expl;
                    
                    let statusText = '';
                    let statusColor = '';
                    if (uAns === undefined) {
                        statusText = '⚠️ Chưa làm';
                        statusColor = 'text-orange-500 border-orange-200';
                    } else if (isCorrect) {
                        statusText = '✅ Bạn làm đúng rồi!';
                        statusColor = 'text-emerald-600 border-emerald-200 bg-emerald-50';
                    } else {
                        statusText = '❌ Bạn làm sai rồi!';
                        statusColor = 'text-red-600 border-red-200 bg-red-50';
                    }

                    html += `<div class="p-4 bg-white border-2 border-indigo-100 rounded-xl shadow-sm">
                        <div class="font-bold text-gray-800 math-scroll mb-3">${item.text}</div>
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-gray-100 pb-3 gap-2">
                            <span class="text-sm font-bold text-gray-500">Bạn chọn: <span class="${uAns === undefined ? 'text-gray-400' : (uAns ? 'text-blue-600' : 'text-gray-600')} font-black uppercase ${!isCorrect && uAns !== undefined ? 'line-through decoration-red-500 decoration-2 text-red-500' : ''}">${uAns === undefined ? 'Chưa trả lời' : (uAns?'Đúng':'Sai')}</span></span>
                            <span class="font-black text-base text-emerald-600 bg-emerald-50 px-3 py-1 rounded-lg border border-emerald-200">ĐÁP ÁN CHUẨN: ${ansText}</span>
                            <span class="font-bold text-sm ${statusColor} px-3 py-1 rounded-lg border text-center">${statusText}</span>
                        </div>
                        <div class="review-explanation mt-3 pt-2 text-sm text-gray-700 font-medium leading-relaxed math-scroll"><span class="text-indigo-500 font-bold uppercase">Giải chi tiết:</span><br> ${explanation}</div>
                    </div>`;
                });
                html += `</div></div>`;
            }
        });
        container.innerHTML = html;
    };

    window.backToResult = function() { showSection('result'); };

    window.renderScores = function() {
        const tbody = document.getElementById('scores-tbody');
        if(!tbody) return;
        if (allScores.length === 0) { tbody.innerHTML = ''; document.getElementById('no-scores').classList.remove('hidden'); return; }
        const noScore = document.getElementById('no-scores');
        if(noScore) noScore.classList.add('hidden');
        const sorted = [...allScores].sort((a, b) => (a.lop.localeCompare(b.lop)) || (b.diem - a.diem));
        tbody.innerHTML = sorted.map((s, idx) => `<tr class="${s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-slate-50'} transition-colors border-b border-slate-100"><td class="px-4 py-4 text-center font-black text-slate-400 text-sm">#${idx + 1}</td><td class="px-4 py-4 font-black text-blue-600 text-sm">${s.lop}</td><td class="px-4 py-4 font-extrabold text-slate-800 text-sm">${s.hoTen} ${s.deviceId === deviceId ? '<span class="ml-2 bg-pink-500 text-white text-[10px] px-2 rounded-md">Bạn</span>' : ''}</td><td class="px-4 py-4 text-xs font-bold text-blue-500"><span class="bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">${s.tenDe}</span></td><td class="px-4 py-4 text-center"><span class="font-black text-lg ${s.diem >= 5 ? 'text-emerald-600' : 'text-red-500'}">${s.diem}</span></td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.startTime}</td><td class="px-4 py-4 text-center text-slate-500 text-xs">${s.endTime}</td><td class="px-4 py-4 text-right font-black text-orange-600 text-xs">${s.duration}</td>
            <td class="px-4 py-4 text-right text-xs text-slate-500 font-bold">${s.thoiGian ? new Date(s.thoiGian).toLocaleDateString('vi-VN') : '--/--/----'}</td></tr>`).join('');
    };

    function showSection(id) {
        ['login', 'quiz', 'scores', 'result', 'review'].forEach(s => {
            const el = document.getElementById(s+'-section');
            if(el) el.classList.add('hidden');
        });
        const tgt = document.getElementById(id+'-section');
        if(tgt) tgt.classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        if(!display) return;
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) window.submitQuiz();
        }, 1000);
    }

    try {
        if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
        deviceId = localStorage.getItem('deviceId');
    } catch (e) { deviceId = 'dev_temp_' + Math.random().toString(36).substr(2); }
  </script>
 </body>
</html>
