  <script>

    let isQuizStarted = false, isSubmitting = false;

    // DATA ĐỀ 1 - ĐÃ CẬP NHẬT GIẢI THÍCH CHI TIẾT
    const de1_data = [
        { id: "1_1", type: "single", question: "I _______ always ready for the computer class.", options: ["A. am", "B. is", "C. are", "D. do"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Tôi luôn sẵn sàng cho tiết học máy tính.<br>📌 <b>Giải thích chi tiết:</b> Trong câu có tính từ 'ready' (sẵn sàng) nên ta cần dùng động từ to be. Chủ ngữ là 'I' nên đi kèm với 'am'." },
        { id: "1_2", type: "single", question: "My brother _______ usually at home on Sunday mornings.", options: ["A. isn't", "B. aren't", "C. doesn't", "D. don't"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Anh trai tôi thường không ở nhà vào các sáng Chủ nhật.<br>📌 <b>Giải thích chi tiết:</b> Trong câu có giới từ 'at home' chỉ nơi chốn nên dùng động từ to be. Chủ ngữ 'My brother' (anh trai tôi) là ngôi thứ ba số ít nên dùng 'is', dạng phủ định thêm 'not' thành 'isn't'." },
        { id: "1_3", type: "single", question: "_______ you often late for school?", options: ["A. Do", "B. Are", "C. Is", "D. Does"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Bạn có thường xuyên đi học muộn không?<br>📌 <b>Giải thích chi tiết:</b> Đi với tính từ 'late' (muộn) cần dùng động từ to be. Chủ ngữ 'you' dùng 'Are', vì là câu hỏi nên đảo 'Are' lên trước chủ ngữ." },
        { id: "1_4", type: "single", question: "Mr. Son _______ always friendly and helpful to his students.", options: ["A. are", "B. is", "C. do", "D. does"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Thầy Sơn luôn thân thiện và hay giúp đỡ học sinh của mình.<br>📌 <b>Giải thích chi tiết:</b> Trong câu có các tính từ 'friendly' (thân thiện) và 'helpful' (hay giúp đỡ). Chủ ngữ 'Mr. Son' là danh từ số ít nên dùng to be 'is'." },
        { id: "1_5", type: "single", question: "The students _______ usually noisy in the library.", options: ["A. isn't", "B. aren't", "C. don't", "D. doesn't"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Các học sinh thường không ồn ào trong thư viện.<br>📌 <b>Giải thích chi tiết:</b> 'noisy' (ồn ào) là tính từ nên cần to be. Chủ ngữ 'The students' (các học sinh - số nhiều) đi với 'are', dạng phủ định là 'aren't'." },
        { id: "1_6", type: "single", question: "_______ Ms. Ha and Ms. Hong often busy on weekends?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 3, explain: "👉 <b>Dịch nghĩa:</b> Cô Hà và cô Hồng có thường bận rộn vào cuối tuần không?<br>📌 <b>Giải thích chi tiết:</b> 'busy' (bận rộn) là tính từ. Chủ ngữ gồm 2 người 'Ms. Ha and Ms. Hong' là số nhiều, nên đảo to be 'Are' lên đầu câu." },
        { id: "1_7", type: "single", question: "We _______ sometimes very tired after the IT lesson.", options: ["A. are", "B. is", "C. do", "D. am"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Đôi khi chúng tôi rất mệt sau tiết học Tin học.<br>📌 <b>Giải thích chi tiết:</b> Đi kèm tính từ 'tired' (mệt mỏi) cần dùng to be. Chủ ngữ 'We' (chúng tôi - số nhiều) đi với to be 'are'." },
        { id: "1_8", type: "single", question: "The internet connection _______ always fast in my room.", options: ["A. is", "B. are", "C. does", "D. do"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Kết nối mạng trong phòng tôi luôn luôn nhanh.<br>📌 <b>Giải thích chi tiết:</b> Đi kèm tính từ 'fast'. 'The internet connection' (sự kết nối mạng) là danh từ trừu tượng không đếm được (số ít) nên dùng to be 'is'." },
        { id: "1_9", type: "single", question: "It _______ usually cold in the winter.", options: ["A. is", "B. am", "C. are", "D. does"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Trời thường lạnh vào mùa đông.<br>📌 <b>Giải thích chi tiết:</b> Đi kèm tính từ 'cold'. Chủ ngữ giả 'It' dùng để chỉ thời tiết luôn đi kèm với to be 'is'." },
        { id: "1_10", type: "single", question: "Where _______ they usually on Saturday evenings?", options: ["A. do", "B. are", "C. is", "D. does"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Họ thường ở đâu vào các buổi tối thứ Bảy?<br>📌 <b>Giải thích chi tiết:</b> Động từ to be mang nghĩa là 'thì, là, ở'. Hỏi về vị trí (ở đâu) cần dùng to be. Chủ ngữ 'they' đi với 'are'." },
        { id: "1_11", type: "single", question: "She _______ to school by bus every day.", options: ["A. go", "B. goes", "C. going", "D. is go"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Cô ấy đi học bằng xe buýt mỗi ngày.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'She' (cô ấy) là ngôi thứ ba số ít, nên động từ 'go' kết thúc bằng chữ 'o' phải được thêm đuôi '-es' thành 'goes'." },
        { id: "1_12", type: "single", question: "They often _______ soccer after school.", options: ["A. plays", "B. play", "C. playing", "D. are play"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Họ thường chơi bóng đá sau giờ học.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'They' (Họ) là danh từ số nhiều, do đó động từ thường 'play' được giữ nguyên không chia." },
        { id: "1_13", type: "single", question: "He always _______ his teeth before going to bed.", options: ["A. brush", "B. brushs", "C. brushes", "D. brushing"], correct: 2, explain: "👉 <b>Dịch nghĩa:</b> Anh ấy luôn đánh răng trước khi đi ngủ.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'He' là ngôi thứ ba số ít. Động từ 'brush' tận cùng là '-sh' nên theo quy tắc phải thêm đuôi '-es' thành 'brushes'." },
        { id: "1_14", type: "single", question: "My mother sometimes _______ dinner for the family.", options: ["A. cook", "B. cooks", "C. is cook", "D. cooking"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Mẹ tôi thỉnh thoảng nấu bữa tối cho gia đình.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'My mother' (Mẹ tôi) tương đương với 'She' (số ít), nên động từ 'cook' phải thêm 's' thành 'cooks'." },
        { id: "1_15", type: "single", question: "We _______ English three times a week.", options: ["A. study", "B. studies", "C. studying", "D. to study"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Chúng tôi học tiếng Anh 3 lần một tuần.<br>📌 <b>Giải thích chi tiết:</b> Dấu hiệu 'three times a week'. Chủ ngữ 'We' (chúng tôi) là danh từ số nhiều, động từ 'study' giữ nguyên thể." },
        { id: "1_16", type: "single", question: "The train usually _______ at 7:00 AM.", options: ["A. leave", "B. leaves", "C. leaving", "D. to leave"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Chuyến tàu thường khởi hành lúc 7 giờ sáng.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'The train' (chuyến tàu) là vật số ít (tương đương với It). Nên động từ 'leave' phải thêm 's' thành 'leaves'." },
        { id: "1_17", type: "single", question: "My friend always _______ his homework in the evening.", options: ["A. do", "B. does", "C. doing", "D. to do"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Bạn tôi luôn làm bài tập về nhà vào buổi tối.<br>📌 <b>Giải thích chi tiết:</b> 'My friend' là một người bạn (số ít). Động từ 'do' kết thúc bằng chữ 'o' nên phải thêm '-es' thành 'does'." },
        { id: "1_18", type: "single", question: "It often _______ a lot in the summer.", options: ["A. rain", "B. rains", "C. raining", "D. is rain"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Trời thường mưa nhiều vào mùa hè.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ giả 'It' (chỉ thời tiết) là ngôi thứ ba số ít. Động từ 'rain' phải thêm 's' thành 'rains'." },
        { id: "1_19", type: "single", question: "The children always _______ TV after dinner.", options: ["A. watch", "B. watches", "C. watching", "D. watchs"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Bọn trẻ luôn xem tivi sau bữa tối.<br>📌 <b>Giải thích chi tiết:</b> 'The children' (những đứa trẻ) là dạng số nhiều của 'child'. Với chủ ngữ số nhiều, động từ 'watch' giữ nguyên không chia." },
        { id: "1_20", type: "single", question: "She sometimes _______ when she reads a sad story.", options: ["A. cry", "B. cries", "C. crys", "D. crying"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Đôi khi cô ấy khóc khi đọc một câu chuyện buồn.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'She' (số ít). Động từ 'cry' kết thúc bằng phụ âm (r) + 'y', ta phải đổi 'y' thành 'i' rồi thêm 'es' tạo thành 'cries'." },
        { id: "1_21", type: "single", question: "He usually _______ the computers for his friends.", options: ["A. fix", "B. fixs", "C. fixes", "D. fixing"], correct: 2, explain: "👉 <b>Dịch nghĩa:</b> Anh ấy thường sửa máy tính cho bạn bè.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'He' (số ít). Động từ 'fix' kết thúc bằng chữ 'x' (nằm trong nhóm o, s, x, z, ch, sh) nên phải thêm 'es' thành 'fixes'." },
        { id: "1_22", type: "single", question: "I always _______ up early in the morning.", options: ["A. gets", "B. get", "C. getting", "D. to get"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Tôi luôn thức dậy sớm vào buổi sáng.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ là ngôi thứ nhất 'I' nên động từ thường 'get' được giữ nguyên thể." },
        { id: "1_23", type: "single", question: "The school bell often _______ at 7:15.", options: ["A. ring", "B. rings", "C. ringing", "D. is ring"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Chuông trường thường reo lúc 7:15.<br>📌 <b>Giải thích chi tiết:</b> 'The school bell' (tiếng chuông trường) là danh từ sự vật số ít. Động từ 'ring' phải thêm 's' thành 'rings'." },
        { id: "1_24", type: "single", question: "My father usually _______ his car on Sundays.", options: ["A. wash", "B. washes", "C. washs", "D. washing"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Bố tôi thường rửa xe ô tô vào Chủ nhật.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'My father' (số ít). Động từ 'wash' tận cùng là '-sh' nên phải thêm '-es' thành 'washes'." },
        { id: "1_25", type: "single", question: "She often _______ a heavy backpack to school.", options: ["A. carry", "B. carries", "C. carrys", "D. carrying"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Cô ấy thường mang một chiếc ba lô nặng đến trường.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'She' (số ít). Động từ 'carry' kết thúc bằng phụ âm (r) + 'y', ta đổi 'y' thành 'i' rồi thêm 'es' tạo thành 'carries'." },
        { id: "1_26", type: "single", question: "I _______ usually play tennis on weekdays.", options: ["A. don't", "B. doesn't", "C. am not", "D. isn't"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Tôi thường không chơi quần vợt vào các ngày trong tuần.<br>📌 <b>Giải thích chi tiết:</b> Đây là câu phủ định của động từ thường ('play'). Với chủ ngữ 'I', ta phải mượn trợ động từ 'do not' (viết tắt là don't)." },
        { id: "1_27", type: "single", question: "He _______ often read comic books.", options: ["A. don't", "B. doesn't", "C. isn't", "D. aren't"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Anh ấy không thường xuyên đọc truyện tranh.<br>📌 <b>Giải thích chi tiết:</b> Câu phủ định của động từ thường ('read'). Chủ ngữ 'He' (ngôi thứ ba số ít) phải mượn trợ động từ 'does not' (doesn't)." },
        { id: "1_28", type: "single", question: "They _______ always go to the cinema on Fridays.", options: ["A. don't", "B. doesn't", "C. not", "D. aren't"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Họ không luôn luôn đi xem phim vào các ngày thứ Sáu.<br>📌 <b>Giải thích chi tiết:</b> Câu phủ định của động từ thường ('go'). Chủ ngữ 'They' (số nhiều) mượn trợ động từ 'don't'." },
        { id: "1_29", type: "single", question: "She _______ usually drink coffee in the morning.", options: ["A. don't", "B. doesn't", "C. isn't", "D. am not"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Cô ấy thường không uống cà phê vào buổi sáng.<br>📌 <b>Giải thích chi tiết:</b> Câu phủ định của động từ thường ('drink'). Chủ ngữ 'She' (số ít) mượn trợ động từ 'doesn't'." },
        { id: "1_30", type: "single", question: "We _______ often visit our grandparents in the city.", options: ["A. doesn't", "B. don't", "C. aren't", "D. isn't"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Chúng tôi không thường xuyên về thăm ông bà ở thành phố.<br>📌 <b>Giải thích chi tiết:</b> Câu phủ định của động từ thường ('visit'). Chủ ngữ 'We' (số nhiều) mượn trợ động từ 'don't'." },
        { id: "1_31", type: "single", question: "The bus _______ always arrive on time.", options: ["A. don't", "B. doesn't", "C. isn't", "D. aren't"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Xe buýt không phải lúc nào cũng đến đúng giờ.<br>📌 <b>Giải thích chi tiết:</b> 'The bus' (chiếc xe buýt) là chủ ngữ số ít. Câu phủ định động từ thường 'arrive' cần mượn trợ động từ 'doesn't'." },
        { id: "1_32", type: "single", question: "My cat _______ usually sleep in the kitchen.", options: ["A. don't", "B. doesn't", "C. isn't", "D. am not"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Con mèo của tôi thường không ngủ trong bếp.<br>📌 <b>Giải thích chi tiết:</b> 'My cat' (số ít). Câu phủ định động từ thường 'sleep' cần mượn trợ động từ 'doesn't'." },
        { id: "1_33", type: "single", question: "You _______ often write emails to your friends.", options: ["A. doesn't", "B. don't", "C. aren't", "D. isn't"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Bạn không thường xuyên viết email cho bạn bè.<br>📌 <b>Giải thích chi tiết:</b> Với chủ ngữ 'You', câu phủ định động từ thường 'write' mượn trợ động từ 'don't'." },
        { id: "1_34", type: "single", question: "Mr. Son _______ always teach on Friday afternoons.", options: ["A. don't", "B. doesn't", "C. isn't", "D. aren't"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Thầy Sơn không phải lúc nào cũng dạy vào các buổi chiều thứ Sáu.<br>📌 <b>Giải thích chi tiết:</b> 'Mr. Son' là danh từ số ít. Câu phủ định động từ thường 'teach' mượn trợ động từ 'doesn't'." },
        { id: "1_35", type: "single", question: "The students _______ usually forget their passwords.", options: ["A. don't", "B. doesn't", "C. aren't", "D. isn't"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Học sinh thường không quên mật khẩu của mình.<br>📌 <b>Giải thích chi tiết:</b> 'The students' (số nhiều). Câu phủ định động từ thường 'forget' mượn trợ động từ 'don't'." },
        { id: "1_36", type: "single", question: "It _______ often snow in Vietnam.", options: ["A. don't", "B. doesn't", "C. isn't", "D. aren't"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Ở Việt Nam không thường xuyên có tuyết rơi.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ giả 'It' chỉ thời tiết là số ít. Câu phủ định động từ thường 'snow' (tuyết rơi) mượn trợ động từ 'doesn't'." },
        { id: "1_37", type: "single", question: "She _______ always wear a jacket to school.", options: ["A. don't", "B. doesn't", "C. isn't", "D. aren't"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Cô ấy không phải lúc nào cũng mặc áo khoác đến trường.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'She' (số ít). Câu phủ định động từ thường 'wear' mượn trợ động từ 'doesn't'." },
        { id: "1_38", type: "single", question: "They _______ usually design websites on their phones.", options: ["A. don't", "B. doesn't", "C. aren't", "D. isn't"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Họ thường không thiết kế trang web trên điện thoại di động.<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'They' (số nhiều). Câu phủ định động từ thường 'design' mượn trợ động từ 'don't'." },
        { id: "1_39", type: "single", question: "_______ you usually listen to music before bed?", options: ["A. Do", "B. Does", "C. Are", "D. Is"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Bạn có thường nghe nhạc trước khi đi ngủ không?<br>📌 <b>Giải thích chi tiết:</b> Đây là câu hỏi với động từ thường 'listen'. Chủ ngữ 'you' nên phải mượn trợ động từ 'Do' đảo lên đầu câu." },
        { id: "1_40", type: "single", question: "_______ she often play the piano?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Cô ấy có thường chơi đàn piano không?<br>📌 <b>Giải thích chi tiết:</b> Câu hỏi động từ thường 'play'. Chủ ngữ 'she' (số ít) nên mượn trợ động từ 'Does' đảo lên đầu câu." },
        { id: "1_41", type: "single", question: "_______ they always eat lunch at the school canteen?", options: ["A. Does", "B. Do", "C. Are", "D. Is"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Họ có luôn ăn trưa ở căng tin trường không?<br>📌 <b>Giải thích chi tiết:</b> Câu hỏi động từ thường 'eat'. Chủ ngữ 'they' (số nhiều) nên mượn trợ động từ 'Do'." },
        { id: "1_42", type: "single", question: "_______ he usually watch educational videos on YouTube?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Anh ấy có thường xem các video giáo dục trên YouTube không?<br>📌 <b>Giải thích chi tiết:</b> Câu hỏi động từ thường 'watch'. Chủ ngữ 'he' (số ít) nên mượn trợ động từ 'Does'." },
        { id: "1_43", type: "single", question: "What time _______ you usually get up?", options: ["A. do", "B. does", "C. are", "D. is"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Bạn thường thức dậy lúc mấy giờ?<br>📌 <b>Giải thích chi tiết:</b> Câu hỏi có từ để hỏi (What time) với động từ thường 'get up'. Chủ ngữ 'you' nên dùng trợ động từ 'do' đặt sau từ để hỏi." },
        { id: "1_44", type: "single", question: "_______ your mother often go shopping?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Mẹ của bạn có thường đi mua sắm không?<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'your mother' (mẹ của bạn) là ngôi thứ 3 số ít. Động từ thường 'go' nên cần mượn trợ động từ 'Does'." },
        { id: "1_45", type: "single", question: "How often _______ they practice coding?", options: ["A. do", "B. does", "C. are", "D. is"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Họ thực hành viết code với tần suất như thế nào?<br>📌 <b>Giải thích chi tiết:</b> Câu hỏi có từ để hỏi (How often). Chủ ngữ 'they' đi với động từ thường 'practice' nên mượn trợ động từ 'do'." },
        { id: "1_46", type: "single", question: "_______ it usually rain heavily in July?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Trời có thường mưa to vào tháng 7 không?<br>📌 <b>Giải thích chi tiết:</b> Câu hỏi với động từ thường 'rain' (mưa). Chủ ngữ giả 'it' số ít nên mượn trợ động từ 'Does'." },
        { id: "1_47", type: "single", question: "Where _______ she often spend her summer holidays?", options: ["A. do", "B. does", "C. are", "D. is"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Cô ấy thường dành kỳ nghỉ hè ở đâu?<br>📌 <b>Giải thích chi tiết:</b> Câu hỏi với từ để hỏi (Where). Chủ ngữ 'she' (số ít) đi với động từ thường 'spend' (tiêu tốn/dành) nên dùng trợ động từ 'does'." },
        { id: "1_48", type: "single", question: "_______ the students always finish their exercises?", options: ["A. Does", "B. Do", "C. Are", "D. Is"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Học sinh có luôn hoàn thành bài tập của họ không?<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'the students' là danh từ số nhiều. Câu hỏi động từ thường 'finish' mượn trợ động từ 'Do'." },
        { id: "1_49", type: "single", question: "Why _______ he often come to class late?", options: ["A. do", "B. does", "C. are", "D. is"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Tại sao cậu ấy thường đến lớp muộn?<br>📌 <b>Giải thích chi tiết:</b> Câu hỏi (Why) với động từ thường 'come'. Chủ ngữ 'he' (số ít) mượn trợ động từ 'does'." },
        { id: "1_50", type: "single", question: "_______ Ms. Ha usually give a lot of homework?", options: ["A. Do", "B. Does", "C. Are", "D. Is"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Cô Hà có thường cho nhiều bài tập về nhà không?<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ 'Ms. Ha' là danh từ số ít. Câu hỏi động từ thường 'give' mượn trợ động từ 'Does'." },

        { id: "2_46", type: "single", question: "_______ the Earth rotate on its axis?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Trái đất có tự quay quanh trục của nó không?<br>📌 <b>Giải thích chi tiết:</b> Chủ ngữ số ít 'the Earth' mượn trợ động từ 'Does'." },
        { id: "2_47", type: "single", question: "_______ fish breathe through gills?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Có phải loài cá thở bằng mang không?<br>📌 <b>Giải thích chi tiết:</b> Từ 'fish' ở đây mang nghĩa là loài cá nói chung (tập hợp số nhiều), nên mượn trợ động từ 'Do'." },
        { id: "2_48", type: "single", question: "_______ a web browser connect you to the Internet?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 1, explain: "👉 <b>Dịch nghĩa:</b> Có phải trình duyệt web kết nối bạn với Internet không?<br>📌 <b>Giải thích chi tiết:</b> Trình duyệt web ('a web browser' - số ít) mượn trợ động từ 'Does'." },
        { id: "2_49", type: "single", question: "_______ birds lay eggs?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Các loài chim có đẻ trứng không?<br>📌 <b>Giải thích chi tiết:</b> Loài chim ('birds' - số nhiều) mượn trợ động từ 'Do'." },
        { id: "2_50", type: "single", question: "_______ herbivores eat meat?", options: ["A. Do", "B. Does", "C. Is", "D. Are"], correct: 0, explain: "👉 <b>Dịch nghĩa:</b> Động vật ăn cỏ có ăn thịt không?<br>📌 <b>Giải thích chi tiết:</b> Động vật ăn cỏ ('herbivores' - số nhiều) mượn trợ động từ 'Do'." },
        { id: "2_essay", type: "essay", question: "📝 WRITING: Write a paragraph (about 100-150 words) about a scientific fact or natural phenomenon you know.", suggested: "One of the most interesting scientific facts is the water cycle. The water cycle is a continuous process that connects all the water on Earth. First, the heat from the Sun causes water in oceans, lakes, and rivers to evaporate into the air as water vapor. This is called evaporation. Then, as the vapor rises into the sky, it cools down and forms clouds. This process is called condensation. When the clouds become too heavy, the water falls back to the Earth as rain or snow. This is known as precipitation. The rainwater then flows back into rivers and oceans, and the cycle starts again. This amazing natural phenomenon is essential for all living things because it provides fresh water for plants, animals, and humans to survive." }
    ];

    const testBanks = { de1: de1_data, de2: de2_data };
    let currentQuestions = [];
    let deviceId = '';
    let allScores = [];
    let currentStudent = {};
    let userAnswers = {};
    let timerInterval;
    let quizStartTime, quizEndTime;

    window.startQuizAction = function() {
        const errDiv = document.getElementById('login-error');
        errDiv.classList.add('hidden');
        const name = document.getElementById('hoTen').value.trim();
        const lop = document.getElementById('lop').value.trim();
        const checkedRadio = document.querySelector('input[name="chonDe"]:checked');
        if (!name || !lop) {
            errDiv.innerText = "⚠️ Vui lòng nhập đầy đủ Họ tên và Lớp!";
            errDiv.classList.remove('hidden');
            return;
        }
        if (name && lop && checkedRadio) {
            const maDe = checkedRadio.value;
            const tenDe = checkedRadio.nextElementSibling.querySelector('.de-text').innerText.split('\n')[0].trim();
            currentStudent = { hoTen: name, lop: lop, maDe: maDe, tenDe: tenDe };
            
            let rawQuestions = JSON.parse(JSON.stringify(testBanks[maDe]));
            rawQuestions.forEach((q, idx) => { 
                if(q.type === 'single') q.displayQuestion = `Câu ${idx + 1}: ${q.question}`;
                else q.displayQuestion = q.question;
            });

            currentQuestions = rawQuestions;
            quizStartTime = new Date();
            
            setTimeout(() => { isQuizStarted = true; }, 1000);
            showSection('quiz');
            document.getElementById('quiz-title').innerText = currentStudent.tenDe;
            document.getElementById('student-info').innerText = `${currentStudent.hoTen} - Lớp ${currentStudent.lop}`;
            currentIdx = 0;
            userAnswers = {};
            window.renderQuestion();
            startTimer(45 * 60);
        }
    };

    window.prevQuestion = function() {
        if (currentIdx > 0) { currentIdx--; window.renderQuestion(); }
    };

    window.nextQuestion = function() {
        if (currentIdx < currentQuestions.length - 1) { currentIdx++; window.renderQuestion(); }
    };

    window.viewScoresAction = function() {
        const btn = document.getElementById('view-scores-btn') || document.createElement('button');
        btn.innerText = "⏳ Đang tải dữ liệu...";
        if (database) {
            scoresRef.once('value').then((snapshot) => {
                const data = snapshot.val();
                allScores = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
                window.renderScores();
                btn.innerText = "🏆 Xem bảng xếp hạng";
                showSection('scores');
            });
        }
    };

    window.goHome = function() {
        document.getElementById('hoTen').value = ''; 
        document.getElementById('lop').value = ''; 
        clearInterval(timerInterval);
        showSection('login');
    };

    function getTotalItems() { return currentQuestions.length; }

    function getAnsweredCount() {
        let count = 0;
        currentQuestions.forEach(q => {
            if (userAnswers[q.id] !== undefined && userAnswers[q.id].toString().trim() !== '') count++;
        });
        return count;
    }

    window.selectAnswer = function(qId, val) {
        userAnswers[qId] = val;
        window.updateProgress();
    };

    window.renderQuestion = function() {
        if (!currentQuestions || currentQuestions.length === 0) return;
        const q = currentQuestions[currentIdx];
        const container = document.getElementById('question-container');
        
        if (q.type === 'single') {
            let isFirstSingle = (currentIdx === 0);
            container.innerHTML = `<div class="fade-in">${isFirstSingle ? `<div class="flex items-center gap-3 mb-6 border-b-2 border-blue-100 pb-3"><span class="bg-gradient-to-br from-blue-400 to-cyan-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">I</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 tracking-wide uppercase">PHẦN TRẮC NGHIỆM (8 ĐIỂM)</h3></div>` : ''}<div class="flex gap-4 mb-5"><div class="w-full"><p class="text-lg sm:text-xl font-bold text-red-600 mt-1 leading-snug tracking-tight">${q.displayQuestion}</p></div></div><div class="space-y-4 md:pl-14 mt-6">${q.options.map((opt, i) => `<div class="flex items-center"><input type="radio" id="opt_${i}" name="q_${q.id}" value="${i}" class="hidden single-radio" ${userAnswers[q.id] === i ? 'checked' : ''} onchange="window.selectAnswer('${q.id}', ${i})"><label for="opt_${i}" class="option-label w-full p-4 border-2 border-gray-200 rounded-2xl flex items-center gap-4 bg-white shadow-sm font-bold text-lg"><span class="w-10 h-10 rounded-xl border-2 border-gray-300 flex items-center justify-center text-base font-black text-gray-400 flex-shrink-0 bg-gray-50 transition-colors shadow-sm">${String.fromCharCode(65 + i)}</span><span class="text-gray-700 leading-relaxed">${opt}</span></label></div>`).join('')}</div></div>`;
        } else if (q.type === 'essay') {
            let val = userAnswers[q.id] || '';
            container.innerHTML = `<div class="fade-in"><div class="flex items-center gap-3 mb-6 border-b-2 border-orange-100 pb-3"><span class="bg-gradient-to-br from-orange-400 to-red-500 text-white w-10 h-10 flex items-center justify-center rounded-xl font-bold text-xl shadow-md">II</span><h3 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-600 tracking-wide uppercase">PHẦN TỰ LUẬN (2 ĐIỂM)</h3></div><div class="bg-red-50 border-2 border-red-200 p-4 rounded-2xl mb-4 text-red-600 font-bold shadow-inner">${q.displayQuestion}</div><textarea id="essay_${q.id}" class="essay-box" placeholder="Start writing your paragraph here..." oninput="window.selectAnswer('${q.id}', this.value)">${val}</textarea><p class="text-sm text-gray-500 mt-2 italic">*Hệ thống tự động chấm: Viết >50 từ được 2 điểm, >20 từ được 1 điểm.</p></div>`;
        }
        
        window.updateNav();
        window.updateProgress();
    };

    window.updateNav = function() {
        document.getElementById('prev-btn').style.display = (currentIdx === 0) ? 'none' : 'block';
        document.getElementById('next-btn').style.display = (currentIdx === currentQuestions.length - 1) ? 'none' : 'block';
        document.getElementById('submit-btn').style.display = (currentIdx === currentQuestions.length - 1) ? 'block' : 'none';
    };

    window.updateProgress = function() {
        document.getElementById('progress-text').innerText = `${getAnsweredCount()}/${getTotalItems()} câu`;
    };

    function formatDuration(sec) {
        const m = Math.floor(sec / 60); const s = sec % 60;
        return `${m}p ${s}s`;
    }

    window.submitQuiz = function() {
        if (!isQuizStarted) return; 
        isQuizStarted = false; 
        quizEndTime = new Date();
        clearInterval(timerInterval);
        
        let correctMC = 0;
        let totalMC = 50; 
        let essayScore = 0;

        currentQuestions.forEach(q => {
            if (q.type === 'single') {
                if (userAnswers[q.id] === q.correct) correctMC++;
            } else if (q.type === 'essay') {
                let ans = (userAnswers[q.id] || '').trim();
                let wordCount = ans ? ans.split(/\s+/).length : 0;
                if (wordCount >= 50) essayScore = 2;
                else if (wordCount >= 20) essayScore = 1;
                else if (wordCount > 0) essayScore = 0.5;
            }
        });

        let mcScore = (correctMC / totalMC) * 8; 
        let totalScore = mcScore + essayScore;

        const record = {
            hoTen: currentStudent.hoTen, lop: currentStudent.lop, tenDe: currentStudent.tenDe,
            diemTrắcNghiệm: mcScore.toFixed(2), diemTuLuan: essayScore.toFixed(2), diemTong: totalScore.toFixed(2),
            soCauDung: correctMC, tongCau: totalMC,
            startTime: quizStartTime.toLocaleTimeString(), endTime: quizEndTime.toLocaleTimeString(),
            duration: formatDuration(Math.floor((quizEndTime - quizStartTime) / 1000)),
            thoiGian: new Date().toISOString(), deviceId: deviceId
        };
        
        if(database) {
            scoresRef.push(record, () => { window.showModalResult(totalScore.toFixed(2), mcScore.toFixed(2), essayScore.toFixed(2), record.duration); });
        }
    };

    window.showModalResult = function(totalScore, mcScore, essayScore, dur) {
        ['login', 'quiz', 'scores', 'review'].forEach(s => document.getElementById(s+'-section').classList.add('hidden'));
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('result-content').innerHTML = `
        <div class="text-center">
            <div class="text-6xl sm:text-7xl mb-4 animate-bounce">🎉</div>
            <h3 class="text-2xl sm:text-3xl font-black text-emerald-600 mb-2">Hoàn thành bài thi!</h3>
            <p class="text-gray-600 mb-6 mt-2"><span class="font-extrabold text-blue-700 text-lg sm:text-xl uppercase tracking-wider">${currentStudent.hoTen} - Lớp ${currentStudent.lop}</span><br><span class="text-sm font-bold text-gray-400 mt-1 block">${currentStudent.tenDe}</span></p>
        </div>
        <div class="bg-blue-50 border-2 border-blue-100 rounded-3xl p-6 mb-6 shadow-inner relative text-center">
            <div class="text-sm text-blue-500 font-extrabold mb-2 uppercase tracking-widest">TỔNG ĐIỂM CỦA BẠN</div>
            <div class="text-6xl sm:text-7xl font-black text-blue-600 drop-shadow-sm">${totalScore} <span class="text-2xl text-gray-400">/ 10</span></div>
            <div class="flex justify-center gap-4 mt-4">
                <span class="bg-white px-4 py-2 rounded-xl shadow-sm font-bold text-indigo-600 text-sm">Trắc nghiệm: ${mcScore}/8</span>
                <span class="bg-white px-4 py-2 rounded-xl shadow-sm font-bold text-orange-600 text-sm">Tự luận: ${essayScore}/2</span>
            </div>
            <div class="text-sm font-bold text-gray-500 mt-4">Thời gian làm bài: ${dur}</div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
            <button onclick="window.reviewQuiz()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">👀 Xem lại bài</button>
            <button onclick="window.viewScoresAction()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-extrabold shadow-sm hover:shadow-md transition-colors text-lg">🏆 Bảng điểm</button>
        </div>`;
    };

    window.reviewQuiz = function() {
        showSection('review');
        const container = document.getElementById('review-content');
        let html = '';

        currentQuestions.forEach((q, idx) => {
            if (q.type === 'single') {
                let uAns = userAnswers[q.id];
                let isCorrect = uAns === q.correct;
                let borderColor = isCorrect ? 'border-emerald-300 bg-emerald-50' : 'border-red-300 bg-red-50';
                html += `<div class="p-4 sm:p-6 border-2 rounded-2xl shadow-sm mb-6 ${borderColor}">`;
                html += `<div class="font-bold text-lg sm:text-xl text-red-600 mb-4 leading-relaxed">${q.displayQuestion}</div>`;
                html += `<div class="space-y-2 mb-4">`;
                q.options.forEach((opt, i) => {
                    let optBg = ''; let iconHtml = '';
                    if (q.correct === i) {
                        optBg = 'bg-emerald-100 text-emerald-900 border-emerald-400 border-2'; 
                        iconHtml = '<span class="text-2xl drop-shadow-sm ml-auto">✅</span>';
                    } else if (uAns === i && !isCorrect) {
                        optBg = 'bg-red-100 text-red-900 line-through border-red-400 border-2'; 
                        iconHtml = '<span class="text-2xl drop-shadow-sm ml-auto">❌</span>';
                    } else { optBg = 'bg-white text-slate-700 border border-slate-200'; }

                    html += `<div class="p-3 rounded-xl ${optBg} flex items-center gap-3">
                                <span class="w-8 h-8 flex items-center justify-center rounded-lg bg-white/50 text-sm font-black shadow-sm">${String.fromCharCode(65 + i)}</span>
                                <span class="${(q.correct === i || uAns === i) ? 'font-semibold' : 'font-medium'} flex-1">${opt}</span>
                                ${iconHtml}
                             </div>`;
                });
                html += `</div>`;
                // ĐÃ CẬP NHẬT CÁCH HIỂN THỊ HTML TRONG PHẦN GIẢI THÍCH
                html += `<div class="bg-blue-50 p-4 rounded-xl border border-blue-200 mt-2">
                            <div class="text-blue-900 font-medium leading-relaxed">${q.explain}</div>
                         </div>`;
                html += `</div>`;
            } else if (q.type === 'essay') {
                html += `<div class="p-4 sm:p-6 border-2 border-orange-300 bg-orange-50 rounded-2xl shadow-sm mb-6">`;
                html += `<div class="font-bold text-lg sm:text-xl text-red-600 mb-4">${q.displayQuestion}</div>`;
                html += `<div class="bg-white p-4 rounded-xl border border-gray-200 mb-4 min-h-[100px]"><span class="font-bold text-gray-500 block mb-2">Bài làm của bạn:</span>${userAnswers[q.id] || '<span class="text-gray-400 italic">Không có nội dung</span>'}</div>`;
                html += `<div class="bg-emerald-100 p-4 rounded-xl border border-emerald-200"><span class="font-bold text-emerald-800 block mb-2">📝 Bài luận tham khảo:</span> <span class="text-emerald-900 font-medium whitespace-pre-wrap">${q.suggested}</span></div>`;
                html += `</div>`;
            }
        });
        container.innerHTML = html;
    };

    window.backToResult = function() { showSection('result'); };

    window.renderScores = function() {
        const tbody = document.getElementById('scores-tbody');
        if (allScores.length === 0) { tbody.innerHTML = ''; document.getElementById('no-scores').classList.remove('hidden'); return; }
        document.getElementById('no-scores').classList.add('hidden');
        const sorted = [...allScores].sort((a, b) => (b.diemTong - a.diemTong) || (a.lop.localeCompare(b.lop)));
        tbody.innerHTML = sorted.map((s, idx) => `<tr class="${s.deviceId === deviceId ? 'my-score-row' : 'hover:bg-slate-50'} transition-colors border-b border-slate-100"><td class="px-4 py-4 text-center font-black text-slate-400 text-sm">#${idx + 1}</td><td class="px-4 py-4 font-black text-blue-600 text-sm">${s.lop}</td><td class="px-4 py-4 font-extrabold text-slate-800 text-sm">${s.hoTen} ${s.deviceId === deviceId ? '<span class="ml-2 bg-pink-500 text-white text-[10px] px-2 rounded-md">Bạn</span>' : ''}</td><td class="px-4 py-4 text-xs font-bold text-blue-500"><span class="bg-blue-50 border border-blue-100 px-2 py-1 rounded-md">${s.tenDe}</span></td><td class="px-4 py-4 text-center text-slate-600 font-bold text-sm">${s.soCauDung}/${s.tongCau} (${s.diemTrắcNghiệm}đ)</td><td class="px-4 py-4 text-center text-slate-600 font-bold text-sm">${s.diemTuLuan}đ</td><td class="px-4 py-4 text-center"><span class="font-black text-lg ${parseFloat(s.diemTong) >= 5 ? 'text-emerald-600' : 'text-red-500'}">${s.diemTong}</span></td><td class="px-4 py-4 text-right font-black text-orange-600 text-xs">${s.duration}</td></tr>`).join('');
    };

    function showSection(id) {
        ['login', 'quiz', 'scores', 'result', 'review'].forEach(s => document.getElementById(s+'-section').classList.add('hidden'));
        document.getElementById(id+'-section').classList.remove('hidden');
    }

    function startTimer(seconds) {
        const display = document.getElementById('timer');
        let remaining = seconds;
        timerInterval = setInterval(() => {
            remaining--;
            const m = Math.floor(remaining / 60).toString().padStart(2, '0');
            const s = (remaining % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (remaining <= 0) window.submitQuiz();
        }, 1000);
    }

    try {
        if (!localStorage.getItem('deviceId')) {
            localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substr(2) + Date.now());
        }
        deviceId = localStorage.getItem('deviceId');
    } catch (e) { deviceId = 'dev_temp_' + Math.random().toString(36).substr(2); }
  </script>
 </body>
</html>
